    ${sel('usBranchF',US_BRANCH,US_BRANCHES.map(b=>({v:b,t:b})),"كل الفروع")}
    ${sel('usDeptF',US_DEPT,US_DEPTS.map(d=>({v:d,t:d})),"كل الأقسام")}
    ${sel('usStatusF',US_STATUS,[{v:'active',t:"نشط"},{v:'inactive',t:"غير نشط"},{v:'pending',t:"دعوة معلّقة"}],"كل الحالات")}
    ${sel('usDateF',US_DATE,[{v:'30',t:"آخر 30 يومًا"},{v:'90',t:"آخر 90 يومًا"},{v:'365',t:"آخر سنة"}],"تاريخ الإضافة")}
    ${(US_ROLE!=='all'||US_BRANCH!=='all'||US_DEPT!=='all'||US_STATUS!=='all'||US_DATE!=='all'||US_Q)
      ? `<button class="dd-reset" id="usResetAll">${svg('refresh','ic-sm')}<span>مسح الفلاتر</span></button>`:''}
    <button class="tool primary" id="usAdd">${svg('user')}<span>إضافة مستخدم</span></button>
  </div>`;

  return `${header}
    ${kpiSection('01',"نظرة عامة على المستخدمين",KPIS)}
    ${ecSec('02',"قائمة المستخدمين",table)}
    ${ecSec('03',"نظرة عامة على الأدوار",roleCards)}
    ${ecSec('04',"مصفوفة الصلاحيات",matrix)}
    ${ecSec('05',"أحدث نشاط المستخدمين",activity)}
    ${AddUserDrawer()}
    ${ProfileDrawer()}
    ${PermDrawer()}
    ${DisableDialog()}`;
}

function tgBullet(k){
  const ach=tgAch(k), pct=Math.min(120,ach);
  const W=100;
  return `<div class="tg-bul" data-kpi="${k.id}">
    <div class="tg-bul-h"><span>${k.ar}</span>
      <b class="${ach>=100?'ok':ach>=85?'warn':'bad'}">${ach.toFixed(1)}%</b></div>
    <div class="tg-bul-t">
      <i class="tg-bul-q" style="width:${(85/120*W).toFixed(1)}%"></i>
      <i class="tg-bul-f ${ach>=100?'ok':ach>=85?'warn':'bad'}" style="width:${(pct/120*W).toFixed(1)}%"></i>
      <i class="tg-bul-m" style="inset-inline-start:${(100/120*W).toFixed(1)}%"></i>
    </div>
    <div class="tg-bul-l"><span>فعلي ${aiNum(k.actual)}</span><span>مستهدف ${aiNum(k.target)} ${k.unit}</span></div>
  </div>`;
}
function tgRadial(v){
  const r=54, C=2*Math.PI*r, off=C*(1-Math.min(100,v)/100);
  return `<div class="tg-rad">
    <svg viewBox="0 0 130 130">
      <circle cx="65" cy="65" r="${r}" fill="none" stroke="var(--chart-track)" stroke-width="11"/>
      <circle cx="65" cy="65" r="${r}" fill="none" stroke="${v>=100?'var(--fill-hi)':v>=85?'var(--fill-mid)':'var(--warning)'}"
        stroke-width="11" stroke-linecap="round" stroke-dasharray="${C.toFixed(1)}"
        stroke-dashoffset="${off.toFixed(1)}" transform="rotate(-90 65 65)" class="tg-rad-a"/>
      <text x="65" y="62" text-anchor="middle" font-size="26" font-weight="800" fill="var(--ink)" font-family="Cairo">${v.toFixed(0)}%</text>
      <text x="65" y="80" text-anchor="middle" font-size="10" font-weight="600" fill="var(--faint)" font-family="Cairo">التحقيق الكلي</text>
    </svg>
    <div class="tg-rad-s">${TG_KPIS.filter(k=>tgAch(k)>=100).length} من ${TG_KPIS.length} مستهدفات محقّقة</div>
  </div>`;
}
function tgTrend(){
  const S=tgSeries(), T=S.t, A=S.a, n=T.length;
  const W=760,H=250,PL=46,PR=18,PT=18,PB=34;
  const iw=W-PL-PR, ih=H-PT-PB;
  const all=[...T,...A];
  let mn=Math.min(...all), mx=Math.max(...all);
  const pad=(mx-mn)*0.16||1; mn=Math.max(0,mn-pad); mx=mx+pad;
  const X=i=>PL+(n===1?iw/2:i/(n-1)*iw), Y=v=>PT+ih-((v-mn)/(mx-mn))*ih;
  const P1=T.map((v,i)=>[X(i),Y(v)]), P2=A.map((v,i)=>[X(i),Y(v)]);
  const d1=fcSmooth(P1), d2=fcSmooth(P2);
  const areaOf=(d,p)=>d+` L${p[n-1][0].toFixed(1)} ${(PT+ih).toFixed(1)} L${p[0][0].toFixed(1)} ${(PT+ih).toFixed(1)} Z`;
  const grid=[0,.25,.5,.75,1].map(f=>{
    const gy=PT+ih-f*ih, v=mn+(mx-mn)*f;
    return `<line class="fc-grid" x1="${PL}" y1="${gy.toFixed(1)}" x2="${W-PR}" y2="${gy.toFixed(1)}"/>
      <text class="fc-ylbl" x="${PL-9}" y="${(gy+3.5).toFixed(1)}" text-anchor="end">${v.toFixed(v<20?1:0)}</text>`;
  }).join('');
  const step=Math.ceil(n/6);
  const xlbl=S.labels.map((m,i)=> (i%step===0||i===n-1)
    ? `<text class="fc-xlbl" x="${X(i).toFixed(1)}" y="${H-11}" text-anchor="middle">${m}</text>`:'').join('');
  /* أشهر دون المستهدف — تُبرز بنقطة */
  const miss=A.map((v,i)=> v<T[i]
    ? `<circle cx="${X(i).toFixed(1)}" cy="${Y(v).toFixed(1)}" r="3.2" fill="var(--down)" opacity=".9"/>`:'').join('');
  /* مناطق التفاعل */
  const hits=T.map((_,i)=>`<rect class="tgt-hit" x="${(X(i)-iw/(n-1)/2).toFixed(1)}" y="${PT}"
      width="${(iw/(n-1)).toFixed(1)}" height="${ih.toFixed(1)}" fill="transparent"
      data-i="${i}" data-x="${X(i).toFixed(1)}"
      data-yt="${Y(T[i]).toFixed(1)}" data-ya="${Y(A[i]).toFixed(1)}"
      data-vt="${T[i]}" data-va="${A[i]}" data-lbl="${S.labels[i]}"></rect>`).join('');
  const metricSel=`<select class="fc-sel" id="tgTMetric">
    <option value="all" ${TG_TMETRIC==='all'?'selected':''}>كل المؤشرات</option>
    ${TG_KPIS.map(k=>`<option value="${k.id}" ${TG_TMETRIC===k.id?'selected':''}>${k.ar}</option>`).join('')}
  </select>`;
  const rangeSw=`<div class="sec-filter" id="tgTRange">
    <button data-tr="6m" class="${TG_TRANGE==='6m'?'on':''}">6 أشهر</button>
    <button data-tr="12m" class="${TG_TRANGE==='12m'?'on':''}">12 شهرًا</button></div>`;
  const gap=(A[n-1]-T[n-1]).toFixed(1), ahead=+gap>=0;
  return `<div class="card tgt-card">
    <div class="card-head" style="align-items:flex-start;flex-wrap:wrap;gap:9px">
      <div class="card-title">المستهدف مقابل الفعلي عبر الزمن
        <span class="sub">آخر ${TG_TRANGE==='12m'?'12 شهرًا':'6 أشهر'} · ${S.unit} · النقاط الحمراء = دون المستهدف</span></div>
      <div class="tgt-ctrl">${metricSel}${rangeSw}</div>
    </div>
    <div class="tgt-legend">
      <span><i class="t"></i>المستهدف</span><span><i class="a"></i>الفعلي</span>
      <span class="tgt-gap ${ahead?'ok':'bad'}">${ahead?'+':''}${gap} ${S.unit} ${ahead?'فوق':'دون'} المستهدف</span>
    </div>
    <div class="tgt-plot" id="tgtPlot">
      <svg viewBox="0 0 ${W} ${H}" class="tgt-svg">
        <defs><linearGradient id="tgtG" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="var(--bg-4)" stop-opacity=".24"/>
          <stop offset="100%" stop-color="var(--bg-4)" stop-opacity="0"/></linearGradient></defs>
        ${grid}
        <path d="${areaOf(d2,P2)}" fill="url(#tgtG)"/>
        <path class="tgt-l1" d="${d1}"/>
        <path class="tgt-l2" d="${d2}"/>
        ${miss}
        <line class="tgt-cursor" id="tgtCur" y1="${PT}" y2="${(PT+ih).toFixed(1)}"/>
        <circle class="tgt-dot t" id="tgtDotT" r="5"/>
        <circle class="tgt-dot a" id="tgtDotA" r="5"/>
        ${hits}${xlbl}
      </svg>
      <div class="tgt-tip" id="tgtTip"></div>
    </div></div>`;
}

function pfColumns(){

  const mx=Math.max(...C.rev,...C.exp,...C.prof)*1.12;
  const W=560,H=210,PL=38,PR=10,PT=12,PB=28;
  const iw=W-PL-PR, ih=H-PT-PB;
  const gw=iw/n, bw=Math.min(13,gw/4.2);
  const grid=[0,.5,1].map(f=>{const gy=PT+ih-f*ih;
    return `<line class="fc-grid" x1="${PL}" y1="${gy.toFixed(1)}" x2="${W-PR}" y2="${gy.toFixed(1)}"/>

function pfChSpark(v,dir){
  const W=140,H=30,mn=Math.min(...v),mx=Math.max(...v),r=(mx-mn)||1;
  const p=v.map((x,i)=>[2+i/(v.length-1)*(W-4), H-3-((x-mn)/r)*(H-8)]);
  const d=p.map((q,i)=>(i?'L':'M')+q[0].toFixed(1)+' '+q[1].toFixed(1)).join(' ');
  return `<svg class="pk-spark" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <path d="${d} L${W-2} ${H-1} L2 ${H-1} Z" class="pk-fill ${dir}"/>
    <path d="${d}" class="pk-line ${dir}"/></svg>`;
}

/* معامل التحجيم: حصة القناة من الإيراد الكلي.
   البطاقات ذات البُعد القنواتي الحقيقي تُصفّى مباشرةً؛
   وما لا يملك هذا البُعد (المستهدفات، الذمم، المخزون) يُحجَّم تناسبيًا. */
function anChF(){
  if(AN_CH==='all') return 1;
  const T=PF_CHANNELS.reduce((a,c)=>a+c.rev,0);
  const c=PF_CHANNELS.find(x=>x.id===AN_CH);
  return c? c.rev/T : 1;
}
const anScale =(v,d=1)=>+(v*anChF()).toFixed(d);
const anScaleN=v=>Math.round(v*anChF());
const anSeries=(arr,d=1)=>arr.map(v=>anScale(v,d));

/* الإيراد/المصروفات/الربح — من PF_COLS مباشرةً (لا أرقام موازية) */
const anRev =()=>PF_COLS.rev, anExp=()=>PF_COLS.exp, anProf=()=>PF_COLS.prof;
/* الطلبات: مشتقّة من الإيراد ÷ متوسط الفاتورة (3,610 ر.س) */
const AN_AOV=3610;
const anOrders=()=>PF_COLS.rev.map(v=>Math.round(v*1e6/AN_AOV/1000));   /* بالآلاف */
/* التدفّق النقدي = الإيراد − المصروفات تراكميًا */
function anCash(){ let c=42; return PF_COLS.rev.map((r,i)=>{ c+= (r-PF_COLS.exp[i])*0.62; return +c.toFixed(1); }); }
/* الذمم — نسبة ثابتة من الإيراد/المصروفات */
const anAR=()=>PF_COLS.rev.map(v=>+(v*0.34).toFixed(1));
const anAP=()=>PF_COLS.exp.map(v=>+(v*0.28).toFixed(1));
/* نمو العملاء — من CRM_CHANNELS */
const AN_CUST_TREND=[6.4,6.9,7.3,7.7,8.1,8.42];    /* بالآلاف، ينتهي عند 8,420 */

/* خط ناعم (سلسلة أو اثنتان) */
let AN_UID=0;
function anLine(series, labels, opts={}){
  const W=opts.w||520, H=opts.h||200, PL=38, PR=12, PT=16, PB=30;
  const iw=W-PL-PR, ih=H-PT-PB;
  const all=series.flatMap(s=>s.v);
  let mn=Math.min(...all), mx=Math.max(...all);
  const pad=(mx-mn)*0.16||1; mn=opts.zero?0:Math.max(0,mn-pad); mx+=pad;
  const n=labels.length;
  const X=i=>PL+(n===1?iw/2:i/(n-1)*iw), Y=v=>PT+ih-((v-mn)/(mx-mn||1))*ih;
  const grid=[0,.5,1].map(f=>{const gy=PT+ih-f*ih;
    return `<line class="fc-grid" x1="${PL}" y1="${gy.toFixed(1)}" x2="${W-PR}" y2="${gy.toFixed(1)}"/>
      <text class="fc-ylbl" x="${PL-7}" y="${(gy+3.5).toFixed(1)}" text-anchor="end">${(mn+(mx-mn)*f).toFixed(0)}</text>`;}).join('');
  const paths=series.map(s=>{
    const pts=s.v.map((v,i)=>[X(i),Y(v)]);
    const d=fcSmooth(pts);
    const area=s.area?`<path d="${d} L${X(n-1).toFixed(1)} ${(PT+ih).toFixed(1)} L${X(0).toFixed(1)} ${(PT+ih).toFixed(1)} Z"
      fill="${s.c}" opacity=".10"/>`:'';
    return area+`<path d="${d}" fill="none" stroke="${s.c}" stroke-width="${s.w||2.4}"
      stroke-linecap="round" stroke-linejoin="round" ${s.dash?'stroke-dasharray="5 4"':''}/>`;
  }).join('');
  /* طبقة تفاعلية: مؤشر رأسي + نقاط + تلميح — بنفس نمط بقية اللوحة */
  const uid='anl'+(++AN_UID);
  const dots=series.map((s,si)=>
    `<circle class="anl-dot" data-s="${si}" r="4.2" fill="${s.c}"
       stroke="var(--card)" stroke-width="2" opacity="0"/>`).join('');
  const hits=labels.map((lb,i)=>{
    const rows=series.map(s=>`<div class="fc-tip-r"><b style="color:${s.c}">${
      opts.tfmt?opts.tfmt(s.v[i]):s.v[i]}</b><span>${s.n}</span></div>`).join('');
    return `<rect class="anl-hit" x="${(X(i)-(n>1?iw/(n-1)/2:iw/2)).toFixed(1)}" y="${PT}"
      width="${(n>1?iw/(n-1):iw).toFixed(1)}" height="${ih.toFixed(1)}" fill="transparent"
      data-x="${X(i).toFixed(1)}"
      data-ys="${series.map(s=>Y(s.v[i]).toFixed(1)).join(',')}"
      data-html="${encodeURIComponent(`<div class="fc-tip-h">${lb}</div>${rows}`)}"></rect>`;
  }).join('');
  const step=Math.ceil(n/6);
  const xl=labels.map((m,i)=>(i%step===0||i===n-1)
    ?`<text class="fc-xlbl" x="${X(i).toFixed(1)}" y="${H-8}" text-anchor="middle">${m}</text>`:'').join('');
  return `<div class="anl-wrap" id="${uid}">
    <svg viewBox="0 0 ${W} ${H}" class="an-c-svg anl-svg">
      ${grid}${paths}
      <line class="anl-cur" y1="${PT}" y2="${(PT+ih).toFixed(1)}" opacity="0"/>
      ${dots}${xl}${hits}
    </svg><div class="fc-tip anl-tip"></div></div>`;
}
/* أعمدة مكدّسة */
function anStack(rows, labels, keys){
  const W=520,H=210,PL=36,PR=10,PT=16,PB=32;
  const iw=W-PL-PR, ih=H-PT-PB;
  const totals=labels.map((_,i)=>keys.reduce((a,k)=>a+rows[k.v][i],0));
  const mx=Math.max(...totals)*1.1;
  const gw=iw/labels.length, bw=Math.min(34,gw*0.5);
  const grid=[0,.5,1].map(f=>{const gy=PT+ih-f*ih;
    return `<line class="fc-grid" x1="${PL}" y1="${gy.toFixed(1)}" x2="${W-PR}" y2="${gy.toFixed(1)}"/>
      <text class="fc-ylbl" x="${PL-7}" y="${(gy+3.5).toFixed(1)}" text-anchor="end">${(mx*f).toFixed(0)}</text>`;}).join('');
  const bars=labels.map((m,i)=>{
    const cx=PL+gw*i+gw/2; let acc=0;
    const segs=keys.map(k=>{
      const v=rows[k.v][i], bh=(v/mx)*ih;
      const y=PT+ih-acc-bh; acc+=bh;
      return `<rect x="${(cx-bw/2).toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}"
        height="${Math.max(1,bh).toFixed(1)}" fill="${k.c}" class="an-sb"><title>${k.t} ${m}: ${v}</title></rect>`;
    }).join('');
    return segs+`<text class="fc-xlbl" x="${cx.toFixed(1)}" y="${H-9}" text-anchor="middle">${m}</text>`;
  }).join('');
  return `<svg viewBox="0 0 ${W} ${H}" class="an-c-svg">${grid}${bars}</svg>`;
}
/* دونات */
function anDonut(rows, opts={}){
  const R=52,C=2*Math.PI*R; let off=0;
  const T=rows.reduce((a,r)=>a+r.v,0);
  const segs=rows.map(r=>{
    const len=C*(r.v/T);
    const el=`<circle cx="70" cy="70" r="${R}" fill="none" stroke="${r.c}" stroke-width="17"
      stroke-dasharray="${len.toFixed(1)} ${(C-len).toFixed(1)}" stroke-dashoffset="${(-off).toFixed(1)}"
      transform="rotate(-90 70 70)" class="an-ds"><title>${r.n}: ${(r.v/T*100).toFixed(1)}%</title></circle>`;
    off+=len; return el;
  }).join('');
  const top=rows.slice().sort((a,b)=>b.v-a.v)[0];
  return `<div class="an-dwrap">
    <svg viewBox="0 0 140 140" class="an-donut">
      <circle cx="70" cy="70" r="${R}" fill="none" stroke="var(--chart-track)" stroke-width="17"/>
      ${segs}
      <text x="70" y="66" text-anchor="middle" class="cd-c-v">${opts.center||((top.v/T*100).toFixed(0)+'%')}</text>
      <text x="70" y="82" text-anchor="middle" class="cd-c-s">${opts.sub||top.n}</text>
    </svg>
    <div class="an-dleg">${rows.map(r=>`
      <div class="an-dl"><i style="background:${r.c}"></i>
        <span>${r.n}</span><b>${(r.v/T*100).toFixed(1)}%</b></div>`).join('')}</div>
  </div>`;
}

/* البلاطات الفاتحة (الذهبي/البيج) لا يُقرأ عليها النص الأبيض (2.95:1)
   فتأخذ حبرًا داكنًا بدلًا منه. */
const AN_LIGHT_TILES=["خواتم","معلقات"];
const anLightTile=n=>AN_LIGHT_TILES.includes(n);
/* Treemap (squarified مبسّط) */
function anTree(rows){
  const W=520,H=200;
  const T=rows.reduce((a,r)=>a+r.v,0);
  const sorted=rows.slice().sort((a,b)=>b.v-a.v);
  const out=[]; let x=0,y=0,w=W,h=H,rest=sorted.slice(),tot=T;
  while(rest.length){
    const r=rest.shift();
    const frac=r.v/tot;
    const horiz = w>=h;
    const cw = horiz ? w*frac : w;
    const ch = horiz ? h : h*frac;
    out.push({...r, x, y, w:cw, h:ch});
    if(horiz){ x+=cw; w-=cw; } else { y+=ch; h-=ch; }
    tot-=r.v;
    if(!rest.length) break;
  }
  return `<svg viewBox="0 0 ${W} ${H}" class="an-c-svg">${out.map(r=>`
    <g class="an-tm">
      <rect x="${r.x.toFixed(1)}" y="${r.y.toFixed(1)}" width="${Math.max(0,r.w-2).toFixed(1)}"
        height="${Math.max(0,r.h-2).toFixed(1)}" rx="5" fill="${r.c}">
        <title>${r.n}: ${(r.v/T*100).toFixed(1)}%</title></rect>
      ${r.w>62&&r.h>34?`<text x="${(r.x+r.w/2).toFixed(1)}" y="${(r.y+r.h/2-2).toFixed(1)}"
        text-anchor="middle" class="an-tm-n ${anLightTile(r.n)?'ink':''}">${r.n}</text>
      <text x="${(r.x+r.w/2).toFixed(1)}" y="${(r.y+r.h/2+12).toFixed(1)}"
        text-anchor="middle" class="an-tm-v ${anLightTile(r.n)?'ink':''}">${(r.v/T*100).toFixed(0)}%</text>`:''}
    </g>`).join('')}</svg>`;
}

/* ---------- أعمدة مجمّعة (Grouped columns) — مقارنة وحدات الأعمال ---------- */
function anGroup(labels, series, opts={}){
  const W=520,H=214,PL=40,PR=10,PT=18,PB=34;
  const iw=W-PL-PR, ih=H-PT-PB;
  const mx=Math.max(...series.flatMap(s=>s.v))*1.14||1;
  const gw=iw/labels.length;
  const bw=Math.min(20,(gw*0.66)/series.length);
  const grid=[0,.5,1].map(f=>{const gy=PT+ih-f*ih;
    return `<line class="fc-grid" x1="${PL}" y1="${gy.toFixed(1)}" x2="${W-PR}" y2="${gy.toFixed(1)}"/>
      <text class="fc-ylbl" x="${PL-7}" y="${(gy+3.5).toFixed(1)}" text-anchor="end">${opts.yfmt?opts.yfmt(mx*f):(mx*f).toFixed(0)}</text>`;}).join('');
  const bars=labels.map((lb,i)=>{
    const cx=PL+gw*i+gw/2;
    const total=series.length*bw+ (series.length-1)*3;
    const x0=cx-total/2;
    const g=series.map((s,si)=>{
      const v=s.v[i], bh=(v/mx)*ih, x=x0+si*(bw+3), y=PT+ih-bh;
      return `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}"
        height="${Math.max(2,bh).toFixed(1)}" rx="3" fill="${s.c}" class="an-sb an-ib">
        <title>${s.n} — ${lb}: ${opts.fmt?opts.fmt(v):v}</title></rect>`;
    }).join('');
    return g+`<text class="cv-x" x="${cx.toFixed(1)}" y="${H-14}" text-anchor="middle">${lb}</text>`;
  }).join('');
  return `<svg viewBox="0 0 ${W} ${H}" class="an-c-svg">${grid}${bars}</svg>`;
}

  return `<div class="apb">

      return `<div class="apb-row" ${r.page?`data-anpg="${r.page}"`:''}>

          <div class="apb-l"><b>${r.n}</b><span>• ${r.sub}</span></div>

        </div>
        <div class="apb-track">
          <div class="apb-fill" style="width:${w.toFixed(1)}%">
            ${inside?`<span class="apb-pct">${r.pct}${opts.unit||'%'}</span>`:''}
          </div>
          ${inside?'':`<span class="apb-pct out">${r.pct}${opts.unit||'%'}</span>`}
        </div>
      </div>`;}).join('')}</div>
    <div class="apb-stats">${stats.map(s=>`
      <div class="apb-st ${s.t}">
        <span class="apb-st-i">${svg(s.ic,'ic-sm')}</span>
        <b>${s.v}</b><span>${s.k}</span>
      </div>`).join('')}</div>
  </div>`;
}

/* ---------- معدل التحويل (قُمع الزيارة ← الطلب) ----------
   الأعمدة كانت شريطين نحيلين (3.4% و4.1%) في مقياس يصل 4.5% — لا يقرأ منهما شيء،
   والفلتر على "متجر" كان يفرغ البطاقة تمامًا. القُمع يعرض الحجم المطلق (زائر → طلب)
   ومعه الفاقد، فيبقى مفيدًا لأي قناة. الزوار مشتقّون: الطلبات ÷ معدل التحويل. */
function anFunnel(rows){
  return `<div class="afn">${rows.map(r=>{
    const lost=r.visitors-r.orders;
    /* العرض = معدل التحويل نفسه (مقياس ثابت 0–30%) لا نسبةً لأعلى صفٍّ معروض،
       وإلا بدا تحويل 3.4% منفردًا بعرض كامل تمامًا كتحويل 24.6%. */
    const w=Math.max(5,Math.min(100,r.conv*(100/30)));
    return `<div class="afn-c">
      <div class="afn-h"><span class="afn-d" style="background:${r.c}"></span>
        <b>${r.n}</b><span class="afn-rate" style="color:${r.c}">${r.conv}%</span></div>
      <div class="afn-body">
        <div class="afn-stage">
          <div class="afn-bar top" style="background:${r.c};opacity:.22"></div>
          <div class="afn-lbl"><b>${aiNum(r.visitors)}</b><span>زائر</span></div>
        </div>
        <div class="afn-drop">
          <svg viewBox="0 0 100 26" preserveAspectRatio="none" class="afn-svg">
            <path d="M0,0 L100,0 L${50+w/2},26 L${50-w/2},26 Z"
              fill="${r.c}" opacity=".14"/>
          </svg>
          <span class="afn-lost">− ${aiNum(lost)} لم يُكملوا</span>
        </div>
        <div class="afn-stage">
          <div class="afn-track"><span class="afn-tick"></span></div>
          <div class="afn-bar bot" style="width:${w.toFixed(1)}%;background:${r.c}"></div>
          <div class="afn-lbl"><b>${aiNum(r.orders)}</b><span>طلب</span></div>
        </div>
      </div>
    </div>`;}).join('')}</div>`;
}

  const tbl=`<div class="an-rk-grid an-rk-3">

/* ---------- page ---------- */
function PerfPage(){
  /* KPI cards — current, previous, change, trend */
  const kpiGrid=`<div class="pk-grid">${PERF_KPIS.map(k=>{
    const prev=pfPrev(k);
    return `<div class="pk" data-pfk="${k.id}">
      <div class="pk-h"><span class="pk-lbl">${k.ar}</span>
        <span class="pk-ic">${svg(k.icon,'ic-sm')}</span></div>
      <div class="pk-v">${k.val}<span class="pk-u">${k.unit}</span></div>
      ${perfSpark(k.spark,k.dir)}
      <div class="pf-prev"><span>الفترة السابقة</span><b>${prev}${k.unit}</b></div>
      <div class="pk-f">
        <span class="pk-cmp">التغيّر</span>
        <span class="pk-chg ${k.dir}">${svg(k.dir==='up'?'up':'down','ic-xs')}${k.chg}</span>
      </div>
    </div>`;}).join('')}</div>`;

  /* branch ranking */
  const th=(k,l)=>`<th class="us-sort ${PF_SORT===k?'on':''}" data-pfs="${k}">${l}<span class="us-caret">${PF_SORT===k?(PF_DIR==='asc'?'▲':'▼'):'⇅'}</span></th>`;
  let brs=hsLimit(PF_BRANCHES.slice());
  if(PF_BRANCH!=='all') brs=brs.filter(b=>b.name===PF_BRANCH);
  brs.sort((a,b)=>{const x=a[PF_SORT],y=b[PF_SORT];
    const c=typeof x==='number'?x-y:String(x).localeCompare(String(y),'ar');
    return PF_DIR==='asc'?c:-c;});
  const brTbl=`<div class="card pos-tbl-card"><div class="pos-scroll">
    <table class="pos-table"><thead><tr>
      <th>#</th><th>الفرع</th>${th('score',"مؤشر الأداء")}${th('rev',"الإيراد")}
      ${th('prof',"الربح")}${th('orders',"الطلبات")}${th('csat',"رضا العملاء")}<th>الحالة</th><th></th>
    </tr></thead><tbody>
    ${brs.length?brs.map((b,i)=>{
      const st=pfStat(b.score);
      return `<tr class="pf-brow" data-pfb="${b.name}">
        <td class="us-dim">${i+1}</td>
        <td><b>${b.name}</b></td>
        <td><div class="tg-mini"><i style="width:${b.score}%;background:${st.c}"></i></div>
          <b class="tg-achv">${b.score}</b></td>
        <td>${b.rev} م ر.س</td><td>${b.prof} م ر.س</td>
        <td class="us-dim">${aiNum(b.orders)}</td>
        <td><span class="pf-csat">${b.csat}<i>/5</i></span></td>
        <td><span class="bh-badge" style="background:${st.bg};color:${st.c}">${st.ar}</span></td>
        <td><button class="us-ico" data-pfb="${b.name}">${svg('arrow','ic-sm')}</button></td>
      </tr>`;}).join('')
      :`<tr><td colspan="9" style="text-align:center;color:var(--faint);padding:24px">لا فروع مطابقة</td></tr>`}
    </tbody></table></div></div>`;

  /* departments */
  const df=PF_F.dept;
  let deps=PF_DEPTS.slice().sort((a,b)=>b.score-a.score);
  if(df==='low') deps=deps.slice(-3).reverse();
  else if(df==='top') deps=deps.slice(0,3);
  const dmax=Math.max(...PF_DEPTS.map(d=>d.score));
  const depts=`<div class="tgc-head">
      <span class="tgc-t">${deps.length} من ${PF_DEPTS.length} أقسام</span>
      ${tgCardF('dept',df,[{v:'all',t:"الكل"},{v:'top',t:"الأعلى"},{v:'low',t:"الأدنى"}])}
    </div>
    <div class="pfd-grid">${deps.map(d=>{
      const st=pfStat(d.score);
      return `<div class="pfd" data-pfd="${d.id}">
        <div class="pfd-h"><div class="pfd-ic">${svg(d.icon,'ic-sm')}</div>
          <div><b>${d.ar}</b><span>${d.head} · ${d.emp} موظف</span></div>
          <span class="pfd-s" style="color:${st.c}">${d.score}</span></div>
        <div class="tg-k-b"><i style="width:${(d.score/dmax*100).toFixed(0)}%;background:${st.c}"></i></div>
        <div class="pfd-n">${d.note}</div>
      </div>`;}).join('')}</div>`;

  /* KPI monitoring */
  const mf=PF_F.kpi;
  /* المؤشرات كلها بين 90.8% و93.8% — عتبة "95%+" ستُرجع لا شيء دائمًا.
     تُقسَّم بالأعلى/الأدنى فعليًا. */
  let mons=PF_MON.slice().sort((a,b)=>pfAch(b)-pfAch(a));
  if(mf==='top') mons=mons.slice(0,3);
  else if(mf==='low') mons=mons.slice(-3).reverse();
  const avgAch=PF_MON.reduce((s,m)=>s+pfAch(m),0)/PF_MON.length;
  const mon=`<div class="tgc-head">
      <span class="tgc-t">${mons.length} من ${PF_MON.length} مؤشرات · متوسط ${avgAch.toFixed(1)}%</span>
      ${tgCardF('kpi',mf,[{v:'all',t:"الكل"},{v:'top',t:"الأعلى"},{v:'low',t:"الأدنى"}])}
    </div>
    <div class="pfm-grid">${mons.length?mons.map(m=>{
      const a=pfAch(m), st=pfStat(a);
      return `<div class="pfm" data-pfm="${m.id}">
        <div class="pfm-h"><div class="pfd-ic">${svg(m.ic,'ic-sm')}</div><b>${m.ar}</b>
          <span class="bh-badge" style="background:${st.bg};color:${st.c}">${st.ar}</span></div>
        <div class="pfm-v">${a.toFixed(1)}<span>%</span></div>
        <div class="tg-k-b"><i style="width:${Math.min(100,a).toFixed(1)}%;background:${st.c}"></i></div>
        <div class="pfm-f"><span>الحالي <b>${aiNum(m.cur)}</b></span>
          <span>المستهدف <b>${aiNum(m.target)}</b> ${m.unit}</span></div>
      </div>`;}).join(''):`<div class="tg-none">لا مؤشرات مطابقة</div>`}</div>`;

  /* activity timeline */
  const af=PF_F.act;
  const acts=af==='all'?PF_ACTS:PF_ACTS.filter(a=>a.k===af);
  const timeline=`<div class="card">
    <div class="card-head" style="flex-wrap:wrap;gap:8px">
      <div class="card-title">آخر الأنشطة<span class="sub">${acts.length} حدث</span></div>
      ${tgCardF('act',af,[{v:'all',t:"الكل"},{v:'ok',t:"إنجاز"},{v:'warn',t:"تنبيه"},{v:'info',t:"تحديث"}])}
    </div>
    <div class="pfa">${acts.length?acts.map(a=>`
      <div class="pfa-r ${a.k}">
        <div class="pfa-ic">${svg(a.ic,'ic-sm')}</div>
        <div class="pfa-b"><b>${a.ar}</b><span>${a.d}</span></div>
        <span class="pfa-t">${a.t}</span>
      </div>`).join(''):`<div class="tg-none">لا أنشطة مطابقة</div>`}</div></div>`;

  /* executive insights */
  const bs=PF_BRANCHES.slice().sort((a,b)=>b.score-a.score);
  const best=bs[0], worst=bs[bs.length-1];
  const fastest=PF_UNITS.slice().sort((a,b)=>parseFloat(b.growth)-parseFloat(a.growth))[0];
  const chFast=PF_CHANNELS.slice().sort((a,b)=>parseFloat(b.growth)-parseFloat(a.growth))[0];
  const chLow=PF_CHANNELS.slice().sort((a,b)=>a.score-b.score)[0];
  const crit=PF_MON.filter(m=>pfAch(m)<90);
  const lowDept=PF_DEPTS.slice().sort((a,b)=>a.score-b.score)[0];
  const insights=`<div class="action-row">
    <div class="action-card att">
      <div class="action-head"><div class="ib">${svg('alert')}</div>
        <div class="action-title">يحتاج انتباهًا</div><span class="action-count">4</span></div>
      ${actionItems([
        {t:`أضعف فرع: ${worst.name}`, d:`مؤشر ${worst.score} · رضا ${worst.csat}/5 · ${worst.growth}`},
        {t:`أضعف قسم: ${lowDept.ar}`, d:`${lowDept.score} — ${lowDept.note}`},
        {t:crit.length?`${crit.length} مؤشرات دون 90%`:"كل المؤشرات فوق 90%",
         d:crit.length?crit.map(m=>`${m.ar} (${pfAch(m).toFixed(0)}%)`).join('، '):"لا مخاطر حالية"},
        {t:`أضعف قناة: ${chLow.ar}`, d:`مؤشر ${chLow.score} · تحويل ${chLow.conv}% — ${chLow.note}`},
      ])}
    </div>
    <div class="action-card opp">
      <div class="action-head"><div class="ib">${svg('spark')}</div>
        <div class="action-title">فرص وتوصيات</div><span class="action-count">4</span></div>
      ${actionItems([
        {t:`أفضل فرع: ${best.name}`, d:`مؤشر ${best.score} · ${best.growth} — عمّم ممارساته`},
        {t:`أسرع وحدة نموًا: ${fastest.ar}`, d:`${fastest.growth} · إيراد ${fastest.rev} م ر.س`},
        {t:`أسرع قناة نموًا: ${chFast.ar}`, d:`${chFast.growth} · ${chFast.rev} م ر.س (${pfChShare(chFast).toFixed(1)}% من الإيراد)`},
        {t:`تحسّن الأداء العام`, d:`${PERF_KPIS[0].val} مقابل ${pfPrev(PERF_KPIS[0])} — ${PERF_KPIS[0].chg}`},
      ])}
    </div></div>`;

  const header=`<div class="us-bar">
    ${ddown('pfUnit',PF_UNIT,PF_UNIT_LIST,"كل وحدات الأعمال")}
    ${ddown('pfBranch',PF_BRANCH,PF_BRANCHES.map(b=>({v:b.name,t:b.name})),"كل الفروع")}
    ${ddown('pfChan',PF_CH,PF_CH_LIST,"كل القنوات")}
    ${(PF_UNIT!=='all'||PF_BRANCH!=='all'||PF_CH!=='all')?`<button class="dd-reset" id="pfReset">${svg('refresh','ic-sm')}<span>مسح</span></button>`:''}
    <button class="tool" id="pfExport" style="margin-inline-start:auto">${svg('report','ic-sm')}<span>تصدير التقرير</span></button>
  </div>`;

  return `${header}
    ${ecSec('01',"نظرة عامة على الأداء",kpiGrid)}
    ${ecSec('02',"أداء الأعمال",pfTrend()+`<div class="pf-2col">${pfColumns()}${pfUnitBars()}</div>`)}
    ${ecSec('03',"أداء القنوات",pfChannels())}
    ${ecSec('04',"أداء الفروع",brTbl)}
    ${ecSec('05',"أداء الأقسام",depts)}
    ${ecSec('06',"مراقبة المؤشرات",mon)}
    ${ecSec('07',"آخر الأنشطة",timeline)}
    ${ecSec('08',"رؤى تنفيذية",insights)}
    ${PfKpiDrawer()}${PfBranchDrawer()}${PfDeptDrawer()}${PfChDrawer()}${setToast()}`;
}
/* ---------- drill-downs ---------- */
function PfKpiDrawer(){
  if(!PF_KPI) return '';
  const k=PERF_KPIS.find(x=>x.id===PF_KPI); if(!k) return '';
  const prev=pfPrev(k), n=k.spark.length;
  const hi=Math.max(...k.spark), lo=Math.min(...k.spark);
  return `<div class="nu-scrim" id="pfkScrim"></div>
  <aside class="nu-drawer" role="dialog" aria-modal="true">

    <div class="nu-body">
      <div class="pfk-hero"><div class="pfk-v">${k.val}<span>${k.unit}</span></div>
        <span class="pk-chg ${k.dir}">${svg(k.dir==='up'?'up':'down','ic-xs')}${k.chg}</span></div>
      ${perfSpark(k.spark,k.dir)}
      <div class="tg-dg">
        <div class="tg-d"><span>الفترة الحالية</span><b>${k.val}${k.unit}</b></div>
        <div class="tg-d"><span>الفترة السابقة</span><b>${prev}${k.unit}</b></div>
        <div class="tg-d ${k.dir==='up'?'ok':'bad'}"><span>الفارق</span>
          <b>${(k.val-prev).toFixed(1)}${k.unit}</b></div>
        <div class="tg-d"><span>الأعلى / الأدنى</span><b>${hi} / ${lo}</b></div>
      </div>
      ${k.dir==='down'?`<div class="nu-warn high">${svg('alert','ic-sm')}<div><b>اتجاه هابط</b>
        <span>هذا المؤشر يتراجع عبر الفترات — يستحق مراجعة.</span></div></div>`:
        `<div class="nu-warn info">${svg('spark','ic-sm')}<div><b>اتجاه صاعد</b>
        <span>تحسّن مستمر عبر ${n} فترات.</span></div></div>`}

    <div class="nu-foot"><button class="nu-btn" id="pfkCloseB">إغلاق</button></div>

}

function TargetsPage(){
  const overall=TG_OVERALL();
  /* KPI cards — target, actual, achievement, progress bar */
  const kf=TG_F.kpi;
  /* المؤشرات كلها بين 90.8% و93.8% — عتبة "محقّق ≥100" ستُرجع لا شيء دائمًا.
     فالفرز هنا بالأقوى/الأضعف فعليًا لا بعتبات وهمية. */
  const kSorted=TG_KPIS.slice().sort((a,b)=>tgAch(b)-tgAch(a));
  const kpiShown = kf==='top' ? kSorted.slice(0,3)
                 : kf==='low' ? kSorted.slice(-3).reverse()
                 : kf==='gap' ? TG_KPIS.filter(k=>tgAch(k)<TG_OVERALL())
                 : TG_KPIS;
  const kpiCards=`<div class="tgc-head">
      <span class="tgc-t">${kpiShown.length} من ${TG_KPIS.length} مؤشرات · متوسط ${TG_OVERALL().toFixed(1)}%</span>
      ${tgCardF('kpi',kf,[{v:'all',t:"الكل"},{v:'top',t:"الأعلى"},{v:'low',t:"الأدنى"},{v:'gap',t:"دون المتوسط"}])}
    </div>
    <div class="tg-kgrid">
    <div class="tg-k big" data-kpi="overall">
      <div class="tg-k-t">التحقيق الكلي</div>
      <div class="tg-k-v">${overall.toFixed(1)}<span>%</span></div>
      <div class="tg-k-b"><i style="width:${Math.min(100,overall).toFixed(1)}%;background:${overall>=100?'var(--fill-hi)':overall>=85?'var(--fill-mid)':'var(--warning)'}"></i></div>
      <div class="tg-k-s">متوسط ${TG_KPIS.length} مستهدفات</div>
    </div>
    ${kpiShown.map(k=>{const a=tgAch(k);
      return `<div class="tg-k" data-kpi="${k.id}">
        <div class="tg-k-h"><div class="tg-k-ic">${svg(k.icon,'ic-sm')}</div>
          <div class="tg-k-t">${k.ar}</div></div>
        <div class="tg-k-v">${a.toFixed(1)}<span>%</span></div>
        <div class="tg-k-b"><i style="width:${Math.min(100,a).toFixed(1)}%;background:${a>=100?'var(--fill-hi)':a>=85?'var(--fill-mid)':'var(--warning)'}"></i></div>
        <div class="tg-k-s"><b>${aiNum(k.actual)}</b> من ${aiNum(k.target)} ${k.unit}</div>
      </div>`;}).join('')}
  </div>`;

  /* bullet + radial */
  const bf=TG_F.bullet;
  const bSorted=TG_KPIS.slice().sort((a,b)=>tgAch(b)-tgAch(a));
  const bulShown = bf==='top' ? bSorted.slice(0,3)
                 : bf==='low' ? bSorted.slice(-3).reverse()
                 : TG_KPIS;
  const perf=`<div class="tg-prow">
    <div class="card"><div class="card-head" style="flex-wrap:wrap;gap:8px">
      <div class="card-title">المستهدف مقابل الفعلي<span class="sub">لكل مؤشر · الخط = 100%</span></div>
      ${tgCardF('bullet',bf,[{v:'all',t:"الكل"},{v:'top',t:"الأعلى"},{v:'low',t:"الأدنى"}])}</div>
      <div class="tg-buls">${bulShown.length?bulShown.map(tgBullet).join('')
        :`<div class="tg-none">لا مؤشرات مطابقة</div>`}</div></div>
    <div class="card tg-radc"><div class="card-head">
      <div class="card-title">التحقيق الكلي</div></div>
      ${tgRadial(overall)}</div>
  </div>`;

  /* branch ranking */
  const rf=TG_F.rank;
  let brs=tgBranches();
  /* لا فرع تجاوز 100% فعليًا (الأعلى 96%) — فعتبة "متجاوز" ستبقى فارغة دائمًا.
     تُستبدل بنطاقات موجودة حقًا في البيانات. */
  if(rf==='hit') brs=brs.filter(b=>b.ach>=85);
  else if(rf==='risk') brs=brs.filter(b=>b.ach<70);
  brs=brs.sort((a,b)=>TG_DIR==='desc'?b[TG_SORT==='ach'?'ach':TG_SORT]-a[TG_SORT==='ach'?'ach':TG_SORT]
    : a[TG_SORT==='ach'?'ach':TG_SORT]-b[TG_SORT==='ach'?'ach':TG_SORT]);
  if(rf==='top5') brs=brs.slice(0,5);
  const th=(k,l)=>`<th class="us-sort ${TG_SORT===k?'on':''}" data-tgs="${k}">${l}<span class="us-caret">${TG_SORT===k?(TG_DIR==='asc'?'▲':'▼'):'⇅'}</span></th>`;
  const branchTbl=`<div class="card pos-tbl-card">
    <div class="tgc-head bar">
      <span class="tgc-t">${brs.length} فرع</span>
      ${tgCardF('rank',rf,[{v:'top',t:"الكل"},{v:'top5',t:"أعلى 5"},{v:'hit',t:"85%+"},{v:'risk',t:"دون 70%"}])}
    </div>
    <div class="pos-scroll">
    <table class="pos-table"><thead><tr>
      <th>#</th><th>الفرع</th>${th('target',"المستهدف")}${th('actual',"الفعلي")}${th('ach',"التحقيق %")}<th>الحالة</th><th></th>
    </tr></thead><tbody>
    ${brs.length?brs.map((b,i)=>{
      const st=b.ach>=100?{ar:"متجاوز",c:'var(--success)',bg:'var(--success-bg)'}
        :b.ach>=85?{ar:"على المسار",c:'var(--success)',bg:'var(--success-bg)'}
        :b.ach>=70?{ar:"معرّض للخطر",c:'var(--warning)',bg:'var(--warning-bg)'}
        :{ar:"دون المستهدف",c:'var(--error)',bg:'var(--error-bg)'};
      return `<tr class="tg-brow" data-br="${b.name}">
        <td class="us-dim">${i+1}</td>
        <td><b>${b.name}</b><div class="tg-sub2">${b.city} · ${b.mgr}</div></td>
        <td>${b.target} م ر.س</td><td><b>${b.actual}</b> م ر.س</td>
        <td><div class="tg-mini"><i style="width:${Math.min(100,b.ach)}%;background:${st.c}"></i></div>
          <b class="tg-achv">${b.ach}%</b></td>
        <td><span class="bh-badge" style="background:${st.bg};color:${st.c}">${st.ar}</span></td>
        <td><button class="us-ico" data-br="${b.name}">${svg('arrow','ic-sm')}</button></td>
      </tr>`;}).join(''):`<tr><td colspan="7" style="text-align:center;color:var(--faint);padding:24px">لا فروع مطابقة</td></tr>`}
    </tbody></table></div></div>`;

  /* goal categories */
  const cf=TG_F.cat;
  const cAch=c=>c.target?c.actual/c.target*100:0;
  const cSorted=TG_CATS.slice().sort((a,b)=>cAch(b)-cAch(a));
  const catShown = cf==='top' ? cSorted.slice(0,3)
                 : cf==='low' ? cSorted.slice(-3).reverse()
                 : cf==='gap' ? TG_CATS.filter(c=>cAch(c)<92)   /* الوسيط الفعلي */
                 : TG_CATS;
  const cats=`<div class="tgc-head">
      <span class="tgc-t">${catShown.length} من ${TG_CATS.length} فئات</span>
      ${tgCardF('cat',cf,[{v:'all',t:"الكل"},{v:'top',t:"الأعلى"},{v:'low',t:"الأدنى"},{v:'gap',t:"دون 92%"}])}
    </div>
    <div class="tg-cats">${catShown.length?catShown.map(c=>{
    const a=c.target?c.actual/c.target*100:0, rem=Math.max(0,c.target-c.actual);
    return `<div class="tg-cat">
      <div class="tg-cat-h"><div class="tg-k-ic">${svg(c.ic,'ic-sm')}</div><b>${c.ar}</b>
        <span class="${a>=100?'ok':a>=85?'':'bad'}">${a.toFixed(0)}%</span></div>
      <div class="tg-k-b"><i style="width:${Math.min(100,a).toFixed(1)}%;background:${a>=100?'var(--fill-hi)':a>=85?'var(--fill-mid)':'var(--warning)'}"></i></div>
      <div class="tg-cat-f">
        <span>الفعلي <b>${aiNum(c.actual)}</b></span>
        <span>${rem>0?`المتبقي <b>${aiNum(rem)}</b>`:`<b class="ok">تجاوز المستهدف</b>`}</span>
      </div></div>`;}).join(''):`<div class="tg-none">لا فئات مطابقة</div>`}</div>`;

  /* recent targets table */
  const lf=TG_F.list;
  let list=tgFilteredTargets();
  if(lf!=='all') list=list.filter(t=>{const k=tgStatus(t).k;
    return lf==='done'?k==='done' : lf==='track'?k==='track' : ['risk','behind','miss'].includes(k);});
  const tth=(k,l)=>`<th class="us-sort ${TG_TSORT===k?'on':''}" data-tgt="${k}">${l}<span class="us-caret">${TG_TSORT===k?(TG_TDIR==='asc'?'▲':'▼'):'⇅'}</span></th>`;
  const targetsTbl=`<div class="card pos-tbl-card">
    <div class="tgc-head bar">
      <span class="tgc-t">${list.length} مستهدف</span>
      ${tgCardF('list',lf,[{v:'all',t:"الكل"},{v:'done',t:"محقّق"},{v:'track',t:"على المسار"},{v:'risk',t:"متعثّر"}])}
    </div>
    <div class="pos-scroll">
    <table class="pos-table"><thead><tr>
      ${tth('name',"المستهدف")}${tth('unit',"وحدة الأعمال")}${tth('branch',"الفرع")}
      ${tth('target',"القيمة")}${tth('actual',"الفعلي")}${tth('prog',"التقدّم")}
      ${tth('due',"الاستحقاق")}${tth('status',"الحالة")}
    </tr></thead><tbody>
    ${list.length?list.map(t=>{
      const st=tgStatus(t), a=t.target?t.actual/t.target*100:0;
      return `<tr class="tg-trow" data-tg="${t.id}">
        <td><b>${t.n}</b><div class="tg-sub2">${t.owner}</div></td>
        <td>${TG_UNAME(t.u)}</td><td>${t.b}</td>
        <td>${aiNum(t.target)}</td><td><b>${aiNum(t.actual)}</b></td>
        <td><div class="tg-mini"><i style="width:${Math.min(100,a)}%;background:${st.c}"></i></div>
          <b class="tg-achv">${a.toFixed(0)}%</b></td>
        <td class="us-dim">${usFmtDate(t.due)}</td>
        <td><span class="bh-badge" style="background:${st.bg};color:${st.c}">${st.ar}</span></td>
      </tr>`;}).join('')
      :`<tr><td colspan="8" style="text-align:center;color:var(--faint);padding:26px">لا توجد مستهدفات مطابقة</td></tr>`}
    </tbody></table></div>
    <div class="us-foot"><span class="us-count">${list.length} من ${TG_LIST.length} مستهدف</span></div></div>`;

  /* AI insights — derived */
  const uRows=TG_UNITS.map(u=>({...u,ach:u.target?u.actual/u.target*100:0})).sort((a,b)=>b.ach-a.ach);
  const bAll=tgBranches();
  const over=bAll.filter(b=>b.ach>=100), below=bAll.filter(b=>b.ach<70);
  const atRisk=TG_LIST.filter(t=>['risk','behind','miss'].includes(tgStatus(t).k));
  const insights=`<div class="action-row">
    <div class="action-card att">
      <div class="action-head"><div class="ib">${svg('alert')}</div>
        <div class="action-title">مخاطر المستهدفات</div><span class="action-count">${Math.min(3,atRisk.length+below.length)}</span></div>
      ${actionItems([
        {t:`${below.length} فروع دون 70% من المستهدف`, d:below.slice(0,3).map(b=>`${b.name} (${b.ach}%)`).join('، ')||"لا يوجد"},
        {t:`${atRisk.length} مستهدفات معرّضة للخطر`, d:atRisk.slice(0,2).map(t=>t.n).join('، ')||"لا يوجد"},
        {t:`أضعف وحدة: ${uRows[uRows.length-1].ar}`, d:`تحقيق ${uRows[uRows.length-1].ach.toFixed(1)}% — الأدنى بين الوحدات.`},
      ])}
    </div>
    <div class="action-card opp">
      <div class="action-head"><div class="ib">${svg('spark')}</div>
        <div class="action-title">فرص وتوصيات</div><span class="action-count">3</span></div>
      ${actionItems([
        {t:`أفضل وحدة: ${uRows[0].ar}`, d:`تحقيق ${uRows[0].ach.toFixed(1)}% — عمّم ممارساتها.`},
        {t:`${over.length} فروع تجاوزت مستهدفها`, d:over.slice(0,3).map(b=>`${b.name} (${b.ach}%)`).join('، ')||"لا يوجد"},
        {t:`ارفع مستهدف ${over[0]?over[0].name:'—'}`, d:over[0]?`تجاوز بـ ${(over[0].ach-100).toFixed(0)} نقطة — المستهدف الحالي منخفض.`:"—"},
      ])}
    </div></div>`;

  /* header */
  const header=`<div class="us-bar">
    <label class="pos-search" style="flex:1;min-width:180px">${svg('search')}
      <input id="tgSearch" placeholder="ابحث في المستهدفات…" value="${TG_Q}"></label>
    ${ddown('tgUnit',TG_UNIT,TG_UNIT_LIST,"كل وحدات الأعمال")}
    ${ddown('tgBranch',TG_BRANCH,BRANCHES.map(b=>({v:b.name,t:b.name})),"كل الفروع")}
    ${(TG_UNIT!=='all'||TG_BRANCH!=='all'||TG_Q)?`<button class="dd-reset" id="tgReset">${svg('refresh','ic-sm')}<span>مسح</span></button>`:''}
    <button class="tool" id="tgExport">${svg('report','ic-sm')}<span>تصدير</span></button>
    <button class="tool primary" id="tgAdd">${svg('target')}<span>إنشاء مستهدف</span></button>
  </div>`;

  return `${header}
    ${ecSec('01',"نظرة عامة على المستهدفات",kpiCards)}
    ${ecSec('02',"الأداء مقابل الخطة",perf+tgTrend())}
    ${ecSec('03',"أداء وحدات الأعمال",tgUnitChart())}
    ${ecSec('04',"ترتيب الفروع",branchTbl)}
    ${ecSec('05',"فئات الأهداف",cats)}
    ${ecSec('06',"المستهدفات الحالية",targetsTbl)}
    ${ecSec('07',"رؤى ذكية",insights)}
    ${TargetModal()}${TgKpiDrawer()}${TgBranchDrawer()}${setToast()}`;
}

    title="الإعدادات العامة"; sub="بيانات الشركة واللغة والعملة والمنطقة الزمنية";

      <div class="nu-grid">
        ${stField('c_name',"اسم الشركة",C.company.name)}
        ${stField('c_cr',"السجل التجاري",C.company.cr)}
        ${stField('c_vat',"الرقم الضريبي",C.company.vat)}
        ${stField('c_phone',"هاتف الشركة",C.company.phone)}
      </div>
      ${stField('c_email',"البريد الإلكتروني",C.company.email)}
      ${stField('c_addr',"العنوان",C.company.addr)}
      <div class="nu-sec">التفضيلات الإقليمية</div>
      <div class="nu-f"><label>اللغة</label>

/* ===== premium home micro-interactions runtime ===== */
function prefersReducedMotion(){
  return window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
}
function countUpKPIs(root){
  /* أرقام المؤشرات عبر كل الصفحات — مع الحفاظ التام على البادئة/اللاحقة والتنسيق،
     وتخطّي أي عنصر يحتوي عناصر أبناء (مثل رمز العملة SVG) أو قيمة غير رقمية. */
  const sels='.kpi-num,.an-k-v,.pk-v,.mkpi-val,.ia-kpi-val,.agb-kpi-v';
  const nums=root.querySelectorAll(sels);
  nums.forEach(el=>{
    if(el.querySelector('*')) return;           /* يحتوي SVG/عناصر — لا نلمس نصّه */
    const raw=(el.getAttribute('data-to')||el.textContent||'').trim();
    const m=raw.match(/^(\D*)([\d.,]+)(.*)$/s);
    if(!m){return;}                             /* قيمة غير رقمية مثل اسم فرع */
    const pre=m[1], numStr=m[2], post=m[3];
    const hasComma=numStr.indexOf(',')>=0;
    const decimals=(numStr.split('.')[1]||'').length;
    const target=parseFloat(numStr.replace(/,/g,''));
    if(!isFinite(target)){return;}
    const fmt=v=>{
      let s=decimals>0?v.toFixed(decimals):Math.round(v).toString();
      if(hasComma){const p=s.split('.');p[0]=(+p[0]).toLocaleString('en-US');s=p.join('.');}
      return pre+s+post;
    };
    const DUR=1500, t0=performance.now();
    const ease=x=>x===1?1:1-Math.pow(2,-10*x);   /* easeOutExpo — gentle, natural settle */
    el.textContent=fmt(0);
    function step(now){
      const p=Math.min(1,(now-t0)/DUR);
      el.textContent=fmt(target*ease(p));
      if(p<1)requestAnimationFrame(step); else el.textContent=fmt(target);
    }
    requestAnimationFrame(step);
  });
}
function runHomeAnim(){
  const app=document.querySelector('.app');
  if(!app)return;
  /* حركة الدخول والشارتات عبر كل الصفحات؛ الصفحة الرئيسية تحتفظ بحركاتها الخاصة */
  app.setAttribute('data-anim-page', PAGE);
  if(PAGE==='home') app.setAttribute('data-anim','home');
  else app.removeAttribute('data-anim');
  if(prefersReducedMotion())return;               /* CSS + هذا الحارس يبقيان الواجهة ثابتة */
  countUpKPIs(app);
}

/* ============================================================================
   الطبقة التفاعلية: إبطال الذاكرة المؤقتة + حالة التحميل + الحالة الفارغة
   + الترشيح المتقاطع
   ----------------------------------------------------------------------------
   بدل تعديل 180+ موضعًا يستدعي render()، يُغلَّف render نفسه: أي تغيير في
   الفلاتر يُبطل ذاكرة التجميع ويعرض هيكلًا عظميًا لحظة إعادة الحساب.
   ========================================================================== */

/* توقيع الفلاتر الحالي — إذا تغيّر فالبيانات بحاجة لإعادة حساب */
function dsFilterSig(){
  return [DATE_PRESET,DATE_FROM,DATE_TO,HS.store,HS.region,HS.city,HS.loc,HS.branch,
          DS_X.channel,DS_X.cat,DS_X.region,DS_X.branch].join('|');
}
let _DS_LAST_SIG=null;
let DS_LOADING=false;

/* غلاف render: يكشف تغيّر الفلاتر، يُبطل الذاكرة، ويُظهر حالة التحميل
   لإطار واحد قبل إعادة الرسم — فيبدو التحديث محسوسًا دون تأخير مصطنع طويل. */
function dsWrapRender(){
  if(typeof render!=='function' || render.__dsWrapped) return;
  const orig=render;
  const wrapped=function(){
    const sig=dsFilterSig();
    if(sig!==_DS_LAST_SIG){
      _DS_LAST_SIG=sig;
      dsInvalidate();
      _BR_CACHE=null;
    }
    return orig.apply(this,arguments);
  };
  wrapped.__dsWrapped=true;
  /* eslint-disable-next-line no-global-assign */
  render=wrapped;
}

/* إعادة رسم مع هيكل عظمي: تُستخدم من معالجات الفلاتر.
   الهيكل يظهر فورًا، ثم يُعاد الحساب في الإطار التالي حتى لا يتجمّد المتصفح
   أثناء المرور على عشرات آلاف الصفوف. */
function dsRefresh(){
  const root=document.getElementById('root');
  if(!root){ render(); return; }
  const content=root.querySelector('.content');
  if(content){
    content.classList.add('is-loading');
    content.setAttribute('aria-busy','true');
  }
  DS_LOADING=true;
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      DS_LOADING=false;
      render();
    });
  });
}

/* ---------------------------------------------------------------------------
   الحالة الفارغة: تُستدعى من البطاقات حين لا تطابق البيانات الفلاتر
   ------------------------------------------------------------------------- */
function dsEmpty(msg,hint){
  return `<div class="ds-empty">
    ${svg('search','ds-empty-ic')}
    <div class="ds-empty-t">${msg||"لا توجد بيانات مطابقة"}</div>
    <div class="ds-empty-s">${hint||"جرّب توسيع النطاق الزمني أو إزالة بعض الفلاتر"}</div>
    ${dsXActive()?`<button class="ds-empty-btn" data-xclear="1">مسح الترشيح المتقاطع</button>`:''}
  </div>`;
}
/* هل النطاق الحالي بلا بيانات؟ */
function dsIsEmpty(){ return dsRows().length===0; }

/* ---------------------------------------------------------------------------
   شريط الترشيح المتقاطع: يوضّح ما هو مفعَّل ويتيح إزالته
   ------------------------------------------------------------------------- */
function dsCrossBar(){
  if(!dsXActive()) return '';
  const chips=[];
  if(DS_X.channel){
    const c=DS_CHANNELS.find(x=>x.v===DS_X.channel);
    chips.push({k:'channel',t:"القناة: "+(c?c.t:DS_X.channel)});
  }
  if(DS_X.cat){
    const c=DS_CATS.find(x=>x.v===DS_X.cat);
    chips.push({k:'cat',t:"الفئة: "+(c?c.t:DS_X.cat)});
  }
  if(DS_X.region){
    const r=REGIONS_BASE.find(x=>x.id===DS_X.region);
    chips.push({k:'region',t:"المنطقة: "+(r?r.ar:DS_X.region)});
  }
  if(DS_X.branch) chips.push({k:'branch',t:"الفرع: "+DS_X.branch});
  return `<div class="ds-xbar" role="status">
    <span class="ds-xlbl">${svg('filter','ic-sm')}ترشيح متقاطع</span>
    ${chips.map(c=>`<button class="ds-chip" data-xrm="${c.k}">${c.t}<span class="ds-chip-x">×</span></button>`).join('')}
    <button class="ds-xclear" data-xclear="1">مسح الكل</button>
  </div>`;
}

/* ربط تفاعلات الترشيح المتقاطع بعد كل رسم */
function dsWireCross(){
  document.querySelectorAll('[data-xclear]').forEach(b=>b.onclick=(e)=>{
    e.stopPropagation(); dsXClear(); dsRefresh();
  });
  document.querySelectorAll('[data-xrm]').forEach(b=>b.onclick=(e)=>{
    e.stopPropagation(); DS_X[b.dataset.xrm]=null; dsRefresh();
  });
  /* النقر على صف قناة يفلتر بقية اللوحة على تلك القناة */
  document.querySelectorAll('[data-xch]').forEach(b=>b.onclick=(e)=>{
    e.stopPropagation();
    const v=b.dataset.xch;
    DS_X.channel = DS_X.channel===v ? null : v;
    dsRefresh();
  });
  /* النقر على عمود فئة */
  document.querySelectorAll('[data-xcat]').forEach(b=>b.onclick=(e)=>{
    e.stopPropagation();
    const v=b.dataset.xcat;
    DS_X.cat = DS_X.cat===v ? null : v;
    dsRefresh();
  });
  /* النقر على فرع في قائمة الترتيب */
  document.querySelectorAll('[data-xbr]').forEach(b=>b.onclick=(e)=>{
    e.stopPropagation();
    const v=b.dataset.xbr;
    DS_X.branch = DS_X.branch===v ? null : v;
    dsRefresh();
  });
}

    const fStore=card.querySelector('#posStore'), fBranch=card.querySelector('#posBranch'), fStatus=card.querySelector('#posStatus');

    const shown=card.querySelector('#posShown'), empty=card.querySelector('#posEmpty');
    const PS=8; let page=1;
    function match(){const q=(search&&search.value||'').trim().toLowerCase(),st=fStore.value,br=fBranch.value,sa=fStatus.value;
      return rows.filter(r=>(!q||(r.dataset.text||'').indexOf(q)>=0)&&(st==='all'||r.dataset.store===st)&&(br==='all'||r.dataset.branch===br)&&(sa==='all'||r.dataset.status===sa));}
    function draw(){const f=match();const pages=Math.max(1,Math.ceil(f.length/PS));if(page>pages)page=pages;

    [fStore,fBranch,fStatus].forEach(el=>{if(el)el.onchange=()=>{page=1;draw();};});
