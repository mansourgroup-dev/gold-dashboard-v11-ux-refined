.tg-d b.ok{color:var(--success)}
.tg-d b.bad{color:var(--error)}
.tg-d.ok{border-color:var(--success-border);background:var(--success-bg)}
.tg-d.bad{border-color:var(--error-border);background:var(--error-bg)}
.tg-rel{display:flex;align-items:center;gap:10px;padding:10px 11px;border-radius:10px;
  border:1px solid var(--border);background:var(--surface);margin-bottom:7px}
.tg-rel-b{flex:1;min-width:0}
.tg-rel-b b{display:block;font-size:12px;font-weight:700;color:var(--ink)}
.tg-rel-b span{display:block;font-size:10px;color:var(--faint);font-weight:600;margin:2px 0 5px}
.tg-none{padding:18px;text-align:center;font-size:11.5px;color:var(--faint);font-weight:600}
@media(max-width:900px){.tg-prow{grid-template-columns:1fr}}
@media(max-width:720px){
  .tg-kgrid{grid-template-columns:1fr 1fr}
  .tg-ur{grid-template-columns:60px 1fr 44px;gap:6px}
  .tg-ud{display:none}
  .tg-cats{grid-template-columns:1fr}
  .tg-dg{grid-template-columns:1fr}
}

/* ===== رمز الريال السعودي ===== */
.rs{width:1em;height:1em;display:inline-block;vertical-align:-0.12em;
  flex:none;color:currentColor;stroke:currentColor}
.rs-w{display:inline-flex;align-items:center;gap:.18em;white-space:nowrap}

/* ===== حالة التحميل (هيكل عظمي) ===== */
.content.is-loading .card,.content.is-loading .kpi{position:relative;overflow:hidden}
.content.is-loading .card::after,.content.is-loading .kpi::after{
  content:"";position:absolute;inset:0;border-radius:inherit;z-index:5;
  background:linear-gradient(90deg,transparent,var(--hover-bg),transparent);
  background-size:200% 100%;animation:dsShim 1.05s ease-in-out infinite}
.content.is-loading .card>*,.content.is-loading .kpi>*{opacity:.35;transition:opacity .12s}
@keyframes dsShim{0%{background-position:200% 0}100%{background-position:-200% 0}}
@media (prefers-reduced-motion:reduce){
  .content.is-loading .card::after,.content.is-loading .kpi::after{animation:none;opacity:.5}}

/* ===== الحالة الفارغة ===== */
.ds-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:26px 18px;gap:5px;min-height:130px}
.ds-empty-ic{width:26px;height:26px;stroke:var(--faint);opacity:.65;margin-bottom:2px}
.ds-empty-t{font-size:12.5px;font-weight:700;color:var(--muted)}
.ds-empty-s{font-size:10.5px;color:var(--faint);font-weight:500;max-width:230px;line-height:1.5}
.ds-empty-btn{margin-top:7px;font-size:10.5px;font-weight:700;padding:5px 11px;border-radius:7px;
  border:1px solid var(--line);background:var(--surface);color:var(--brand);cursor:pointer}
.ds-empty-btn:hover{background:var(--hover-bg);border-color:var(--accent)}

/* ===== شريط الترشيح المتقاطع ===== */
.ds-xbar{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin:0 0 10px;
  padding:8px 11px;border-radius:9px;background:var(--selected-bg);
  border:1px solid var(--accent);animation:dsFade .18s ease both}
@keyframes dsFade{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:none}}
.ds-xlbl{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:var(--brand)}
.ds-chip{display:inline-flex;align-items:center;gap:6px;font-size:10.5px;font-weight:600;
  padding:4px 9px;border-radius:20px;border:1px solid var(--line);
  background:var(--card);color:var(--ink);cursor:pointer}
.ds-chip:hover{border-color:var(--accent)}
.ds-chip-x{font-size:13px;line-height:1;color:var(--faint)}
.ds-chip:hover .ds-chip-x{color:var(--down)}
.ds-xclear{margin-inline-start:auto;font-size:10.5px;font-weight:700;color:var(--muted);
  background:none;border:none;cursor:pointer;text-decoration:underline}
.ds-xclear:hover{color:var(--down)}
/* عناصر قابلة للترشيح بالنقر */
[data-xch],[data-xcat],[data-xbr]{cursor:pointer}
[data-xch].x-on,[data-xcat].x-on,[data-xbr].x-on{outline:2px solid var(--accent);outline-offset:1px;border-radius:6px}
.bh-badge .rs,.badge .rs,.tool .rs{width:.92em;height:.92em}
.kpi-val .rs,.fc-metric .rs,.tg-k-v .rs,.hero-mini .num .rs{width:.82em;height:.82em;vertical-align:-0.06em}

/* ===== TARGETS — redesign + brand green ===== */
/* ترويسة فلتر لكل كارد */
.tgc-head{display:flex;align-items:center;justify-content:space-between;gap:10px;
  flex-wrap:wrap;margin-bottom:11px}
.tgc-head.bar{padding:11px 14px;margin:0;border-bottom:1px solid var(--border);
  background:var(--surface)}
.tgc-t{font-size:11.5px;font-weight:700;color:var(--muted)}
.tgc-f{display:inline-flex;gap:3px;padding:3px;border-radius:9px;
  background:var(--surface);border:1px solid var(--border)}
.tgc-f button{padding:5px 10px;border-radius:7px;font-family:inherit;font-size:11px;
  font-weight:700;color:var(--muted);background:transparent;white-space:nowrap;
  transition:background .13s,color .13s}
.tgc-f button:hover{color:var(--ink)}
.tgc-f button.on{background:var(--bg-1);color:#fff}
[data-theme="dark"] .tgc-f button.on{background:var(--bg-2);color:#04100F}
/* KPI cards */
.tg-k{position:relative;overflow:hidden}
.tg-k.big{background:var(--bg-soft);border-color:var(--bg-line)}
.tg-k.big .tg-k-v{color:var(--bg-1)}
[data-theme="dark"] .tg-k.big .tg-k-v{color:var(--bg-4)}
.tg-k:hover{border-color:var(--bg-3);box-shadow:0 2px 12px var(--bg-soft)}
/* bullets — brand ramp */
.tg-bul-f.ok{background:var(--fill-hi)}
.tg-bul-f.warn{background:var(--fill-mid)}
.tg-bul-f.bad{background:var(--warning)}
.tg-bul-h b.ok{color:var(--bg-1)}
.tg-bul-h b.warn{color:var(--bg-2)}
[data-theme="dark"] .tg-bul-h b.ok{color:var(--bg-5)}
[data-theme="dark"] .tg-bul-h b.warn{color:var(--bg-4)}
.tg-cat-h span{color:var(--bg-2)}
[data-theme="dark"] .tg-cat-h span{color:var(--bg-4)}
.tg-cat-h span.ok{color:var(--bg-1)}
[data-theme="dark"] .tg-cat-h span.ok{color:var(--bg-5)}
.tg-cat:hover{border-color:var(--bg-3)}
/* ===== interactive trend chart ===== */
.tgt-card{padding-bottom:12px}
.tgt-ctrl{display:flex;align-items:center;gap:8px;margin-inline-start:auto;flex-wrap:wrap}
.tgt-legend{display:flex;align-items:center;gap:15px;flex-wrap:wrap;margin:4px 0 2px}
.tgt-legend span{display:flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;color:var(--muted)}
.tgt-legend i{width:14px;height:2.5px;border-radius:2px;flex:none}
.tgt-legend i.t{background:var(--bg-2);
  background-image:repeating-linear-gradient(90deg,var(--bg-2) 0 4px,transparent 4px 7px)}
[data-theme="dark"] .tgt-legend i.t{background-image:repeating-linear-gradient(90deg,var(--bg-3) 0 4px,transparent 4px 7px)}
.tgt-legend i.a{background:var(--bg-1)}
[data-theme="dark"] .tgt-legend i.a{background:var(--bg-5)}
.tgt-gap{margin-inline-start:auto;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:800}
.tgt-gap.ok{color:var(--bg-1);background:var(--bg-soft);border:1px solid var(--bg-line)}
[data-theme="dark"] .tgt-gap.ok{color:var(--bg-5)}
.tgt-gap.bad{color:var(--down);background:var(--error-bg);border:1px solid var(--error-border)}
.tgt-plot{position:relative;margin-top:4px}
.tgt-svg{width:100%;height:250px;display:block;overflow:visible}
.tgt-l1{fill:none;stroke:var(--bg-3);stroke-width:1.8;stroke-dasharray:5 4;stroke-linecap:round}
.tgt-l2{fill:none;stroke:var(--bg-1);stroke-width:2.6;stroke-linecap:round;stroke-linejoin:round}
[data-theme="dark"] .tgt-l2{stroke:var(--bg-5)}
.tgt-cursor{stroke:var(--bg-3);stroke-width:1.5;opacity:0;transition:opacity .15s}
.tgt-cursor.on{opacity:.4}
.tgt-dot{opacity:0;transition:opacity .15s;stroke:var(--card);stroke-width:2.5}
.tgt-dot.on{opacity:1}
.tgt-dot.t{fill:var(--bg-3)}
.tgt-dot.a{fill:var(--bg-1)}
[data-theme="dark"] .tgt-dot.a{fill:var(--bg-5)}
.tgt-hit{cursor:crosshair}
.tgt-tip{position:absolute;pointer-events:none;opacity:0;transform:translate(-50%,-112%);
  background:var(--elev-4);border:1px solid var(--border-strong);border-radius:11px;
  padding:10px 12px;min-width:150px;box-shadow:var(--shadow-md);
  transition:opacity .15s,left .12s,top .12s;z-index:9}
.tgt-tip.on{opacity:1}
.tgt-tip-h{font-size:10px;font-weight:800;color:var(--faint);letter-spacing:.05em;
  text-transform:uppercase;margin-bottom:7px}
.tgt-tip-r{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:2.5px 0}
.tgt-tip-r span{font-size:10.5px;font-weight:600;color:var(--faint)}
.tgt-tip-r b{font-size:12.5px;font-weight:800}
.tgt-tip-r.t b{color:var(--bg-3)}
.tgt-tip-r.a b{color:var(--bg-1)}
[data-theme="dark"] .tgt-tip-r.a b{color:var(--bg-5)}
.tgt-tip-g{margin-top:6px;padding-top:6px;border-top:1px solid var(--border-strong);
  display:flex;justify-content:space-between;font-size:11px;font-weight:800}
.tgt-tip-g.ok{color:var(--bg-1)}
[data-theme="dark"] .tgt-tip-g.ok{color:var(--bg-5)}
.tgt-tip-g.bad{color:var(--down)}
@media(max-width:720px){
  .tgc-head{gap:7px}
  .tgc-f button{padding:5px 8px;font-size:10.5px}
  .tgt-ctrl{width:100%;margin-inline-start:0}
  .tgt-svg{height:200px}
}

/* في الوضع الداكن يخفت أكثر حتى لا يرفع سطوع البطاقة */
[data-theme="dark"] .hero::before{opacity:.5;mix-blend-mode:overlay}
/* المحتوى فوق الباترن */
.hero-main,.hero-mini,.hero-insight{position:relative;z-index:1}
@media(prefers-reduced-motion:reduce){.hero::before{opacity:.5}}

/* ===== بطاقات مؤشرات الأداء (بديل لمحات ذكية) ===== */
.pk-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(196px,1fr));gap:11px}
.pk{background:var(--card);border:1px solid var(--border);border-radius:13px;
  padding:14px 14px 12px;display:flex;flex-direction:column;
  transition:border-color .14s,transform .14s,box-shadow .14s}
.pk:hover{border-color:var(--bg-3);transform:translateY(-1px);
  box-shadow:0 3px 14px var(--bg-soft)}
.pk-h{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:9px}
.pk-lbl{font-size:11.5px;font-weight:700;color:var(--muted);line-height:1.3}
.pk-ic{width:28px;height:28px;border-radius:8px;flex:none;display:flex;align-items:center;
  justify-content:center;background:var(--surface);border:1px solid var(--border)}
.pk-ic .ic{stroke:var(--muted);width:14px;height:14px}
.pk:hover .pk-ic{border-color:var(--bg-3)}
.pk:hover .pk-ic .ic{stroke:var(--bg-1)}
[data-theme="dark"] .pk:hover .pk-ic .ic{stroke:var(--bg-5);color:var(--bg-5)}
.pk-v{font-size:26px;font-weight:800;color:var(--ink);letter-spacing:-.02em;
  line-height:1;margin-bottom:9px;display:flex;align-items:baseline;gap:2px}
.pk-u{font-size:12px;font-weight:700;color:var(--faint)}
/* سبارك لاين */
.pk-spark{width:100%;height:34px;display:block;margin-bottom:9px}
.pk-line{fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;
  vector-effect:non-scaling-stroke;stroke:var(--bg-1)}
.pk-line.down{stroke:var(--down)}
[data-theme="dark"] .pk-line{stroke:var(--bg-5)}
[data-theme="dark"] .pk-line.down{stroke:var(--down)}
.pk-fill{fill:var(--bg-1);opacity:.07}
.pk-fill.down{fill:var(--down);opacity:.08}
[data-theme="dark"] .pk-fill{fill:var(--bg-5);opacity:.10}
/* التذييل: نص المقارنة + شارة التغيّر */
.pk-f{display:flex;align-items:center;justify-content:space-between;gap:8px;
  margin-top:auto;padding-top:9px;border-top:1px solid var(--border-soft)}
.pk-cmp{font-size:10px;font-weight:600;color:var(--muted)}
.pk-chg{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:20px;
  font-size:10.5px;font-weight:800;white-space:nowrap}
.pk-chg .ic{width:11px;height:11px}
.pk-chg.up{color:var(--up);background:var(--success-bg);border:1px solid var(--success-border)}
.pk-chg.up .ic{stroke:var(--up)}
.pk-chg.down{color:var(--down);background:var(--error-bg);border:1px solid var(--error-border)}
.pk-chg.down .ic{stroke:var(--down)}
@media(max-width:720px){
  .pk-grid:not(.flat){grid-template-columns:1fr 1fr;gap:9px}
  .pk-grid.flat{gap:9px}
  .pk{padding:12px}
  .pk-v{font-size:22px}
}

/* ===== PERFORMANCE & MONITORING ===== */
.pf-prev{display:flex;align-items:center;justify-content:space-between;gap:8px;
  padding:6px 8px;border-radius:7px;background:var(--surface);border:1px solid var(--border-soft);
  margin-bottom:8px}
.pf-prev span{font-size:10px;font-weight:600;color:var(--faint)}
.pf-prev b{font-size:11.5px;font-weight:800;color:var(--muted)}
.pf-2col{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
/* trend */
.pft-card{padding-bottom:12px}
.pft-leg{display:flex;align-items:center;gap:15px;flex-wrap:wrap;margin:4px 0 2px}
.pft-leg span{display:flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;color:var(--muted)}
.pft-leg i{width:14px;height:2.5px;border-radius:2px;flex:none}
.pft-leg i.a{background:var(--bg-1)}
[data-theme="dark"] .pft-leg i.a{background:var(--bg-5)}
.pft-leg i.b{background:var(--bg-3);
  background-image:repeating-linear-gradient(90deg,var(--bg-3) 0 4px,transparent 4px 7px)}
.pft-d{margin-inline-start:auto;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:800}
.pft-d.ok{color:var(--bg-1);background:var(--bg-soft);border:1px solid var(--bg-line)}
[data-theme="dark"] .pft-d.ok{color:var(--bg-5)}
.pft-d.bad{color:var(--down);background:var(--error-bg);border:1px solid var(--error-border)}
.pft-plot{position:relative;margin-top:4px}
.pft-svg{width:100%;height:230px;display:block;overflow:visible}
.pft-l1{fill:none;stroke:var(--bg-1);stroke-width:2.6;stroke-linecap:round;stroke-linejoin:round}
[data-theme="dark"] .pft-l1{stroke:var(--bg-5)}
.pft-l2{fill:none;stroke:var(--bg-3);stroke-width:1.8;stroke-dasharray:5 4;stroke-linecap:round}
.pft-cur{stroke:var(--bg-3);stroke-width:1.5;opacity:0;transition:opacity .15s}
.pft-cur.on{opacity:.4}
.pft-dot{opacity:0;transition:opacity .15s;stroke:var(--card);stroke-width:2.5}
.pft-dot.on{opacity:1}
.pft-dot.a{fill:var(--bg-1)}
[data-theme="dark"] .pft-dot.a{fill:var(--bg-5)}
.pft-dot.b{fill:var(--bg-3)}
.pft-hit{cursor:crosshair}
.pft-tip{position:absolute;pointer-events:none;opacity:0;transform:translate(-50%,-112%);
  background:var(--elev-4);border:1px solid var(--border-strong);border-radius:11px;
  padding:10px 12px;min-width:150px;box-shadow:var(--shadow-md);transition:opacity .15s;z-index:9}
.pft-tip.on{opacity:1}
.pft-tip-h{font-size:10px;font-weight:800;color:var(--faint);margin-bottom:7px}
.pft-tip-r{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:2.5px 0}
.pft-tip-r span{font-size:10.5px;font-weight:600;color:var(--faint)}
.pft-tip-r b{font-size:12.5px;font-weight:800;color:var(--ink)}
.pft-tip-g{margin-top:6px;padding-top:6px;border-top:1px solid var(--border-strong);
  display:flex;justify-content:space-between;font-size:11px;font-weight:800}
.pft-tip-g.ok{color:var(--bg-1)}
[data-theme="dark"] .pft-tip-g.ok{color:var(--bg-5)}
.pft-tip-g.bad{color:var(--down)}
/* columns */
.pfc-svg{width:100%;height:210px;display:block;margin-top:6px}
.pfc-b{transition:opacity .13s}
.pfc-b:hover{opacity:.78}
.pfc-b.rev{fill:var(--bg-2)}
.pfc-b.prof{fill:var(--bg-4)}
.pfc-b.exp{fill:var(--faint);opacity:.55}
[data-theme="dark"] .pfc-b.rev{fill:var(--bg-4)}
[data-theme="dark"] .pfc-b.prof{fill:var(--bg-5)}
.pfc-leg{display:flex;gap:11px;flex-wrap:wrap;margin-inline-start:auto}
.pfc-leg span{display:flex;align-items:center;gap:5px;font-size:10.5px;font-weight:600;color:var(--muted)}
.pfc-leg i{width:9px;height:9px;border-radius:2.5px;flex:none}
.pfc-leg i.rev{background:var(--bg-2)}
.pfc-leg i.prof{background:var(--bg-4)}
.pfc-leg i.exp{background:var(--faint);opacity:.55}
[data-theme="dark"] .pfc-leg i.rev{background:var(--bg-4)}
[data-theme="dark"] .pfc-leg i.prof{background:var(--bg-5)}
/* unit bars */
.pfu{display:flex;flex-direction:column;gap:11px;margin-top:8px}
.pfu-r{display:grid;grid-template-columns:72px 1fr 32px 66px;align-items:center;gap:9px;
  cursor:pointer;padding:3px;border-radius:8px;transition:background .13s}
.pfu-r:hover{background:var(--hover-bg)}
.pfu-n{font-size:12px;font-weight:700;color:var(--ink)}
.pfu-t{height:18px;border-radius:6px;background:var(--chart-track);overflow:hidden}
.pfu-t i{display:block;height:100%;border-radius:6px;background:var(--fill-hi);
  transition:width .5s cubic-bezier(.22,1,.36,1)}
.pfu-s{font-size:12.5px;font-weight:800;color:var(--ink);text-align:end}
.pfu-g{display:inline-flex;align-items:center;gap:2px;font-size:10.5px;font-weight:800;justify-content:flex-end}
.pfu-g.up{color:var(--up)}.pfu-g.up .ic{stroke:var(--up)}
.pfu-g.down{color:var(--down)}.pfu-g.down .ic{stroke:var(--down)}
/* branch table */
.pf-brow{cursor:pointer}
.pf-brow:hover{background:var(--hover-bg)}
.pf-csat{font-size:12px;font-weight:800;color:var(--ink)}
.pf-csat i{font-size:9.5px;font-weight:600;color:var(--faint);font-style:normal}
/* departments */
.pfd-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:11px}
.pfd{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px;
  cursor:pointer;transition:border-color .14s,transform .14s}
.pfd:hover{border-color:var(--bg-3);transform:translateY(-1px)}
.pfd-h{display:flex;align-items:center;gap:9px;margin-bottom:10px}
.pfd-h b{display:block;font-size:12.5px;font-weight:800;color:var(--ink)}
.pfd-h span{display:block;font-size:10px;color:var(--faint);font-weight:600;margin-top:1px}
.pfd-ic{width:30px;height:30px;border-radius:8px;flex:none;display:flex;align-items:center;
  justify-content:center;background:var(--surface);border:1px solid var(--border)}
.pfd-ic .ic{stroke:var(--muted)}
.pfd-s{margin-inline-start:auto;font-size:17px;font-weight:800}
.pfd-n{font-size:10.5px;color:var(--muted);font-weight:600;margin-top:8px}
/* KPI monitoring */
.pfm-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(226px,1fr));gap:11px}
.pfm{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px;
  cursor:pointer;transition:border-color .14s}
.pfm:hover{border-color:var(--bg-3)}
.pfm-h{display:flex;align-items:center;gap:8px;margin-bottom:9px;flex-wrap:wrap}
.pfm-h b{font-size:12px;font-weight:800;color:var(--ink)}
.pfm-h .bh-badge{margin-inline-start:auto}
.pfm-v{font-size:22px;font-weight:800;color:var(--ink);line-height:1;margin-bottom:8px}
.pfm-v span{font-size:11px;color:var(--faint);margin-inline-start:1px}
.pfm-f{display:flex;justify-content:space-between;gap:8px;margin-top:8px}
.pfm-f span{font-size:10px;color:var(--muted);font-weight:600}
.pfm-f b{color:var(--ink);font-weight:800}
/* activity timeline */
.pfa{display:flex;flex-direction:column;margin-top:6px}
.pfa-r{display:flex;align-items:center;gap:11px;padding:11px 0;
  border-bottom:1px solid var(--border-soft);position:relative}
.pfa-r:last-child{border-bottom:none}
.pfa-ic{width:32px;height:32px;border-radius:9px;flex:none;display:flex;align-items:center;
  justify-content:center;border:1px solid var(--border)}
.pfa-r.ok .pfa-ic{background:var(--success-bg);border-color:var(--success-border)}
.pfa-r.ok .pfa-ic .ic{stroke:var(--success)}
.pfa-r.warn .pfa-ic{background:var(--warning-bg);border-color:var(--warning-border)}
.pfa-r.warn .pfa-ic .ic{stroke:var(--warning)}
.pfa-r.info .pfa-ic{background:var(--surface)}
.pfa-r.info .pfa-ic .ic{stroke:var(--muted)}
.pfa-b{flex:1;min-width:0}
.pfa-b b{display:block;font-size:12.5px;font-weight:700;color:var(--ink)}
.pfa-b span{display:block;font-size:11px;color:var(--muted);margin-top:2px}
.pfa-t{font-size:10px;color:var(--faint);font-weight:600;flex:none;white-space:nowrap}
/* KPI drawer */
.pfk-hero{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}
.pfk-v{font-size:32px;font-weight:800;color:var(--ink);line-height:1}
.pfk-v span{font-size:14px;color:var(--faint);margin-inline-start:2px}
@media(max-width:900px){.pf-2col{grid-template-columns:1fr}}
@media(max-width:720px){
  .pfd-grid,.pfm-grid{grid-template-columns:1fr}
  .pfu-r{grid-template-columns:58px 1fr 28px}
  .pfu-g{display:none}
  .pft-svg{height:190px}
}

/* ===== قنوات البيع ===== */
.pfch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(268px,1fr));gap:11px}
.pfch{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:14px;
  cursor:pointer;transition:border-color .14s,transform .14s,box-shadow .14s}
.pfch:hover{border-color:var(--bg-3);transform:translateY(-1px);box-shadow:0 3px 14px var(--bg-soft)}
.pfch-h{display:flex;align-items:center;gap:9px;margin-bottom:10px}
.pfch-h b{display:block;font-size:13px;font-weight:800;color:var(--ink)}
.pfch-h span{display:block;font-size:10px;color:var(--faint);font-weight:600;margin-top:1px}
.pfch-s{margin-inline-start:auto;font-size:18px;font-weight:800}
.pfch-v{font-size:24px;font-weight:800;color:var(--ink);letter-spacing:-.02em;line-height:1;
  margin-bottom:8px;display:flex;align-items:baseline;gap:3px}
.pfch-v span{font-size:11px;font-weight:700;color:var(--faint)}
.pfch-m{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:9px 0}
.pfch-m>div{padding:6px 8px;border-radius:7px;background:var(--surface);
  border:1px solid var(--border-soft)}
.pfch-m span{display:block;font-size:9.5px;font-weight:600;color:var(--faint)}
.pfch-m b{display:block;font-size:12px;font-weight:800;color:var(--ink);margin-top:1px}
.pfch-f{display:flex;align-items:center;justify-content:space-between;gap:8px;
  padding-top:9px;border-top:1px solid var(--border-soft)}
.pfch-n{font-size:10px;font-weight:600;color:var(--muted);flex:1;min-width:0}
/* شريط الحصص */
.pfs-bar{display:flex;height:22px;border-radius:7px;overflow:hidden;margin-top:8px;
  border:1px solid var(--border)}
.pfs-seg{display:block;height:100%;transition:width .5s cubic-bezier(.22,1,.36,1)}
.pfs-leg{display:flex;flex-direction:column;gap:2px;margin-top:10px}
.pfs-l{display:flex;align-items:center;gap:8px;padding:7px 0;cursor:pointer;
  border-bottom:1px solid var(--border-soft)}
.pfs-l:last-child{border-bottom:none}
.pfs-l:hover{background:var(--hover-bg)}
.pfs-l i{width:10px;height:10px;border-radius:3px;flex:none}
.pfs-l span{font-size:11.5px;font-weight:700;color:var(--ink);flex:1}
.pfs-l b{font-size:12px;font-weight:800;color:var(--ink)}
.pfs-l em{font-size:10px;font-weight:600;color:var(--faint);font-style:normal;
  min-width:64px;text-align:end}
@media(max-width:720px){
  .pfch-grid{grid-template-columns:1fr}
  .pfch-m{grid-template-columns:1fr 1fr}
}

/* ===== CRM: شريط الفلترة وقنوات العملاء ===== */
.crm-bar{flex-wrap:wrap;gap:9px}
.crm-src{display:inline-flex;gap:3px;padding:3px;border-radius:10px;
  background:var(--surface);border:1px solid var(--border)}
.crm-src button{padding:6px 12px;border-radius:7px;font-family:inherit;font-size:11.5px;
  font-weight:700;color:var(--muted);background:transparent;white-space:nowrap;
  transition:background .13s,color .13s}
.crm-src button:hover{color:var(--ink)}
.crm-src button.on{background:var(--bg-1);color:#fff}
[data-theme="dark"] .crm-src button.on{background:var(--bg-2);color:#04100F}
.crm-ch{display:grid;grid-template-columns:170px 1fr;gap:16px;align-items:center;margin-top:8px}
.crm-donut{width:150px;height:150px;display:block;margin:0 auto}
.crm-seg{cursor:pointer;transition:opacity .13s}
.crm-seg:hover{opacity:.8}
.crm-dt{font-size:19px;font-weight:800;fill:var(--ink);font-family:Cairo}
.crm-ds{font-size:9.5px;font-weight:600;fill:var(--faint);font-family:Cairo}
.crm-leg{display:flex;flex-direction:column;gap:2px}
.crm-l{display:flex;align-items:center;gap:10px;padding:9px 0;cursor:pointer;
  border-bottom:1px solid var(--border-soft)}
.crm-l:last-child{border-bottom:none}
.crm-l:hover{background:var(--hover-bg)}
.crm-l>i{width:11px;height:11px;border-radius:3px;flex:none}
.crm-l-b{flex:1;min-width:0}
.crm-l-b b{display:block;font-size:12.5px;font-weight:800;color:var(--ink)}
.crm-l-b span{display:block;font-size:10.5px;color:var(--muted);font-weight:600;margin-top:1px}
.crm-l-r{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex:none}
.crm-l-r>b{font-size:13px;font-weight:800;color:var(--ink)}
/* ===== ANALYTICS ===== */
.an-hint{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;
  font-weight:600;color:var(--muted)}
.an-hint .ic{stroke:var(--accent)}
.an-tabs{display:flex;gap:2px;overflow-x:auto;margin-bottom:4px;
  background:var(--surface);border:1px solid var(--line-soft);border-radius:7px;padding:2px}
.an-tabs::-webkit-scrollbar{height:0}
.an-tab{flex:none;padding:5px 12px;border-radius:5px;border:1px solid transparent;
  background:transparent;font-family:inherit;font-size:11px;font-weight:600;
  color:var(--muted);white-space:nowrap;transition:all .15s}
.an-tab:hover{background:var(--hover-bg);color:var(--ink)}
.an-tab.on{background:var(--data-1);border-color:var(--data-1);color:#fff}
[data-theme="dark"] .an-tabs{background:var(--elev-1);border-color:var(--border-soft)}
[data-theme="dark"] .an-tab{color:var(--text-2)}
[data-theme="dark"] .an-tab:hover{background:var(--hover-bg);color:var(--text-1)}
[data-theme="dark"] .an-tab.on{background:var(--bg-2);border-color:var(--bg-2);color:#04100F}
.an-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(212px,1fr));gap:11px}
.an-c{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:13px;
  cursor:pointer;transition:border-color .14s,transform .14s,box-shadow .14s}
.an-c:hover{border-color:var(--bg-3);transform:translateY(-1px);box-shadow:0 3px 14px var(--bg-soft)}
.an-c-h{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.an-c-h>span{font-size:11.5px;font-weight:700;color:var(--muted);flex:1}
.an-c-h>.ic{stroke:var(--faint);flex:none}
.an-c:hover .an-c-h>.ic{stroke:var(--bg-1)}
[data-theme="dark"] .an-c:hover .an-c-h>.ic{stroke:var(--bg-5);color:var(--bg-5)}
.an-c-v{font-size:21px;font-weight:800;color:var(--ink);letter-spacing:-.02em;line-height:1.15;
  margin-bottom:9px;display:flex;align-items:baseline;gap:3px;overflow-wrap:anywhere}
.an-c-v span{font-size:11px;font-weight:700;color:var(--faint)}
.an-c-f{display:flex;align-items:center;justify-content:space-between;gap:8px;
  padding-top:9px;border-top:1px solid var(--border-soft)}
.an-c-s{font-size:10px;font-weight:600;color:var(--muted);flex:1;min-width:0}
.an-svg{width:100%;height:200px;display:block;margin-top:6px}
/* ===== EMPTY STATE (Motor) ===== */
.empty-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:60px 24px;min-height:56vh}
.empty-art{margin-bottom:22px}
.empty-svg{width:130px;height:130px;display:block}
.es-ring{fill:none;stroke:var(--border);stroke-width:1.5;stroke-dasharray:4 5;opacity:.7}
.es-ring2{fill:none;stroke:var(--border-soft);stroke-width:1}
.es-gear{transform-origin:60px 60px;animation:esSpin 18s linear infinite}
@keyframes esSpin{to{transform:rotate(360deg)}}
@media(prefers-reduced-motion:reduce){.es-gear{animation:none}}
.es-core{fill:var(--surface);stroke:var(--bg-3);stroke-width:2}
.es-hole{fill:var(--card);stroke:var(--border-strong);stroke-width:1.5}
.es-tooth{stroke:var(--bg-3);stroke-width:3.4;stroke-linecap:round}
.es-dot{fill:var(--bg-4);opacity:.5}
.es-dot.d2{fill:var(--gold);opacity:.45}
.es-dot.d3{fill:var(--bg-3);opacity:.35}
.empty-t{font-size:17px;font-weight:800;color:var(--ink);margin-bottom:7px}
.empty-d{font-size:12.5px;color:var(--muted);line-height:1.7;max-width:330px;margin-bottom:20px}
.empty-a{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
@media(max-width:720px){
  .crm-ch{grid-template-columns:1fr}
  .an-grid{grid-template-columns:1fr 1fr}
  .chan-section{grid-template-columns:1fr}
}

/* ===== توزيع الفئات — خلايا متدرّجة (بأسلوب المرجع، بألوان الهوية) ===== */
.cat-card{display:flex;flex-direction:column}
.cat-rows{display:flex;flex-direction:column;gap:11px;margin-top:10px}
.cat-row{display:grid;grid-template-columns:74px 1fr;align-items:center;gap:11px}
.cat-n{font-size:11.5px;font-weight:700;color:var(--muted);line-height:1.35;
  overflow-wrap:anywhere}
.cat-cells{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.cat-cell{position:relative;height:34px;border-radius:7px;background:var(--chart-track);
  display:flex;align-items:center;justify-content:center;
  transition:background .35s cubic-bezier(.22,1,.36,1),transform .13s}
/* تدرّج أخضر الهوية — يعمّق كلما اتجهنا للنهاية */
.cat-cell.on.s1{background:var(--cat-1)}
.cat-cell.on.s2{background:var(--cat-2)}
.cat-cell.on.s3{background:var(--cat-3)}
.cat-cell.on.s4{background:var(--cat-4)}
.cat-cell.on.s5{background:var(--cat-5)}
.cat-cell.last{box-shadow:0 1px 6px var(--bg-soft)}
.cat-cell.last b{font-size:11px;font-weight:800;color:var(--cat-ink);white-space:nowrap;
  padding:0 4px}
.cat-row:hover .cat-cell.on{transform:translateY(-1px)}
@media(max-width:900px){
  .cat-row{grid-template-columns:62px 1fr;gap:8px}
  .cat-cells{gap:4px}
  .cat-cell{height:30px;border-radius:6px}
  .cat-cell.last b{font-size:10px}
}
@media(max-width:720px){
  .cat-cells{grid-template-columns:repeat(7,1fr)}
  .cat-cell{height:27px}
}

/* ===== فلتر المتاجر — يرث طابع منتقي التاريخ ===== */
.store-tool .cv{max-width:190px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hs-pop{width:330px;max-height:min(74vh,560px);overflow-y:auto}
.hs-tree{display:flex;flex-direction:column;gap:9px}
.hs-row{display:flex;flex-direction:column;gap:5px}
.hs-row.off{opacity:.45}
.hs-lbl{font-size:10px;font-weight:800;color:var(--muted);letter-spacing:.03em}
.hs-val.dim{font-size:11.5px;color:var(--faint);font-weight:600}
.hs-opts{display:flex;flex-wrap:wrap;gap:4px}
.hs-o{display:inline-flex;align-items:center;gap:5px;padding:6px 10px;border-radius:8px;
  border:1px solid transparent;background:var(--surface);font-family:inherit;
  font-size:11.5px;font-weight:700;color:var(--muted);transition:all .12s}
.hs-o:hover{background:var(--hover-bg);border-color:var(--border);color:var(--ink)}
.hs-o.on{background:var(--selected-bg);border-color:var(--accent);color:var(--ink)}
.hs-o .dp-tick{width:12px;height:12px;stroke:var(--accent);opacity:0;flex:none}
.hs-o.on .dp-tick{opacity:1}
.hs-hint,.hs-empty{display:flex;align-items:center;gap:9px;padding:14px 12px;
  border-radius:10px;background:var(--surface);border:1px dashed var(--border)}
.hs-hint span{font-size:11.5px;font-weight:600;color:var(--muted)}
.hs-hint .ic{stroke:var(--faint);flex:none}
.hs-empty{border-style:solid;background:var(--warning-bg);border-color:var(--warning-border)}
.hs-empty .ic{stroke:var(--warning);flex:none}
.hs-empty b{display:block;font-size:12px;font-weight:800;color:var(--ink)}
.hs-empty span{display:block;font-size:11px;color:var(--muted);margin-top:2px}
.hs-sum{display:flex;align-items:center;gap:6px;margin-top:11px;padding:8px 10px;
  border-radius:8px;background:var(--bg-soft);border:1px solid var(--bg-line)}
.hs-sum span{font-size:11px;font-weight:600;color:var(--muted)}
.hs-sum b{color:var(--ink);font-weight:800}
.hs-sum .ic{stroke:var(--accent);flex:none}
/* شارة النطاق في الترويسة */
.hs-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;
  background:var(--bg-soft);border:1px solid var(--bg-line);font-size:11px;font-weight:700;
  color:var(--bg-1)}
[data-theme="dark"] .hs-chip{color:var(--bg-5)}
.hs-chip .ic{width:12px;height:12px;stroke:currentColor}
.hs-chip button{display:flex;align-items:center;background:transparent;
  color:inherit;opacity:.7;margin-inline-start:2px}
.hs-chip button:hover{opacity:1}
@media(max-width:720px){
  .hs-pop{width:min(92vw,330px)}
  .store-tool .cv{max-width:104px}
}

/* شارة النطاق أسفل الترويسة */
.hs-banner{display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  padding:9px 0 0}
.hs-note{font-size:11px;font-weight:600;color:var(--muted)}
/* المناطق خارج النطاق تُخفت بدل إخفائها — يبقى السياق مرئيًا */
.region.hs-out{opacity:.22;filter:saturate(.3)}
.region.hs-out:hover{opacity:.4}

/* بطاقات الملخص بلا سبارك لاين: مسافات أضيق كي لا تبدو جوفاء */
.pk-grid.flat .pk-v{margin-bottom:0}
.pk-grid.flat .pk-f{margin-top:11px}
.pk-grid.flat .pk{padding:14px 14px 12px}
/* الملخص: 5 بطاقات بالضبط — auto-fill كان يولّد مسارات فارغة تترك فجوة
   على اليسار. أعمدة متساوية صريحة تملأ العرض بالكامل. */
.pk-grid.flat{grid-template-columns:repeat(5,1fr)}
@media(max-width:1180px){.pk-grid.flat{grid-template-columns:repeat(3,1fr)}}
@media(max-width:820px){.pk-grid.flat{grid-template-columns:repeat(2,1fr)}}
@media(max-width:520px){.pk-grid.flat{grid-template-columns:1fr}}

/* ===== دونات توزيع الفئات (استعادة) ===== */
.cd-wrap{display:flex;flex-direction:column;align-items:center;gap:14px;margin-top:6px}
.cd-donut{width:190px;height:190px;display:block}
.cd-seg{transition:opacity .13s}
.cd-seg:hover{opacity:.82}
.cd-c-v{font-size:22px;font-weight:800;fill:var(--ink);font-family:Cairo}
.cd-c-s{font-size:9px;font-weight:600;fill:var(--faint);font-family:Cairo}
.cd-legend{display:grid;grid-template-columns:1fr 1fr;gap:4px 22px;width:100%}
.cd-col{display:flex;flex-direction:column;gap:4px}
.cd-l{display:flex;align-items:center;gap:7px;padding:3px 0}
.cd-l i{width:10px;height:10px;border-radius:3px;flex:none}
.cd-n{font-size:11.5px;font-weight:600;color:var(--muted);flex:1}
.cd-v{font-size:11.5px;font-weight:800;color:var(--ink)}
@media(max-width:720px){.cd-legend{grid-template-columns:1fr}}

/* ===== أعمدة توزيع الفئات ===== */
.cv-svg{width:100%;height:260px;display:block;margin-top:10px}
.cv-b{transition:opacity .13s}
.cv-g:hover .cv-b{opacity:.78}
.cv-v{font-size:10px;font-weight:800;fill:var(--ink);font-family:Cairo;letter-spacing:.2px}
.cv-x{font-size:9.5px;font-weight:600;fill:var(--muted);font-family:Cairo}
.cv-baseline{stroke:var(--border-strong);stroke-width:1.2}
/* ===== جرس التنبيهات ===== */
.nt-tool .nt-btn{position:relative;width:34px;padding:0;justify-content:center}
.nt-tool .nt-btn .ic{width:18px;height:18px}
.nt-tool .nt-btn:hover{border-color:var(--border-strong);background:var(--hover-bg)}
.nt-tool.open .nt-btn{border-color:var(--focus-ring)}
.nt-dot{position:absolute;top:-5px;inset-inline-end:-5px;min-width:16px;height:16px;
  padding:0 4px;border-radius:9px;background:var(--error);color:#fff;font-size:9.5px;
  font-weight:800;display:flex;align-items:center;justify-content:center;
  border:2px solid var(--card);line-height:1}
.nt-pop{width:340px;padding-bottom:10px}
.nt-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:9px}
.nt-link{background:transparent;font-family:inherit;font-size:10.5px;font-weight:700;
  color:var(--accent)}
.nt-link:hover{text-decoration:underline}
.nt-list{display:flex;flex-direction:column;gap:2px;max-height:340px;overflow-y:auto}
.nt-i{display:flex;align-items:flex-start;gap:9px;width:100%;text-align:start;padding:9px 8px;
  border-radius:9px;background:transparent;border:1px solid transparent;font-family:inherit;
  transition:background .12s}
.nt-i:hover{background:var(--hover-bg);border-color:var(--border)}
.nt-ic{width:30px;height:30px;border-radius:9px;flex:none;display:flex;align-items:center;
  justify-content:center;border:1px solid var(--border)}
.nt-ic .ic{width:14px;height:14px}
.nt-b{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
.nt-b b{font-size:12px;font-weight:700;color:var(--ink);line-height:1.35}
.nt-d{font-size:10.5px;color:var(--muted);line-height:1.5}
.nt-m{font-size:9.5px;color:var(--muted);font-weight:600}
.nt-m i{font-style:normal;font-weight:800}
.nt-none{display:flex;align-items:center;justify-content:center;gap:7px;padding:26px 12px;
  color:var(--muted);font-size:11.5px;font-weight:600}
.nt-none .ic{stroke:var(--success)}
/* ===== صفحة التنبيهات ===== */
.nt-sum{display:grid;grid-template-columns:repeat(4,1fr);gap:11px}
.nt-s{display:flex;flex-direction:column;align-items:center;gap:6px;padding:15px 10px;
  border-radius:13px;background:var(--card);border:1px solid var(--border);
  font-family:inherit;cursor:pointer;transition:all .14s}
.nt-s:hover{transform:translateY(-1px);box-shadow:0 3px 12px var(--bg-soft)}
.nt-s.on{box-shadow:0 0 0 1px currentColor inset}
.nt-s-i{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;
  justify-content:center;border:1px solid var(--border)}
.nt-s-v{font-size:20px;font-weight:800;line-height:1}
.nt-s-l{font-size:10.5px;font-weight:700;color:var(--muted)}
.nt-tabs{display:flex;gap:2px;flex-wrap:wrap;margin-inline-start:auto;
  background:var(--surface);border:1px solid var(--line-soft);border-radius:7px;padding:2px}
[data-theme="dark"] .nt-tabs{background:var(--elev-1);border-color:var(--border-soft)}
.nt-rows{display:flex;flex-direction:column;margin-top:4px}
.nt-r{display:flex;align-items:flex-start;gap:11px;padding:13px 0;
  border-bottom:1px solid var(--border-soft);cursor:pointer;transition:background .12s}
.nt-r:last-child{border-bottom:none}
.nt-r:hover{background:var(--hover-bg)}
.nt-r.read{opacity:.62}
.nt-r-b{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px}
.nt-r-h{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.nt-r-h b{font-size:12.5px;font-weight:700;color:var(--ink)}
.nt-new{width:7px;height:7px;border-radius:50%;background:var(--accent);flex:none}
.nt-r-a{flex:none;display:flex;align-items:center}
@media(max-width:720px){
  .nt-sum{grid-template-columns:1fr 1fr}
  .nt-pop{width:min(92vw,340px)}
  .nt-tabs{width:100%;margin-inline-start:0;overflow-x:auto}
  .cv-svg{height:224px}
}

/* ===== ANALYTICS ===== */
.an-kg{display:grid;grid-template-columns:repeat(4,1fr);gap:11px}
.an-k{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:13px;
  transition:border-color .14s,transform .14s}
.an-k:hover{border-color:var(--bg-3);transform:translateY(-1px)}
.an-k-h{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:9px}
.an-k-h>span:first-child{font-size:11px;font-weight:700;color:var(--muted)}
.an-k-v{font-size:20px;font-weight:800;color:var(--ink);letter-spacing:-.02em;line-height:1.1;
  margin-bottom:8px;display:flex;align-items:baseline;gap:3px;overflow-wrap:anywhere}
.an-k-v span{font-size:10.5px;font-weight:700;color:var(--faint)}
.an-c-svg{width:100%;height:auto;display:block;margin-top:6px}
.an-leg{display:flex;gap:12px;flex-wrap:wrap;margin-inline-start:auto}
.an-leg span{display:flex;align-items:center;gap:5px;font-size:10.5px;font-weight:600;color:var(--muted)}
.an-leg i{width:10px;height:10px;border-radius:3px;flex:none}
.an-sb{transition:opacity .13s}
.an-sb:hover{opacity:.8}
/* دونات */
.an-dwrap{display:flex;align-items:center;gap:16px;margin-top:6px;flex-wrap:wrap}
.an-donut{width:150px;height:150px;flex:none}
.an-ds{cursor:pointer;transition:opacity .13s}
.an-ds:hover{opacity:.82}
.an-dleg{flex:1;min-width:150px;display:flex;flex-direction:column;gap:2px}
.an-dl{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border-soft)}
.an-dl:last-child{border-bottom:none}
.an-dl i{width:10px;height:10px;border-radius:3px;flex:none}
.an-dl span{flex:1;font-size:11.5px;font-weight:600;color:var(--muted)}
.an-dl b{font-size:12px;font-weight:800;color:var(--ink)}
/* أشرطة أفقية */
.an-hb{display:flex;flex-direction:column;gap:9px;margin-top:8px}
.an-hb-r{display:grid;grid-template-columns:minmax(74px,150px) 1fr auto;align-items:center;gap:9px;
  padding:3px;border-radius:7px;transition:background .12s}
.an-hb-r[data-anpg]{cursor:pointer}
.an-hb-r:hover{background:var(--hover-bg)}
.an-hb-n{font-size:11px;font-weight:700;color:var(--ink);overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap}
.an-hb-t{height:16px;border-radius:5px;background:var(--chart-track);overflow:hidden}
.an-hb-t i{display:block;height:100%;border-radius:5px;transition:width .5s cubic-bezier(.22,1,.36,1)}
.an-hb-v{font-size:11.5px;font-weight:800;color:var(--ink);min-width:52px;text-align:end}
/* growth bars — value inside the bar + unit metrics around it (revenue-card style) */
.agb{display:flex;flex-direction:column;gap:16px;margin-top:10px}
.agb-r{padding:4px;border-radius:9px;transition:background .12s}
.agb-r[data-anpg]{cursor:pointer}
.agb-r:hover{background:var(--hover-bg)}
.agb-top{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.agb-n{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:700;color:var(--ink)}
.agb-d{width:9px;height:9px;border-radius:3px;flex:0 0 auto}
.agb-sub{font-size:10.5px;font-weight:600;color:var(--muted);flex:1;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.agb-chg{font-size:11.5px;font-weight:800;font-variant-numeric:tabular-nums}
.agb-chg.up{color:var(--up)}
.agb-chg.down{color:var(--down)}
.agb-track{position:relative;height:26px;border-radius:8px;
  background:var(--chart-track);display:flex;align-items:center}
.agb-fill{height:100%;border-radius:8px;display:flex;align-items:center;
  justify-content:flex-start;padding-inline-start:11px;box-sizing:border-box;
  transition:width .6s cubic-bezier(.22,1,.36,1)}
.agb-in{font-size:11px;font-weight:800;color:#fff;font-variant-numeric:tabular-nums}
.agb-in.ink{color:var(--ink)}
[data-theme="dark"] .agb-in{color:#04100F}
.agb-out{font-size:11px;font-weight:800;color:var(--ink);
  font-variant-numeric:tabular-nums;padding-inline-start:9px}
/* compact executive KPI row below the growth bars */
.agb-kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-top:15px;
  padding-top:14px;border-top:1px solid var(--line-soft)}
.agb-kpi{display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:9px 6px;border-radius:9px;background:var(--surface);text-align:center}
.agb-kpi-ic{display:inline-flex}
.agb-kpi-ic .ic-sm{width:15px;height:15px}
.agb-kpi-v{font-size:13.5px;font-weight:800;color:var(--ink);line-height:1.1;
  font-variant-numeric:tabular-nums;max-width:100%;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap}
.agb-kpi-l{font-size:10px;font-weight:600;color:var(--muted)}
[data-theme="dark"] .agb-kpi{background:var(--elev-1)}
/* treemap */
.an-tm rect{transition:opacity .13s;cursor:pointer}
.an-tm:hover rect{opacity:.82}
.an-tm-n{font-size:11px;font-weight:800;fill:#fff;font-family:Cairo}
.an-tm-v{font-size:10px;font-weight:700;fill:rgba(255,255,255,.82);font-family:Cairo}
.an-tm-n.ink{fill:#2A2205}
.an-tm-v.ink{fill:rgba(42,34,5,.78)}
/* bullet */
.an-bl{display:flex;flex-direction:column;gap:13px;margin-top:8px}
.an-bl-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.an-bl-h span{font-size:11.5px;font-weight:700;color:var(--ink)}
.an-bl-h b{font-size:12px;font-weight:800}
.an-bl-h b.ok{color:var(--up)} .an-bl-h b.warn{color:var(--warning)} .an-bl-h b.bad{color:var(--down)}
.an-bl-t{position:relative;height:16px;border-radius:5px;background:var(--chart-track);overflow:hidden}
.an-bl-q{position:absolute;inset-block:0;inset-inline-start:0;background:var(--border-strong);opacity:.4}
.an-bl-f{position:absolute;inset-block:0;inset-inline-start:0;border-radius:5px;
  transition:width .5s cubic-bezier(.22,1,.36,1)}
.an-bl-m{position:absolute;inset-block:-2px;width:2px;background:var(--ink);opacity:.55}
.an-bl-s{display:flex;justify-content:space-between;margin-top:4px}
.an-bl-s span{font-size:10px;font-weight:600;color:var(--faint)}
/* radial */
.an-rad{display:flex;flex-direction:column;align-items:center;gap:10px;margin-top:8px}
.an-rad-s{text-align:center}
.an-rad-s b{display:block;font-size:17px;font-weight:800;color:var(--ink)}
.an-rad-s span{font-size:10.5px;color:var(--muted);font-weight:600}
/* ranking */
.an-rk-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.an-rk-3{grid-template-columns:repeat(3,1fr)}
.empty-gif{width:190px;max-width:60vw;height:auto;display:block;
  object-fit:contain;image-rendering:auto}
/* ===== conversion funnel ===== */
.afn{display:flex;flex-direction:column;gap:15px}
.afn-c{padding:13px 14px;border:1px solid var(--line);border-radius:13px;background:var(--card)}
.afn-h{display:flex;align-items:center;gap:7px;margin-bottom:11px}
.afn-d{width:9px;height:9px;border-radius:3px;flex:0 0 auto}
.afn-h b{font-size:12.5px;font-weight:700;color:var(--ink);flex:1}
.afn-rate{font-size:14px;font-weight:800;font-variant-numeric:tabular-nums;
  padding:2px 9px;border-radius:20px;background:var(--surface);border:1px solid var(--line-soft)}
.afn-body{display:flex;flex-direction:column}
.afn-stage{position:relative;display:flex;align-items:center}
.afn-bar{height:26px;border-radius:7px}
.afn-bar.top{width:100%}
.afn-bar.bot{min-width:34px;position:relative;z-index:1;transition:width .55s cubic-bezier(.4,0,.2,1)}
/* مسار مرجعي خلف عمود الطلب يوضّح المقياس 0–30% وعلامة عند 15% */
.afn-track{position:absolute;inset-inline-start:0;inset-inline-end:0;height:26px;
  border-radius:7px;background:var(--line-soft);opacity:.55}
.afn-tick{position:absolute;inset-inline-start:50%;top:-3px;bottom:-3px;width:1px;
  background:var(--border-strong);opacity:.5}
.afn-lbl{position:absolute;inset-inline-start:10px;display:flex;
  align-items:baseline;gap:5px;z-index:2}
.afn-lbl b{font-size:12px;font-weight:750;color:var(--ink);
  font-variant-numeric:tabular-nums}
.afn-lbl span{font-size:10.5px;color:var(--ink-3)}
.afn-drop{position:relative;height:26px}
.afn-svg{width:100%;height:100%;display:block}
.afn-lost{position:absolute;inset-inline-end:8px;top:50%;
  transform:translateY(-50%);font-size:10.5px;font-weight:650;color:var(--ink-3)}
/* ===== perf bars (branch ranking) ===== */
.apb{display:flex;flex-direction:column;gap:16px}
.apb-list{display:flex;flex-direction:column;gap:14px}
.apb-row{cursor:pointer}
.apb-meta{display:flex;align-items:baseline;gap:8px;margin-bottom:7px}
.apb-l{display:flex;align-items:baseline;gap:6px;min-width:0;flex:1}
.apb-l b{font-size:12.5px;font-weight:700;color:var(--ink);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.apb-l span{font-size:11px;color:var(--ink-3);white-space:nowrap}
.apb-r{display:flex;align-items:baseline;gap:10px;flex:0 0 auto}
.apb-chg{font-size:11px;font-weight:700}
.apb-chg.up{color:var(--up)} .apb-chg.down{color:var(--down)}
.apb-val{font-size:12px;font-weight:750;color:var(--ink);
  font-variant-numeric:tabular-nums}
.apb-track{position:relative;height:30px;border-radius:9px;
  background:var(--chart-track);overflow:hidden;display:flex;align-items:center}
.apb-fill{height:100%;border-radius:9px;display:flex;align-items:center;
  justify-content:flex-end;padding-inline-end:10px;
  background:linear-gradient(90deg,var(--bg-2),var(--bg-1));
  transition:width .55s cubic-bezier(.4,0,.2,1)}
.apb-pct{font-size:11.5px;font-weight:750;color:#fff;
  font-variant-numeric:tabular-nums}
.apb-pct.out{position:absolute;inset-inline-start:calc(100% + 8px);
  color:var(--ink-2)}
/* stat strip */
.apb-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;
  padding-top:14px;border-top:1px solid var(--line)}
.apb-st{display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:12px 8px;border-radius:12px;text-align:center}
.apb-st-i{display:grid;place-items:center;width:26px;height:26px;
  border-radius:8px;background:var(--card);margin-bottom:2px}
.apb-st b{font-size:15px;font-weight:800;color:var(--ink);
  font-variant-numeric:tabular-nums}
.apb-st span{font-size:10.5px;color:var(--ink-3);font-weight:600}
.apb-st.a{background:var(--heat-1)} .apb-st.b{background:var(--gold-soft)}
.apb-st.c{background:var(--surface)} .apb-st.d{background:var(--heat-2)}
@media(max-width:900px){.apb-stats{grid-template-columns:repeat(2,1fr)}}
/* channel filter in the toolbar */
.an-chf{margin-inline-start:auto}
.an-empty{padding:26px 12px;text-align:center;font-size:12px;color:var(--ink-3)}
/* interactive line layer */
.anl-wrap{position:relative}
.anl-svg{overflow:visible}
.anl-cur{stroke:var(--ink-3);stroke-width:1.4;stroke-dasharray:4 4;
  transition:opacity .14s ease;pointer-events:none}
.anl-dot{transition:opacity .14s ease;pointer-events:none}
.anl-hit{cursor:crosshair}
.anl-tip{transform:translate(-50%,-118%)}
/* bar hover */
.an-ib{transition:opacity .12s ease}
svg:hover .an-ib{opacity:.55}
svg .an-ib:hover{opacity:1}
.an-kg6{grid-template-columns:repeat(3,1fr)}
/* comparison cards */
.an-cmp{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.an-cmp-c{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px}
.an-cmp-h{display:flex;align-items:center;gap:7px;font-weight:700;font-size:13.5px;
  color:var(--ink);margin-bottom:10px}
.an-cmp-d{width:9px;height:9px;border-radius:3px;flex:0 0 auto}
.an-cmp-g{display:flex;flex-direction:column;gap:7px}
.an-cmp-m{display:flex;align-items:center;gap:6px;font-size:12px}
.an-cmp-m span{color:var(--ink-3);flex:1;white-space:nowrap}
.an-cmp-m b{color:var(--ink);font-weight:650;font-variant-numeric:tabular-nums}
.an-cmp-m i{font-style:normal;font-size:11px;font-weight:650}
.an-cmp-m i.up{color:var(--up)} .an-cmp-m i.down{color:var(--down)}
.an-note{font-size:11px;color:var(--ink-3)}
/* heatmap */
.an-heat{padding:2px 0}
.an-heat-g{display:grid;grid-template-columns:repeat(auto-fill,minmax(112px,1fr));gap:7px}
.an-ht{display:flex;flex-direction:column;gap:3px;align-items:flex-start;
  padding:10px 11px;border-radius:10px;border:1px solid var(--line);
  cursor:pointer;transition:transform .12s ease,box-shadow .12s ease;text-align:start}
.an-ht:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,.16)}
.an-ht-n{font-size:11.5px;font-weight:650;opacity:.92}
.an-ht-v{font-size:14px;font-weight:750;font-variant-numeric:tabular-nums}
.an-ht.l1{background:var(--heat-1)} .an-ht.l2{background:var(--heat-2)}
.an-ht.l3{background:var(--heat-3)} .an-ht.l4{background:var(--heat-4)}
.an-ht.l5{background:var(--heat-5)} .an-ht.l6{background:var(--heat-6)}
.an-ht.l1,.an-ht.l2,.an-ht.l3{color:var(--ink)}
.an-ht.l4,.an-ht.l5,.an-ht.l6{color:#fff}
.an-heat-s{display:flex;align-items:center;gap:4px;margin-top:10px;
  font-size:11px;color:var(--ink-3)}
.an-heat-s i{width:20px;height:9px;border-radius:3px}
.an-heat-s i.l1{background:var(--heat-1)} .an-heat-s i.l2{background:var(--heat-2)}
.an-heat-s i.l3{background:var(--heat-3)} .an-heat-s i.l4{background:var(--heat-4)}
.an-heat-s i.l5{background:var(--heat-5)} .an-heat-s i.l6{background:var(--heat-6)}
/* progress */

/* ===== dashboard-wide premium micro-interactions (all pages, lightweight) ===== */
@keyframes dbRise{from{opacity:0;transform:translateY(9px)}to{opacity:1;transform:none}}
@keyframes dbFade{from{opacity:0}to{opacity:1}}
@keyframes dbLineDraw{to{stroke-dashoffset:0}}
@keyframes dbBarX{from{transform:scaleX(0)}to{transform:scaleX(1)}}
@keyframes dbBarY{from{transform:scaleY(0)}to{transform:scaleY(1)}}
@keyframes dbPop{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:none}}
/* section/card entrance — applies to every page except home (home has its own) */
[data-anim-page]:not([data-anim="home"]) .content > *{animation:dbRise .5s cubic-bezier(.22,.61,.36,1) both}
[data-anim-page]:not([data-anim="home"]) .content > *:nth-child(1){animation-delay:.02s}
[data-anim-page]:not([data-anim="home"]) .content > *:nth-child(2){animation-delay:.07s}
[data-anim-page]:not([data-anim="home"]) .content > *:nth-child(3){animation-delay:.12s}
[data-anim-page]:not([data-anim="home"]) .content > *:nth-child(4){animation-delay:.17s}
[data-anim-page]:not([data-anim="home"]) .content > *:nth-child(5){animation-delay:.22s}
[data-anim-page]:not([data-anim="home"]) .content > *:nth-child(6){animation-delay:.27s}
[data-anim-page]:not([data-anim="home"]) .content > *:nth-child(n+7){animation-delay:.3s}
/* KPI tiles pop in gently on analytics/perf/finance/etc. */
[data-anim-page]:not([data-anim="home"]) .an-k,
[data-anim-page]:not([data-anim="home"]) .pk,
[data-anim-page]:not([data-anim="home"]) .mkpi,
[data-anim-page]:not([data-anim="home"]) .ia-kpi,
[data-anim-page]:not([data-anim="home"]) .agb-kpi{animation:dbPop .5s cubic-bezier(.22,.61,.36,1) both}
[data-anim-page]:not([data-anim="home"]) .an-k:nth-child(2),
[data-anim-page]:not([data-anim="home"]) .pk:nth-child(2),
[data-anim-page]:not([data-anim="home"]) .agb-kpi:nth-child(2){animation-delay:.06s}
[data-anim-page]:not([data-anim="home"]) .an-k:nth-child(3),
[data-anim-page]:not([data-anim="home"]) .pk:nth-child(3),
[data-anim-page]:not([data-anim="home"]) .agb-kpi:nth-child(3){animation-delay:.12s}
[data-anim-page]:not([data-anim="home"]) .an-k:nth-child(4),
[data-anim-page]:not([data-anim="home"]) .pk:nth-child(4){animation-delay:.18s}
[data-anim-page]:not([data-anim="home"]) .an-k:nth-child(5),
[data-anim-page]:not([data-anim="home"]) .pk:nth-child(5){animation-delay:.24s}
[data-anim-page]:not([data-anim="home"]) .an-k:nth-child(6){animation-delay:.3s}
/* SVG line + area charts draw/fade (analytics line, sparkline-style paths) */
[data-anim-page] .anl-svg path[stroke]:not([stroke-dasharray]){stroke-dasharray:2200;stroke-dashoffset:2200;animation:dbLineDraw 1.1s cubic-bezier(.4,.1,.2,1) forwards}
[data-anim-page] .anl-svg path[fill]:not([fill="none"]){opacity:0;animation:dbFade .8s .2s ease forwards}
/* vertical bar/column charts grow up (treemap tiles fade instead) */
[data-anim-page] .an-c-svg rect:not(.anl-hit){transform-box:fill-box;transform-origin:50% 100%;animation:dbBarY .6s cubic-bezier(.33,.9,.34,1) both}
[data-anim-page] .an-tm rect{transform:none;transform-origin:center;animation:dbFade .6s ease both}
/* donut / pie slices fade+pop */
[data-anim-page] .an-donut path,
[data-anim-page] .an-donut circle{animation:dbFade .7s ease both}
/* horizontal bars & progress fills sweep from start edge */
[data-anim-page] .an-hb-t i,
[data-anim-page] .agb-fill,
[data-anim-page] .an-pg-t i,
[data-anim-page] .an-bl-f,
[data-anim-page] .apb-bar i,
[data-anim-page] .soc-bar i{animation:dbBarX .7s cubic-bezier(.33,.9,.34,1) both;transform-origin:right}
[dir="ltr"][data-anim-page] .an-hb-t i,
[dir="ltr"][data-anim-page] .agb-fill,
[dir="ltr"][data-anim-page] .an-pg-t i,
[dir="ltr"][data-anim-page] .an-bl-f,
[dir="ltr"][data-anim-page] .apb-bar i,
[dir="ltr"][data-anim-page] .soc-bar i{transform-origin:left}
/* gentle hover lift on cards across the dashboard */
.card,.an-card,.an-k,.pk,.mkpi,.bh-card,.qa-btn{transition:box-shadow .18s ease,transform .18s ease,border-color .15s ease}
@media (prefers-reduced-motion: reduce){
  [data-anim-page] .content > *,
  [data-anim-page] .an-k,[data-anim-page] .pk,[data-anim-page] .mkpi,
  [data-anim-page] .ia-kpi,[data-anim-page] .agb-kpi,
  [data-anim-page] .anl-svg path,[data-anim-page] .an-c-svg rect,
  [data-anim-page] .an-tm rect,
  [data-anim-page] .an-donut path,[data-anim-page] .an-donut circle,
  [data-anim-page] .an-hb-t i,[data-anim-page] .agb-fill,
  [data-anim-page] .an-pg-t i,[data-anim-page] .an-bl-f,
  [data-anim-page] .apb-bar i,[data-anim-page] .soc-bar i{
    animation:none!important;opacity:1!important;transform:none!important;stroke-dashoffset:0!important}
}
/* ===== premium home micro-interactions (scoped, lightweight) ===== */
@keyframes homeRise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes kpiRise{from{opacity:0;transform:translateY(8px) scale(.985)}to{opacity:1;transform:none}}
@keyframes catGrow{from{transform:scaleY(0)}to{transform:scaleY(1)}}
@keyframes barGrow{from{transform:scaleX(0)}to{transform:scaleX(1)}}
@keyframes ctLineDraw{to{stroke-dashoffset:0}}
@keyframes ctFade{to{opacity:1}}
/* section-level entrance: home content blocks stagger in */
[data-anim="home"] .content > .hero,
[data-anim="home"] .content > div{animation:homeRise .5s cubic-bezier(.22,.61,.36,1) both}
[data-anim="home"] .content > *:nth-child(1){animation-delay:.02s}
[data-anim="home"] .content > *:nth-child(2){animation-delay:.07s}
[data-anim="home"] .content > *:nth-child(3){animation-delay:.12s}
[data-anim="home"] .content > *:nth-child(4){animation-delay:.17s}
[data-anim="home"] .content > *:nth-child(5){animation-delay:.22s}
[data-anim="home"] .content > *:nth-child(6){animation-delay:.27s}
[data-anim="home"] .content > *:nth-child(7){animation-delay:.32s}
[data-anim="home"] .content > *:nth-child(8){animation-delay:.37s}
[data-anim="home"] .content > *:nth-child(9){animation-delay:.42s}

[data-anim="home"] .kpi-row .kpi:nth-child(1){animation-delay:.06s}
[data-anim="home"] .kpi-row .kpi:nth-child(2){animation-delay:.10s}
[data-anim="home"] .kpi-row .kpi:nth-child(3){animation-delay:.14s}
[data-anim="home"] .kpi-row .kpi:nth-child(4){animation-delay:.18s}
[data-anim="home"] .kpi-row .kpi:nth-child(5){animation-delay:.22s}
[data-anim="home"] .kpi-row .kpi:nth-child(6){animation-delay:.26s}
[data-anim="home"] .kpi-row .kpi:nth-child(7){animation-delay:.30s}
[data-anim="home"] .kpi-row .kpi:nth-child(8){animation-delay:.34s}
[data-anim="home"] .kpi-row .kpi:nth-child(9){animation-delay:.38s}
[data-anim="home"] .kpi-row .kpi:nth-child(10){animation-delay:.42s}
/* category bars grow up from baseline (gentle stagger, smooth settle) */
[data-anim="home"] .cat-card .cv-b{transform-box:fill-box;transform-origin:50% 100%;animation:catGrow .7s cubic-bezier(.33,.9,.34,1) both}
[data-anim="home"] .cat-card .cv-g:nth-child(2) .cv-b{animation-delay:.04s}
[data-anim="home"] .cat-card .cv-g:nth-child(3) .cv-b{animation-delay:.08s}
[data-anim="home"] .cat-card .cv-g:nth-child(4) .cv-b{animation-delay:.12s}
[data-anim="home"] .cat-card .cv-g:nth-child(5) .cv-b{animation-delay:.16s}
[data-anim="home"] .cat-card .cv-g:nth-child(6) .cv-b{animation-delay:.20s}
[data-anim="home"] .cat-card .cv-g:nth-child(7) .cv-b{animation-delay:.24s}
[data-anim="home"] .cat-card .cv-v,[data-anim="home"] .cat-card .cv-x{opacity:0;animation:ctFade .45s ease both;animation-delay:.45s}
/* horizontal ranking/channel bars sweep in from their start edge */
[data-anim="home"] .br-bar i,
[data-anim="home"] .p-bar i,
[data-anim="home"] .b-bar i,
[data-anim="home"] .chan-bar i{animation:barGrow .7s cubic-bezier(.33,.9,.34,1) both;transform-origin:right}
[dir="ltr"][data-anim="home"] .br-bar i,
[dir="ltr"][data-anim="home"] .b-bar i,
[dir="ltr"][data-anim="home"] .p-bar i,
[dir="ltr"][data-anim="home"] .chan-bar i{transform-origin:left}
[data-anim="home"] .chan-row:nth-child(2) .chan-bar i{animation-delay:.06s}
[data-anim="home"] .chan-row:nth-child(3) .chan-bar i{animation-delay:.12s}
/* performance-trend line draw + area fade (graceful) */
[data-anim="home"] #perfTrendWrap .ct-line{stroke-dasharray:1400;stroke-dashoffset:1400;animation:ctLineDraw 1.15s cubic-bezier(.4,.1,.2,1) forwards}
[data-anim="home"] #perfTrendWrap .ct-area{opacity:0;animation:ctFade .8s .25s ease forwards}
@media (prefers-reduced-motion: reduce){
  [data-anim="home"] .content > .hero,
  [data-anim="home"] .content > div,
  [data-anim="home"] .kpi-row .kpi,
  [data-anim="home"] .cat-card .cv-b,

  [data-anim="home"] .chan-bar i,

/* ============================================================
   RESPONSIVE — TABLET & MOBILE
   ============================================================ */

/* Hamburger button (hidden on desktop) */
.mnav-btn{display:none;flex:none;width:38px;height:38px;border:1px solid var(--line);border-radius:9px;background:var(--card);
  flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;transition:border-color .15s,background .15s}
.mnav-btn:hover{border-color:var(--brand);background:var(--surface)}
.mnav-btn span{display:block;width:18px;height:2px;border-radius:2px;background:var(--ink);transition:transform .2s ease,opacity .2s ease}
html[data-mnav="open"] .mnav-btn span:nth-child(1){transform:translateY(6px) rotate(45deg)}
html[data-mnav="open"] .mnav-btn span:nth-child(2){opacity:0}
html[data-mnav="open"] .mnav-btn span:nth-child(3){transform:translateY(-6px) rotate(-45deg)}

/* Scrim behind the mobile drawer */
.mnav-scrim{display:none;position:fixed;inset:0;z-index:88;background:rgba(9,26,25,.5);opacity:0;transition:opacity .22s ease}
html[data-mnav="open"] .mnav-scrim{opacity:1}

/* ---------- TABLET (<=1024px) ---------- */
@media (max-width:1024px){
  .content{padding:16px 18px 32px}
  .topbar-row{padding:11px 18px 9px;gap:12px}
  .goldbar{padding:0 18px}
  .kpi-row{grid-template-columns:repeat(3,1fr)}
  .insight-strip{grid-template-columns:repeat(2,1fr)}
  .hero{grid-template-columns:1fr 1fr}
  .heat-section,.perf-section,.chan-section{grid-template-columns:1fr}
  .mkpi-grid,.status-grid,.qa-grid{grid-template-columns:repeat(3,1fr)}
}

/* ---------- MOBILE + SMALL TABLET: off-canvas sidebar (<=900px) ---------- */
@media (max-width:900px){
  .mnav-btn{display:flex}
  .mnav-scrim{display:block;pointer-events:none}
  html[data-mnav="open"] .mnav-scrim{pointer-events:auto}

  /* Sidebar becomes a fixed drawer. RTL: docked right, hidden to the right.
     LTR: docked left, hidden to the left. */
  .sidebar{
    position:fixed !important;top:0;bottom:0;right:0;left:auto;z-index:90 !important;
    width:min(280px,82vw) !important;height:100vh;height:100dvh;max-height:100dvh;
    box-shadow:-12px 0 32px rgba(9,61,57,.18);
    transform:translateX(100%);
    transition:transform .26s cubic-bezier(.4,0,.2,1) !important;
  }
  [dir="ltr"] .sidebar{right:auto;left:0;transform:translateX(-100%)}
  html[data-mnav="open"] .sidebar{transform:translateX(0) !important}
  /* Keep drawer fully expanded even if desktop nav was collapsed */
  html[data-nav="collapsed"] .sidebar{--sidebar-w:280px}
  html[data-nav="collapsed"] .brand-name,
  html[data-nav="collapsed"] .brand-env,
  html[data-nav="collapsed"] .nav-item > span:not(.badge),
  html[data-nav="collapsed"] .nav-caret,
  html[data-nav="collapsed"] .profile-name,
  html[data-nav="collapsed"] .profile-role,
  html[data-nav="collapsed"] .profile-branch{opacity:1}

  .main{width:100%}
  .content{padding:14px 14px 28px;gap:14px;max-width:100%}

  /* Topbar shrinks: hide non-essential tools, keep title + a few actions */
  .topbar-row{padding:9px 14px 8px;gap:10px;flex-wrap:wrap}
  .page-title{font-size:16px}
  .crumb{font-size:10px}
  .topbar-tools{gap:6px}
  .updated{display:none}
  .topbar-tools .tool.primary span,
  .topbar-tools #langToggle span{display:none}
  .topbar-tools .tool.primary,
  .topbar-tools #langToggle{padding:0 10px}
  .goldbar{padding:0 14px}
  .gold-stamp{display:none}

  /* Layout grids collapse */
  .hero{grid-template-columns:1fr}
  .kpi-row{grid-template-columns:repeat(2,1fr)}
  .insight-strip{grid-template-columns:1fr}
  .mkpi-grid,.status-grid,.qa-grid{grid-template-columns:repeat(2,1fr)}
  .bh-grid,.si-grid,.inv-grid{grid-template-columns:1fr}
  .action-row,.act-grid{grid-template-columns:1fr}
  .rankings-grid{grid-template-columns:1fr!important}

  /* Wide data tables scroll horizontally instead of overflowing */
  .cat-head-row,.cat-row{min-width:520px}
  table{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}
}

/* ---------- SMALL PHONES (<=560px) ---------- */
@media (max-width:560px){
  .content{padding:12px 11px 24px}
  .topbar-row{padding:8px 11px 7px}
  .goldbar{padding:0 11px}
  .page-title{font-size:15px}
  .kpi-row,.mkpi-grid,.status-grid,.qa-grid{grid-template-columns:1fr}
  .karat-list{gap:14px}
  /* Collapse secondary topbar buttons to icons only */
  .topbar-tools .tool span{display:none}
  .topbar-tools .tool{padding:0 9px}
  .topbar-tools .store-tool span,
  .topbar-tools .date-tool .cv{display:inline}
  .dp-pop{width:min(290px,calc(100vw - 22px))}
}

/* Prevent horizontal page scroll from wide inner elements */
@media (max-width:900px){
  html,body{overflow-x:hidden}
}


/* ============================================================================
   الطبقة الاستجابية الموحّدة
   ----------------------------------------------------------------------------
   نقاط التوقّف الثلاث المعتمدة:
     • جوال      < 768px
     • لوحي   768–1024px
     • مكتبي     > 1024px
   ملاحظة: الملف يحوي نقاط توقّف قديمة متفرّقة (720/760/900/1180…) نشأت
   تدريجيًا؛ هذه الطبقة تأتي بعدها في ترتيب الأنماط فتفوز عند التعارض،
   دون حذفها حتى لا تنكسر تفاصيل صُمّمت عليها.
   ========================================================================== */

/* ---------- أهداف اللمس: 44×44 كحدّ أدنى على الأجهزة اللمسية ---------- */
@media (hover:none) and (pointer:coarse){
  .tool,.mnav-tool,.dp-preset,.hs-o,.seg-btn,.brand-filter button,
  .sec-filter button,.metric-switch button,.nav-item,.qa-btn,
  .us-ico,.nt-item,.dp-btn,.nu-btn,.ds-chip,.ds-empty-btn{
    min-height:44px;
  }
  /* الأزرار الأيقونية مربّعة بالكامل */
  .tool.icon-only,.mnav-btn,.us-ico{min-width:44px}
  /* تباعد أريح بين العناصر القابلة للنقر */
  .brand-filter,.sec-filter,.metric-switch{gap:6px}
}

/* ---------- لوحي: 768–1024px ---------- */
@media (min-width:768px) and (max-width:1024px){
  .kpi-row{grid-template-columns:repeat(3,1fr)}
  .insight-strip{grid-template-columns:repeat(2,1fr)}
  .mkpi-grid,.status-grid,.qa-grid{grid-template-columns:repeat(3,1fr)}
  .hero{grid-template-columns:1fr 1fr}
  .heat-section,.perf-section,.chan-section,.rankings-row{grid-template-columns:1fr}
  .action-row{grid-template-columns:1fr}
}

/* ---------- جوال: أقل من 768px ---------- */
/* الترويسة تحتفظ بفلتري التاريخ والفروع فقط حيثما وُجد الدرج */
@media (max-width:900px){
  .topbar-tools .updated,
  .topbar-tools #themeToggle,
  .topbar-tools #langToggle,
  .topbar-tools #ntTool,
  .topbar-tools .tool.primary{display:none}
}

@media (max-width:767.98px){
  .topbar-row{flex-wrap:wrap;gap:8px;padding:10px 14px 8px}
  .page-title-wrap{flex:1 1 auto;min-width:0}
  .page-title{font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .crumb{display:none}
  .topbar-tools{flex:1 1 100%;display:flex;gap:8px}
  /* الفلتران يتقاسمان العرض بالتساوي فيسهل بلوغهما بالإبهام */
  .topbar-tools>.store-tool,.topbar-tools>.date-tool{flex:1 1 0;min-width:0}
  .topbar-tools>.store-tool>.tool,.topbar-tools>.date-tool>.tool{width:100%;justify-content:center}
  /* القوائم المنسدلة تتمركز ولا تتجاوز حافة الشاشة */
  .dp-pop{position:fixed;top:auto;inset-inline:10px;width:auto;max-width:none;
    max-height:70vh;overflow:auto;-webkit-overflow-scrolling:touch}

  /* شريط الذهب يمرّر أفقيًا بدل الانضغاط */
  .goldbar{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .goldbar::-webkit-scrollbar{display:none}
  .karat-list{flex-wrap:nowrap}


  /* ===== المحتوى: تكديس رأسي بمسافات ثابتة ===== */
  .content{padding:14px 0 30px}
  .content>*{margin-inline:14px}
  .hero{grid-template-columns:1fr;margin-inline:14px}
  .heat-section,.perf-section,.chan-section,.rankings-row,.action-row{
    grid-template-columns:1fr;gap:12px}

  /* ===== الكاروسيل: صفوف البطاقات تُمرَّر أفقيًا بدل الانضغاط ===== */
  .kpi-row,.insight-strip,.mkpi-grid,.status-grid,.qa-grid,.pk-row{
    display:flex;
    overflow-x:auto;
    gap:12px;
    padding:2px 14px 10px;
    margin-inline:0;
    scroll-snap-type:x mandatory;
    -webkit-overflow-scrolling:touch;

     أصلًا)؛ المطلوب فقط منع انضغاط الأعمدة بإعطاء الجدول حدًّا أدنى. */
  .pos-scroll,.tbl-wrap,.table-wrap,.us-tbl-wrap,.pos-wrap{
    overflow-x:auto;-webkit-overflow-scrolling:touch}
  .pos-scroll>table,.tbl-wrap>table,.table-wrap>table,
  .us-tbl-wrap>table,.pos-wrap>table{min-width:660px}
  /* أي جدول غير ملفوف يبقى قابلًا للقراءة بدل ضغط أعمدته */
  .card table{min-width:560px}

  /* ===== أحجام الخط: تبقى مقروءة (لا تصغير مبالغ) ===== */
  .kpi-num{font-size:22px}
  .kpi-lbl{font-size:11.5px}
  .sec-title{font-size:13.5px}
  .card-title{font-size:13px}

  /* ===== شريط الترشيح المتقاطع ===== */
  .ds-xbar{margin-inline:14px}
}

/* شجرة المتاجر تسجّل مدنًا (الرياض، المدينة، خميس مشيط…) بينما الخريطة
   تعرض 13 منطقة إدارية — حبيبتان مختلفتان. فتُسنَد المدن المطابقة لمناطقها
   من البيانات الفعلية، ويُوزَّع الباقي على حصص المناطق التاريخية حتى تبقى
   الخريطة متجاوبة مع الفلاتر دون اختلاق انتماءات غير موجودة. */
const CITY_TO_REGION={riyadh:'riyadh', taibah:'riyadh', bawadi:'makkah',
  mkmall:'makkah', madinah:'madinah', oldtown:'madinah', khamis:'asir', majan:'asir'};
Object.defineProperty(globalThis,'REGIONS',{configurable:true,get(){
  const rows=dsRows({ignoreCross:true});
  const total=rows.reduce((a,r)=>a+r.sales,0);
  if(!total) return REGIONS_BASE.map(r=>({...r,sales:0,profit:0,pgrams:0,avg:0,share:0}));
  const direct=new Map();
  let mapped=0;
  for(const r of rows){
    const id=CITY_TO_REGION[dsBr(r.bi).city];
    if(!id) continue;
    const g=direct.get(id)||{sales:0,profit:0,grams:0,orders:0};
    g.sales+=r.sales; g.profit+=r.sales-r.cost; g.grams+=r.grams; g.orders+=r.orders;
    direct.set(id,g); mapped+=r.sales;
  }
  const rest=Math.max(0,total-mapped);
  const restBase=REGIONS_BASE.filter(r=>!direct.has(r.id));
  const restShare=restBase.reduce((a,r)=>a+r.share,0)||1;
  return REGIONS_BASE.map(b=>{
    const d=direct.get(b.id);
    let sales,profit,grams,orders;
    if(d){ sales=d.sales; profit=d.profit; grams=d.grams; orders=d.orders; }
    else { const f=b.share/restShare; sales=rest*f; profit=sales*0.194; grams=sales/GOLD_REF; orders=sales/3600; }
    return {...b,
      sales:+(sales/1e6).toFixed(1),
      profit:+(profit/1e6).toFixed(1),
      pgrams:Math.round(profit/GOLD_REF),
      avg:Math.round(orders? sales/orders : 0),
      share:+(sales/total*100).toFixed(1),
      target:Math.round(b.target*(0.9+(sales/total)*1.6)),
    };
  });
}});

/* الربح صار يُقاس بالوزن (جرام) لا بالعملة.
   pgrams مشتقة من الربح على سعر مرجعي ثابت (273.35 ر.س للجرام — عيار 21)
   حتى لا تتناقض القيمتان. */
const GOLD_REF=273.35;
const METRICS = {sales:{ar:"المبيعات",fmt:v=>v.toFixed(1)+"M"}, pgrams:{ar:"الربح بالوزن",fmt:v=>aiNum(Math.round(v))+" غ"}, target:{ar:"تحقيق الهدف",fmt:v=>v+"%"}, avg:{ar:"متوسط الفاتورة",fmt:v=>v.toLocaleString()}};

/* KPIS صارت مشتقّة: تُحسب من جدول الحقائق حسب الفلاتر النشطة بدل قيم ثابتة.
   تُستدعى kpiList() عند كل رسم؛ ويُبقى الاسم KPIS كخاصية محسوبة للتوافق
   مع الشيفرة القائمة التي تقرأ KPIS.find(...) في عدة مواضع. */
function kpiSpark(metric){
  const s=dsSeries(dsRows(),metric);
  const v=s.values;
  if(!v.length) return [0,0,0,0,0,0,0];
  if(v.length<=7) return v;
  /* اختزال لسبع نقاط ليبقى الخط المصغّر مقروءًا */
  const out=[],step=v.length/7;
  for(let i=0;i<7;i++){
    const a=Math.floor(i*step), b=Math.max(a+1,Math.floor((i+1)*step));
    out.push(v.slice(a,b).reduce((x,y)=>x+y,0)/(b-a));
  }
  return out;
}
function kpiList(){
  const cur=dsAgg(dsRows()), prev=dsAgg(dsRows({prev:true}));
  const rows=dsRows();
  const dS=dsDelta(cur.sales,prev.sales);
  const dP=dsDelta(cur.cost,prev.cost);
  const dA=dsDelta(cur.avg,prev.avg);
  const dR=dsDelta(cur.returns,prev.returns);
  const marginPt=(cur.margin-prev.margin);
  /* المستهدف مشتق من الفترة السابقة +6% — فيتحرّك مع النطاق بدل رقم ثابت */
  const targetVal=prev.sales*1.06;
  const targetPct=targetVal? cur.sales/targetVal*100 : 0;
  const dT=dsDelta(targetPct,100);
  /* أعلى فرع مرتجعات ضمن التصفية الحالية */
  const byBr=dsGroup(rows,r=>dsBr(r.bi).ar).sort((a,b)=>b.returns-a.returns);
  const topRtn=byBr[0];
  const topRtnName=topRtn? String(topRtn.key).split('—').slice(0,1).join('').trim() : '—';
  /* أعلى فئة توريد (تُعرض كـ"موطن الذهب") */
  const byCat=dsGroup(rows,r=>r.cat).sort((a,b)=>b.sales-a.sales);
  const topCat=byCat[0];
  const catName=topCat? (DS_CATS.find(c=>c.v===topCat.key)||{}).t : '—';
  const catShare=topCat&&cur.sales? (topCat.sales/cur.sales*100).toFixed(0)+'%' : '0%';
  /* قيمة المخزون تقديرية: تغطية ~45 يومًا من التكلفة الجارية */
  const days=Math.max(1,dsRangeDays(dsActiveRange()));
  const invVal=cur.cost/days*45;
  const invKg=cur.grams/days*45/1000;
  return [
    {id:"sales",  ar:"إجمالي المبيعات", val:dsM(cur.sales), cur:"م ر.س", dir:dS.dir, chg:dS.txt, sub:"مقارنة بالفترة السابقة", icon:"sales", spark:kpiSpark('sales')},
    {id:"purch",  ar:"إجمالي المشتريات",val:dsM(cur.cost),  cur:"م ر.س", dir:dP.dir, chg:dP.txt, sub:"مقارنة بالفترة السابقة", icon:"cart",  spark:kpiSpark('purchases')},
    {id:"margin", ar:"هامش الربح",      val:cur.margin.toFixed(1), cur:"%", dir:marginPt>=0?'up':'down', chg:(marginPt>=0?'+':'−')+Math.abs(marginPt).toFixed(1)+'pt', sub:"مقارنة بالفترة السابقة", icon:"margin",spark:kpiSpark('profit')},
    {id:"avg",    ar:"متوسط الفاتورة",  val:dsInt(cur.avg), cur:"ر.س",   dir:dA.dir, chg:dA.txt, sub:"مقارنة بالفترة السابقة", icon:"receipt",spark:kpiSpark('sales').map(x=>x/60)},
    {id:"target", ar:"تحقيق الهدف",     val:targetPct.toFixed(1), cur:"%", dir:targetPct>=100?'up':'down', chg:dT.txt, sub:"مقارنة بالمستهدف", icon:"target",spark:kpiSpark('sales')},
    {id:"returns",ar:"إجمالي المرتجعات",val:dsM(cur.returns), cur:"م ر.س", dir:dR.dir==='up'?'down':'up', chg:dR.txt, sub:"مقارنة بالفترة السابقة", icon:"refresh", spark:kpiSpark('sales').map(x=>x*0.03)},
    {id:"brpurch",ar:"مشتريات الفروع",  val:dsM(cur.cost*0.4), cur:"م ر.س", dir:dP.dir, chg:dP.txt, sub:"مقارنة بالفترة السابقة", icon:"branch",  spark:kpiSpark('purchases').map(x=>x*0.4)},
    {id:"origin", ar:"موطن الذهب",      val:catName, cur:"", dir:"up", chg:catShare, sub:"أعلى فئة مبيعًا", icon:"origin", spark:kpiSpark('sales')},
    {id:"toprtn", ar:"أعلى فرع مرتجعات",val:topRtnName, cur:"", dir:"down", chg:topRtn?dsM(topRtn.returns)+' م':'—', sub:"أعلى قيمة مرتجعات", icon:"store", spark:kpiSpark('sales').map(x=>x*0.03)},
    {id:"invval", ar:"قيمة المخزون",    val:dsM(invVal), cur:"م ر.س", dir:"up", chg:"+2.7%", sub:"الوزن: "+dsInt(invKg)+" كجم", icon:"karat", spark:kpiSpark('purchases')},
  ];
}
Object.defineProperty(globalThis,'KPIS',{get:kpiList, configurable:true});


/* ===== مؤشرات الأداء والنمو (بديل "لمحات ذكية") =====

const PERF_KPIS=[
  {id:'score', ar:"مؤشر الأداء العام", val:87.4, unit:"",   chg:"+3.1%", dir:'up',

   المختار (يوم/أسبوع/شهر حسب طوله) بدل سبع نقاط ثابتة. */
Object.defineProperty(globalThis,'SERIES',{configurable:true,get(){

function chartLabels(){ return dsSeries(dsRows(),'sales').labels; }

// full branch ranking, highest to lowest (used for the big ranking panel)
/* الفروع تُشتق من شجرة المتاجر نفسها — لا قائمة موازية تتباعد عنها.
   الاسم مؤهَّل (مدينة — مول — فرع) لأن "فرع 1" وحده يتكرر 8 مرات ولا يميّز شيئًا.
   الإجمالي يظل 765.4 م ر.س مطابقًا لمؤشر المبيعات. */
function hsAllBranches(){
  const out=[];
  STORES.forEach(st=>st.regions.forEach(r=>r.cities.forEach(c=>{
    (c.branches||[]).forEach(b=>out.push({store:st.v,region:r.v,city:c.v,loc:null,
      br:b, ar:`${c.t} — ${b}`}));
    (c.locs||[]).forEach(l=>(l.branches||[]).forEach(b=>out.push({store:st.v,region:r.v,city:c.v,
      loc:l.v, br:b, ar:`${c.t} — ${l.t} — ${b}`})));
  })));
  return out;
}
/* توزيع المبيعات: منحنى تنازلي واقعي يجمع 765.4 بالضبط */
const BR_WEIGHTS=[92,84,79,74,68,63,59,55,51,47,44,41,38,35,32,30,27,25,23,21,19,17,15,13,11,9,7];
/* STORES تُعرَّف لاحقًا في الملف، فالتقييم مؤجَّل (كسول) —
   لو حُسبت هنا مباشرة لألقت "Cannot access 'STORES' before initialization"
   وكسرت اللوحة كلها عند التحميل (node --check لا يلتقط هذا). */
let _BR_CACHE=null;   /* {sig,data} */
function branchesAll(){
  /* صار الترتيب مشتقًّا من جدول الحقائق حسب الفلاتر النشطة بدل أوزان ثابتة،
     فيتغيّر فعليًا مع النطاق الزمني والقناة والفئة. التخزين بمفتاح الفلاتر
     لأن الدالة تُستدعى من عدة بطاقات في نفس الرسم. */
  const sig=dsSig('BR');
  if(_BR_CACHE && _BR_CACHE.sig===sig) return _BR_CACHE.data;
  const rows=dsRows();
  const g=dsGroup(rows,r=>dsBr(r.bi).ar);
  const meta=new Map(hsAllBranches().map(b=>[b.ar,b]));
  const TOTAL=g.reduce((a,c)=>a+c.sales,0);
  const data=g.map(x=>{
    const b=meta.get(x.key)||{ar:x.key};
    return {...b, ar:x.key,
      val:+(x.sales/1e6).toFixed(1),
      grams:Math.round(x.grams),
      orders:Math.round(x.orders),
      profit:x.profit,
      share:(TOTAL? x.sales/TOTAL*100:0).toFixed(1)+"%"};
  }).sort((a,b)=>b.val-a.val);
  _BR_CACHE={sig,data};
  return data;
}

/* رمز الريال السعودي — مرسوم على 19×19 (لا 24×24) فله دالته الخاصة حتى لا يُقصّ.
   يرث اللون عبر currentColor فيعمل في الثيمين. */
/* ===== تنسيق الأرقام الكبيرة: M للملايين و K للآلاف =====
   fmtNum يحوّل أي رقم خام إلى صيغة مختصرة موحّدة عبر اللوحة.
   numFormat يُطبَّق على المخرجات النهائية لتوحيد اللواحق القديمة
   (م / k) إلى M و K دون المساس ببنية القوالب أو قاموس الترجمة. */
function fmtNum(n){
  const v=Number(n); if(!isFinite(v)) return String(n);
  const a=Math.abs(v);
  if(a>=1e6) return (v/1e6).toFixed(a>=1e7?0:1).replace(/\.0$/,'')+'M';
  if(a>=1e3) return (v/1e3).toFixed(a>=1e4?0:1).replace(/\.0$/,'')+'K';
  return v.toLocaleString('en-US',{maximumFractionDigits:1});
}
/* توحيد اللواحق في النص النهائي دون تغيير الأرقام نفسها:
   "م" (مليون) → "M"  و  "k"/"ألف" → "K".
   يعالج ثلاث حالات: اللاحقة ملاصقة للرقم، أو يفصلها وسم مغلق،
   أو ترد في وسم مستقل للوحدة مثل <span class="cur">م ر.س</span>. */
function numFormat(html){
  return String(html)
    /* 1) وحدة مستقلة داخل وسم: >م ر.س<  أو  >م<  */
    .replace(/>\s*\u0645(?=\s*<)/g,'>M')
    .replace(/>\s*\u0645\s+(ر\.س)/g,'>M $1')
    /* وحدة داخل قوسين مثل "(م ر.س)" */
    .replace(/\(\s*\u0645\s+(ر\.س)/g,'(M $1')
    /* 2) لاحقة تتبع الرقم مباشرةً أو بعد وسم مغلق */
    /* لا تلمس صيغة الوقت "11:20 م" أو تسميات الساعات "10م" — الأرقام هنا وقت لا مليون */
    .replace(/(\d[\d,.]*)(\s*(?:<\/[a-zA-Z]+>\s*)*)\u0645(?=\s*(?:ر\.س|<|\s|$))/g,(m,n,tags,off,str)=>{
      const before=str.slice(Math.max(0,off-6),off);
      if(/\d:\d\d$/.test(n)||/:\s*$/.test(before)||/\d:\d/.test(n)) return m; /* وقت */
      if(!/[.,]/.test(n)&&+n<=12&&!/\s$/.test(m.slice(n.length,m.length-1))) return m; /* 1م .. 12م = ساعة */
      return n+tags.replace(/\s+$/,'')+'M';
    })
    .replace(/(\d[\d,.]*)\s*k\b/g,'$1K')
    .replace(/(\d[\d,.]*)(\s*(?:<\/[a-zA-Z]+>\s*)*)\u0623\u0644\u0641\b/g,(m,n,tags)=>n+tags.replace(/\s+$/,'')+'K');
}

const RS_RE=/(?:م\s*)?ر\.س|\bSAR\b/g;

}

/* التحجيم صار محايدًا (1) بعد إدخال جدول الحقائق.
   سابقًا كان dpNum يضرب الأرقام في (أيام/7 × نصيب الفروع) لمحاكاة أثر الفلتر
   على قيم ثابتة. الآن القيم مجمَّعة فعليًا من البيانات لكل نطاق، فإبقاء
   الضرب كان يُضاعف الأثر مرتين (ظهرت 30 يومًا كـ1,329M بدل 310M).
   تُترك الدالة لأن عشرات المواضع تستدعيها للتنسيق (فواصل الآلاف). */
const dpScale=()=>1;

  if(isRate) return str;
  const m=String(str).match(/^([\d.,]+)(.*)$/); if(!m) return str;
  const raw=m[1], suffix=m[2];
  const hasComma=raw.includes(',');
  const n=parseFloat(raw.replace(/,/g,'')); if(isNaN(n)) return str;
  const v=n*dpScale();

  /* keep the figure scannable: 4-digit+ results get thousands separators rather
     than sprawling (e.g. 9840.9 -> 9,840.9) */
  let out = v>=1000
    ? Number(v.toFixed(dec)).toLocaleString('en-US',{minimumFractionDigits:dec,maximumFractionDigits:dec})
    : v.toFixed(dec);
  if(hasComma && v<1000) out=Number(out).toLocaleString('en-US',{minimumFractionDigits:dec,maximumFractionDigits:dec});
