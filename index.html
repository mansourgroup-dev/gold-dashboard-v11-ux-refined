/* الترويسة العلوية صارت ديناميكية: التاريخ والنطاق والرقم كلها تتبع فلتر الهيدر
   (كانت "الأحد، 6 يوليو 2026" ثابتة — ولا تطابق حتى تاريخ اليوم). */
const AR_DAYS=["الأحد","الإثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"];
const AR_MONTHS=["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو",
                 "أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];
const EN_DAYS=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const EN_MONTHS=["January","February","March","April","May","June","July",
                 "August","September","October","November","December"];
function fmtDay(d){
  return LANG==='en'
    ? `${EN_DAYS[d.getDay()]}, ${d.getDate()} ${EN_MONTHS[d.getMonth()]} ${d.getFullYear()}`
    : `${AR_DAYS[d.getDay()]}، ${d.getDate()} ${AR_MONTHS[d.getMonth()]} ${d.getFullYear()}`;
}
/* التاريخ يعكس النافذة الزمنية المختارة فعليًا، لا مجرد "اليوم" —
   وإلا لما تغيّر شيء عند تبديل الفلتر، وهو المطلوب. */
function fmtShort(d){
  return LANG==='en' ? `${d.getDate()} ${EN_MONTHS[d.getMonth()]}`
                     : `${d.getDate()} ${AR_MONTHS[d.getMonth()]}`;
}
function heroDate(){
  const to = (DATE_PRESET==='custom'&&DATE_TO) ? new Date(DATE_TO) : dpToday();
  let from;
  if(DATE_PRESET==='custom'&&DATE_FROM) from=new Date(DATE_FROM);
  else { from=new Date(to); from.setDate(from.getDate()-(dpDays()-1)); }
  /* نفس الشهر والسنة -> اختصر: "6 — 12 يوليو 2026" */
  const sameMY = from.getMonth()===to.getMonth() && from.getFullYear()===to.getFullYear();
  const sep = LANG==='en' ? ' – ' : ' — ';
  const y=to.getFullYear();
  /* اسم اليوم يصلح ليوم واحد فقط؛ في النطاق يُحذف ويُكتب المدى بدله */
  if(from.getTime()===to.getTime()) return fmtDay(to);
  const M = LANG==='en'?EN_MONTHS:AR_MONTHS;
  return sameMY
    ? `${from.getDate()}${sep}${to.getDate()} ${M[to.getMonth()]} ${y}`
    : `${fmtShort(from)}${sep}${fmtShort(to)} ${y}`;
}
function heroGreet(){
  const h=new Date().getHours();
  if(LANG==='en') return h<12?"Good morning":h<17?"Good afternoon":"Good evening";
  return h<12?"صباح الخير":h<17?"طاب يومك":"مساء الخير";
}
/* الرقم يتبع نفس تحجيم dpNum المستخدم في بطاقات المؤشرات */
function heroSales(){
  const k=KPIS.find(x=>x.id==='sales'); if(!k) return '';
  const v=dpNum(k.val,false);
  /* يُخرَج "م ر.س" كنص عادي ليمرّ على numFormat (م→M) ثم rsFormat
     الذي يستبدل "ر.س" برمز الريال — بدل بناء الرمز يدويًا هنا. */
  return v+' م ر.س';
}


/* شريحة المكان: كانت تقرأ HEAD_BRAND — وهو حقل ميت (عنصر #headBrand لم يعد
   موجودًا في الـDOM، فـ onchange لا يُربط أبدًا وتبقى القيمة على 'all' للأبد).
   الفلتر الحيّ هو HS (متجر ← منطقة ← مدينة ← موقع ← فرع)، وhsPathLabel يبني
   المسار الكامل بالفعل. فنقرأ منه مباشرةً. */
function heroPlace(){
  if(HS.store==='all') return "كل الفروع · المملكة";
  const st=hsStore(); if(!st) return "كل الفروع · المملكة";
  /* القنوات الرقمية بلا فروع جغرافية — لا تُذيَّل بـ"المملكة" */
  if(st.online) return st.t;
  const path=hsPathLabel();
  /* على مستوى المتجر فقط: أضف نطاق المملكة؛ وما دونه يكفيه المسار */
  return HS.region==='all' ? `${path} · المملكة` : path;
}


/* ================= شجرة المتاجر (متجر ← منطقة ← مدينة ← موقع/مول ← فرع) =================
   الشجرة غير منتظمة عمدًا كما وردت: بعض المدن تحتوي مولات (الرياض)، وبعضها
   فروعًا مباشرة (المدينة، حائل)، وبعضها كليهما (خميس مشيط). المستوى "الموقع"

/* حالة الفلتر المتتالي */
let HS={store:'all', region:'all', city:'all', loc:'all', branch:'all'};

/* ============================================================================
   طبقة البيانات الديناميكية (Fact Table + محرّك التجميع)
   ----------------------------------------------------------------------------
   قبل هذه الطبقة كانت كل الأرقام نصوصًا ثابتة تُضرب في معامل تحجيم، فلم يكن
   تغيير الفلتر يعيد الحساب فعليًا. الآن يُولَّد جدول حقائق يومي لكل
   (يوم × فرع × قناة × فئة)، وتُشتق منه كل المؤشرات والرسوم بالتجميع.

   التوليد حتمي (بذرة ثابتة) — نفس الفلتر يعطي نفس الأرقام في كل تحميل،
   وإلا لاهتزّت الأرقام بين إعادة الرسم وبدت اللوحة غير موثوقة.
   ========================================================================== */

/* مولّد أرقام شبه‑عشوائي حتمي (mulberry32) */
function dsRng(seed){
  let a=seed>>>0;
  return function(){
    a|=0; a=a+0x6D2B79F5|0;
    let t=Math.imul(a^a>>>15,1|a);
    t=t+Math.imul(t^t>>>7,61|t)^t;
    return ((t^t>>>14)>>>0)/4294967296;
  };
}
function dsHash(str){
  let h=2166136261>>>0;
  for(let i=0;i<str.length;i++){ h^=str.charCodeAt(i); h=Math.imul(h,16777619); }
  return h>>>0;
}

const DS_CHANNELS=[
  {v:'store',  t:"الفروع",           w:0.62},
  {v:'web',    t:"الموقع الإلكتروني", w:0.21},
  {v:'mobile', t:"الجوال",           w:0.17},
];
const DS_CATS=[
  {v:'bullion', t:"سبائك",  w:0.22},
  {v:'sets',    t:"أطقم",   w:0.18},
  {v:'rings',   t:"خواتم",  w:0.16},
  {v:'bracel',  t:"أساور",  w:0.15},
  {v:'earr',    t:"أقراط",  w:0.12},
  {v:'chains',  t:"سلاسل",  w:0.10},
  {v:'pend',    t:"معلقات", w:0.07},
];
/* سعر الجرام المرجعي (عيار 21) — تُشتق منه الأوزان فتتّسق مع القيم */
const DS_GRAM_PRICE=273.35;
/* هامش الربح لكل فئة: السبائك الأدنى (سلعة قريبة من سعر المعدن)،
   والمشغولات اليدوية الأعلى (أجور صناعة) */
const DS_CAT_MARGIN={bullion:0.061, sets:0.243, rings:0.268, bracel:0.221,
                     earr:0.259, chains:0.196, pend:0.284};
const DS_HISTORY_DAYS=420;               /* يغطي "هذا العام" ومقارنة الفترة السابقة */
const DS_TODAY=new Date('2026-07-12T00:00:00');

const dsKey=d=>d.toISOString().slice(0,10);
function dsAddDays(d,n){ const x=new Date(d.getTime()); x.setDate(x.getDate()+n); return x; }

/* ---------------------------------------------------------------------------
   جدول الحقائق: صف لكل (يوم × فرع × قناة × فئة)
   يُبنى مرة واحدة كسولًا ثم يُخزَّن — بناؤه في كل إعادة رسم كان سيجمّد الواجهة.
   ------------------------------------------------------------------------- */
let _DS_FACTS=null;
function dsFacts(){
  if(_DS_FACTS) return _DS_FACTS;
  const branches=hsAllBranches();
  const rows=[];
  const start=dsAddDays(DS_TODAY,-(DS_HISTORY_DAYS-1));

  /* وزن ثابت لكل فرع: يحدّد حجمه النسبي عبر كل الفترات */
  const bw=branches.map((b,i)=>{
    const r=dsRng(dsHash(b.ar||('b'+i)));
    return 0.35+r()*1.15;
  });

  for(let day=0; day<DS_HISTORY_DAYS; day++){
    const date=dsAddDays(start,day);
    const iso=dsKey(date);
    const dow=date.getDay();                    /* 0=الأحد … 6=السبت */
    /* موسمية: نهاية الأسبوع أعلى، ورمضان/الأعياد ليست ضمن النطاق فتُهمل */
    const dowF = (dow===5||dow===6) ? 1.28 : (dow===0?0.94:1.0);
    /* اتجاه نمو تدريجي عبر الزمن (~+14% سنويًا) */
    const trendF = 1 + (day/DS_HISTORY_DAYS)*0.14;
    /* تذبذب شهري خفيف */
    const monthF = 1 + Math.sin(day/30.4*Math.PI*2)*0.06;

    for(let bi=0; bi<branches.length; bi++){
      const b=branches[bi];
      const rnd=dsRng(dsHash(iso+'|'+bi));
      const noise=0.86+rnd()*0.28;
      const dayBase = 300000 * bw[bi] * dowF * trendF * monthF * noise;

      for(const ch of DS_CHANNELS){
        /* القنوات الرقمية أضعف في الفروع الصغيرة، وأقوى في المدن الكبيرة */
        const chTilt = ch.v==='store' ? 1 : (0.72+bw[bi]*0.34);
        const chRnd=dsRng(dsHash(iso+'|'+bi+'|'+ch.v));
        const chBase = dayBase*ch.w*chTilt*(0.9+chRnd()*0.2);

        for(const cat of DS_CATS){
          const cRnd=dsRng(dsHash(iso+'|'+bi+'|'+ch.v+'|'+cat.v));
          const sales = chBase*cat.w*(0.85+cRnd()*0.3);
          if(sales<1) continue;
          const orders=Math.max(1,Math.round(sales/ (3300+cRnd()*900) ));
          /* الهامش يختلف بنيويًا حسب الفئة والقناة — السبائك هامشها ضعيف
             (قريبة من سعر المعدن) والمشغولات أعلى؛ والقنوات الرقمية تتحمّل
             تكلفة شحن وتسويق. بدون هذا التمايز كان الهامش يخرج ثابتًا
             (~18.5%) مهما تغيّر الفلتر لأن العشوائية وحدها تتلاشى بالتجميع. */
          const catMargin = DS_CAT_MARGIN[cat.v];
          const chAdj = ch.v==='store' ? 0 : (ch.v==='web' ? -0.021 : -0.028);
          const margin = catMargin + chAdj + (cRnd()-0.5)*0.012;
          /* تُخزَّن مراجع الفرع (bi) لا نسخ من نصوصه: تكرار خمس سلاسل نصية
             على 238 ألف صف كان يضخّم الذاكرة أضعافًا بلا فائدة. تُقرأ
             الحقول النصية عبر getters من جدول الفروع عند الحاجة. */
          rows.push({
            iso, day, dow, bi,
            ch:ch.v, cat:cat.v,
            sales,
            orders,
            grams: sales/DS_GRAM_PRICE,
            cost: sales*(1-margin),
            returns: sales*(0.018+cRnd()*0.016),
          });
        }
      }
    }
  }
  _DS_FACTS=rows;
  return rows;
}

   نطاقات التاريخ

const DS_RANGES={
  today:     {ar:"اليوم",           en:"Today"},
  yesterday: {ar:"أمس",             en:"Yesterday"},
  '7d':      {ar:"آخر 7 أيام",      en:"Last 7 Days"},
  '30d':     {ar:"آخر 30 يومًا",    en:"Last 30 Days"},
  month:     {ar:"هذا الشهر",       en:"This Month"},
  lastmonth: {ar:"الشهر الماضي",    en:"Last Month"},
  quarter:   {ar:"هذا الربع",       en:"This Quarter"},
  year:      {ar:"هذا العام",       en:"This Year"},
  custom:    {ar:"نطاق مخصص",       en:"Custom Range"},
};

/* يعيد {from,to} كتواريخ فعلية — الأساس الوحيد لكل التصفية الزمنية */
function dsRange(preset,from,to){
  const T=DS_TODAY;
  const mk=(a,b)=>({from:a,to:b});
  switch(preset){
    case 'today':     return mk(T,T);
    case 'yesterday': {const y=dsAddDays(T,-1); return mk(y,y);}
    case '7d':        return mk(dsAddDays(T,-6),T);
    case '30d':       return mk(dsAddDays(T,-29),T);
    case 'month':     return mk(new Date(T.getFullYear(),T.getMonth(),1),T);
    case 'lastmonth': {
      const s=new Date(T.getFullYear(),T.getMonth()-1,1);
      const e=new Date(T.getFullYear(),T.getMonth(),0);
      return mk(s,e);
    }
    case 'quarter':   {
      const q=Math.floor(T.getMonth()/3);
      return mk(new Date(T.getFullYear(),q*3,1),T);
    }
    case 'year':      return mk(new Date(T.getFullYear(),0,1),T);
    case 'custom':
      if(from&&to) return mk(new Date(from),new Date(to));
      return mk(dsAddDays(T,-6),T);
    default:          return mk(dsAddDays(T,-6),T);
  }
}
/* الفترة السابقة المكافئة — لحساب نسب التغيّر بصدق بدل رقم ثابت */
function dsPrevRange(r){
  const days=Math.round((r.to-r.from)/86400000)+1;
  return {from:dsAddDays(r.from,-days), to:dsAddDays(r.from,-1)};
}
function dsRangeDays(r){ return Math.round((r.to-r.from)/86400000)+1; }

/* ---------------------------------------------------------------------------
   التصفية: تطبّق كل الفلاتر العامة معًا
   ------------------------------------------------------------------------- */
function dsActiveRange(){ return dsRange(DATE_PRESET,DATE_FROM,DATE_TO); }

/* يطابق صفًا مع نطاق الفروع المختار (متجر/منطقة/مدينة/موقع/فرع) */
/* جدول الفروع مفهرس بالموضع — يُقرأ منه انتماء كل صف بدل تخزينه فيه */
let _DS_BR=null;
function dsBr(i){ if(!_DS_BR) _DS_BR=hsAllBranches(); return _DS_BR[i]; }
function dsMatchScope(row){
  const b=dsBr(row.bi); if(!b) return false;
  if(HS.store!=='all' && b.store!==HS.store) return false;
  if(HS.region!=='all' && b.region!==HS.region) return false;
  if(HS.city!=='all' && b.city!==HS.city) return false;
  if(HS.loc!=='all' && b.loc!==HS.loc) return false;
  /* تسمية الفرع في المنتقي غير مؤهَّلة بالمدينة ("أسواق طيبة — فرع 1")
     بينما هي مؤهَّلة في البيانات ("الرياض — أسواق طيبة — فرع 1")، فالمطابقة
     التامة كانت تُرجع صفر صفوف لأي فرع مفرد. تُقارن باللاحقة بدل التطابق. */
  if(HS.branch!=='all' && !dsSameBranch(b.ar,HS.branch)) return false;
  return true;
}
/* يطابق تسميتَي فرع قد تختلفان في عدد المستويات المؤهِّلة */
function dsSameBranch(dataName,pick){
  if(dataName===pick) return true;
  const norm=x=>String(x).replace(/\s+/g,' ').trim();
  const a=norm(dataName), b=norm(pick);
  return a===b || a.endsWith('— '+b) || a.endsWith(b);
}
function dsMatchCross(row){
  if(DS_X.channel && row.ch!==DS_X.channel) return false;
  if(DS_X.cat && row.cat!==DS_X.cat) return false;
  if(DS_X.region || DS_X.branch){
    const b=dsBr(row.bi); if(!b) return false;
    if(DS_X.region && CITY_TO_REGION[b.city]!==DS_X.region) return false;
    if(DS_X.branch && !dsSameBranch(b.ar,DS_X.branch)) return false;
  }
  return true;
}

/* حالة الترشيح المتقاطع (نقر على عنصر في رسم يفلتر بقية اللوحة) */
let DS_X={channel:null, cat:null, region:null, branch:null};
function dsXActive(){ return !!(DS_X.channel||DS_X.cat||DS_X.region||DS_X.branch); }
function dsXClear(){ DS_X={channel:null,cat:null,region:null,branch:null}; }

/* النتيجة مخزَّنة حسب توقيع الفلاتر: التجميع يمرّ على عشرات آلاف الصفوف،
   وإعادته لكل بطاقة على حدة كانت ستُبطئ إعادة الرسم بوضوح. */
let _DS_CACHE={};
function dsSig(extra){
  return [DATE_PRESET,DATE_FROM,DATE_TO,HS.store,HS.region,HS.city,HS.loc,HS.branch,
          DS_X.channel,DS_X.cat,DS_X.region,DS_X.branch,extra||''].join('~');
}
function dsRows(opt){
  opt=opt||{};
  const sig=dsSig((opt.prev?'P':'C')+(opt.ignoreCross?'I':''));
  if(_DS_CACHE[sig]) return _DS_CACHE[sig];
  let r=dsActiveRange();
  if(opt.prev) r=dsPrevRange(r);
  const f=dsKey(r.from), t=dsKey(r.to);
  const out=dsFacts().filter(row=>
    row.iso>=f && row.iso<=t && dsMatchScope(row) &&
    (opt.ignoreCross?true:dsMatchCross(row))
  );
  _DS_CACHE[sig]=out;
  return out;
}
function dsInvalidate(){ _DS_CACHE={}; }

/* ---------------------------------------------------------------------------
   التجميع
   ------------------------------------------------------------------------- */
function dsAgg(rows){
  let sales=0,orders=0,grams=0,cost=0,returns=0;
  for(const r of rows){ sales+=r.sales; orders+=r.orders; grams+=r.grams; cost+=r.cost; returns+=r.returns; }
  return {
    sales, orders, grams, cost, returns,
    profit: sales-cost,
    margin: sales? (sales-cost)/sales*100 : 0,
    avg: orders? sales/orders : 0,
    n: rows.length,
  };
}
function dsGroup(rows,keyFn){
  const m=new Map();
  for(const r of rows){
    const k=keyFn(r);
    let g=m.get(k);
    if(!g){ g={key:k,sales:0,orders:0,grams:0,cost:0,returns:0}; m.set(k,g); }
    g.sales+=r.sales; g.orders+=r.orders; g.grams+=r.grams; g.cost+=r.cost; g.returns+=r.returns;
  }
  return [...m.values()].map(g=>({...g, profit:g.sales-g.cost, avg:g.orders?g.sales/g.orders:0}));
}
/* سلسلة زمنية: تتكيّف حبيبتها مع طول النطاق (يوم/أسبوع/شهر) وإلا لصار
   "هذا العام" 365 نقطة مضغوطة لا تُقرأ. */
function dsSeries(rows,metric){
  const r=dsActiveRange(), days=dsRangeDays(r);
  const gran = days<=31 ? 'day' : (days<=120?'week':'month');
  const m=new Map();
  for(const row of rows){
    const d=new Date(row.iso+'T00:00:00');
    let k,lbl;
    if(gran==='day'){
      k=row.iso;
      /* أسبوع واحد → اسم اليوم يكفي ويميّز. أطول من ذلك → يتكرر الاسم سبع مرات
         ولا يدل على أي جمعة، فيُستخدم اليوم/الشهر. */
      lbl = days<=7 ? DS_DAY_AR[d.getDay()] : (d.getDate()+'/'+(d.getMonth()+1));
    }
    else if(gran==='week'){
      const wk=Math.floor((d-r.from)/(7*86400000));
      k='w'+wk; lbl='أ'+(wk+1);
    } else { k=d.getFullYear()+'-'+d.getMonth(); lbl=DS_MON_AR[d.getMonth()]; }
    let g=m.get(k);
    if(!g){ g={k,lbl,sales:0,profit:0,purchases:0,orders:0,grams:0}; m.set(k,g); }
    g.sales+=row.sales; g.profit+=row.sales-row.cost; g.purchases+=row.cost;
    g.orders+=row.orders; g.grams+=row.grams;
  }
  const arr=[...m.values()].sort((a,b)=>a.k<b.k?-1:1);
  return {gran, labels:arr.map(a=>a.lbl), values:arr.map(a=>a[metric]||0), rows:arr};
}
const DS_DAY_AR=["الأحد","الاثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"];
const DS_MON_AR=["ينا","فبر","مار","أبر","ماي","يون","يول","أغس","سبت","أكت","نوف","ديس"];

/* نسبة التغيّر مقابل الفترة السابقة — تُحسب لا تُكتب */
function dsDelta(cur,prev){
  if(!prev) return {pct:0, dir:'up', txt:'0%'};
  const d=(cur-prev)/prev*100;
  return {pct:d, dir:d>=0?'up':'down', txt:(d>=0?'+':'−')+Math.abs(d).toFixed(1)+'%'};
}
/* تنسيق مختصر: 765.4 م ر.س / 12.4 ألف — يمرّ لاحقًا على numFormat */
function dsM(v){ return (v/1e6).toFixed(1); }
function dsK(v){ return v>=1000? (v/1000).toFixed(1)+'k' : Math.round(v); }
function dsInt(v){ return Math.round(v).toLocaleString('en-US'); }


const hsStore  =()=>STORES.find(s=>s.v===HS.store);
const hsRegion =()=>{const s=hsStore(); return s&&s.regions.find(r=>r.v===HS.region);};
const hsCity   =()=>{const r=hsRegion(); return r&&r.cities.find(c=>c.v===HS.city);};
const hsLoc    =()=>{const c=hsCity(); return c&&(c.locs||[]).find(l=>l.v===HS.loc);};
/* الخيارات المتاحة عند كل مستوى — تعتمد على ما قبلها (تتالٍ حقيقي) */
const hsRegions =()=>{const s=hsStore(); return s?s.regions:[];};
const hsCities  =()=>{const r=hsRegion(); return r?r.cities:[];};
const hsLocs    =()=>{const c=hsCity(); return c?(c.locs||[]):[];};
const hsBranches=()=>{
  const l=hsLoc(); if(l) return l.branches||[];
  const c=hsCity();
  if(c){
    /* مدينة بلا موقع محدد: تُعرض فروعها المباشرة + فروع مواقعها */
    if(HS.loc==='all'){
      const direct=(c.branches||[]).slice();
      const nested=(c.locs||[]).flatMap(x=>(x.branches||[]).map(b=>`${x.t} — ${b}`));
      return [...direct,...nested];
    }
    return c.branches||[];
  }
  return [];
};
/* عدد الفروع تحت أي عقدة — يُستخدم لتحجيم البيانات */
function hsCountBranches(node){
  if(!node) return 0;
  if(node.regions) return node.regions.reduce((a,r)=>a+hsCountBranches(r),0);
  if(node.cities)  return node.cities.reduce((a,c)=>a+hsCountBranches(c),0);
  const direct=(node.branches||[]).length;
  const nested=(node.locs||[]).reduce((a,l)=>a+(l.branches||[]).length,0);
  return direct+nested;
}
const HS_TOTAL=STORES.reduce((a,s)=>a+hsCountBranches(s),0);
/* أضيق مستوى مختار */
function hsScope(){
  if(HS.branch!=='all') return {lvl:'branch', n:1, label:hsPathLabel()};
  const l=hsLoc();  if(l) return {lvl:'loc',  n:hsCountBranches(l),  label:hsPathLabel()};
  const c=hsCity(); if(c) return {lvl:'city', n:hsCountBranches(c),  label:hsPathLabel()};
  const r=hsRegion();if(r)return {lvl:'region',n:hsCountBranches(r), label:hsPathLabel()};
  const s=hsStore();if(s) return {lvl:'store',n:hsCountBranches(s),  label:hsPathLabel()};
  return {lvl:'all', n:HS_TOTAL, label:"كل الفروع"};
}
/* معامل التحجيم: نصيب النطاق المختار من إجمالي الفروع.
   ليس رقمًا اعتباطيًا — هو نسبة الفروع المشمولة فعليًا. */
function hsScale(){
  const sc=hsScope();
  if(sc.lvl==='all') return 1;
  return HS_TOTAL? Math.max(0.02, sc.n/HS_TOTAL) : 1;
}
function hsPathLabel(){
  const p=[];
  const s=hsStore(); if(s) p.push(s.t);
  const r=hsRegion(); if(r) p.push(r.t);
  const c=hsCity();  if(c) p.push(c.t);
  const l=hsLoc();   if(l) p.push(l.t);
  if(HS.branch!=='all') p.push(HS.branch);
  return p.length?p.join(' · '):"كل الفروع";
}
const hsActive=()=>HS.store!=='all';


/* ---------- فلتر المتاجر: نفس طابع منتقي التاريخ (زر + بوب أوفر) ---------- */
let HS_OPEN=false;
let HS_DRAFT={store:'all',region:'all',city:'all',loc:'all',branch:'all'};  /* يُطبَّق عند الضغط */

/* اختيار مستوى يصفّر ما بعده — هذا جوهر التتالي */
function hsPick(lvl,v){
  const D=HS_DRAFT;
  if(lvl==='store'){ D.store=v; D.region='all'; D.city='all'; D.loc='all'; D.branch='all'; }
  if(lvl==='region'){ D.region=v; D.city='all'; D.loc='all'; D.branch='all'; }
  if(lvl==='city'){ D.city=v; D.loc='all'; D.branch='all'; }
  if(lvl==='loc'){ D.loc=v; D.branch='all'; }
  if(lvl==='branch'){ D.branch=v; }
}
/* قراءة الخيارات من المسودة (لا من الحالة المطبَّقة) */
const dStore =()=>STORES.find(x=>x.v===HS_DRAFT.store);
const dRegion=()=>{const s=dStore();  return s&&s.regions.find(r=>r.v===HS_DRAFT.region);};
const dCity  =()=>{const r=dRegion(); return r&&r.cities.find(c=>c.v===HS_DRAFT.city);};
const dLoc   =()=>{const c=dCity();   return c&&(c.locs||[]).find(l=>l.v===HS_DRAFT.loc);};
function dBranches(){
  const l=dLoc(); if(l) return (l.branches||[]).map(b=>({v:b,t:b}));
  const c=dCity();
  if(c && HS_DRAFT.loc==='all'){
    const direct=(c.branches||[]).map(b=>({v:b,t:b}));
    const nested=(c.locs||[]).flatMap(x=>(x.branches||[]).map(b=>({v:`${x.t} — ${b}`,t:`${x.t} — ${b}`})));
    return [...direct,...nested];
  }
  return [];
}
function hsRow(lvl,label,opts,cur,disabled){

    <span class="hs-lbl">${label}</span>
    <div class="hs-opts">
      <button class="hs-o ${cur==='all'?'on':''}" data-hs="${lvl}|all">
        <span>الكل</span>${svg('check','dp-tick')}</button>
      ${opts.map(o=>`<button class="hs-o ${cur===o.v?'on':''}" data-hs="${lvl}|${o.v}">
        <span>${o.t}</span>${svg('check','dp-tick')}</button>`).join('')}
    </div></div>`;
}
function StoreTool(){

          <span>${s.t}</span>${svg('check','dp-tick')}</button>`).join('')}
      </div>
      ${st?'<div class="dp-div"></div>':''}
      ${st&&!noTree?'<div class="dp-sec">التسلسل</div>':''}

        <span>النطاق: <b>${hsDraftCount()}</b> من ${HS_TOTAL} فرع</span></div>

        <button class="dp-btn" id="hsCancel">إلغاء</button>
        <button class="dp-btn primary" id="hsApply">تطبيق</button>

/* عدد الفروع المشمولة في المسودة */
function hsDraftCount(){
  if(HS_DRAFT.branch!=='all') return 1;
  const l=dLoc();  if(l) return (l.branches||[]).length;
  const c=dCity(); if(c) return hsCountBranches(c);
  const r=dRegion(); if(r) return hsCountBranches(r);
  const s=dStore();  if(s) return hsCountBranches(s);
  return HS_TOTAL;
}


/* ---- تطبيق النطاق على الجداول والخرائط والرسوم ----
   البيانات الحالية ثابتة ولا تحمل انتماءً للشجرة الجديدة، فبدل تزوير
   انتماء لكل صف، يُطبَّق النطاق بأمرين صادقين:
   (1) الكميات المطلقة تُحجَّم بنسبة الفروع المشمولة (عبر dpScale).
   (2) القوائم المرتبطة بالفروع تُقلَّص إلى عدد الفروع المشمولة. */
/* الفروع الحقيقية تحمل انتماءها للشجرة، فتُصفّى بدقّة لا بالقص.
   (القوائم القديمة التي لا تحمل انتماءً تُقصّ كما كان — احتياط.) */
function hsLimit(list){
  const sc=hsScope();
  if(sc.lvl==='all' || HS.store==='all') return list;
  /* قناة رقمية: لا فروع جغرافية لها. بدون هذا الحارس كانت كل شروط
     التصفية أدناه تُتخطّى (لا منطقة/مدينة/موقع/فرع) فتُعاد القائمة كاملة —
     أي أن اختيار "الجوال" كان سيعرض الـ27 فرعًا الفعلية. */
  const st=hsStore();
  /* أي متجر بلا شجرة فروع (قناة رقمية، أو غامية التي regions=[]) لا يملك
     فروعًا جغرافية — وإلا فلا شرط تصفية يُطبَّق فتُعاد القائمة كاملة. */
  if(st && (st.online || !hsCountBranches(st))) return [];
  if(!list.length) return list;
  const r=hsRegion(), c=hsCity(), l=hsLoc();
  const row0=list[0];
  /* قائمتان بأعراف حقول مختلفة:
     - hsAllBranches: city مفتاح ('riyadh')، والاسم في ar
     - BRANCHES/PF_BRANCHES: city اسم معروض ('الرياض')، والاسم في name
     فتُقارن كل واحدة بعرفها بدل افتراض شكل واحد. */
  const keyed = row0.br!==undefined;      /* صفوف الشجرة */
  if(!keyed && row0.region===undefined) return list;   /* بلا انتماء */
  return list.filter(b=>{
    const nm=String(b.name||b.ar||'');
    if(r && b.region!==r.v) return false;
    if(c && (keyed ? b.city!==c.v : b.city!==c.t)) return false;
    if(l && (keyed ? b.loc!==l.v : !nm.includes(l.t))) return false;
    if(HS.branch!=='all'){
      const bn=keyed ? b.br : nm;
      if(!String(bn).includes(HS.branch) && nm!==HS.branch) return false;
    }
    return true;
  });
}
/* الخريطة: تُبرز مناطق النطاق وتُخفت ما عداها */
const HS_REGION_MAP={central:['riyadh','qassim'], western:['makkah','madinah'],
  southern:['asir','jazan','najran'], northern:['hail','northern','jouf']};
function hsRegionIds(){
  const r=hsRegion();
  if(!r) return null;                       /* بلا تحديد = الكل نشط */
  return HS_REGION_MAP[r.v]||null;
}
function hsDim(regionId){
  const ids=hsRegionIds();
  return ids ? !ids.includes(regionId) : false;
}

}


/* ================= التنبيهات ================= */
let NT_OPEN=false;            /* لوحة الجرس */
let NT_FILTER='all';          /* all | critical | warning | info | success */
let NT_READ={};               /* id -> true */
let NT_SEL=null;              /* تفاصيل تنبيه */

/* التنبيهات مشتقّة من البيانات الحيّة لا مكتوبة يدويًا —
   فأي تغيّر في الأداء أو المستهدفات ينعكس عليها فورًا. */
function ntBuild(){
  const out=[];
  const push=(o)=>out.push({id:o.id, sev:o.sev, ar:o.ar, d:o.d, t:o.t,
    ic:o.ic, page:o.page||null, src:o.src||""});

  /* 1) فروع دون 70% */
  hsLimit(PF_BRANCHES).filter(b=>b.score<70)
    .sort((a,b)=>a.score-b.score).slice(0,4).forEach((b,i)=>push({
      id:'br-'+b.name, sev:b.score<50?'critical':'warning',
      ar:`أداء منخفض — ${b.name}`,
      d:`مؤشر ${b.score} · رضا ${b.csat}/5 · النمو ${b.growth}`,
      t:i===0?"قبل ساعة":"اليوم", ic:'store', page:'perf', src:"أداء الفروع"}));

  /* 2) مؤشرات دون المستهدف */
  PF_MON.filter(m=>pfAch(m)<90).forEach(m=>push({
    id:'mon-'+m.id, sev:pfAch(m)<80?'critical':'warning',
    ar:`${m.ar} دون المستهدف`,
    d:`${aiNum(m.cur)} من ${aiNum(m.target)} ${m.unit} — تحقيق ${pfAch(m).toFixed(1)}%`,
    t:"اليوم", ic:m.ic, page:'targets', src:"مراقبة المؤشرات"}));

  /* 3) مؤشرات النمو الهابطة */
  PERF_KPIS.filter(k=>k.dir==='down').forEach(k=>push({
    id:'kpi-'+k.id, sev:'warning', ar:`${k.ar} في تراجع`,
    d:`${k.val}${k.unit} — ${k.chg} مقارنة بالفترة السابقة`,
    t:"أمس", ic:k.icon, page:'perf', src:"مؤشرات الأداء"}));

  /* 4) قنوات ضعيفة الأداء */
  PF_CHANNELS.filter(c=>c.score<85).forEach(c=>push({
    id:'ch-'+c.id, sev:'info', ar:`${c.ar} — أدنى مؤشر بين القنوات`,
    d:`مؤشر ${c.score} · تحويل ${c.conv}% · ${c.note}`,
    t:"أمس", ic:c.ic, page:'perf', src:"أداء القنوات"}));

  /* 5) إنجازات */
  PF_CHANNELS.filter(c=>parseFloat(c.growth)>=18).forEach(c=>push({
    id:'win-'+c.id, sev:'success', ar:`نمو قوي — ${c.ar}`,
    d:`${c.growth} · ${c.rev} م ر.س (${pfChShare(c).toFixed(1)}% من الإيراد)`,
    t:"اليوم", ic:'trendup', page:'perf', src:"أداء القنوات"}));

  /* 6) تنبيهات تشغيلية ثابتة (لا تُشتق من مؤشر) */
  push({id:'inv-abha', sev:'warning', ar:"مخزون تحت الحد",
    d:"3 أصناف دون حد التنبيه — يستحق إعادة طلب.", t:"أمس 16:40",
    ic:'box', page:'karat', src:"المخزون"});
  push({id:'sys-backup', sev:'info', ar:"نسخة احتياطية مكتملة",
    d:"تمت أرشفة بيانات الأمس بنجاح.", t:"اليوم 03:00",
    ic:'refresh', page:'settings', src:"النظام"});
  return out;
}
const NT_SEV={
  critical:{ar:"حرِج",   c:'var(--error)',   bg:'var(--error-bg)',   bd:'var(--error-border)'},
  warning: {ar:"تحذير",  c:'var(--warning)', bg:'var(--warning-bg)', bd:'var(--warning-border)'},
  info:    {ar:"معلومة", c:'var(--muted)',   bg:'var(--surface)',    bd:'var(--border)'},

};

function ntAll(){
  return ntBuild().sort((a,b)=>NT_ORDER[a.sev]-NT_ORDER[b.sev]);
}

/* ---------- KPIs ---------- */
function sparkPath(vals,w,h){
  const mn=Math.min(...vals),mx=Math.max(...vals),r=mx-mn||1;
  const pts=vals.map((v,i)=>[i/(vals.length-1)*w,h-((v-mn)/r)*h]);
  return {line:pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' '),
          area:`M0 ${h} `+pts.map(p=>'L'+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ')+` L${w} ${h} Z`,
          last:pts[pts.length-1]};
}
function KPI(k){
  const sp=sparkPath(k.spark,120,24);
  const col=k.dir==='up'?'var(--up)':'var(--down)';
  /* absolute totals grow with the window; rates/averages don't */
  const isRate = RATE_IDS.has(k.id) || k.cur==='%' ;
  const shownVal = dpNum(k.val, isRate);
  const shownSub = (DATE_PRESET==='custom' || dpDays()!==7) ? ("خلال "+dpDays()+" يومًا") : k.sub;
  return `<div class="kpi">
    <div class="kpi-top"><div class="kpi-ic ${k.dir}">${svg(k.icon)}</div><div class="kpi-title">${k.ar}</div></div>
    <div class="kpi-val"><span class="kpi-num" data-to="${shownVal}">${shownVal}</span><span class="cur">${k.cur}</span></div>
    <svg class="spark" viewBox="0 0 120 24" preserveAspectRatio="none">
      <path d="${sp.area}" fill="${col}" opacity="var(--spark-fill)"/>
      <path d="${sp.line}" fill="none" stroke="${col}" stroke-width="1.6"/>
      <circle cx="${sp.last[0].toFixed(1)}" cy="${sp.last[1].toFixed(1)}" r="2.2" fill="${col}"/>
    </svg>
    <div class="kpi-foot"><span class="trend ${k.dir}">${svg(k.dir,'ic-sm')}${k.chg}</span><span class="kpi-sub">${shownSub}</span></div>
  </div>`;
}
function KPIRow(){return `<div><div class="sec-head"><span class="sec-title"><span class="num">01</span>المؤشرات الرئيسية</span><span class="sec-hint">أهم مؤشرات الأداء هذا الأسبوع</span></div><div class="kpi-row" style="margin-top:10px">${KPIS.map(KPI).join('')}</div></div>`;}

/* شكل العرض مطابق للمرفق: أيقونة + عنوان، رقم كبير، سبارك لاين، ثم شارة المقارنة */
function perfSpark(v,dir){
  const W=150,H=34,mn=Math.min(...v),mx=Math.max(...v),r=(mx-mn)||1;
  const pts=v.map((x,i)=>[2+i/(v.length-1)*(W-4), H-3-((x-mn)/r)*(H-8)]);
  const d=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const c = dir==='down' ? 'var(--down)' : 'var(--bg-1)';
  const cd= dir==='down' ? 'var(--down)' : 'var(--bg-5)';
  return `<svg class="pk-spark" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <path d="${d} L${W-2} ${H-1} L2 ${H-1} Z" class="pk-fill ${dir}"/>
    <path d="${d}" class="pk-line ${dir}"/></svg>`;
}

/* ---------- HEATMAP (big) + BRANCH RANKING ---------- */
function colorFor(val,metric){
  const vals=REGIONS.map(r=>r[metric]);
  const mn=Math.min(...vals),mx=Math.max(...vals);
  const t=(val-mn)/(mx-mn||1);
  return HEAT[Math.min(HEAT.length-1,Math.floor(t*HEAT.length))];
}
function textColorFor(val,metric){
  const vals=REGIONS.map(r=>r[metric]);
  const mn=Math.min(...vals),mx=Math.max(...vals);
  const t=(val-mn)/(mx-mn||1);
  return t>0.55?'#EAF3F0':'#0C3B36';
}
function rankOf(id,metric){
  return [...REGIONS].sort((a,b)=>b[metric]-a[metric]).findIndex(r=>r.id===id)+1;
}
function Heatmap(){
  const m=CUR_METRIC;
  const paths=REGIONS.map(r=>{const d=MAP_PATHS[r.id]; if(!d)return'';
    return `<path class="region ${r.id===SEL_REGION?'sel':''} ${hsDim(r.id)?'hs-out':''} ${DS_X.region===r.id?'x-on':''}" data-id="${r.id}" data-xreg="${r.id}" d="${d}" fill="${colorFor(r[m],m)}"><title>${r.ar}</title></path>`;}).join('');

/* ---------- PERFORMANCE TREND (no dead space) ---------- */
function Chart(){
  const data=SERIES[CHART_METRIC];
  const W=560,H=180,PADX=8,PADB=24,PADT=12;
  const mx=Math.max(...data),mn=Math.min(...data)*0.85;
  const iw=W-PADX*2,ih=H-PADB-PADT;
  const x=i=>PADX+i/(data.length-1)*iw;
  const y=v=>PADT+ih-((v-mn)/(mx-mn))*ih;
  const pts=data.map((v,i)=>[x(i),y(v)]);
  const line=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const area=`M${x(0)} ${PADT+ih} `+pts.map(p=>'L'+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ')+` L${x(data.length-1)} ${PADT+ih} Z`;
  const maxI=data.indexOf(Math.max(...data)), minI=data.indexOf(Math.min(...data));
  const grid=[0,0.5,1].map(f=>{const gy=PADT+ih-f*ih;return `<line x1="${PADX}" y1="${gy}" x2="${W-PADX}" y2="${gy}" stroke="var(--line-soft)" stroke-width="1"/>`;}).join('');
  const dots=pts.map((p,i)=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="${i===maxI||i===minI?3.5:2.6}" fill="${i===maxI?'var(--up)':i===minI?'var(--down)':'var(--brand)'}" stroke="#fff" stroke-width="1.4"/>`).join('');
  const bandW=iw/(data.length-1);
  const hits=pts.map((p,i)=>`<rect class="cdot" data-i="${i}" data-cx="${p[0].toFixed(1)}" data-cy="${p[1].toFixed(1)}" x="${(p[0]-bandW/2).toFixed(1)}" y="${PADT}" width="${bandW.toFixed(1)}" height="${ih}" fill="transparent"/>`).join('');
  /* التسميات تتبع الحبيبة الفعلية للبيانات (يوم/أسبوع/شهر)؛ وتُخفَّف
     تلقائيًا عند كثرة النقاط حتى لا تتراكب. */
  const _lbl=chartLabels(), _skip=Math.ceil(_lbl.length/9);
  const labels=_lbl.map((d,i)=>(i%_skip)?'':`<text class="cx-lbl" data-i="${i}" x="${x(i).toFixed(1)}" y="${H-6}" text-anchor="middle" font-size="10" fill="var(--faint)" font-weight="600" font-family="Cairo">${d}</text>`).join('');
  return `<div class="chart-wrap" id="perfTrendWrap">
    <svg class="chart-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
      <defs><linearGradient id="cg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="var(--brand)" stop-opacity="0.14"/><stop offset="1" stop-color="var(--brand)" stop-opacity="0"/></linearGradient></defs>
      ${grid}<path class="ct-area" d="${area}" fill="url(#cg)"/><path class="ct-line" d="${line}" fill="none" stroke="var(--data-1)" stroke-width="2.2"/>${dots}${labels}
      <line class="ct-guide" x1="0" y1="${PADT}" x2="0" y2="${PADT+ih}" stroke="var(--data-1)" stroke-width="1" stroke-dasharray="4 4" opacity="0"/>
      <circle class="ct-active" cx="0" cy="0" r="4.5" fill="var(--data-1)" stroke="#fff" stroke-width="1.8" opacity="0"/>
      ${hits}
    </svg><div class="chart-tip" id="chartTip"></div>
  </div>`;
}

     (نطاق أسبوع)؛ في النطاقات الأطول التسمية تاريخ محدّد مضى فلا تُقال. */

/* ---------- CATEGORY DONUT ---------- */
function donutSlices(items,cx,cy,r,rInner){
  const total=items.reduce((a,b)=>a+b.val,0);
  let acc=-90;
  return items.map(it=>{
    const ang=it.val/total*360;
    const large=ang>180?1:0;
    const a0=acc*Math.PI/180, a1=(acc+ang)*Math.PI/180;
    const x0=cx+r*Math.cos(a0), y0=cy+r*Math.sin(a0);
    const x1=cx+r*Math.cos(a1), y1=cy+r*Math.sin(a1);
    const xi0=cx+rInner*Math.cos(a1), yi0=cy+rInner*Math.sin(a1);
    const xi1=cx+rInner*Math.cos(a0), yi1=cy+rInner*Math.sin(a0);
    acc+=ang;
    return `<path d="M${x0.toFixed(1)} ${y0.toFixed(1)} A${r} ${r} 0 ${large} 1 ${x1.toFixed(1)} ${y1.toFixed(1)} L${xi0.toFixed(1)} ${yi0.toFixed(1)} A${rInner} ${rInner} 0 ${large} 0 ${xi1.toFixed(1)} ${yi1.toFixed(1)} Z" fill="${it.color}"/>`;
  }).join('');
}

/* ---- توزيع المبيعات حسب الفئة (بأسلوب الخلايا المتدرّجة) ----
   لكل قناة/فرع توزيعه الخاص — الفلتر يبدّل بيانات فعلية لا شكلًا فقط.
   القيم = مبيعات الفئة بالمليون ر.س. */


/* توزيع الفئات حسب القناة — الجوال يميل للقطع الصغيرة، المعارض للسبائك */
let CAT_CH='all';
const CAT_BY_CH={
  all:    [{n:"سبائك",v:22},{n:"أطقم",v:18},{n:"خواتم",v:16},{n:"أساور",v:15},
           {n:"أقراط",v:12},{n:"سلاسل",v:11},{n:"معلقات",v:6}],
  store:  [{n:"سبائك",v:31},{n:"أطقم",v:22},{n:"أساور",v:14},{n:"خواتم",v:12},
           {n:"سلاسل",v:9},{n:"أقراط",v:8},{n:"معلقات",v:4}],
  web:    [{n:"أطقم",v:24},{n:"خواتم",v:19},{n:"أساور",v:17},{n:"سبائك",v:14},
           {n:"سلاسل",v:12},{n:"أقراط",v:9},{n:"معلقات",v:5}],
  mobile: [{n:"خواتم",v:27},{n:"أقراط",v:22},{n:"سلاسل",v:17},{n:"أساور",v:14},
           {n:"أطقم",v:11},{n:"معلقات",v:6},{n:"سبائك",v:3}],
};
const CAT_CHS=[{v:'all',t:"الكل"},{v:'store',t:"الفروع"},{v:'web',t:"الموقع الإلكتروني"},{v:'mobile',t:"الجوال"}];
const CAT_COLOR={"سبائك":"var(--heat-6)","أطقم":"var(--heat-5)","خواتم":"var(--gold)",
  "أساور":"var(--heat-4)","أقراط":"var(--heat-3)","سلاسل":"var(--heat-2)","معلقات":"#D8CBA0"};
/* توزيع الفئات صار محسوبًا من جدول الحقائق: يحترم النطاق الزمني ونطاق
   الفروع، ويستجيب لفلتر القناة الخاص بالبطاقة (CAT_CH). */
function catCh(){
  const rows=dsRows({ignoreCross:true}).filter(r=>CAT_CH==='all'||r.ch===CAT_CH);
  const g=dsGroup(rows,r=>r.cat);
  const tot=g.reduce((a,c)=>a+c.sales,0);
  const byV=new Map(g.map(x=>[x.key,x.sales]));
  return DS_CATS.map(c=>({n:c.t, v:tot? +(100*(byV.get(c.v)||0)/tot).toFixed(1):0, cv:c.v}));
}

function CategoryDonut(){
  const rows=catCh().slice().sort((a,b)=>b.v-a.v);
  const mx=Math.max(...rows.map(r=>r.v));
  /* أعمدة أنحف وأطول بتباعد أوسع لتطابق الرسم — قمم بزوايا خفيفة وتنفّس أعلى للقيم.
     بداية الشارت (أعلى عمود) عند اليمين تحت العنوان، وأرقام المحور عند اليسار مع الفلتر. */
  const W=520,H=260,PAX=34,PR=14,PT=40,PB=48;   /* PAX = حيّز أرقام المحور على اليسار */
  const iw=W-PAX-PR, ih=H-PT-PB;
  const gw=iw/rows.length, bw=Math.min(30,gw*0.42);
  const ticks=[0,.25,.5,.75,1];
  const grid=ticks.map(f=>{
    const gy=PT+ih-f*ih, base=f===0;
    return `<line class="fc-grid${base?' cv-baseline':''}" x1="${PAX}" y1="${gy.toFixed(1)}" x2="${W-PR}" y2="${gy.toFixed(1)}"/>
      <text class="fc-ylbl" x="${(PAX-9).toFixed(1)}" y="${(gy+3.4).toFixed(1)}" text-anchor="end">${Math.round(mx*f)}%</text>`;
  }).join('');
  const bars=rows.map((r,i)=>{
    /* i=0 (الأعلى قيمة) يبدأ من اليمين ثم تتناقص الأعمدة نحو اليسار */
    const bh=(r.v/mx)*ih, cx=(W-PR)-gw*i-gw/2, x=cx-bw/2, y=PT+ih-bh;
    return `<g class="cv-g ${DS_X.cat===r.cv?'x-on':''}" data-xcat="${r.cv}">
      <rect class="cv-b" x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}"
        height="${Math.max(2,bh).toFixed(1)}" rx="4" fill="${CAT_COLOR[r.n]||'var(--heat-4)'}">
        <title>${r.n}: ${r.v}% — انقر للترشيح</title></rect>
      <text class="cv-v" x="${cx.toFixed(1)}" y="${(y-12).toFixed(1)}" text-anchor="middle">${r.v}%</text>
      <text class="cv-x" x="${cx.toFixed(1)}" y="${(H-18).toFixed(1)}" text-anchor="middle">${r.n}</text>
    </g>`;
  }).join('');
  /* العنوان في ترويسة الكارد (خارج جسمه) — مطابقًا لبطاقة قنوات البيع */
  return `<div class="card cat-card">
    <div class="card-head">
      <div class="card-title">توزيع المبيعات حسب الفئة
        <span class="sub">نسبة من إجمالي القطع المباعة</span></div>
      <div class="brand-filter" id="catChFilter">
        ${CAT_CHS.map(o=>`<button data-catch="${o.v}" class="${CAT_CH===o.v?'on':''}">${o.t}</button>`).join('')}
      </div>
    </div>
    <svg viewBox="0 0 ${W} ${H}" class="cv-svg">${grid}${bars}</svg>
  </div>`;
}

  return `<div><div class="sec-head"><span class="sec-title"><span class="num">04</span>تحليل المبيعات حسب القناة والفئة</span><span class="sec-hint">مصادر المبيعات وتوزيعها</span></div>

function staticChart(data,labels){
  const W=560,H=180,PADX=8,PADB=24,PADT=12;
  const mx=Math.max(...data),mn=Math.min(...data)*0.85;
  const iw=W-PADX*2,ih=H-PADB-PADT;
  const x=i=>PADX+i/(data.length-1)*iw, y=v=>PADT+ih-((v-mn)/(mx-mn))*ih;
  const pts=data.map((v,i)=>[x(i),y(v)]);
  const line=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const area=`M${x(0)} ${PADT+ih} `+pts.map(p=>'L'+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ')+` L${x(data.length-1)} ${PADT+ih} Z`;
  const maxI=data.indexOf(Math.max(...data)), minI=data.indexOf(Math.min(...data));
  const grid=[0,0.5,1].map(f=>{const gy=PADT+ih-f*ih;return `<line x1="${PADX}" y1="${gy}" x2="${W-PADX}" y2="${gy}" stroke="var(--line-soft)" stroke-width="1"/>`;}).join('');
  const dots=pts.map((p,i)=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="${i===maxI||i===minI?3.5:2.6}" fill="${i===maxI?'var(--up)':i===minI?'var(--down)':'var(--brand)'}" stroke="#fff" stroke-width="1.4"/>`).join('');
  const lbl=labels.map((d,i)=>`<text x="${x(i).toFixed(1)}" y="${H-6}" text-anchor="middle" font-size="10" fill="var(--faint)" font-weight="600" font-family="Cairo">${d}</text>`).join('');
  return `<div class="chart-wrap"><svg class="chart-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <defs><linearGradient id="cg2" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="var(--brand)" stop-opacity="0.14"/><stop offset="1" stop-color="var(--brand)" stop-opacity="0"/></linearGradient></defs>
    ${grid}<path d="${area}" fill="url(#cg2)"/><path d="${line}" fill="none" stroke="var(--data-1)" stroke-width="2.2"/>${dots}${lbl}
  </svg></div>`;
}

function srTrendChart(){

function ecSec(num,title,inner){return `<div><div class="sec-head"><span class="sec-title"><span class="num">${num}</span>${title}</span></div><div style="margin-top:10px">${inner}</div></div>`;}
function chartCard(title,sub,inner){return `<div class="card"><div class="card-head"><div class="card-title">${title}<span class="sub">${sub}</span></div></div>${inner}</div>`;}
function dualLine(a,b,labels,la,lb){
  const W=680,H=210,PADX=14,PADT=16,PADB=28,all=a.concat(b),mx=Math.max(...all),mn=Math.min(...all)*0.85;
  const iw=W-PADX*2,ih=H-PADT-PADB,X=i=>PADX+i/(a.length-1)*iw,Y=v=>PADT+ih-((v-mn)/(mx-mn||1))*ih;
  const p=arr=>arr.map((v,i)=>(i?'L':'M')+X(i).toFixed(1)+' '+Y(v).toFixed(1)).join(' ');
  const grid=[0,.5,1].map(f=>{const gy=PADT+ih-f*ih;return `<line x1="${PADX}" y1="${gy}" x2="${W-PADX}" y2="${gy}" stroke="var(--line-soft)" stroke-width="1"/>`;}).join('');
  const dots=(arr,c)=>arr.map((v,i)=>`<circle cx="${X(i).toFixed(1)}" cy="${Y(v).toFixed(1)}" r="2.5" fill="var(--card)" stroke="${c}" stroke-width="1.6"/>`).join('');
  const lbl=labels.map((d,i)=>`<text x="${X(i).toFixed(1)}" y="${H-8}" text-anchor="middle" font-size="10" fill="var(--faint)" font-weight="600" font-family="Cairo">${d}</text>`).join('');
  return `<div class="chart-wrap"><svg class="chart-svg" viewBox="0 0 ${W} ${H}">${grid}
    <path d="${p(a)}" fill="none" stroke="var(--data-1)" stroke-width="2.4"/>${dots(a,'var(--brand)')}
    <path d="${p(b)}" fill="none" stroke="var(--gold)" stroke-width="2.4" stroke-dasharray="5 4"/>${dots(b,'var(--gold)')}${lbl}</svg>
    <div class="dl-legend2"><span><i style="background:var(--data-1)"></i>${la}</span><span><i style="background:var(--gold)"></i>${lb}</span></div></div>`;
}
const EC_BADGE={ok:{bg:'rgba(9,61,57,.09)',c:'var(--brand)'},warn:{bg:'var(--gold-soft)',c:'#8A6D1E'},neutral:{bg:'#EEF1EF',c:'var(--muted)'}};
function ecBadge(t,k){const s=EC_BADGE[k]||EC_BADGE.neutral;return `<span class="ec-badge" style="background:${s.bg};color:${s.c}">${t}</span>`;}

function smoothPath(pts){if(pts.length<2)return '';let d='M'+pts[0][0].toFixed(1)+' '+pts[0][1].toFixed(1);
  for(let i=0;i<pts.length-1;i++){const p0=pts[i-1]||pts[i],p1=pts[i],p2=pts[i+1],p3=pts[i+2]||p2;
    const c1x=p1[0]+(p2[0]-p0[0])/6,c1y=p1[1]+(p2[1]-p0[1])/6,c2x=p2[0]-(p3[0]-p1[0])/6,c2y=p2[1]-(p3[1]-p1[1])/6;
    d+=' C'+c1x.toFixed(1)+' '+c1y.toFixed(1)+' '+c2x.toFixed(1)+' '+c2y.toFixed(1)+' '+p2[0].toFixed(1)+' '+p2[1].toFixed(1);}return d;}
function barPath(x,y,w,h,rt,rb){if(h<=0.5)return '';rt=Math.min(rt,w/2,h);rb=Math.min(rb,w/2,h);
  return `M${(x+rt).toFixed(1)} ${y.toFixed(1)} H${(x+w-rt).toFixed(1)} Q${(x+w).toFixed(1)} ${y.toFixed(1)} ${(x+w).toFixed(1)} ${(y+rt).toFixed(1)} V${(y+h-rb).toFixed(1)} Q${(x+w).toFixed(1)} ${(y+h).toFixed(1)} ${(x+w-rb).toFixed(1)} ${(y+h).toFixed(1)} H${(x+rb).toFixed(1)} Q${x.toFixed(1)} ${(y+h).toFixed(1)} ${x.toFixed(1)} ${(y+h-rb).toFixed(1)} V${(y+rt).toFixed(1)} Q${x.toFixed(1)} ${y.toFixed(1)} ${(x+rt).toFixed(1)} ${y.toFixed(1)} Z`;}
function refChart(a,b,labels,nameA,nameB){
  const W=720,H=250,PADX=32,PADT=18,PADB=30,n=a.length,GAP=0;
  const tot=a.map((v,i)=>v+b[i]),mx=Math.max(...tot)*1.14;
  const iw=W-PADX*2,ih=H-PADT-PADB,step=iw/n,bw=Math.min(48,step*0.62),base=PADT+ih,hh=v=>(v/mx)*ih;
  const grid=[0,.25,.5,.75,1].map(f=>{const gy=base-f*ih,val=Math.round(mx*f);
    return `<line x1="${PADX}" y1="${gy.toFixed(1)}" x2="${W-PADX}" y2="${gy.toFixed(1)}" stroke="var(--line-soft)" stroke-width="1"/><text x="${(PADX-8)}" y="${(gy+3).toFixed(1)}" text-anchor="end" font-size="9" fill="var(--faint)" font-family="Cairo">${val}</text>`;}).join('');
  const bars=labels.map((d,i)=>{const x=PADX+step*i+(step-bw)/2,bH=hh(b[i]),aH=hh(a[i]),botY=base-bH,topY=botY-GAP-aH;
    return `<g class="rc-bar"><path class="rc-bseg" d="${barPath(x,botY,bw,bH,0,7)}" fill="var(--data-1)"/><path class="rc-bseg" d="${barPath(x,topY,bw,aH,7,0)}" fill="#7FB2A8"/></g>`;}).join('');
  const lbls=labels.map((d,i)=>`<text class="rc-xl" data-i="${i}" x="${(PADX+step*i+step/2).toFixed(1)}" y="${H-9}" text-anchor="middle" font-size="9.5" fill="var(--faint)" font-weight="600" font-family="Cairo">${d}</text>`).join('');
  const hits=labels.map((d,i)=>{const x=PADX+step*i+(step-bw)/2,topY=base-hh(b[i])-GAP-hh(a[i]);
    return `<rect class="rc-hit" x="${(PADX+step*i).toFixed(1)}" y="${PADT}" width="${step.toFixed(1)}" height="${ih}" fill="transparent" data-i="${i}" data-l="${d}" data-na="${nameA}" data-nb="${nameB}" data-va="${a[i]} م ر.س" data-vb="${b[i]} م ر.س" data-cx="${(x+bw/2).toFixed(1)}" data-cy="${topY.toFixed(1)}"/>`;}).join('');
  return `<div class="rc-wrap" id="campChart"><svg class="rc-svg" viewBox="0 0 ${W} ${H}">${grid}${bars}${lbls}${hits}</svg><div class="rc-tip" id="campTip"></div></div>`;
}

  const iw=W-PADX*2,ih=H-PADT-PADB,X=i=>PADX+i/(data.length-1)*iw,Y=v=>PADT+ih-(v/mxNice)*ih;
  const pts=data.map((v,i)=>[X(i),Y(v)]);
  const line=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const area=line+` L${X(data.length-1).toFixed(1)} ${(PADT+ih).toFixed(1)} L${X(0).toFixed(1)} ${(PADT+ih).toFixed(1)} Z`;
  const grid=[0,.25,.5,.75,1].map(f=>{const gy=PADT+ih-f*ih,val=Math.round(mxNice*f);

  const step=iw/(data.length-1);
  const hits=labels.map((d,i)=>`<rect class="pf-hit" x="${(X(i)-step/2).toFixed(1)}" y="${PADT}" width="${step.toFixed(1)}" height="${ih}" fill="transparent" data-l="${d}" data-v="${data[i]}K ر.س" data-x="${X(i).toFixed(1)}" data-y="${Y(data[i]).toFixed(1)}"/>`).join('');

      ${grid}<path d="${area}" fill="url(#pfg)"/><path class="pf-line" d="${line}" fill="none" stroke="var(--chart-axis)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
      <line class="pf-guide" x1="0" y1="${PADT}" x2="0" y2="${PADT+ih}" stroke="var(--chart-axis)" stroke-width="1" stroke-dasharray="4 4" opacity="0"/>
      <circle class="pf-dot" r="5" fill="var(--card)" stroke="var(--chart-axis)" stroke-width="2.4" opacity="0"/>
      ${hits}${lbl}
    </svg><div class="bal-tip" id="pfTip"></div></div></div>`;
}

  let d='M'+X(0).toFixed(1)+' '+Y(data[0]).toFixed(1);
  for(let i=1;i<data.length;i++){d+=' L'+X(i).toFixed(1)+' '+Y(data[i-1]).toFixed(1)+' L'+X(i).toFixed(1)+' '+Y(data[i]).toFixed(1);}
  const area=d+` L${X(data.length-1).toFixed(1)} ${(PADT+ih).toFixed(1)} L${X(0).toFixed(1)} ${(PADT+ih).toFixed(1)} Z`;
  const grid=[0,.25,.5,.75,1].map(f=>{const gy=PADT+ih-f*ih,val=Math.round(mxNice*f);
    return `<line x1="${PADX}" y1="${gy.toFixed(1)}" x2="${W-PADX}" y2="${gy.toFixed(1)}" stroke="var(--line)" stroke-width="1" stroke-dasharray="4 5"/><text x="${(PADX-10)}" y="${(gy+3).toFixed(1)}" text-anchor="end" font-size="9" fill="var(--faint)" font-family="Cairo">${val}K</text>`;}).join('');
  const lbl=labels.map((dd,i)=>`<text x="${X(i).toFixed(1)}" y="${H-9}" text-anchor="middle" font-size="9.5" fill="var(--faint)" font-weight="600" font-family="Cairo">${dd}</text>`).join('');
  const step=iw/(data.length-1);
  const hits=labels.map((dd,i)=>`<rect class="rv-hit" x="${(X(i)-step/2).toFixed(1)}" y="${PADT}" width="${step.toFixed(1)}" height="${ih}" fill="transparent" data-l="${dd}" data-v="${data[i]}K ر.س" data-x="${X(i).toFixed(1)}" data-y="${Y(data[i]).toFixed(1)}"/>`).join('');
  return `<div class="card"><div class="card-head" style="align-items:flex-start"><div class="card-title">اتجاه الإيرادات<span class="sub">الإيراد عبر الوقت</span></div>${filter}</div>
    <div class="rv-wrap" id="ecRevWrap"><svg class="rv-svg" viewBox="0 0 ${W} ${H}">
      <defs><linearGradient id="rvg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#4E5D57" stop-opacity=".14"/><stop offset="1" stop-color="#4E5D57" stop-opacity="0"/></linearGradient></defs>
      ${grid}<path d="${area}" fill="url(#rvg)"/><path class="rv-line" d="${d}" fill="none" stroke="var(--chart-axis)" stroke-width="2.2" stroke-linejoin="round"/>
      <line class="rv-guide" x1="0" y1="${PADT}" x2="0" y2="${PADT+ih}" stroke="var(--chart-axis)" stroke-width="1" stroke-dasharray="4 4" opacity="0"/>
      <circle class="rv-dot" r="5" fill="var(--card)" stroke="var(--chart-axis)" stroke-width="2.4" opacity="0"/>
      ${hits}${lbl}
    </svg><div class="rv-tip" id="ecRevTip"></div></div></div>`;
}

function finLineChart(id,tipId,series,labels,colors,names){

  const grid=[0,.5,1].map(f=>{const gy=PADT+ih-f*ih;return `<line x1="${PADX}" y1="${gy.toFixed(1)}" x2="${W-PADX}" y2="${gy.toFixed(1)}" stroke="var(--line-soft)" stroke-width="1"/>`;}).join('');

/* status is DERIVED from achievement + time remaining — not a hardcoded label */
function tgStatus(t){
  const ach=t.target? t.actual/t.target*100 : 0;
  const today=new Date('2026-07-13'), due=new Date(t.due);
  const daysLeft=Math.round((due-today)/86400000);
  if(ach>=100) return {k:'done', ar:"محقّق", c:'var(--success)', bg:'var(--success-bg)'};
  if(daysLeft<0) return {k:'miss', ar:"فات الموعد", c:'var(--error)', bg:'var(--error-bg)'};
  /* pace check: is it on track to land by the due date? */
  if(ach>=85) return {k:'track', ar:"على المسار", c:'var(--success)', bg:'var(--success-bg)'};
  if(ach>=60 || daysLeft>60) return {k:'risk', ar:"معرّض للخطر", c:'var(--warning)', bg:'var(--warning-bg)'};
  return {k:'behind', ar:"متأخر", c:'var(--error)', bg:'var(--error-bg)'};
}

function aiFacts(){
  const kpi=id=>KPIS.find(k=>k.id===id)||{};
  const branches=BRANCHES.slice().sort((a,b)=>b.perf-a.perf);
  const best=branches[0], worst=branches[branches.length-1];
  const avgPerf=branches.reduce((a,b)=>a+b.perf,0)/branches.length;
  const under=branches.filter(b=>b.perf<80);
  const down=BRANCHES.filter(b=>b.dir==='down');
  const topKarat=KARATS.slice().sort((a,b)=>b.rev-a.rev)[0];
  const win=dpLabel();
  return {kpi,branches,best,worst,avgPerf,under,down,topKarat,win,
    sales:kpi('sales'), purch:kpi('purch'), margin:kpi('margin'), avg:kpi('avg')};
}

/* Each answer is BUILT from data — no canned prose with fake numbers. */
function aiAnswer(q){
  const F=aiFacts(); const s=q.trim();
  const has=(...ws)=>ws.some(w=>s.includes(w));

  // ---- today's summary / executive report ----
  if(has("ملخص","اليوم","تقرير تنفيذي","summary","today","executive")){
    const cards=[

      aiKpiCard("المشتريات", dpNum(F.purch.val,false)+" "+F.purch.cur, F.purch.chg, F.purch.dir),
      aiKpiCard("هامش الربح", F.margin.val+"%", F.margin.chg, F.margin.dir),
      aiKpiCard("متوسط الفاتورة", F.avg.val+" "+F.avg.cur, F.avg.chg, F.avg.dir),
    ];
    return {t:`خلال ${F.win}: المبيعات ${dpNum(F.sales.val,false)} ${F.sales.cur} (${F.sales.chg}) وهامش الربح ${F.margin.val}% (${F.margin.chg}). `
      +`أفضل فرع ${F.best.name} بأداء ${F.best.perf}%، وأضعفها ${F.worst.name} بـ ${F.worst.perf}%. `
      +`متوسط أداء الفروع ${F.avgPerf.toFixed(1)}%.`,
      cards, chart:{k:'spark', v:F.sales.spark, lbl:"اتجاه المبيعات"}};
  }
  // ---- why did sales change? ----
  if(has("لماذا","انخفاض","سبب","تراجع","why","decrease","drop")){
    const dirWord = F.sales.dir==='up' ? "ارتفعت" : "انخفضت";
    const drivers=[];
    if(F.avg.dir==='down') drivers.push(`متوسط الفاتورة ${F.avg.chg} — عملاء يشترون أقل لكل زيارة`);
    if(F.down.length) drivers.push(`${F.down.length} فروع في تراجع: ${F.down.map(b=>b.name).join('، ')}`);
    if(F.under.length) drivers.push(`${F.under.length} فروع دون 80% من المستهدف`);
    ATTN.slice(0,2).forEach(a=>drivers.push(a.t+" — "+a.d));
    return {t:`المبيعات ${dirWord} ${F.sales.chg} خلال ${F.win} (${dpNum(F.sales.val,false)} ${F.sales.cur}). `
      +(F.sales.dir==='up'
        ? `الاتجاه العام إيجابي، لكن هناك نقاط تستحق الانتباه:`
        : `الأسباب المرجّحة بحسب البيانات الحالية:`),
      cards:drivers.slice(0,4).map(d=>aiKpiCard("",d,"",F.sales.dir))};
  }
  // ---- best branch ----
  if(has("أفضل فرع","أفضل الفروع","الأفضل","أعلى فرع","best branch","top branch","best perform")){
    const top3=F.branches.slice(0,3);
    return {t:`أفضل فرع هو ${F.best.name} (${F.best.city}) بأداء ${F.best.perf}% ومبيعات ${F.best.sales} م ر.س ونمو ${F.best.growth}. `
      +`مديره ${F.best.mgr}.`,
      cards:top3.map((b,i)=>aiKpiCard(`#${i+1} ${b.name}`, b.perf+"%", `${b.sales} م ر.س · ${b.growth}`, b.dir)),
      chart:{k:'bars', v:top3.map(b=>({l:b.name,v:b.perf})), lbl:"أداء الفروع"}};
  }
  // ---- underperforming ----
  if(has("أضعف","دون المستهدف","متعثر","underperform","worst","below target")){
    const low=F.branches.slice(-3).reverse();
    return {t:F.under.length
      ? `${F.under.length} فروع دون 80%: ${F.under.map(b=>`${b.name} (${b.perf}%)`).join('، ')}. الأدنى ${F.worst.name} بـ ${F.worst.perf}%.`
      : `لا يوجد فرع تحت 80%. الأدنى حاليًا ${F.worst.name} بأداء ${F.worst.perf}% — ضمن النطاق المقبول.`,
      cards:low.map(b=>aiKpiCard(b.name, b.perf+"%", `${b.sales} م ر.س · ${b.growth}`, b.dir)),
      chart:{k:'bars', v:low.map(b=>({l:b.name,v:b.perf})), lbl:"الفروع الأدنى"}};
  }
  // ---- financial overview ----
  if(has("مالية","مالي","الإيرادات","المصروفات","financial","finance","revenue")){
    const profit=(+F.sales.val - +F.purch.val).toFixed(1);
    return {t:`خلال ${F.win}: الإيرادات ${dpNum(F.sales.val,false)} م ر.س والمشتريات ${dpNum(F.purch.val,false)} م ر.س، `
      +`بفارق ${dpNum(profit,false)} م ر.س وهامش ${F.margin.val}% (${F.margin.chg}).`,
      cards:[
        aiKpiCard("الإيرادات", dpNum(F.sales.val,false)+" م ر.س", F.sales.chg, F.sales.dir),
        aiKpiCard("المشتريات", dpNum(F.purch.val,false)+" م ر.س", F.purch.chg, F.purch.dir),
        aiKpiCard("هامش الربح", F.margin.val+"%", F.margin.chg, F.margin.dir),
      ]};
  }
  // ---- inventory ----
  if(has("مخزون","نفاد","inventory","stock")){
    const low=FC_RESTOCK?FC_RESTOCK.slice(0,3):[];
    return {t:low.length
      ? `${low.length} أصناف تحتاج إعادة تخزين قريبًا. أعلى مخزون: ${F.topKarat.k} بـ ${F.topKarat.inv}.`
      : `المخزون ضمن الحدود. أعلى رصيد ${F.topKarat.k} (${F.topKarat.inv}).`,
      cards:low.map(r=>aiKpiCard(r.n||r.name||"صنف", r.d||r.days||"—", r.q||r.need||"", 'down'))};
  }
  // ---- comparison ----
  if(has("مقارنة","الشهر الماضي","الفترة السابقة","compare","last month")){
    return {t:`مقارنة ${F.win} بالفترة السابقة: المبيعات ${F.sales.chg}، المشتريات ${F.purch.chg}، `
      +`هامش الربح ${F.margin.chg}، ومتوسط الفاتورة ${F.avg.chg}. `
      +(F.avg.dir==='down' ? `الانتباه: متوسط الفاتورة يتراجع رغم نمو المبيعات — النمو مدفوع بعدد الطلبات لا بقيمتها.`
                           : `النمو متوازن بين عدد الطلبات وقيمتها.`),
      cards:[F.sales,F.purch,F.margin,F.avg].map(k=>aiKpiCard(k.ar, k.val+" "+(k.cur||''), k.chg, k.dir))};
  }
  // ---- targets ----
  if(has("مستهدف","الأهداف","هدف","target","goal")){
    const hit=F.branches.filter(b=>b.perf>=100).length;
    return {t:`${hit} من ${F.branches.length} فروع تجاوزت مستهدفها. متوسط التحقيق ${F.avgPerf.toFixed(1)}%. `
      +`${F.under.length?`${F.under.length} فروع تحت 80% وتحتاج تدخلًا.`:'لا توجد فروع حرجة.'}`,
      cards:F.branches.slice(0,4).map(b=>aiKpiCard(b.name, b.perf+"%", b.status, b.dir)),
      chart:{k:'radial', v:Math.round(F.avgPerf), lbl:"متوسط التحقيق"}};
  }
  // ---- risks & opportunities ----
  if(has("مخاطر","فرص","risk","opportunit")){
    return {t:`أبرز المخاطر والفرص بحسب البيانات الحالية:`,
      cards:[...ATTN.slice(0,2).map(a=>aiKpiCard("⚠ "+a.t,a.d,"",'down')),
             ...OPPS.slice(0,2).map(o=>aiKpiCard("✦ "+o.t,o.d,"",'up'))]};
  }
  // ---- recommendations ----
  if(has("توصيات","اقترح","حسّن","recommend","improve","action")){
    const recs=[];
    if(F.under.length) recs.push(`راجع ${F.under.map(b=>b.name).join('، ')} — دون 80% من المستهدف.`);
    if(F.avg.dir==='down') recs.push(`متوسط الفاتورة ${F.avg.chg} — فعّل البيع المتقاطع ورفع قيمة السلة.`);
    recs.push(`${F.topKarat.k} يقود الإيرادات (${F.topKarat.rev} م ر.س) — ارفع مخزونه.`);
    if(F.best) recs.push(`عمّم ممارسات ${F.best.name} (${F.best.perf}%) على بقية الفروع.`);
    return {t:`توصيات مبنية على أداء ${F.win}:`,
      cards:recs.slice(0,4).map((r,i)=>aiKpiCard("توصية "+(i+1), r, "", 'up'))};
  }
  // ---- fallback: honest, not a fabricated answer ----
  return {t:`لم أفهم السؤال تمامًا. أستطيع الإجابة عن: المبيعات، الإيرادات والأرباح، الفروع وأدائها، `
    +`المخزون، المستهدفات، المقارنات الزمنية، والمخاطر والفرص. جرّب أحد الاقتراحات بالأسفل.`,
    cards:[]};
}

function aiChart(c){
  if(!c) return '';
  if(c.k==='spark'){
    const v=c.v, mx=Math.max(...v), mn=Math.min(...v), W=232,H=44;
    const pts=v.map((x,i)=>[8+i/(v.length-1)*(W-16), H-6-((x-mn)/((mx-mn)||1))*(H-14)]);
    const d=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
    return `<div class="ai-chart"><div class="ai-chart-l">${c.lbl}</div>
      <svg viewBox="0 0 ${W} ${H}"><path d="${d} L${W-8} ${H-4} L8 ${H-4} Z" fill="var(--fc-1)" opacity=".13"/>
      <path d="${d}" fill="none" stroke="var(--fc-1)" stroke-width="2" stroke-linecap="round"/></svg></div>`;
  }
  if(c.k==='bars'){
    const mx=Math.max(...c.v.map(x=>x.v));
    return `<div class="ai-chart"><div class="ai-chart-l">${c.lbl}</div>
      ${c.v.map(x=>`<div class="ai-bar"><span>${x.l}</span>
        <i><b style="width:${(x.v/mx*100).toFixed(0)}%"></b></i><em>${x.v}%</em></div>`).join('')}</div>`;
  }
  if(c.k==='radial'){
    const r=26, C=2*Math.PI*r, off=C*(1-c.v/100);
    return `<div class="ai-chart ai-rad"><svg viewBox="0 0 68 68">
      <circle cx="34" cy="34" r="${r}" fill="none" stroke="var(--chart-track)" stroke-width="7"/>
      <circle cx="34" cy="34" r="${r}" fill="none" stroke="var(--fc-1)" stroke-width="7"
        stroke-linecap="round" stroke-dasharray="${C.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}"
        transform="rotate(-90 34 34)"/>
      <text x="34" y="38" text-anchor="middle" font-size="14" font-weight="800"
        fill="var(--ink)" font-family="Cairo">${c.v}%</text></svg>
      <div class="ai-chart-l">${c.lbl}</div></div>`;
  }
  return '';
}

function karatTrendChart(){
  const D=KA_TREND[KA_RANGE],labels=D.labels;
  const shown=KA_KARAT==='all'?Object.keys(D.series):[KA_KARAT];
  const rng=[['week','أسبوع'],['month','شهر'],['quarter','ربع']];
  const filter=`<div class="sec-filter" id="karatRange" style="margin-inline-start:auto">${rng.map(r=>`<button data-r="${r[0]}" class="${KA_RANGE===r[0]?'on':''}">${r[1]}</button>`).join('')}</div>`;
  const all=shown.flatMap(s=>D.series[s]),mx=Math.max(...all)*1.15,mn=Math.min(...all)*0.5;
  const W=720,H=250,PADX=22,PADT=16,PADB=28,iw=W-PADX*2,ih=H-PADT-PADB;
  const X=i=>PADX+i/(labels.length-1)*iw,Y=v=>PADT+ih-((v-mn)/(mx-mn||1))*ih;
  const grid=[0,.5,1].map(f=>{const gy=PADT+ih-f*ih;return `<line x1="${PADX}" y1="${gy.toFixed(1)}" x2="${W-PADX}" y2="${gy.toFixed(1)}" stroke="var(--line-soft)" stroke-width="1"/>`;}).join('');
  const lines=shown.map(s=>`<path d="${smoothPath(D.series[s].map((v,i)=>[X(i),Y(v)]))}" fill="none" stroke="${KA_COL[s]}" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>`).join('');
  const lbl=labels.map((d,i)=>`<text x="${X(i).toFixed(1)}" y="${H-8}" text-anchor="middle" font-size="9.5" fill="var(--faint)" font-weight="600" font-family="Cairo">${d}</text>`).join('');
  const step=iw/(labels.length-1);
  const hits=labels.map((d,i)=>`<rect class="kt-hit" x="${(X(i)-step/2).toFixed(1)}" y="${PADT}" width="${step.toFixed(1)}" height="${ih}" fill="transparent" data-l="${d}" data-x="${X(i).toFixed(1)}" data-vals="${shown.map(s=>s+'§'+D.series[s][i]).join('|')}"/>`).join('');
  const legend=`<div class="cg-legend">${shown.map(s=>`<span><i style="background:${KA_COL[s]}"></i>${s}</span>`).join('')}</div>`;
  return `<div class="card"><div class="card-head" style="align-items:flex-start"><div class="card-title">اتجاه مبيعات العيار<span class="sub">اتجاه مبيعات كل عيار عبر الوقت</span></div>${filter}</div>${legend}
    <div class="et-wrap" id="karatTrendWrap"><svg class="et-svg" viewBox="0 0 ${W} ${H}">${grid}${lines}
      <line class="kt-guide" x1="0" y1="${PADT}" x2="0" y2="${PADT+ih}" stroke="var(--muted)" stroke-width="1" stroke-dasharray="3 3" opacity="0"/>
      ${hits}${lbl}
    </svg><div class="cg-tip" id="karatTrendTip"></div></div></div>`;
}
function karatBranchChart(){
  const ALLK=["عيار 24","عيار 21","عيار 22","عيار 18"];
  const karats = KA_KARAT==='all' ? ALLK : [KA_KARAT];
  const CITYMAP={"الرياض":["العليا","طريق الملك"],"جدة":["جدة الكورنيش","الحمراء"],"الدمام":["الدمام","الخبر"]};
  let data=KA_BRANCH_DATA.slice();
  if(KA_CITY!=='all' && CITYMAP[KA_CITY]) data=data.filter(d=>CITYMAP[KA_CITY].includes(d.b));
  if(!data.length) data=KA_BRANCH_DATA.slice();

  const totOf=d=>karats.reduce((a,k)=>a+d.v[k],0);
  if(KB_SORT==='asc') data.sort((a,b)=>totOf(a)-totOf(b));
  else data.sort((a,b)=>totOf(b)-totOf(a));      // default: highest first, like the reference

  const CELLS=6;                                  // stepped cells per row
  const tots=data.map(totOf);
  const mx=Math.max(...tots), mn=Math.min(...tots);
  /* Spread the staircase across the ACTUAL min..max range. Scaling from 0
     compresses everything into 4..6 cells (the branches are 35..58, all
     similar) and the stepped effect is lost — the top branch gets all 6 and
     the bottom still gets 4. Ranking from mn..mx restores a readable ladder. */
  const rank=t=> mx===mn ? CELLS : 2 + Math.round((t-mn)/(mx-mn)*(CELLS-2));
  const rows=data.map(d=>{
    const t=totOf(d);
    const filled=Math.max(2,Math.min(CELLS,rank(t)));
    const cells=Array.from({length:CELLS},(_,i)=>{
      const on=i<filled, last=(i===filled-1);
      const cls='kbc'+(on?' on s'+i:'')+(last?' last':'');
      /* the value label lives inside the final filled cell, as in the reference */
      return `<div class="${cls}">${last?`<span class="kbc-val">${t}</span>`:''}</div>`;
    }).join('');
    const parts=karats.map(k=>k+'§'+d.v[k]).join('|');
    return `<div class="kb-row" data-b="${d.b}" data-tot="${t}" data-vals="${parts}">
        <div class="kb-name">${d.b}</div>
        <div class="kb-cells">${cells}</div>
      </div>`;
  }).join('');

  const sortSw=`<div class="sec-filter" id="kbSort" style="margin-inline-start:auto">
    <button data-s="desc" class="${KB_SORT!=='asc'?'on':''}">الأعلى</button>
    <button data-s="asc" class="${KB_SORT==='asc'?'on':''}">الأدنى</button></div>`;

  return `<div class="card"><div class="card-head" style="align-items:flex-start;flex-wrap:wrap;gap:8px">
      <div class="card-title">أداء العيار حسب الفرع<span class="sub">إجمالي مبيعات كل فرع (م ر.س) · مرّر للتفاصيل</span></div>
      ${sortSw}
    </div>
    <div class="kb-list" id="karatBranchWrap">${rows}<div class="camp-tip" id="karatBranchTip"></div></div>
  </div>`;
}
function karatWeightChart(){
  const rows = KA_KARAT==='all' ? KARATS : KARATS.filter(k=>k.k===KA_KARAT);
  const data=rows.map(k=>k.wN), labels=rows.map(k=>k.k);
  const mx=Math.max(...data), mxScale=mx*1.18, n=data.length;
  const W=560,H=210,PADL=42,PADR=12,PADT=14,PADB=30;
  const iw=W-PADL-PADR, ih=H-PADT-PADB, gap=n>1?10:0;
  const bw=Math.min(74,(iw-gap*(n-1))/n);
  const total=data.reduce((a,b)=>a+b,0);
  /* محور Y — الشارت السابق ما كان فيه أي مرجع رقمي */
  const ticks=[0,.5,1].map(f=>{
    const gy=PADT+ih-f*ih;
    return `<line x1="${PADL}" y1="${gy.toFixed(1)}" x2="${W-PADR}" y2="${gy.toFixed(1)}" stroke="var(--chart-grid)" stroke-width="1"/>
      <text x="${PADL-7}" y="${(gy+3.5).toFixed(1)}" text-anchor="end" font-size="9" fill="var(--chart-label)" font-weight="600" font-family="Cairo">${Math.round(mxScale*f)}</text>`;
  }).join('');
  const bars=data.map((v,i)=>{
    const bh=(v/mxScale)*ih, x=PADL+i*(bw+gap)+(iw-(bw*n+gap*(n-1)))/2, y=PADT+ih-bh;
    const share=total?(v/total*100).toFixed(0):0;
    return `<g class="kw-bar" data-k="${labels[i]}" data-v="${v}" data-share="${share}">
      <rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${bh.toFixed(1)}" rx="5" fill="${KA_COL[labels[i]]||'var(--data-1)'}"/>
      <text x="${(x+bw/2).toFixed(1)}" y="${(y-6).toFixed(1)}" text-anchor="middle" font-size="10.5" font-weight="800" fill="var(--ink)" font-family="Cairo">${v.toLocaleString('en-US')}</text>
      <text x="${(x+bw/2).toFixed(1)}" y="${H-9}" text-anchor="middle" font-size="9.5" fill="var(--chart-label)" font-weight="700" font-family="Cairo">${labels[i]}</text>
    </g>`;
  }).join('');
  return `<div class="card"><div class="card-head"><div class="card-title">الوزن المُباع حسب العيار<span class="sub">إجمالي الجرامات المباعة لكل عيار (كجم) · الإجمالي ${total.toLocaleString('en-US')}</span></div></div>
    <div class="kw-wrap"><svg class="col-chart" viewBox="0 0 ${W} ${H}">${ticks}${bars}</svg></div></div>`;
}

  const W=720,H=230,PADX=22,PADT=18,PADB=28,mx=Math.max(...data)*1.15,mn=Math.min(...data)*0.6;
  const iw=W-PADX*2,ih=H-PADT-PADB,X=i=>PADX+i/(data.length-1)*iw,Y=v=>PADT+ih-((v-mn)/(mx-mn||1))*ih;
  const pts=data.map((v,i)=>[X(i),Y(v)]),line=smoothPath(pts),area=line+` L${X(data.length-1).toFixed(1)} ${(PADT+ih).toFixed(1)} L${X(0).toFixed(1)} ${(PADT+ih).toFixed(1)} Z`;

function segArc(cx,cy,r,ri,a0,a1){
  const x0=cx+r*Math.cos(a0),y0=cy+r*Math.sin(a0),x1=cx+r*Math.cos(a1),y1=cy+r*Math.sin(a1);
  const xi1=cx+ri*Math.cos(a1),yi1=cy+ri*Math.sin(a1),xi0=cx+ri*Math.cos(a0),yi0=cy+ri*Math.sin(a0);
  const large=(a1-a0)>Math.PI?1:0;
  return `M${x0.toFixed(2)} ${y0.toFixed(2)} A${r} ${r} 0 ${large} 1 ${x1.toFixed(2)} ${y1.toFixed(2)} L${xi1.toFixed(2)} ${yi1.toFixed(2)} A${ri} ${ri} 0 ${large} 0 ${xi0.toFixed(2)} ${yi0.toFixed(2)} Z`;
}

/* smooth curve through points (Catmull-Rom -> cubic bezier) */
function fcSmooth(pts){
  if(pts.length<2) return '';
  let d='M'+pts[0][0].toFixed(1)+' '+pts[0][1].toFixed(1);
  for(let i=0;i<pts.length-1;i++){
    const p0=pts[i-1]||pts[i], p1=pts[i], p2=pts[i+1], p3=pts[i+2]||p2;
    const t=0.5;                                  // tension: calm, not wobbly
    const c1x=p1[0]+(p2[0]-p0[0])/6*t, c1y=p1[1]+(p2[1]-p0[1])/6*t;
    const c2x=p2[0]-(p3[0]-p1[0])/6*t, c2y=p2[1]-(p3[1]-p1[1])/6*t;
    d+=` C${c1x.toFixed(1)} ${c1y.toFixed(1)}, ${c2x.toFixed(1)} ${c2y.toFixed(1)}, ${p2[0].toFixed(1)} ${p2[1].toFixed(1)}`;
  }
  return d;
}
function fcChart(){
  const S=FC_SERIES[FC_METRIC];
  const cur=[...S.hist,...S.fc];                  // this period (10 pts)
  const prev=S.prev.slice(0,cur.length);          // last period
  const labels=[...FC_MONTHS,...FC_FUT];
  const n=cur.length;
  const W=760,H=250,PL=52,PR=18,PT=18,PB=34;
  const iw=W-PL-PR, ih=H-PT-PB;
  const all=[...cur,...prev];
  let mn=Math.min(...all), mx=Math.max(...all);
  const pad=(mx-mn)*0.18||1; mn=Math.max(0,mn-pad); mx=mx+pad;
  const X=i=>PL+(n===1?iw/2:i/(n-1)*iw);
  const Y=v=>PT+ih-((v-mn)/(mx-mn))*ih;
  const P1=cur.map((v,i)=>[X(i),Y(v)]), P2=prev.map((v,i)=>[X(i),Y(v)]);
  const line1=fcSmooth(P1), line2=fcSmooth(P2);
  const areaOf=(d,pts)=>d+` L${pts[pts.length-1][0].toFixed(1)} ${(PT+ih).toFixed(1)} L${pts[0][0].toFixed(1)} ${(PT+ih).toFixed(1)} Z`;

  /* very light grid + minimal axis, per the reference */
  const grid=[0,.25,.5,.75,1].map(f=>{
    const gy=PT+ih-f*ih, val=mn+(mx-mn)*f;
    return `<line class="fc-grid" x1="${PL}" y1="${gy.toFixed(1)}" x2="${W-PR}" y2="${gy.toFixed(1)}"/>
      <text class="fc-ylbl" x="${PL-10}" y="${(gy+3.5).toFixed(1)}" text-anchor="end">${Math.round(val)}</text>`;
  }).join('');
  /* vertical dashed guides, like the reference */
  const vlines=labels.map((_,i)=> i%3===0&&i>0
    ? `<line class="fc-vline" x1="${X(i).toFixed(1)}" y1="${PT}" x2="${X(i).toFixed(1)}" y2="${(PT+ih).toFixed(1)}"/>`:'').join('');
  const xlbl=`<text class="fc-xlbl" x="${PL}" y="${H-10}" text-anchor="start">${labels[0]}</text>
    <text class="fc-xlbl" x="${W-PR}" y="${H-10}" text-anchor="end">${labels[n-1]}</text>`;

  /* hit zones drive the hover highlight + tooltip */
  const hits=labels.map((_,i)=>`<rect class="fc-hit" x="${(X(i)-iw/(n-1)/2).toFixed(1)}" y="${PT}"
      width="${(iw/(n-1)).toFixed(1)}" height="${ih.toFixed(1)}" fill="transparent"
      data-i="${i}" data-x="${X(i).toFixed(1)}"
      data-y1="${Y(cur[i]).toFixed(1)}" data-y2="${Y(prev[i]).toFixed(1)}"
      data-v1="${cur[i]}" data-v2="${prev[i]}" data-lbl="${labels[i]}"></rect>`).join('');

  /* inventory trends DOWN (-8.7%) — a green up-badge would be plainly wrong,
     so the badge follows the actual sign. */
  const gRaw=((cur.at(-1)-prev.at(-1))/prev.at(-1))*100;
  const gUp=gRaw>=0, growth=(gUp?'+':'−')+Math.abs(gRaw).toFixed(1);
  const metricSel=`<select class="fc-sel" id="fcMetricSel">
    ${Object.entries(FC_SERIES).map(([k,v])=>`<option value="${k}" ${FC_METRIC===k?'selected':''}>${v.ar}</option>`).join('')}
  </select>`;
  const scopeSel=`<select class="fc-sel" id="fcScopeSel">
    <option value="all">كل الفئات</option><option value="rings">خواتم</option>
    <option value="bars">سبائك</option><option value="sets">أطقم</option></select>`;

  return `<div class="fc-card">
    <div class="fc-head">
      <div>
        <div class="fc-eyebrow">${S.ar} المتوقعة</div>
        <div class="fc-metric">${cur.at(-1)}<span class="fc-unit">${S.unit}</span>
          <span class="fc-growth ${gUp?'up':'down'}">${svg(gUp?'up':'down','fc-ga')}${growth}%</span></div>
      </div>
      <div class="fc-acc">${svg('perf','ic-sm')}<span>دقة ${S.acc}</span></div>
    </div>
    <div class="fc-ctrl">
      <div class="fc-sels">${metricSel}${scopeSel}</div>
      <div class="fc-legend">
        <span><i class="d1"></i>الفترة الحالية</span>
        <span><i class="d2"></i>الفترة السابقة</span>
      </div>
    </div>
    <div class="fc-plot" id="fcPlot">
      <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" class="fc-svg">
        <defs>
          <linearGradient id="fcG1" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="var(--fc-1)" stop-opacity="0.26"/>
            <stop offset="100%" stop-color="var(--fc-1)" stop-opacity="0"/>
          </linearGradient>
          <linearGradient id="fcG2" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="var(--fc-2)" stop-opacity="0.16"/>
            <stop offset="100%" stop-color="var(--fc-2)" stop-opacity="0"/>
          </linearGradient>
        </defs>
        ${grid}${vlines}
        <path class="fc-area" d="${areaOf(line2,P2)}" fill="url(#fcG2)"/>
        <path class="fc-area" d="${areaOf(line1,P1)}" fill="url(#fcG1)"/>
        <path class="fc-l2" d="${line2}"/>
        <path class="fc-l1" d="${line1}"/>
        <line class="fc-cursor" id="fcCursor" y1="${PT}" y2="${(PT+ih).toFixed(1)}"/>
        <circle class="fc-dot d2" id="fcDot2" r="5"/>
        <circle class="fc-dot d1" id="fcDot1" r="5"/>
        ${hits}${xlbl}
      </svg>
      <div class="fc-tip" id="fcTip"></div>
    </div>
  </div>`;
}

/* Searchable dropdown. Native <select> can't do in-list search, custom hover
   states, or a clear affordance — which is what the redesign calls for. */
function ddown(id,val,opts,ph,opt){
  opt=opt||{};
  const open=DD_OPEN===id;
  const q=(DD_Q[id]||'').trim();
  const list=q?opts.filter(o=>o.t.includes(q)||o.t.toLowerCase().includes(q.toLowerCase())):opts;
  const cur=opts.find(o=>o.v===val);
  const active=val!=='all';
  const searchable=opt.search!==false && opts.length>=6;
  return `<div class="dd ${open?'open':''} ${active?'has':''}" data-dd="${id}">
    <button class="dd-btn" data-ddt="${id}" aria-haspopup="listbox" aria-expanded="${open}">
      <span class="dd-lbl">${cur?cur.t:ph}</span>
      ${active?`<span class="dd-x" data-ddclear="${id}" role="button" aria-label="مسح">${svg('close','ic-xs')}</span>`:''}
      ${svg('chevd','dd-cv')}

    <div class="dd-pop" role="listbox">

        <input class="dd-inp" data-ddq="${id}" value="${q}" placeholder="بحث…"></div>`:''}
      <div class="dd-scroll">
        <button class="dd-opt ${val==='all'?'on':''}" data-ddv="${id}|all">
          <span>${ph}</span>${val==='all'?svg('check','dd-tick'):''}</button>
        ${list.length?list.map(o=>`<button class="dd-opt ${val===o.v?'on':''}" data-ddv="${id}|${o.v}">
          <span>${o.t}</span>${val===o.v?svg('check','dd-tick'):''}</button>`).join('')
          :`<div class="dd-empty">لا توجد نتائج</div>`}
      </div>
    </div>
  </div>`;
}

function nuValidate(){
  const e={};
  const name=NU.name.trim();
  if(!name) e.name="الاسم الكامل مطلوب";
  else if(name.split(/\s+/).length<2) e.name="أدخل الاسم الأول واسم العائلة";
  const em=NU.email.trim();
  if(!em) e.email="البريد الإلكتروني مطلوب";
  else if(!/^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(em)) e.email="صيغة البريد غير صحيحة";
  else if(USERS.some(u=>u.e.toLowerCase()===em.toLowerCase() && u.e!==NU_EDIT)) e.email="هذا البريد مستخدم بالفعل";
  const ph=NU.phone.trim();
  if(!ph) e.phone="رقم الجوال مطلوب";
  else if(!/^(\+?966|0)?5\d{8}$/.test(ph.replace(/[\s-]/g,''))) e.phone="رقم جوال سعودي غير صالح";
  if(NU.empId.trim() && !/^[A-Za-z0-9-]{3,12}$/.test(NU.empId.trim())) e.empId="3–12 حرفًا/رقمًا";
  if(!NU.title.trim()) e.title="المسمى الوظيفي مطلوب";
  if(!NU.dept)   e.dept="اختر القسم";
  if(!NU.branch) e.branch="اختر الفرع";
  if(!NU.role)   e.role="اختر الدور";
  if(!NU_EDIT && NU.cred==='pwd'){
    if(!NU.pwd) e.pwd="كلمة المرور المؤقتة مطلوبة";
    else if(NU.pwd.length<8) e.pwd="8 أحرف على الأقل";
    else if(!/[A-Za-z]/.test(NU.pwd)||!/\d/.test(NU.pwd)) e.pwd="يجب أن تحتوي أحرفًا وأرقامًا";
  }
  return e;
}
function nuWarnings(){
  const w=[];
  const r=ROLES.find(x=>x.id===NU.role);
  /* تحذيرات صلاحيات — ليست أخطاء تمنع الحفظ */
  if(NU.role==='super') w.push({k:'high',t:"صلاحية كاملة على النظام",d:"سيتمكن من إدارة المدراء وتعديل كل الصلاحيات. راجع الحاجة الفعلية."});
  else if(NU.role==='admin') w.push({k:'high',t:"صلاحيات إدارية عليا",d:"إدارة المستخدمين والإعدادات والتقارير."});
  if((NU.role==='super'||NU.role==='admin'||NU.role==='finance') && !NU.fa)
    w.push({k:'high',t:"التحقق الثنائي معطّل لدور حسّاس",d:"يُنصح بشدة بتفعيله لهذا الدور."});
  if(NU.cred==='pwd' && NU.status==='active')
    w.push({k:'mid',t:"كلمة مرور مؤقتة",d:"سيُطلب من المستخدم تغييرها عند أول تسجيل دخول."});
  if(r && NU.role) w.push({k:'info',t:`سيحصل على ${r.perms} صلاحية`,d:r.d});
  return w;
}

function UsersPage(){
  const all=USERS.length;
  const act=USERS.filter(u=>u.st==='active').length;
  const ina=USERS.filter(u=>u.st==='inactive').length;
  const adm=USERS.filter(u=>u.r==='super'||u.r==='admin').length;
  const pen=USERS.filter(u=>u.st==='pending').length;
  const KPIS=[
    {id:'u_all', ar:"إجمالي المستخدمين", val:String(all), cur:"", dir:"up", chg:"+3", sub:"هذا الشهر", icon:"users", spark:[11,12,13,14,15,15,16]},
    {id:'u_act', ar:"المستخدمون النشطون", val:String(act), cur:"", dir:"up", chg:"+2", sub:"مقارنة بالشهر السابق", icon:"user", spark:[8,9,9,10,10,11,11]},
    {id:'u_ina', ar:"غير النشطين", val:String(ina), cur:"", dir:"down", chg:"+1", sub:"يحتاجون مراجعة", icon:"offline", spark:[1,1,2,2,2,3,3]},
    {id:'u_adm', ar:"المدراء", val:String(adm), cur:"", dir:"up", chg:"0", sub:"صلاحيات عليا", icon:"target", spark:[2,2,2,2,2,2,2]},
    {id:'u_pen', ar:"دعوات معلّقة", val:String(pen), cur:"", dir:"down", chg:"+2", sub:"بانتظار القبول", icon:"calendar", spark:[0,0,1,1,1,2,2]},
  ];

  /* ---------- Section 2: users table ---------- */
  const data=usFiltered();
  const pages=Math.max(1,Math.ceil(data.length/US_PER));
  const page=Math.min(US_PAGE,pages);
  const slice=data.slice((page-1)*US_PER, page*US_PER);
  const allSel=slice.length>0 && slice.every(u=>US_SEL.includes(u.e));
  const sortTh=(k,label)=>`<th class="us-sort ${US_SORT===k?'on':''}" data-sort="${k}">
      ${label}<span class="us-caret">${US_SORT===k?(US_DIR==='asc'?'▲':'▼'):'⇅'}</span></th>`;
  const rows=slice.map(u=>{
    const st=US_STATUS_META[u.st];
    return `<tr class="${US_SEL.includes(u.e)?'sel':''}">
      <td><label class="us-cb"><input type="checkbox" class="us-row-cb" data-e="${u.e}" ${US_SEL.includes(u.e)?'checked':''}><span></span></label></td>
      <td><div class="us-id"><span class="us-av">${u.n.trim()[0]}</span><b>${u.n}</b></div></td>
      <td class="us-mail">${u.e}</td>
      <td>${usRoleChip(u.r)}</td>
      <td>${u.dp}</td>
      <td>${u.b}</td>
      <td class="us-dim">${u.ll}</td>
      <td><span class="bh-badge" style="background:${st.bg};color:${st.c}">${st.ar}</span></td>
      <td>${u.fa
        ? `<span class="us-2fa on">${svg('check','ic-sm')}مفعّل</span>`
        : `<span class="us-2fa off">${svg('alert','ic-sm')}غير مفعّل</span>`}</td>
      <td><div class="us-acts">
        <button class="us-ico" data-prof="${u.e}" title="الملف الشخصي">${svg('user','ic-sm')}</button>
        <button class="us-ico" data-perm="${u.e}" title="الصلاحيات">${svg('menu','ic-sm')}</button>
        <button class="us-ico danger" data-dis="${u.e}" title="تعطيل" ${u.st==='inactive'?'disabled':''}>${svg('offline','ic-sm')}</button>
      </div></td>
    </tr>`;
  }).join('');

  const bulk=US_SEL.length?`<div class="us-bulk">
      <span class="us-bulk-n">${US_SEL.length} محدد</span>
      <button class="tool" id="usAct">${svg('check','ic-sm')}<span>تفعيل</span></button>
      <button class="tool" id="usDeact">${svg('offline','ic-sm')}<span>تعطيل</span></button>
      <button class="tool" id="usRole">${svg('users','ic-sm')}<span>تعيين دور</span></button>
      <button class="tool danger" id="usDel">${svg('alert','ic-sm')}<span>حذف</span></button>
      <button class="us-clear" id="usClear">إلغاء التحديد</button>
    </div>`:'';

  const table=`<div class="card pos-tbl-card">
    ${bulk}
    <div class="pos-scroll"><table class="pos-table us-table">
      <thead><tr>
        <th style="width:34px"><label class="us-cb"><input type="checkbox" id="usAll" ${allSel?'checked':''}><span></span></label></th>
        ${sortTh('name',"المستخدم")}<th>البريد الإلكتروني</th>${sortTh('role',"الدور")}
        ${sortTh('dept',"القسم")}${sortTh('branch',"الفرع")}${sortTh('login',"آخر دخول")}

      </tr></thead>
      <tbody>${rows||`<tr><td colspan="10" style="text-align:center;color:var(--faint);padding:26px">لا يوجد مستخدمون مطابقون</td></tr>`}</tbody>
    </table></div>
    <div class="us-foot">
      <span class="us-count">${data.length} من ${all} مستخدم</span>
      <div class="us-pg">
        <button class="pg-btn" data-pg="prev" ${page===1?'disabled':''}>السابق</button>
        ${Array.from({length:pages},(_,i)=>`<button class="pg-btn ${i+1===page?'on':''}" data-pg="${i+1}">${i+1}</button>`).join('')}
        <button class="pg-btn" data-pg="next" ${page===pages?'disabled':''}>التالي</button>
      </div>
    </div></div>`;

  /* ---------- Section 3: roles ---------- */
  const roleCards=`<div class="us-roles">${ROLES.map(r=>`
    <div class="us-rcard ${PERM_ROLE===r.id?'on':''}" data-role="${r.id}">
      <div class="us-rtop"><span class="us-rdot" style="background:${r.col}"></span>
        <b>${r.ar}</b><span class="us-rn">${r.users}</span></div>
      <div class="us-rd">${r.d}</div>
      <div class="us-rfoot">${svg('menu','ic-sm')}<span>${r.perms} صلاحية</span></div>
    </div>`).join('')}</div>`;

  /* ---------- Section 4: permission matrix ---------- */
  const role=ROLES.find(r=>r.id===PERM_ROLE)||ROLES[1];
  const def=PERM_DEFAULT[PERM_ROLE]||PERM_DEFAULT.admin;
  const isOn=(ri,ai)=>{const k=ri+'|'+ai+'|'+PERM_ROLE;
    return (k in PERM_STATE) ? PERM_STATE[k] : (ai < def[ri]);};
  const onCount=PERM_RES.reduce((a,_,ri)=>a+PERM_ACT.reduce((b,__,ai)=>b+(isOn(ri,ai)?1:0),0),0);
  const matrix=`<div class="card">
    <div class="card-head">
      <div class="card-title">مصفوفة الصلاحيات<span class="sub">الدور: ${role.ar} · ${onCount} صلاحية مفعّلة من ${PERM_RES.length*PERM_ACT.length}</span></div>

    </div>
    <div class="pos-scroll"><table class="pos-table perm-tbl">
      <thead><tr><th>المورد</th>${PERM_ACT.map(a=>`<th class="pc">${a}</th>`).join('')}</tr></thead>
      <tbody>${PERM_RES.map((res,ri)=>`<tr>
        <td class="perm-res">${res}</td>
        ${PERM_ACT.map((_,ai)=>`<td class="pc">
          <label class="sw"><input type="checkbox" class="perm-cb" data-r="${ri}" data-a="${ai}" ${isOn(ri,ai)?'checked':''}><span class="sw-t"></span></label>
        </td>`).join('')}
      </tr>`).join('')}</tbody>
    </table></div></div>`;

  /* ---------- Section 5: activity ---------- */
  const activity=`<div class="card">
    <div class="card-head"><div class="card-title">أحدث نشاط المستخدمين<span class="sub">سجل التدقيق</span></div></div>

      ${US_ACTIVITY.map(a=>`<div class="tl-item">
        <div class="tl-ic ${a.k==='warn'?'warn':''}">${svg(a.ic,'ic-sm')}</div>
        <div class="tl-body"><div class="tl-t">${a.t} — ${a.w}</div><div class="tl-who">${a.s}</div></div>
        <span class="tl-time">${a.tm}</span>
      </div>`).join('')}
    </div></div>`;

  /* ---------- header filters ---------- */
  const sel=(id,val,opts,ph)=>ddown(id,val,opts,ph);
  const header=`<div class="us-bar">
    <label class="pos-search" style="flex:1;min-width:190px">${svg('search')}
      <input id="usSearch" placeholder="ابحث بالاسم أو البريد أو القسم…" value="${US_Q}"></label>
