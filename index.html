<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منصة إدارة الذهب — الملخص التنفيذي</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FFFEF9;
  --brand:#093D39;
  --brand-2:#0F5049;
  --ink:#0F1A19;
  --muted:#5D6B69;
  --faint:#8A9694;
  --line:#E7E9E3;
  --line-soft:#EFF0EA;
  --card:#FFFFFF;
  --surface:#FBFAF3;
  --up:#1E7A5A;
  --down:#B4483B;
  --gold:#B8912E;
  --gold-soft:#F3EBD3;
  --radius:10px;
  --sidebar-w:256px;
  --density:1;
  --shadow-sm:0 1px 2px rgba(9,61,57,.04), 0 1px 1px rgba(9,61,57,.03);
  --shadow-md:0 2px 8px rgba(9,61,57,.06), 0 1px 2px rgba(9,61,57,.04);
  --heat-1:#EAF0EE;--heat-2:#C4D6D1;--heat-3:#8FB3AC;--heat-4:#4E837A;--heat-5:#1E5A52;--heat-6:#093D39;
  --topbar-bg:rgba(255,254,249,.92);
  --sidebar-bg:var(--brand);
  --map-stroke:#FFFEF9;
  --tip-bg:var(--brand);
  --on-brand:#fff;

  /* --- elevation scale (light) --- */
  --elev-0:#FFFEF9;   /* app background            */
  --elev-1:#FBFAF3;   /* recessed / table headers  */
  --elev-2:#FFFFFF;   /* cards                     */
  --elev-3:#FFFFFF;   /* raised: dropdowns, panels */
  --elev-4:#FFFFFF;   /* overlays: dialogs, tips   */

  /* --- text ramp --- */
  --text-1:#0F1A19;   /* primary   */
  --text-2:#5D6B69;   /* secondary */
  --text-3:#8A9694;   /* tertiary  */
  --text-disabled:#B4BDBB;

  /* --- borders --- */
  --border:#E7E9E3;
  --border-soft:#EFF0EA;
  --border-strong:#D9DED6;

  /* --- interaction states --- */
  --hover-bg:rgba(9,61,57,.04);
  --active-bg:rgba(9,61,57,.08);
  --selected-bg:#F3EBD3;
  --focus-ring:#0F5049;
  --focus-soft:rgba(15,80,73,.13);
  --ai-fab:#0F5049; --ai-bg:#FCFCFB; --ai-bd:#0F5049;
  /* أخضر الهوية كتدرّج بيانات — #093D39 نفسه غير مرئي على الكارت الداكن (1.38:1)
     فيُحتفظ بالدرجة اللونية وتُرفع الإضاءة في الوضع الداكن. */
  --bg-1:#093D39; --bg-2:#0F5049; --bg-3:#166A5F; --bg-4:#1E8A78; --bg-5:#2FAE95;
  --bg-soft:rgba(9,61,57,.10); --bg-line:rgba(9,61,57,.22);
  --fill-hi:#0F5049; --fill-mid:#1E8A78;   /* تعبئة أغمق من المسار في الوضع الفاتح */
  /* تدرّج خلايا الفئات — من الفاتح إلى العميق (كما في المرجع) بأخضر الهوية */
  --cat-1:#CDE8E1; --cat-2:#9DD3C8; --cat-3:#5FB9A9; --cat-4:#2C8F7E; --cat-5:#0F5049;
  --cat-ink:#FFFFFF;
  --accent:#093D39;
  --accent-hover:#0F5049;
  --on-accent:#FFFFFF;

  /* --- status --- */
  --success:#1E7A5A; --success-bg:#F3FAF7; --success-border:#CFE7DD;
  --warning:#B8912E; --warning-bg:#FDF8EC; --warning-border:#EADFBE;
  --error:#B4483B;   --error-bg:#FCF5F4;   --error-border:#F0CFC9;
  --info:#2E6B94;    --info-bg:#F2F8FC;    --info-border:#CFE0EC;

  /* --- charts --- */
  --chart-grid:#EFF0EA;
  --chart-axis:#8A9694;
  --chart-label:#5D6B69;
  --chart-1:#093D39; --chart-2:#B8912E; --chart-3:#2E7D6E;
  --chart-4:#7FA79F; --chart-5:#C9B78E; --chart-6:#4E837A;
  --chart-track:#EFF0EA;
  --medal-2-bg:#DCE6E3; --medal-3-bg:#E9DCC0;
  --row-divider:#EFF0EA;
  --spark-fill:0.08;
  --pin-beige:#E8DCC0;   /* location pin under the CEO name */
  --k24:#C9971F; --k21:#0F5049; --k22:#5FAE9C; --k18:#CFE4DC;
  --kb-empty:#F1F5F3;
  --kb-1:#EAF4F2; --kb-2:#CDE9E4; --kb-3:#A5DBD3; --kb-4:#6FC5BA; --kb-5:#3EA294; --kb-6:#1E7A6E;
  --kb-val-ink:#FFFFFF;
  /* forecast card: soft off-white surface + calm green/teal comparison series */
  --fc-surface:#FCFCFB; --fc-border:#E9ECE9; --fc-tip-bg:#FFFFFF;
  --fc-grid:#EFF1EE;
  --fc-1:#12A366; --fc-2:#26808F;
  --fc-growth-bg:#E9F7F0; --fc-growth-bd:#C6E9D8;
  --fc-muted:#7E8A88;  /* --faint is 2.98:1 on the off-white surface */
  --seg-line:rgba(255,255,255,.55);
  /* trend badge: ink / fill / border are decoupled so the label and the pill
     don't compete for the same contrast budget. */
  --trend-up-ink:#12684C;  --trend-up-bg:#E6F6EF;  --trend-up-bd:#B4E0CD;
  --trend-dn-ink:#A03A2C;  --trend-dn-bg:#FCEEEB;  --trend-dn-bd:#F0C6BC;
  --karat-chip-bg:#F3EBD3; --karat-chip-ink:#093D39; --karat-chip-bd:#EADFBE;
  --data-1:#093D39;   /* primary chart series */
  --data-2:#B8912E;   /* secondary series     */
  --on-data:#FFFFFF;  /* text on --data-1     */
  --on-fill:#0F1A19;  /* text on pale bar fills (AA in both themes) */
  --fill-a:#5AA593; --fill-b:#B3D4CB;
  --fill-slow-a:#8FB3AC; --fill-slow-b:#C9BE9E;
  --fill-profit:#7FB2A8;
  --avatar-bg:#EDE6D6;
}

/* ================= DARK MODE ================= */
/* Elevation model: as surfaces rise, they get LIGHTER (never pure black,
   never pure white text). #061111 is the app floor.                      */
[data-theme="dark"]{
  /* --- elevation scale --- */
  --elev-0:#061111;   /* app background            */
  --elev-1:#0A1918;   /* recessed / table headers  */
  --elev-2:#0E211F;   /* cards                     */
  --elev-3:#132B29;   /* raised: dropdowns, panels */
  --elev-4:#183330;   /* overlays: dialogs, tips   */

  --bg:var(--elev-0);
  --card:var(--elev-2);
  --surface:var(--elev-1);

  /* --- text ramp: off-white, never #fff --- */
  --text-1:#E4EDEB;
  --text-2:#A3B5B2;
  --text-3:#7C8F8B;
  --text-disabled:#4E605D;
  --ink:var(--text-1);
  --muted:var(--text-2);
  --faint:var(--text-3);

  /* --- borders: carry the hierarchy, so shadows can stay subtle --- */
  --border:#1F3937;
  --border-soft:#162B29;
  --border-strong:#2C4B48;
  --line:var(--border);
  --line-soft:var(--border-soft);

  /* --- brand --- */
  --brand:#0E2A28;
  --brand-2:#17423D;
  --sidebar-bg:#08191A;

  /* --- interaction states --- */
  --hover-bg:rgba(255,255,255,.05);
  --active-bg:rgba(255,255,255,.09);
  --selected-bg:#1D3B37;
  --focus-ring:#5FD3AC;
  --focus-soft:rgba(95,211,172,.16);
  --ai-fab:#369184; --ai-bg:#0C1D1B; --ai-bd:#4BA697;
  --bg-1:#2FAE95; --bg-2:#3EC4A6; --bg-3:#4FD6B6; --bg-4:#63E3C4; --bg-5:#86EED5;
  --bg-soft:rgba(79,214,182,.12); --bg-line:rgba(79,214,182,.26);
  --fill-hi:#86EED5; --fill-mid:#4FD6B6;   /* أفتح من المسار في الوضع الداكن */
  --cat-1:#1C4741; --cat-2:#2A6B60; --cat-3:#3B9184; --cat-4:#52BCA8; --cat-5:#86EED5;
  --cat-ink:#04100F;
  /* accent lightened from #2E7D6E: at that value even pure-black label text
     topped out at 4.27:1, below the 4.5 AA threshold for button text. */
  --accent:#369184;
  --accent-hover:#3EA394;
  --on-accent:#04100F;
  --on-brand:#E4EDEB;

  /* --- status: lifted for legibility on dark, tinted bgs stay dim --- */
  --up:#4FC79A;      --down:#F08A78;
  --success:#4FC79A; --success-bg:#0E2A24; --success-border:#1F4A3D;
  --warning:#E3B65A; --warning-bg:#2A2415; --warning-border:#4A3F1F;
  --error:#F08A78;   --error-bg:#2C1A17;   --error-border:#4E2C26;
  --info:#6BB6E0;    --info-bg:#13252E;    --info-border:#27414F;
  --gold:#E3B65A;    --gold-soft:#2A2415;

  /* --- charts --- */
  --chart-grid:#24403D;
  --chart-axis:#8DA09C;
  --chart-label:#A3B5B2;
  /* series solved for luminance separation: each is >=3:1 on the card AND
     >=1.34:1 from every other series, so they survive greyscale / CVD. */
  --chart-1:#2971A5; --chart-2:#DA4F7E; --chart-3:#2BAD77;
  --chart-4:#C5A6E5; --chart-5:#EACB80; --chart-6:#DAF3F0;
  --chart-track:#1A302E;
  --heat-1:#12292A;--heat-2:#1A413F;--heat-3:#265B55;--heat-4:#37806F;--heat-5:#4EA88C;--heat-6:#6ED4A9;
  --medal-2-bg:#2C4B48; --medal-3-bg:#463C22;
  --row-divider:#24403D;
  --spark-fill:0.20;   /* 0.08 vanishes on dark */
  --pin-beige:#E8DCC0;
  --k24:#E8B84B; --k21:#3E8FB5; --k22:#5ED0B4; --k18:#CDE7DC;
  --kb-empty:#132825;
  --kb-1:#16302E; --kb-2:#1C4A45; --kb-3:#23645C; --kb-4:#2C8177; --kb-5:#37A092; --kb-6:#6FCFC0;
  --kb-val-ink:#04100F;   /* deepest cell is the LIGHTEST on dark -> dark ink */
  --fc-surface:#0C1D1B; --fc-border:#1E3634; --fc-tip-bg:#152F2C;
  --fc-grid:#1A302E;
  --fc-1:#3DDC9B; --fc-2:#2E8B9E;
  --fc-growth-bg:rgba(61,220,155,.14); --fc-growth-bd:rgba(61,220,155,.34);
  --fc-muted:#8DA09C;
  --seg-line:rgba(14,33,31,.75);
  /* Same-hue text+fill made the label and pill fight: every gain in pill
     visibility cost label contrast (ceiling ~5.0). Decoupled: bright chromatic
     ink on a deep opaque fill -> label 7.04 / 6.19, pill 1.79 / 1.72. */
  --trend-up-ink:#9DF0D2;  --trend-up-bg:#17503C;  --trend-up-bd:#33775F;
  --trend-dn-ink:#FFC0AC;  --trend-dn-bg:#6B3527;  --trend-dn-bd:#9A5741;
  --karat-chip-bg:#3D3420; --karat-chip-ink:#F0D9A0; --karat-chip-bd:#5C4E2E;
  --data-1:#4FC79A;   /* primary series: legible on dark, unlike --brand */
  --data-2:#E3B65A;
  --on-data:#04100F;  /* dark ink on the bright dark-mode series */
  --on-fill:#04100F;  /* pale fills stay pale -> keep dark ink */
  --fill-a:#2E8F7A; --fill-b:#7FCBB8;
  --fill-slow-a:#568D84; --fill-slow-b:#B39C6A;
  --fill-profit:#4FA894;
  --avatar-bg:#2C4B48;

  /* --- chrome --- */
  --topbar-bg:rgba(6,17,17,.85);
  --map-stroke:#061111;
  --tip-bg:var(--elev-4);

  /* --- shadows: subtle. elevation is carried by surface + border. --- */
  --shadow-sm:0 1px 2px rgba(0,0,0,.30);
  --shadow-md:0 4px 12px rgba(0,0,0,.38);

  color-scheme:dark;
}

/* ---------- surfaces & elevation ---------- */
[data-theme="dark"] .card{background:var(--elev-2);border-color:var(--border)}
[data-theme="dark"] .sidebar{background:var(--sidebar-bg);border-left-color:var(--border)}
[data-theme="dark"] .topbar{border-bottom-color:var(--border)}
[data-theme="dark"] .hero{background:linear-gradient(120deg,#0E2A28,#14403B);color:var(--text-1)}
[data-theme="dark"] .ps-box.strong{background:linear-gradient(180deg,var(--success-bg),var(--elev-2))}
[data-theme="dark"] .ps-box.weak{background:linear-gradient(180deg,var(--error-bg),var(--elev-2))}
[data-theme="dark"] .action-card.opp{background:linear-gradient(180deg,var(--success-bg),var(--elev-2))}
[data-theme="dark"] .action-card.att{background:linear-gradient(180deg,var(--warning-bg),var(--elev-2))}

/* ---------- interactive: hover / active / selected / focus / disabled ---------- */
[data-theme="dark"] .tool{background:var(--elev-3);border-color:var(--border)}
[data-theme="dark"] .tool:hover{background:var(--elev-4);border-color:var(--border-strong)}
[data-theme="dark"] .tool.primary{background:var(--accent);border-color:var(--accent);color:var(--on-accent)}
[data-theme="dark"] .tool.primary:hover{background:var(--accent-hover);border-color:var(--accent-hover)}
[data-theme="dark"] .tool.primary .ic{stroke:var(--on-accent);color:var(--on-accent)}
[data-theme="dark"] .f-select,[data-theme="dark"] .pos-search,[data-theme="dark"] .act-search{background:var(--elev-3);border-color:var(--border);color:var(--text-1)}
[data-theme="dark"] .f-select:hover{border-color:var(--border-strong)}
[data-theme="dark"] select option{background:var(--elev-3);color:var(--text-1)}
[data-theme="dark"] .sec-filter{background:var(--elev-1);border-color:var(--border-soft)}
[data-theme="dark"] .sec-filter button,[data-theme="dark"] .metric-switch button,[data-theme="dark"] .act-chip{color:var(--text-2)}
[data-theme="dark"] .sec-filter button:hover,[data-theme="dark"] .metric-switch button:hover,[data-theme="dark"] .act-chip:hover{background:var(--hover-bg);color:var(--text-1)}
[data-theme="dark"] .sec-filter button.on,
[data-theme="dark"] .metric-switch button.on,
[data-theme="dark"] .act-chip.on,
[data-theme="dark"] .p-item.hi .p-no{background:var(--accent);border-color:var(--accent);color:var(--on-accent)}
[data-theme="dark"] .act-item:hover,[data-theme="dark"] .atl-card:hover{border-color:var(--border-strong);background:var(--hover-bg)}
[data-theme="dark"] .nav-item:hover{background:var(--hover-bg);color:var(--text-1)}
[data-theme="dark"] .nav-item.active{background:var(--active-bg);color:#fff}
[data-theme="dark"] .qa-item:hover,[data-theme="dark"] .ins-card:hover{border-color:var(--border-strong);background:var(--hover-bg)}
[data-theme="dark"] button:disabled,[data-theme="dark"] .disabled,[data-theme="dark"] [aria-disabled="true"]{color:var(--text-disabled);opacity:.6;cursor:not-allowed}
[data-theme="dark"] :focus-visible{outline:2px solid var(--focus-ring);outline-offset:2px;border-radius:6px}

/* ---------- tables ---------- */
/* Tables: header anchored with a stronger rule; row dividers raised from
   1.12:1 (invisible) to 1.49:1 so rows separate without harsh banding. */
[data-theme="dark"] .pos-table thead th{
  background:var(--elev-1);border-bottom:1.5px solid var(--border-strong);
  color:var(--text-2);font-weight:800}
[data-theme="dark"] .pos-table tbody td{border-bottom-color:var(--row-divider);color:var(--text-1)}
[data-theme="dark"] .pos-table tbody tr:hover{background:var(--hover-bg)}
[data-theme="dark"] .pos-table tbody tr:hover td{color:var(--text-1)}
[data-theme="dark"] .pos-table tbody tr:last-child td{border-bottom:none}

/* ---------- overlays: tooltips, dropdowns, panels ---------- */
[data-theme="dark"] .map-tip,[data-theme="dark"] .chart-tip{background:var(--elev-4);border:1px solid var(--border-strong);color:var(--text-1);box-shadow:var(--shadow-md)}
[data-theme="dark"] .map-tip .rn,[data-theme="dark"] .map-tip .rrow b{color:var(--text-1)}
[data-theme="dark"] .map-tip .rn .rk{background:rgba(227,182,90,.18);color:var(--gold)}


/* ---------- charts ---------- */
[data-theme="dark"] .region{stroke:var(--map-stroke)}
[data-theme="dark"] .rlabel{stroke:rgba(6,17,17,.5);fill:var(--text-1)}
[data-theme="dark"] .cmp-b.prev{background:var(--border-strong)}
[data-theme="dark"] .br-bar,[data-theme="dark"] .hbar-track,[data-theme="dark"] .bar-track{background:var(--chart-track)}

/* ---------- accents, badges & medals ---------- */
[data-theme="dark"] .avatar{background:var(--brand-2);color:#CFE9E1}
[data-theme="dark"] .hero-insight .ic{background:rgba(255,255,255,.1);stroke:#9FE7CE}
[data-theme="dark"] .spotlight-badge,[data-theme="dark"] .scope-pill,[data-theme="dark"] .ec-scope,
[data-theme="dark"] .cb-badge,[data-theme="dark"] .reg-share{background:var(--gold-soft);border-color:var(--warning-border);color:var(--gold)}
[data-theme="dark"] .tl-ic{background:var(--elev-3);border-color:var(--border)}
[data-theme="dark"] .tl-ic.warn,[data-theme="dark"] .ach-ic{background:var(--gold-soft);border-color:var(--warning-border)}
[data-theme="dark"] .br-item:nth-child(1) .br-no,
[data-theme="dark"] .b-item.r1 .b-medal{background:var(--gold);color:#1A1405;border-color:var(--gold)}
[data-theme="dark"] .br-item:nth-child(2) .br-no,[data-theme="dark"] .b-item.r2 .b-medal{background:var(--medal-2-bg);color:var(--text-1);border-color:var(--border)}
[data-theme="dark"] .br-item:nth-child(3) .br-no,[data-theme="dark"] .b-item.r3 .b-medal{background:var(--medal-3-bg);color:var(--text-1);border-color:var(--border)}
[data-theme="dark"] .tp-avatar{background:var(--elev-3);border-color:var(--gold)}
[data-theme="dark"] img[alt="Mansour"]{filter:brightness(0) invert(1) opacity(.9)}
[data-theme="dark"] ::selection{background:var(--brand-2);color:var(--text-1)}
[data-theme="dark"] .sidebar::-webkit-scrollbar-thumb{background:var(--border-strong)}
/* ---------- tooltips (all variants) ---------- */
[data-theme="dark"] .hbar2-tip,[data-theme="dark"] .ct-tip,[data-theme="dark"] .cg-tip,
[data-theme="dark"] .rc-tip,[data-theme="dark"] .et-tip,[data-theme="dark"] .mr-tip,
[data-theme="dark"] .pf-tip,[data-theme="dark"] .rv-tip{
  background:var(--elev-4);color:var(--text-1);border:1px solid var(--border-strong);box-shadow:var(--shadow-md)}
[data-theme="dark"] .hbar2-tip b,[data-theme="dark"] .ct-tip b,[data-theme="dark"] .cg-tip b{color:var(--text-1)}
[data-theme="dark"] .ct-h,[data-theme="dark"] .cg-th,[data-theme="dark"] .rc-th{color:var(--text-1);border-bottom-color:var(--border-strong)}
[data-theme="dark"] .ct-r span,[data-theme="dark"] .cg-r span{color:var(--text-2)}
/* ---------- chart gridlines & axes ---------- */
[data-theme="dark"] .grid line,[data-theme="dark"] .gridline,[data-theme="dark"] .axis line,
[data-theme="dark"] .axis path{stroke:var(--chart-grid)}
[data-theme="dark"] .axis text,[data-theme="dark"] .tick text,[data-theme="dark"] .c-lbl{fill:var(--chart-label)}
[data-theme="dark"] .spark{opacity:.95}
/* ---------- popups & badges retokenized off hardcoded #fff ---------- */
[data-theme="dark"] .camp-tip,[data-theme="dark"] .seg-tip,[data-theme="dark"] .pf-badge{
  background:var(--elev-4);border-color:var(--border-strong);color:var(--text-1);box-shadow:var(--shadow-md)}
[data-theme="dark"] .camp-tip .l,[data-theme="dark"] .seg-tip span,
[data-theme="dark"] .sr-tip .l{color:var(--text-2)}
[data-theme="dark"] .sr-tip{background:var(--elev-4);border:1px solid var(--border-strong);color:var(--text-1)}
[data-theme="dark"] .camp-tip b,[data-theme="dark"] .seg-tip b{color:var(--text-1)}
/* ---------- pagination / segmented controls ---------- */
[data-theme="dark"] .pg-btn{background:var(--elev-3);border-color:var(--border);color:var(--text-2)}
[data-theme="dark"] .pg-btn:hover{background:var(--elev-4);color:var(--text-1)}
[data-theme="dark"] .pg-btn.on{background:var(--accent);border-color:var(--accent);color:var(--on-accent)}
[data-theme="dark"] .brand-filter button{color:var(--text-2)}
[data-theme="dark"] .brand-filter button.on{background:var(--accent);color:var(--on-accent)}
/* ---------- inputs ---------- */
[data-theme="dark"] input,[data-theme="dark"] select,[data-theme="dark"] textarea{color:var(--text-1);background:transparent}
[data-theme="dark"] input::placeholder{color:var(--text-3)}
/* ---------- KPI / analytics cards: scannability ---------- */
[data-theme="dark"] .kpi{background:var(--elev-2);border-color:var(--border)}
[data-theme="dark"] .kpi:hover{border-color:var(--border-strong);background:var(--hover-bg)}
[data-theme="dark"] .kpi-val{color:var(--text-1)}

/* --- 1. % BADGES: at .14 alpha the pill shape was 1.31:1 vs card (invisible).
   .22 lifts it to 1.58:1 while the label still clears 4.5. A 1px status border
   defines the shape without over-tinting. The arrow icon already exists in the
   markup and inherits currentColor. --- */
/* trend badge colours now come from the --trend-* tokens (both themes), so no
   rgba override here — it would beat the tokens. Icon inherits the ink. */
[data-theme="dark"] .trend .ic{stroke:currentColor}

/* --- 3. CARD INDICATORS: .kpi-ic used --surface, which is DARKER than the card
   (1.08:1) so it read as a hole punched in the card. Now elevated + status-tinted. --- */
[data-theme="dark"] .kpi-ic{background:var(--elev-3);border:1px solid var(--border-strong)}
[data-theme="dark"] .kpi-ic .ic{stroke:var(--text-2);color:var(--text-2)}
[data-theme="dark"] .kpi-ic.up{
  background:rgba(79,199,154,.16);border-color:rgba(79,199,154,.40)}
[data-theme="dark"] .kpi-ic.up .ic{stroke:var(--up);color:var(--up)}
[data-theme="dark"] .kpi-ic.down{
  background:rgba(240,138,120,.16);border-color:rgba(240,138,120,.40)}
[data-theme="dark"] .kpi-ic.down .ic{stroke:var(--down);color:var(--down)}

/* --- 2. GOLD PRICE BAR: .karat .k was brand ink (#0E2A28) on gold-soft (#2A2415)
   = 1.01:1, i.e. literally invisible. Tokenized to a soft amber container. --- */
[data-theme="dark"] .karat .p{color:var(--text-1)}
*{box-sizing:border-box;margin:0;padding:0}
/* Theme crossfade: only while .theme-anim is set (during a toggle), so normal
   interaction stays instant. Respects reduced-motion. */
.theme-anim, .theme-anim *{transition:background-color .22s ease, border-color .22s ease, color .22s ease, fill .22s ease, stroke .22s ease !important}
@media (prefers-reduced-motion: reduce){ .theme-anim, .theme-anim *{transition:none !important} }
html,body{height:100%}
body{font-family:'Cairo',system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;overflow-x:hidden}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
svg{display:block}
.ic{width:18px;height:18px;stroke:var(--data-1);color:var(--data-1);stroke-width:1.6;fill:none;stroke-linecap:round;stroke-linejoin:round;flex:none}
.ic-sm{width:15px;height:15px}

/* ============ LAYOUT ============ */
.app{display:flex;min-height:100vh;width:100%}
.sidebar{width:var(--sidebar-w);flex:none;background:var(--sidebar-bg);border-left:1px solid var(--brand);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.sidebar::-webkit-scrollbar{width:5px}
.sidebar::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px}
.brand-head{padding:20px 20px 14px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(255,255,255,.08)}
.brand-logo{width:40px;height:40px;border-radius:8px;background:var(--brand-2);display:flex;align-items:center;justify-content:center;flex:none;padding:5px}
.brand-logo img{width:100%;height:100%;object-fit:contain}
.brand-name{font-weight:700;font-size:14.5px;color:#fff;line-height:1.25;white-space:nowrap}
.brand-env{font-size:10.5px;color:#9FC0BA;font-weight:500;margin-top:1px}
.profile{margin:14px 14px 6px;padding:11px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:var(--radius);display:flex;align-items:center;gap:10px}
.avatar{width:36px;height:36px;border-radius:8px;background:#F5F1EB;color:var(--brand);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex:none}
.profile-name{font-weight:600;font-size:12.5px;color:#fff;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.profile-role{font-size:10.5px;color:#9FC0BA;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.profile-branch{font-size:10px;color:var(--pin-beige);margin-top:2px;display:flex;align-items:center;gap:4px}
.profile-branch .ic{stroke:var(--pin-beige);opacity:1}
.nav{padding:6px 12px 20px;flex:1}
.nav-group{margin-top:12px}
.nav-label{font-size:10px;font-weight:700;color:#6F9691;letter-spacing:.04em;padding:0 10px 5px;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;color:#C9DEDA;font-size:12.5px;font-weight:500;position:relative;transition:background .15s,color .15s;width:100%;text-align:start}
.nav-item:hover{background:rgba(255,255,255,.07);color:#fff}
.nav-item .ic{width:16px;height:16px;stroke:#C9DEDA;opacity:.9}
.nav-item.active{background:rgba(255,255,255,.1);color:#fff;font-weight:600}
.nav-item.active .ic{stroke:#F5F1EB;opacity:1}
.nav-item.active::before{content:"";position:absolute;inset-inline-start:0;top:8px;bottom:8px;width:3px;border-radius:8px;background:#F5F1EB}
.nav-item .badge{margin-inline-start:auto;background:#F5F1EB;color:var(--brand);font-size:9.5px;font-weight:800;padding:1px 7px;border-radius:20px}

.main{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{position:sticky;top:0;z-index:40;background:var(--topbar-bg);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.topbar-row{display:flex;align-items:center;gap:16px;padding:13px 24px 11px}
.crumb{font-size:11px;color:var(--faint);display:flex;align-items:center;gap:6px;margin-bottom:2px}
.crumb .sep{opacity:.5}
.page-title{font-size:19px;font-weight:700;color:var(--ink);line-height:1.2}
.topbar-tools{margin-inline-start:auto;display:flex;align-items:center;gap:9px}
.tool{display:flex;align-items:center;gap:7px;height:34px;padding:0 12px;border:1px solid var(--line);border-radius:8px;background:var(--card);font-size:12px;font-weight:500;color:var(--ink);transition:border-color .15s,background .15s}
.tool:hover{border-color:var(--brand);background:var(--surface)}
.tool .ic{width:14px;height:14px}
.tool select{border:none;background:none;font-family:inherit;font-size:12px;font-weight:500;color:inherit;cursor:pointer;outline:none}
.tool.icon-only{width:34px;padding:0;justify-content:center}
.tool.primary{background:var(--data-1);color:#fff;border-color:var(--brand)}
.tool.primary .ic{stroke:#fff}
.tool.primary:hover{background:var(--brand-2)}
.updated{font-size:10.5px;color:var(--faint);display:flex;align-items:center;gap:5px}
.dot-live{width:6px;height:6px;border-radius:50%;background:var(--up);position:relative}
.dot-live::after{content:"";position:absolute;inset:-3px;border-radius:50%;border:1px solid var(--up);opacity:.5;animation:pulse 2s infinite}
@keyframes pulse{0%{transform:scale(.8);opacity:.6}70%{transform:scale(1.6);opacity:0}100%{opacity:0}}

.goldbar{display:flex;align-items:center;gap:0;padding:0 24px;border-top:1px solid var(--line-soft);background:var(--surface);overflow-x:auto}
.gold-live{display:flex;align-items:center;gap:8px;padding:8px 14px 8px 0;border-inline-end:1px solid var(--line);margin-inline-end:14px;flex:none}
.gold-live .lbl{font-size:10.5px;color:var(--muted);font-weight:600}
.gold-live .val{font-size:14px;font-weight:700;color:var(--brand)}
.gold-live .chg{font-size:10.5px;font-weight:600;color:var(--up);display:flex;align-items:center;gap:3px}
.karat-list{display:flex;align-items:center;gap:20px;flex:1}
.karat{display:flex;align-items:baseline;gap:6px;white-space:nowrap;padding:8px 0}
.karat .k{font-size:10.5px;font-weight:700;color:var(--karat-chip-ink);background:var(--karat-chip-bg);border:1px solid var(--karat-chip-bd);padding:1px 6px;border-radius:5px}
.karat .p{font-size:12px;font-weight:600}
.karat .c{font-size:10px;font-weight:600}
.karat .c.up{color:var(--trend-up-ink)}.karat .c.down{color:var(--trend-dn-ink)}
.gold-stamp{margin-inline-start:auto;font-size:10px;color:var(--faint);display:flex;align-items:center;gap:5px;flex:none;padding-inline-start:14px}

.content{padding:18px 24px 36px;display:flex;flex-direction:column;gap:16px;max-width:1560px;width:100%}

/* ---- compact premium hero ---- */
.hero{background:linear-gradient(120deg,var(--brand),#0B4842);border-radius:var(--radius);padding:0;color:#EAF3F0;position:relative;overflow:hidden;display:grid;grid-template-columns:1.3fr 1fr 1fr 1fr;}
.hero::after{content:none}
.hero-main{padding:18px 22px;position:relative;z-index:1;display:flex;flex-direction:column;justify-content:center;gap:6px;border-inline-end:1px solid rgba(255,255,255,.1)}
.hero-welcome{font-size:18px;font-weight:700;color:#fff}
.hero-date{font-size:11.5px;color:#A9C7C1}
.hero-sub{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:4px}
.hero-sub .chip{background:rgba(255,255,255,.09);padding:3px 9px;border-radius:20px;font-weight:500;display:flex;align-items:center;gap:5px;font-size:11px}
.hero-sub .chip .ic{width:12px;height:12px;stroke:#EAF3F0}
.hero-mini{padding:14px 18px;position:relative;z-index:1;border-inline-end:1px solid rgba(255,255,255,.1);display:flex;flex-direction:column;justify-content:center;gap:3px}
.hero-mini .lbl{font-size:10.5px;color:#9FC0BA;font-weight:600}
.hero-mini .num{font-size:20px;font-weight:800;color:#fff}
.hero-mini .chg{font-size:11px;font-weight:700;display:flex;align-items:center;gap:3px}
.hero-mini .chg.up{color:#8FE0BC}.hero-mini .chg.down{color:#F0AFA4}
.hero-insight{padding:14px 18px;position:relative;z-index:1;background:rgba(255,255,255,.06);display:flex;align-items:center;gap:10px}
.hero-insight .ic{stroke:var(--data-1);width:30px;height:30px;flex:none;background:#F5F1EB;border-radius:8px;padding:6px}
.hero-insight-txt strong{color:#fff;font-weight:700;display:block;font-size:12.5px;line-height:1.3}
.hero-insight-txt span{font-size:10.5px;color:#A9C7C1}

/* section titles */
.sec-head{display:flex;align-items:center;gap:10px;margin-bottom:-2px}
.sec-title{font-size:13.5px;font-weight:700;color:var(--ink)}
.sec-title .num{color:var(--faint);font-weight:600;font-size:11.5px;margin-inline-end:6px}
.sec-hint{font-size:11px;color:var(--faint);margin-inline-start:auto}
.sec-filter{margin-inline-start:auto;display:flex;background:var(--surface);border:1px solid var(--line-soft);border-radius:7px;padding:2px;gap:2px}
.sec-filter button{font-size:11px;font-weight:600;color:var(--muted);padding:5px 12px;border-radius:5px;transition:all .15s}
.sec-filter button.on{background:var(--data-1);color:#fff}

/* KPI row */
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:13px 14px;display:flex;flex-direction:column;gap:7px;transition:box-shadow .18s,transform .18s}
.kpi:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.kpi-top{display:flex;align-items:center;gap:8px}
.kpi-ic{width:28px;height:28px;border-radius:7px;background:var(--surface);display:flex;align-items:center;justify-content:center;flex:none}
.kpi-ic .ic{width:15px;height:15px}
.kpi-title{font-size:11px;color:var(--muted);font-weight:600;line-height:1.3}
.kpi-val{font-size:21px;font-weight:800;color:var(--ink);letter-spacing:-.01em;line-height:1}
.kpi-val .cur{font-size:12px;font-weight:600;color:var(--faint);margin-inline-start:3px}
.kpi-foot{display:flex;align-items:center;gap:6px;font-size:11px}
.trend{display:flex;align-items:center;gap:3px;font-weight:700;padding:1px 5px;border:1px solid transparent;border-radius:5px}
.trend.up{color:var(--trend-up-ink);background:var(--trend-up-bg);border:1px solid var(--trend-up-bd)}
.trend.down{color:var(--trend-dn-ink);background:var(--trend-dn-bg);border:1px solid var(--trend-dn-bd)}
.trend .ic{width:11px;height:11px;stroke:currentColor}
.kpi-sub{color:var(--faint);font-size:10.5px}
.spark{width:100%;height:24px}

/* insight strip */
.insight-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.insight{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:12px 14px;display:flex;align-items:center;gap:11px}
.insight-ic{width:34px;height:34px;border-radius:8px;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;flex:none;background:var(--surface)}
.insight-lbl{font-size:10.5px;color:var(--faint);font-weight:600}
.insight-main{font-size:13.5px;font-weight:700;color:var(--ink);line-height:1.25;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.insight-meta{font-size:10.5px;font-weight:600;margin-top:1px}
.insight-meta.up{color:var(--up)}.insight-meta.down{color:var(--down)}.insight-meta.n{color:var(--muted)}

.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px}
.card-head{display:flex;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.card-title{font-size:13.5px;font-weight:700;color:var(--ink)}
.card-title .sub{display:block;font-size:10.5px;font-weight:500;color:var(--faint);margin-top:1px}
.seg{margin-inline-start:auto;display:flex;background:var(--surface);border:1px solid var(--line-soft);border-radius:7px;padding:2px;gap:2px}
.seg button{font-size:11px;font-weight:600;color:var(--muted);padding:5px 10px;border-radius:5px;transition:all .15s}
.seg button.on{background:var(--card);color:var(--brand);box-shadow:var(--shadow-sm)}

/* ===== BIG HEATMAP SECTION ===== */
.heat-section{display:grid;grid-template-columns:1.55fr 1fr;gap:14px;align-items:stretch}
.heat-card{padding:16px;display:flex;flex-direction:column}
.metric-switch{margin-inline-start:auto;display:flex;background:var(--surface);border:1px solid var(--line-soft);border-radius:7px;padding:2px;gap:2px;flex-wrap:wrap}
.metric-switch button{font-size:10.5px;font-weight:600;color:var(--muted);padding:5px 9px;border-radius:5px;transition:all .15s}
.metric-switch button.on{background:var(--data-1);color:#fff}
.map-svg-wrap{position:relative;background:var(--surface);border:1px solid var(--line-soft);border-radius:var(--radius);padding:10px;flex:1;min-height:560px;display:flex;align-items:center;justify-content:center}
.map-svg{width:100%;height:100%;max-height:640px}
.region{stroke:var(--map-stroke);stroke-width:1.6;cursor:pointer;transition:opacity .15s,filter .15s}
.region:hover{opacity:.9;filter:brightness(1.05)}
.region.sel{stroke:var(--gold);stroke-width:3.4}
.rlabel{pointer-events:none;user-select:none;paint-order:stroke;stroke:rgba(255,254,249,.35);stroke-width:2.5px}
.map-tip{position:absolute;pointer-events:none;background:var(--data-1);color:#fff;border-radius:8px;padding:10px 13px;font-size:11.5px;opacity:0;transition:opacity .12s;z-index:10;min-width:170px;box-shadow:var(--shadow-md);transform:translate(-50%,-105%)}
.map-tip .rn{font-weight:700;font-size:13px;color:#fff;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.map-tip .rn .rk{background:rgba(184,145,46,.25);color:#F0DFB0;font-size:10px;padding:1px 7px;border-radius:20px}
.map-tip .rrow{display:flex;justify-content:space-between;gap:14px;padding:2px 0;color:#C9D9D5}
.map-tip .rrow b{color:#fff;font-weight:700}
.legend-mini{display:flex;align-items:center;gap:8px;margin-top:10px;font-size:10.5px;color:var(--faint)}
.legend-bar{flex:1;height:8px;border-radius:6px;background:linear-gradient(90deg,var(--heat-1),var(--heat-2),var(--heat-3),var(--heat-4),var(--heat-5),var(--heat-6))}

/* branch ranking panel next to heatmap */
.branch-rank-card{display:flex;flex-direction:column;padding:16px}
.branch-rank-list{display:flex;flex-direction:column;gap:1px;overflow-y:auto;flex:1;max-height:560px;padding-inline-end:2px}
.br-item{display:flex;align-items:center;gap:10px;padding:9px 6px;border-radius:8px;transition:background .12s;border-bottom:1px solid var(--line-soft)}
.br-item:last-child{border-bottom:none}
.br-item:hover{background:var(--surface)}
.br-no{width:24px;height:24px;border-radius:7px;background:var(--surface);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:var(--muted);flex:none}
.br-item:nth-child(1) .br-no{background:var(--gold);color:#fff;border-color:var(--gold)}
.br-item:nth-child(2) .br-no{background:var(--medal-2-bg);color:var(--brand);border-color:var(--line)}
.br-item:nth-child(3) .br-no{background:var(--medal-3-bg);color:var(--brand);border-color:var(--line)}
.br-body{flex:1;min-width:0}
.br-name{font-size:12.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.br-bar{height:5px;background:var(--line-soft);border-radius:6px;overflow:hidden;margin-top:5px}
.br-bar i{display:block;height:100%;background:var(--data-1);border-radius:6px}
.br-val{text-align:end;flex:none}
.br-val b{display:block;font-size:12.5px;font-weight:700}
.br-val span{font-size:10px;color:var(--faint);font-weight:600}
/* ترتيب الفروع الجغرافي: السعر والوزن في سطر، الطلبات مساند تحتهما */
.br-top{display:flex;align-items:baseline;gap:8px;white-space:nowrap;justify-content:flex-end}
.br-top b{display:inline;font-size:12.5px}
.br-wt{font-size:11px;font-weight:600;color:var(--muted);padding-inline-start:8px;border-inline-start:1px solid var(--line-soft)}
.br-ord{display:block;margin-top:2px;font-size:10px;color:var(--faint);font-weight:600;white-space:nowrap}

/* performance trend redesigned - no dead space */
.perf-section{display:grid;grid-template-columns:1.5fr 1fr;gap:14px}
.chart-wrap{position:relative}
.chart-svg{width:100%;height:200px;overflow:visible}
.chart-tip{position:absolute;pointer-events:none;background:var(--data-1);color:#fff;padding:7px 11px;border-radius:7px;font-size:11px;opacity:0;transform:translate(-50%,-8px);transition:opacity .12s;white-space:nowrap;z-index:5;box-shadow:var(--shadow-md)}
.chart-tip strong{font-weight:700;font-size:12.5px;display:block}
.chart-tip .d{color:#A9C7C1;font-size:10px}
.perf-stats{display:flex;flex-direction:column;gap:10px}
.ps-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ps-box{border:1px solid var(--line);border-radius:9px;padding:11px 12px;display:flex;flex-direction:column;gap:3px}
.ps-box.strong{background:linear-gradient(180deg,var(--success-bg),var(--card))}
.ps-box.weak{background:linear-gradient(180deg,var(--error-bg),var(--card))}
.ps-lbl{font-size:10px;color:var(--faint);font-weight:700;text-transform:uppercase;letter-spacing:.02em;display:flex;align-items:center;gap:5px}
.ps-day{font-size:14.5px;font-weight:800}
.ps-val{font-size:11px;font-weight:600}
.ps-val.up{color:var(--up)}.ps-val.down{color:var(--down)}
.ps-extra{border:1px solid var(--line);border-radius:9px;padding:11px 12px;display:flex;flex-direction:column;gap:8px;flex:1}
.ps-extra-row{display:flex;justify-content:space-between;align-items:center;font-size:11.5px;padding:6px 0;border-top:1px solid var(--line-soft)}
.ps-extra-row:first-child{border-top:none;padding-top:0}
.ps-extra-row span{color:var(--muted)}
.ps-extra-row b{font-weight:700;color:var(--ink)}

/* priority ranking with filter */
.priority-card{display:flex;flex-direction:column}
.priority-list{display:flex;flex-direction:column;gap:2px;margin-top:2px}
.p-item{display:flex;align-items:center;gap:11px;padding:8px 6px;border-radius:8px;transition:background .12s}
.p-item:hover{background:var(--surface)}
.p-no{width:22px;height:22px;border-radius:6px;background:var(--surface);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:700;color:var(--muted);flex:none}
.p-item.hi .p-no{background:var(--data-1);color:#fff;border-color:var(--brand)}
.p-item.lo .p-no{background:rgba(180,72,59,.08);color:var(--down);border-color:rgba(180,72,59,.2)}
.p-name{font-size:12.5px;font-weight:600;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.p-name small{display:block;font-size:10px;color:var(--faint);font-weight:500}
.p-bar{flex:1;max-width:90px;height:5px;background:var(--line-soft);border-radius:6px;overflow:hidden}
.p-bar i{display:block;height:100%;background:var(--data-1);border-radius:6px}
.p-item.lo .p-bar i{background:var(--down);opacity:.75}
.p-val{font-size:12.5px;font-weight:700;text-align:end;white-space:nowrap;flex:none}
.p-val small{display:block;font-size:10px;font-weight:600;color:var(--muted)}
/* ترتيب الفروع: تدرّج بصري — المبيعات أساسي، الوزن بجانبه، الطلبات مساند */
.p-main{flex:1;min-width:0;display:flex;flex-direction:column;gap:5px}
.p-main .p-name{flex:none}
.p-main .p-bar{flex:none;max-width:none;width:100%}
.p-metrics{flex:none;text-align:end;display:flex;flex-direction:column;gap:2px;align-items:flex-end}
.p-top{display:flex;align-items:baseline;gap:8px;white-space:nowrap}
.p-metrics .p-val{font-size:13.5px;line-height:1.15}
.p-metrics .p-val small{display:inline;margin-inline-start:3px;font-size:9.5px}
.p-wt{font-size:11.5px;font-weight:600;color:var(--muted);padding-inline-start:8px;border-inline-start:1px solid var(--line-soft)}
.p-sub{font-size:10px;font-weight:600;color:var(--faint);white-space:nowrap}

/* compact top contributors */
.contrib-card{display:flex;flex-direction:column}
.contrib-list{display:flex;flex-direction:column;gap:0;margin-top:2px}
.c-item{display:flex;align-items:center;gap:9px;padding:7px 4px;border-bottom:1px solid var(--line-soft)}
.c-item:last-child{border-bottom:none}
.c-av{width:26px;height:26px;border-radius:7px;background:var(--gold-soft);color:var(--brand);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex:none}
.c-body{flex:1;min-width:0}
.c-name{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.c-role{font-size:10px;color:var(--faint)}
.c-val{text-align:end;flex:none}
.c-val b{font-size:12px;font-weight:700;display:block}
.c-val span{font-size:9.5px;color:var(--faint)}

/* brand ranking component */
.brand-card{display:flex;flex-direction:column}
.brand-list{display:flex;flex-direction:column;gap:9px;margin-top:4px}
.b-item{display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:10px;border:1px solid var(--line);position:relative;overflow:hidden}
.b-item.r1{background:linear-gradient(90deg,rgba(184,145,46,.12),transparent);border-color:rgba(184,145,46,.35)}
.b-item.r2{background:var(--surface)}
.b-item.r3{background:var(--surface)}
.b-medal{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex:none}
.b-item.r1 .b-medal{background:var(--gold);color:#fff}
.b-item.r2 .b-medal{background:var(--medal-2-bg);color:var(--brand)}
.b-item.r3 .b-medal{background:var(--medal-3-bg);color:var(--brand)}
.b-body{flex:1;min-width:0}
.b-name{font-size:13px;font-weight:700}
.b-sub{font-size:10.5px;color:var(--faint);margin-top:1px}
.b-bar{height:6px;background:var(--line-soft);border-radius:6px;overflow:hidden;margin-top:6px}
.b-bar i{display:block;height:100%;border-radius:6px}
.b-item.r1 .b-bar i{background:var(--gold)}
.b-item.r2 .b-bar i,.b-item.r3 .b-bar i{background:var(--data-1)}
.b-val{text-align:end;flex:none}
.b-val b{font-size:14px;font-weight:800;display:block}
.b-val span{font-size:10px;color:var(--faint)}

/* action */
.action-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.action-card{border-radius:var(--radius);padding:16px;border:1px solid var(--line)}
.action-card.opp{background:linear-gradient(180deg,var(--success-bg),var(--card))}
.action-card.att{background:linear-gradient(180deg,var(--warning-bg),var(--card))}
.action-head{display:flex;align-items:center;gap:9px;margin-bottom:12px}
.action-head .ib{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex:none;background:var(--surface);border:1px solid var(--line-soft)}
.action-title{font-size:13.5px;font-weight:700}
.action-count{margin-inline-start:auto;font-size:10.5px;font-weight:700;padding:2px 9px;border-radius:20px}
.action-card.opp .action-count{background:rgba(30,122,90,.1);color:var(--up)}
.action-card.att .action-count{background:rgba(180,72,59,.1);color:var(--down)}
.action-item{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-top:1px solid var(--line-soft)}
.action-item:first-of-type{border-top:none;padding-top:2px}
.action-mark{width:6px;height:6px;border-radius:50%;margin-top:6px;flex:none}
.action-card.opp .action-mark{background:var(--up)}
.action-card.att .action-mark{background:var(--down)}
.action-item-body{flex:1;min-width:0}
.action-item-title{font-size:12.5px;font-weight:600;line-height:1.35}
.action-item-desc{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.4}
.action-link{margin-inline-start:auto;font-size:11px;font-weight:700;color:var(--brand);display:flex;align-items:center;gap:3px;white-space:nowrap;flex:none;padding-top:1px}
.action-link .ic{width:12px;height:12px}

/* ===== channels / social / category section ===== */
/* بعد إزالة بطاقة وسائل التواصل: عمودان بدل ثلاثة —
   الفئات تأخذ المساحة المحرَّرة بدل ترك فراغ. */
.chan-section{display:grid;grid-template-columns:1fr 1.35fr;gap:14px}
.chan-card{display:flex;flex-direction:column}
.brand-filter{margin-inline-start:auto;display:flex;background:var(--surface);border:1px solid var(--line-soft);border-radius:7px;padding:2px;gap:2px}
.brand-filter button{font-size:11px;font-weight:600;color:var(--muted);padding:5px 11px;border-radius:5px;transition:all .15s}
.brand-filter button.on{background:var(--data-1);color:#fff}
.chan-rows{display:flex;flex-direction:column;gap:12px;margin-top:6px;flex:1;justify-content:center}
.chan-row{display:flex;align-items:center;gap:10px}
.chan-ic{width:30px;height:30px;border-radius:8px;background:var(--surface);border:1px solid var(--line-soft);display:flex;align-items:center;justify-content:center;flex:none}
.chan-ic .ic{width:15px;height:15px}
.chan-body{flex:1;min-width:0}
.chan-top{display:flex;justify-content:space-between;font-size:11.5px;margin-bottom:5px}
.chan-top b{font-weight:700;color:var(--ink)}
.chan-top span{color:var(--faint);font-weight:600}
.chan-bar{height:9px;background:var(--line-soft);border-radius:6px;overflow:hidden}
.chan-bar i{display:block;height:100%;border-radius:6px;background:var(--data-1)}
/* branch ranking bars — modern horizontal ranking chart */
.brb{display:flex;flex-direction:column;gap:12px;margin-top:10px}
.brb-row{display:grid;grid-template-columns:22px minmax(88px,1fr) 2.2fr auto;
  align-items:center;gap:10px}
.brb-rank{width:22px;height:22px;border-radius:7px;background:var(--surface);
  border:1px solid var(--line-soft);color:var(--muted);font-size:11px;font-weight:800;
  display:flex;align-items:center;justify-content:center;font-variant-numeric:tabular-nums}
.brb-row.top .brb-rank{background:var(--gold);border-color:var(--gold);color:#fff}
.brb-name{font-size:11.5px;font-weight:700;color:var(--ink);overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap}
.brb-track{height:20px;background:var(--chart-track);border-radius:7px;overflow:hidden}
.brb-track i{display:block;height:100%;border-radius:7px;
  background:linear-gradient(90deg,#5AA593,#B3D4CB);
  transition:width .6s cubic-bezier(.33,.9,.34,1)}
.brb-row.top .brb-track i{background:linear-gradient(90deg,#0F5049,#2E7D6E)}
.brb-val{font-size:12px;font-weight:800;color:var(--ink);min-width:46px;text-align:end;
  font-variant-numeric:tabular-nums}
.brb-u{font-size:9.5px;font-weight:600;color:var(--muted);margin-inline-start:2px}
[data-theme="dark"] .brb-track i{background:linear-gradient(90deg,#3EC4A6,#7FE0CC)}
[data-theme="dark"] .brb-row.top .brb-track i{background:linear-gradient(90deg,#2FAE95,#5AD6BE)}
.chan-summary{display:flex;justify-content:space-between;margin-top:12px;padding-top:10px;border-top:1px solid var(--line-soft);font-size:11px}
.chan-summary div{text-align:center;flex:1}
.chan-summary b{display:block;font-size:14px;font-weight:800;color:var(--brand)}
.chan-summary span{color:var(--faint);font-size:10px}

.social-card{display:flex;flex-direction:column}
.social-list{display:flex;flex-direction:column;gap:10px;margin-top:4px;flex:1;justify-content:center}
.soc-row{display:flex;align-items:center;gap:10px}
.soc-badge{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex:none}
.soc-body{flex:1;min-width:0}
.soc-top{display:flex;justify-content:space-between;font-size:11.5px;margin-bottom:5px}
.soc-top b{font-weight:700}
.soc-bar{height:7px;background:var(--line-soft);border-radius:6px;overflow:hidden}
.soc-bar i{display:block;height:100%;border-radius:6px}

.donut-card{display:flex;flex-direction:column;align-items:center}
.donut-wrap{position:relative;display:flex;align-items:center;justify-content:center;margin-top:4px}
.donut-center{position:absolute;text-align:center}
.donut-center b{display:block;font-size:18px;font-weight:800;color:var(--ink)}
.donut-center span{font-size:9.5px;color:var(--faint);font-weight:600}
.donut-legend{display:grid;grid-template-columns:1fr 1fr;gap:6px 14px;margin-top:12px;width:100%}
.dl-item{display:flex;align-items:center;gap:6px;font-size:11px}
.dl-sw{width:9px;height:9px;border-radius:3px;flex:none}
.dl-name{color:var(--muted);flex:1}
.dl-val{font-weight:700;color:var(--ink)}

/* employee of the month — featured inside Top Contributors card */
.spotlight-feature{background:linear-gradient(160deg,var(--brand) 0%,#0C4C45 100%);border-radius:10px;padding:12px 13px;position:relative;overflow:hidden;margin-bottom:10px}
.spotlight-feature::after{content:none}
.spotlight-badge{display:inline-flex;align-items:center;gap:5px;background:#F5F1EB;border:none;color:#7A5E1A;font-size:9.5px;font-weight:700;padding:2px 9px;border-radius:20px;width:fit-content;position:relative;z-index:1}
.spotlight-feature-body{display:flex;align-items:center;gap:10px;margin-top:9px;position:relative;z-index:1}
.spotlight-avatar{width:42px;height:42px;border-radius:50%;background:var(--avatar-bg);display:flex;align-items:center;justify-content:center;overflow:hidden;flex:none;border:2px solid rgba(255,255,255,.35)}
.spotlight-avatar svg{width:100%;height:100%;display:block}
.spotlight-feature-info{flex:1;min-width:0}
.spotlight-feature-name{font-size:12.5px;font-weight:800;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.spotlight-feature-role{font-size:10px;color:#A9C7C1;margin-top:1px}
.spotlight-feature-val{text-align:end;flex:none}
.spotlight-feature-val b{display:block;font-size:14px;font-weight:800;color:#fff}
.spotlight-feature-val span{font-size:9px;color:#A9C7C1}
.spotlight-feature-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:10px;position:relative;z-index:1}
.spotlight-feature-stats div{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:7px;padding:5px 4px;text-align:center}
.spotlight-feature-stats b{display:block;font-size:12px;font-weight:800;color:#fff}
.spotlight-feature-stats span{font-size:8.5px;color:#A9C7C1;font-weight:600}
.spotlight-feature-quote{font-size:10px;color:#D8CBA0;margin-top:9px;line-height:1.5;position:relative;z-index:1;border-top:1px solid rgba(255,255,255,.12);padding-top:8px}

.footer-note{text-align:center;font-size:10.5px;color:var(--faint);padding:6px 0 2px}
@media(max-width:1300px){.chan-section{grid-template-columns:1fr}.rankings-grid{grid-template-columns:1fr 1fr!important}}
@media(max-width:800px){.rankings-grid{grid-template-columns:1fr!important}}

@media(max-width:1300px){
  .heat-section,.perf-section{grid-template-columns:1fr}
  .kpi-row{grid-template-columns:repeat(3,1fr)}
  .insight-strip{grid-template-columns:repeat(2,1fr)}
  .action-row{grid-template-columns:1fr}
  .hero{grid-template-columns:1fr 1fr}
}
/* ================= POS PREMIUM DASHBOARD ================= */
.pos-page{display:flex;flex-direction:column;gap:22px}
.pos-page .sec-head{margin-bottom:2px}
/* S1 KPI */
.mkpi-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-top:10px}
.mkpi{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;display:flex;flex-direction:column;gap:9px;box-shadow:var(--shadow-sm);position:relative;overflow:hidden;transition:box-shadow .18s,transform .18s}
.mkpi:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.mkpi-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
.mkpi-ic{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:var(--surface);border:1px solid var(--line-soft)}
.mkpi-ic .ic{width:17px;height:17px}
.mkpi-lbl{font-size:10.5px;color:var(--muted);font-weight:600;line-height:1.3}
.mkpi-val{font-size:22px;font-weight:800;letter-spacing:-.02em;line-height:1;color:var(--ink)}
.mkpi-val .u{font-size:11px;font-weight:600;color:var(--faint);margin-inline-start:3px}
.mkpi-spark{height:26px;margin-top:-2px}
.mkpi-foot{display:flex;align-items:center;gap:6px;font-size:10.5px}
/* S2 status */
.status-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-top:10px}
.status-card{border-radius:14px;padding:14px;display:flex;flex-direction:column;gap:9px;position:relative;overflow:hidden;border:1px solid;box-shadow:var(--shadow-sm);transition:transform .16s}
.status-card:hover{transform:translateY(-2px)}
.status-card .s-ic{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center}
.status-card .s-ic .ic{width:18px;height:18px}
.status-val{font-size:22px;font-weight:800;line-height:1;color:var(--ink)}
.status-lbl{font-size:10.5px;font-weight:600;color:var(--muted)}
.status-badge{align-self:flex-start;font-size:9px;font-weight:800;padding:2px 9px;border-radius:20px;letter-spacing:.02em}
/* S3 branch health */
.bh-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:10px}
.bh-card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;box-shadow:var(--shadow-sm);display:flex;flex-direction:column;gap:13px;transition:box-shadow .18s,transform .18s}
.bh-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.bh-head{display:flex;align-items:center;gap:10px}
.bh-av{width:34px;height:34px;border-radius:10px;background:var(--surface);border:1px solid var(--line-soft);display:flex;align-items:center;justify-content:center;flex:none}
.bh-av .ic{width:17px;height:17px}
.bh-name{font-weight:800;font-size:13px;line-height:1.2}
.bh-sub{font-size:10px;color:var(--faint)}
.bh-badge{margin-inline-start:auto;font-size:9px;font-weight:800;padding:3px 9px;border-radius:20px;white-space:nowrap}
.bh-metrics{display:grid;grid-template-columns:1fr 1fr;gap:9px 12px}
.bh-metrics.bh-metrics-3{grid-template-columns:1fr;gap:8px}
.bh-metrics.bh-metrics-3 .bh-metric{display:flex;align-items:baseline;justify-content:space-between;gap:10px}
.bh-metric .k{font-size:9.5px;color:var(--faint);font-weight:600;display:flex;align-items:center;gap:3px}
.bh-metric .v{font-size:13px;font-weight:800;color:var(--ink);margin-top:1px}
.bh-metric .v small{font-size:10px;font-weight:700}
.bh-foot{display:flex;align-items:center;gap:11px;border-top:1px solid var(--line-soft);padding-top:12px}
.bh-ring-txt{display:flex;flex-direction:column}
.bh-ring-txt b{font-size:15px;font-weight:800;line-height:1}
.bh-ring-txt span{font-size:9.5px;color:var(--faint);font-weight:600}
.bh-stock{flex:1}
.bh-stock .t{display:flex;justify-content:space-between;font-size:10px;font-weight:700;margin-bottom:4px}
.bh-stock .track{height:6px;background:var(--line-soft);border-radius:5px;overflow:hidden}
.bh-stock .track i{display:block;height:100%;border-radius:5px}
/* S4 charts */
.pos-chart-grid{display:grid;grid-template-columns:1.5fr 1fr;gap:14px;margin-top:10px}
.pos-chart-grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px}
.hbars{display:flex;flex-direction:column;gap:12px;margin-top:8px}
.hbar{display:grid;grid-template-columns:96px 1fr 54px;align-items:center;gap:10px}
.hbar .lbl{font-size:11.5px;font-weight:600;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hbar .track{height:11px;background:var(--line-soft);border-radius:6px;overflow:hidden}
.hbar .fill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--data-1),var(--data-2))}
.hbar .val{font-size:11.5px;font-weight:800;color:var(--ink);text-align:end}
.col-chart{width:100%;height:190px;overflow:visible}
/* S5 inventory */
.inv-grid{display:grid;grid-template-columns:1fr 1.1fr 1fr;gap:14px;margin-top:10px}
.gauge-card{display:flex;flex-direction:column;align-items:center;justify-content:center}
.gauge-legend{display:flex;gap:14px;margin-top:6px}
.gauge-legend div{display:flex;align-items:center;gap:5px;font-size:10.5px;color:var(--muted);font-weight:600}
.gauge-legend .sw{width:9px;height:9px;border-radius:3px}
.mv-list{display:flex;flex-direction:column;gap:9px;margin-top:4px}
.mv-row{display:flex;align-items:center;gap:9px}
.mv-ic{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex:none}
.mv-ic .ic{width:14px;height:14px}
.mv-body{flex:1;min-width:0}
.mv-top{display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px}
.mv-top b{font-weight:700}.mv-top span{color:var(--faint);font-weight:600}
.mv-bar{height:5px;background:var(--line-soft);border-radius:5px;overflow:hidden}
.mv-bar i{display:block;height:100%;border-radius:5px}
.mv-split{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.mv-split h5{font-size:10.5px;font-weight:800;color:var(--muted);margin-bottom:6px;display:flex;align-items:center;gap:5px}
.rings-row{display:flex;flex-direction:column;gap:14px;justify-content:center;height:100%}
.ring-item{display:flex;align-items:center;gap:12px}
.ring-txt b{display:block;font-size:16px;font-weight:800;line-height:1}
.ring-txt span{font-size:10px;color:var(--faint);font-weight:600}
/* S6 rankings */
.rank2-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:10px}
.rk-list{display:flex;flex-direction:column}
.rk-item{display:flex;align-items:center;gap:11px;padding:10px 4px;border-bottom:1px solid var(--line-soft)}
.rk-item:last-child{border-bottom:none}
.rk-medal{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex:none}
.rk-body{flex:1;min-width:0}
.rk-name{font-size:12.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rk-sub{font-size:10px;color:var(--faint);margin-top:1px;display:flex;align-items:center;gap:5px}
.rk-score{text-align:end;flex:none}
.rk-score b{font-size:14px;font-weight:800;display:block;line-height:1}
.rk-score span{font-size:9px;color:var(--faint);font-weight:600}
/* S7 smart insights */
.si-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:10px}
.si-card{border-radius:14px;padding:14px;display:flex;gap:11px;border:1px solid;align-items:flex-start}
.si-ic{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex:none}
.si-ic .ic{width:17px;height:17px}
.si-title{font-size:12.5px;font-weight:700;line-height:1.35;color:var(--ink)}
.si-desc{font-size:10.5px;color:var(--muted);margin-top:2px;line-height:1.4}
.si-tag{display:inline-block;font-size:8.5px;font-weight:800;padding:1px 7px;border-radius:20px;margin-top:6px;letter-spacing:.03em}
/* S8 timeline */
.tl-card{max-height:none}
.timeline{display:flex;flex-direction:column;margin-top:2px}
.tl-item{position:relative;display:grid;grid-template-columns:32px 1fr auto;gap:11px;padding-bottom:15px}
.tl-item:last-child{padding-bottom:0}
.tl-rail{position:relative;display:flex;justify-content:center}
.tl-rail::before{content:"";position:absolute;top:30px;bottom:-15px;width:2px;background:var(--line)}
.tl-item:last-child .tl-rail::before{display:none}
.tl-dot{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex:none;z-index:1}
.tl-dot .ic{width:15px;height:15px}
.tl-title{font-size:12px;font-weight:700;line-height:1.3}
.tl-meta{font-size:10.5px;color:var(--muted);margin-top:1px}
.tl-time{font-size:10px;color:var(--faint);font-weight:600;white-space:nowrap;padding-top:2px}
/* S9 comparison */
.cmp-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:10px}
.cmp-head{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.cmp-name{font-size:12.5px;font-weight:800}
.cmp-name.a{color:var(--brand)}.cmp-name.b{color:var(--gold)}
.cmp-vs{font-size:9.5px;font-weight:800;color:var(--faint);background:var(--surface);border:1px solid var(--line-soft);padding:2px 8px;border-radius:20px;margin:0 auto}
.cmp-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:11px}
.cmp-k{grid-column:1/-1;font-size:10px;color:var(--faint);font-weight:700;text-align:center;margin-bottom:-6px}
.cmp-side .t{display:flex;justify-content:space-between;font-size:10.5px;font-weight:800;margin-bottom:4px}
.cmp-bar{height:6px;background:var(--line-soft);border-radius:5px;overflow:hidden}
.cmp-bar i{display:block;height:100%;border-radius:5px}
.cmp-side.a .cmp-bar i{background:var(--data-1)}
.cmp-side.b .cmp-bar i{background:var(--gold)}
/* S10 quick actions */
.qa-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-top:10px}
.qa-btn{border:1px solid var(--line);border-radius:14px;padding:16px 10px;display:flex;flex-direction:column;align-items:center;gap:10px;background:var(--card);box-shadow:var(--shadow-sm);transition:all .16s;text-align:center;width:100%}
.qa-btn:hover{border-color:var(--brand);background:var(--surface);transform:translateY(-2px);box-shadow:var(--shadow-md)}
.qa-ic{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--brand),var(--brand-2))}
.qa-ic .ic{width:20px;height:20px;stroke:#fff}
.qa-lbl{font-size:11.5px;font-weight:700;color:var(--ink)}
@media (max-width:1200px){
  .mkpi-grid,.status-grid,.qa-grid{grid-template-columns:repeat(3,1fr)}
  .bh-grid{grid-template-columns:repeat(2,1fr)}
  .inv-grid,.si-grid{grid-template-columns:1fr}
  .pos-chart-grid,.pos-chart-grid2,.rank2-grid,.cmp-grid{grid-template-columns:1fr}
}

/* ===== POS refinements ===== */
.sec-tools{display:flex;align-items:center;gap:8px;margin-inline-start:auto;flex-wrap:wrap}
.tool.mini{height:30px;padding:0 10px}
.tool.mini select{max-width:150px}
.scope-pill{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:700;color:var(--brand);background:var(--gold-soft);border:1px solid var(--warning-border);padding:4px 10px;border-radius:20px}
.scope-pill .ic{width:12px;height:12px;stroke:var(--data-1)}
/* neutral status + insight cards, semantic accent only */
.status-card{background:var(--card);border-color:var(--line);padding-inline-start:17px}
.status-card .s-ic{background:var(--surface);border:1px solid var(--line-soft)}
.si-card{background:var(--card);border-color:var(--line);padding-inline-start:17px;position:relative;overflow:hidden}
.si-card .si-ic{background:var(--surface);border:1px solid var(--line-soft)}
.status-accent,.si-accent{position:absolute;inset-inline-start:0;top:12px;bottom:12px;width:3px;border-radius:4px}
/* activity log */
.act-card{padding:16px}
.act-toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.act-search{display:flex;align-items:center;gap:7px;height:34px;padding:0 11px;border:1px solid var(--line);border-radius:9px;background:var(--surface);flex:1;min-width:180px;max-width:300px}
.act-search .ic{width:14px;height:14px;stroke:var(--faint)}
.act-search input{border:none;background:none;outline:none;font-family:inherit;font-size:12px;color:var(--ink);width:100%}
.act-chips{display:flex;gap:6px;flex-wrap:wrap;margin-inline-start:auto}
.act-chip{font-size:11px;font-weight:600;color:var(--muted);padding:6px 11px;border-radius:8px;border:1px solid var(--line-soft);background:var(--surface);cursor:pointer;transition:all .14s;display:flex;align-items:center;gap:6px}
.act-chip:hover{border-color:var(--line);color:var(--ink)}
.act-chip.on{background:var(--data-1);color:#fff;border-color:var(--brand)}
.act-chip .cnt{font-size:9px;font-weight:800;background:rgba(9,61,57,.09);color:inherit;padding:0 6px;border-radius:10px}
.act-chip.on .cnt{background:rgba(255,255,255,.22)}
.act-section{margin-top:4px}
.act-group{font-size:10px;font-weight:800;color:var(--faint);letter-spacing:.05em;margin:6px 0 8px;display:flex;align-items:center;gap:9px}
.act-group::after{content:"";flex:1;height:1px;background:var(--line-soft)}
.act-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.act-item{border:1px solid var(--line);border-radius:11px;background:var(--card);overflow:hidden;transition:border-color .14s,box-shadow .14s}
.act-item:hover{border-color:var(--border-strong);box-shadow:var(--shadow-sm)}
.act-row{display:grid;grid-template-columns:34px 1fr auto;gap:11px;align-items:center;padding:10px 12px;cursor:pointer}
.act-ic{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex:none}
.act-ic .ic{width:16px;height:16px}
.act-main{min-width:0}
.act-title{font-size:12.5px;font-weight:700;line-height:1.25;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.act-badge{font-size:8.5px;font-weight:800;padding:1px 7px;border-radius:20px;white-space:nowrap}
.act-meta{font-size:10.5px;color:var(--muted);margin-top:3px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.act-user{display:inline-flex;align-items:center;gap:5px;font-weight:600;color:var(--ink)}
.act-uav{width:17px;height:17px;border-radius:5px;background:var(--gold-soft);color:var(--brand);font-size:8px;font-weight:800;display:flex;align-items:center;justify-content:center}
.act-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex:none}
.act-time{font-size:10px;color:var(--faint);font-weight:600;white-space:nowrap}
.act-chev{width:15px !important;height:15px !important;stroke:var(--faint);transition:transform .2s}
.act-item.open .act-chev{transform:rotate(180deg)}
.act-details{max-height:0;overflow:hidden;transition:max-height .22s ease}
.act-item.open .act-details{max-height:200px}
.act-details-inner{padding:0 12px 12px;margin:2px 12px 0;display:grid;grid-template-columns:1fr 1fr;gap:7px 18px;border-top:1px solid var(--line-soft);padding-top:10px}
.act-drow{display:flex;justify-content:space-between;gap:10px;font-size:10.5px}
.act-drow span{color:var(--faint)}
.act-drow b{font-weight:700;color:var(--ink)}
.act-empty{padding:26px;text-align:center;color:var(--faint);font-size:12px}
@media (max-width:1200px){.act-grid{grid-template-columns:1fr}}

/* ===== POS v3 refinements ===== */
.status-card{padding-inline-start:14px}
.status-accent,.si-accent{display:none}
.si-card{padding-inline-start:14px}
/* interactive sales trend */
.sr-trend-card .card-head{margin-bottom:6px}
.sr-trend-wrap{position:relative;margin-top:6px}
.sr-chart{width:100%;height:auto;display:block;overflow:visible}
.srdot{cursor:pointer}
.sr-line{stroke-dasharray:2600;stroke-dashoffset:2600;animation:srDraw 1.1s cubic-bezier(.6,.05,.2,1) forwards}
.sr-area{opacity:0;animation:srFade .8s .25s ease forwards}
@keyframes srDraw{to{stroke-dashoffset:0}}
@keyframes srFade{to{opacity:1}}
.sr-tip{position:absolute;transform:translate(-50%,-118%);background:var(--data-1);color:#fff;border-radius:9px;padding:7px 11px;font-size:11px;pointer-events:none;opacity:0;transition:opacity .15s;white-space:nowrap;box-shadow:var(--shadow-md);z-index:5}
.sr-tip .l{display:block;font-size:9.5px;color:#A9C7C1;font-weight:600;margin-bottom:2px}
.sr-tip b{font-size:13px;font-weight:800}
.sr-row2{display:grid;grid-template-columns:1.25fr 1fr;gap:14px;margin-top:14px}
/* category distribution table */
.cat-card .card-head{align-items:flex-start}
.cat-tot{display:flex;gap:18px;margin-inline-start:auto}
.cat-tot div{text-align:center}
.cat-tot b{display:block;font-size:15px;font-weight:800;color:var(--brand);line-height:1}
.cat-tot span{font-size:9.5px;color:var(--faint);font-weight:600}
.cat-head-row,.cat-row{display:grid;grid-template-columns:1.25fr 1.4fr 58px 74px 66px;align-items:center;gap:12px}
.cat-head-row{font-size:9.5px;font-weight:700;color:var(--faint);letter-spacing:.02em;padding:0 2px 9px;border-bottom:1px solid var(--line-soft);margin-bottom:4px}
.cat-head-row .cat-c1,.cat-head-row .cat-c2,.cat-head-row .cat-c3{text-align:end}
.cat-list{display:flex;flex-direction:column}
.cat-row{padding:9px 2px;border-bottom:1px solid var(--line-soft)}
.cat-row:last-child{border-bottom:none}
.cat-name{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;color:var(--ink)}
.cat-sw{width:11px;height:11px;border-radius:4px;flex:none}
.cat-track{height:8px;background:var(--line-soft);border-radius:6px;overflow:hidden}
.cat-track i{display:block;height:100%;border-radius:6px}
.cat-c1{text-align:end;font-size:12px}
.cat-c1 b{font-weight:800;color:var(--ink)}
.cat-c2{text-align:end;font-size:12px;font-weight:700;color:var(--ink)}
.cat-c2 small{font-size:9px;color:var(--faint);font-weight:600;margin-inline-start:2px}
.cat-c3{text-align:end;font-size:11.5px;font-weight:600;color:var(--muted)}
/* inventory v3 */
.inv-tiles{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:10px}
.inv-tile{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px;box-shadow:var(--shadow-sm);display:flex;flex-direction:column;gap:10px}
.inv-tile-top{display:flex;align-items:center;gap:9px}
.inv-tile-ic{width:32px;height:32px;border-radius:9px;background:var(--surface);border:1px solid var(--line-soft);display:flex;align-items:center;justify-content:center;flex:none}
.inv-tile-ic .ic{width:16px;height:16px}
.inv-tile-lbl{font-size:11px;color:var(--muted);font-weight:600}
.inv-tile-val{font-size:22px;font-weight:800;color:var(--ink);line-height:1}
.inv-tile-val .u{font-size:11px;font-weight:600;color:var(--faint);margin-inline-start:3px}
.inv-tile-bar{height:6px;background:var(--line-soft);border-radius:5px;overflow:hidden;margin-top:-2px}
.inv-tile-bar i{display:block;height:100%;border-radius:5px}
.inv-tile-foot{font-size:10.5px;font-weight:600}
.inv-row2{display:grid;grid-template-columns:1.4fr 1fr;gap:14px;margin-top:14px}
.ih-head{display:flex;align-items:baseline;gap:10px;margin:2px 0 12px}
.ih-big{font-size:34px;font-weight:800;color:var(--ink);line-height:1}
.ih-cap{font-size:11px;color:var(--muted);font-weight:600}
.ih-bar{display:flex;height:14px;border-radius:8px;overflow:hidden;gap:2px;background:var(--line-soft)}
.ih-bar span{display:block;height:100%}
.ih-legend{display:flex;flex-direction:column;gap:2px;margin-top:14px}
.ih-leg{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line-soft)}
.ih-leg:last-child{border-bottom:none}
.ih-dot{width:10px;height:10px;border-radius:4px;flex:none}
.ih-leg-t{flex:1;min-width:0}
.ih-leg-t b{font-size:12px;font-weight:700;display:block}
.ih-leg-t span{font-size:10px;color:var(--faint);font-weight:600}
.ih-pct{font-size:13px;font-weight:800;color:var(--ink)}
.mv2-group{margin-top:4px}
.mv2-group+.mv2-group{margin-top:14px;padding-top:12px;border-top:1px solid var(--line-soft)}
.mv2-h{font-size:10.5px;font-weight:800;color:var(--muted);display:flex;align-items:center;gap:6px;margin-bottom:9px}
.mv2-row{padding:6px 0}
.mv2-top{display:flex;justify-content:space-between;font-size:11.5px;margin-bottom:2px}
.mv2-top b{font-weight:700}.mv2-top span{color:var(--faint);font-weight:600;font-size:10.5px}
.mv2-meta{font-size:9.5px;color:var(--faint);margin-bottom:5px}
.mv2-bar{height:5px;background:var(--line-soft);border-radius:5px;overflow:hidden}
.mv2-bar i{display:block;height:100%;border-radius:5px}
/* unified ranking */
.rank-uni .card-head{align-items:flex-start;flex-wrap:wrap;gap:10px}
.ru-head,.ru-item{display:grid;grid-template-columns:40px 1.5fr 1fr 1fr 1.5fr;align-items:center;gap:12px}
.ru-head{font-size:9.5px;font-weight:700;color:var(--faint);letter-spacing:.02em;padding:2px 4px 10px;border-bottom:1px solid var(--line-soft)}
.ru-head .ru-hc{text-align:center}.ru-head .ru-hc2{text-align:start}
.ru-list{display:flex;flex-direction:column}
.ru-item{padding:11px 4px;border-bottom:1px solid var(--line-soft);transition:background .12s;border-radius:8px}
.ru-item:last-child{border-bottom:none}
.ru-item:hover{background:var(--surface)}
.ru-rank{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:12.5px;font-weight:800;background:var(--surface);border:1px solid var(--line-soft)}
.ru-main{min-width:0}
.ru-name{font-size:12.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ru-sub{font-size:10px;color:var(--faint);margin-top:1px}
.ru-kpi{font-size:12px;font-weight:700;color:var(--ink);text-align:center;display:flex;justify-content:center}
.ru-score{display:flex;align-items:center;gap:9px}
.ru-bar{flex:1;height:7px;background:var(--line-soft);border-radius:6px;overflow:hidden}
.ru-bar i{display:block;height:100%;border-radius:6px}
.ru-score b{font-size:13px;font-weight:800;color:var(--ink);width:26px;text-align:end}
/* activity timeline v3 */
.atl{position:relative;margin-top:4px}
.atl-item{position:relative;display:grid;grid-template-columns:34px 1fr;gap:12px;padding-bottom:12px}
.atl-item:last-child{padding-bottom:0}
.atl-rail{position:relative;display:flex;justify-content:center}
.atl-rail::before{content:"";position:absolute;top:32px;bottom:-12px;width:2px;background:var(--line-soft)}
.atl-item:last-child .atl-rail::before{display:none}
.atl-dot{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex:none;z-index:1}
.atl-dot .ic{width:16px;height:16px}
.atl-card{border:1px solid var(--line);border-radius:11px;background:var(--card);overflow:hidden;transition:border-color .14s,box-shadow .14s}
.atl-card:hover{border-color:var(--border-strong);box-shadow:var(--shadow-sm)}
.atl-row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;padding:10px 13px;cursor:pointer}
.atl-main{min-width:0}
.atl-title{font-size:12.5px;font-weight:700;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.atl-meta{font-size:10.5px;color:var(--muted);margin-top:3px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.atl-sep{color:var(--faint)}
.atl-right{display:flex;align-items:center;gap:9px;flex:none}
.atl-time{font-size:10.5px;color:var(--faint);font-weight:600;white-space:nowrap}
.atl-chev{width:15px !important;height:15px !important;stroke:var(--faint);transition:transform .2s}
.atl-item.open .atl-chev{transform:rotate(180deg)}
.atl-item.open .atl-card{border-color:var(--border-strong)}
@media (max-width:1200px){
  .sr-row2,.inv-row2,.inv-tiles{grid-template-columns:1fr}
  .inv-tiles{grid-template-columns:1fr 1fr}
  .ru-head,.ru-item{grid-template-columns:34px 1.4fr 1fr 1.4fr}
  .ru-head span:nth-child(4),.ru-item .ru-kpi:nth-of-type(2){display:none}
  .cat-head-row,.cat-row{grid-template-columns:1.2fr 1fr 50px 64px}
  .cat-head-row .cat-c3,.cat-row .cat-c3{display:none}
}

/* hourly chart fills card + green+beige trend pills */
.hour-card{display:flex;flex-direction:column}
.hour-card .card-head{flex:none}
.hour-card .col-chart{flex:1 1 auto;height:auto;min-height:220px;width:100%}
.pos-page .trend.up{color:var(--trend-up-ink);background:var(--trend-up-bg);border-color:var(--trend-up-bd)}
.pos-page .trend.down{color:var(--trend-dn-ink);background:var(--trend-dn-bg);border-color:var(--trend-dn-bd)}

/* performance top row: trend + hourly side by side */
.perf-top-row{display:grid;grid-template-columns:1.35fr 1fr;gap:14px;margin-top:10px;align-items:start}
.colpro-wrap{margin-top:8px}
.colpro{width:100%;height:auto;display:block;overflow:visible}
.cpro-bar{transition:opacity .16s}
.colpro:hover .cpro-bar{opacity:.5}
.colpro .cpro-bar:hover{opacity:1}
.mv-split2{display:grid;grid-template-columns:1fr 1fr;gap:26px;margin-top:4px}
.mv2-col .mv2-h{margin-bottom:9px}
@media (max-width:1200px){.perf-top-row,.mv-split2{grid-template-columns:1fr}}

/* POS Activity Table */
.pos-tbl-card{padding:16px}
.pos-toolbar{display:flex;align-items:center;gap:9px;flex-wrap:wrap;margin-bottom:14px}
.pos-search{display:flex;align-items:center;gap:7px;height:34px;padding:0 11px;border:1px solid var(--line);border-radius:9px;background:var(--surface);flex:1;min-width:170px;max-width:260px}
.pos-search .ic{width:14px;height:14px;stroke:var(--faint)}
.pos-search input{border:none;background:none;outline:none;font-family:inherit;font-size:12px;color:var(--ink);width:100%}
.pos-refresh{display:inline-flex;align-items:center;gap:6px;height:34px;padding:0 13px;border:1px solid var(--line);border-radius:9px;background:var(--card);font-family:inherit;font-size:12px;font-weight:700;color:var(--brand);cursor:pointer;transition:all .14s;margin-inline-start:auto}
.pos-refresh:hover{background:var(--surface);border-color:var(--brand)}
.pos-refresh .ic{width:14px;height:14px;stroke:var(--data-1)}
.pos-refresh.spin .ic{animation:posspin .5s linear}
@keyframes posspin{to{transform:rotate(360deg)}}
.pos-scroll{overflow-x:auto;border:1px solid var(--line-soft);border-radius:12px}
.pos-table{width:100%;border-collapse:collapse;font-size:12.5px;min-width:820px}
.pos-table thead th{text-align:start;font-size:10.5px;font-weight:800;color:var(--faint);letter-spacing:.02em;padding:12px 14px;background:var(--surface);border-bottom:1px solid var(--line);white-space:nowrap}
.pos-table tbody td{padding:11px 14px;border-bottom:1px solid var(--line-soft);color:var(--ink);white-space:nowrap;vertical-align:middle}
.pos-table tbody tr:last-child td{border-bottom:none}
.pos-table tbody tr:hover{background:var(--surface)}
.pos-id{font-weight:800;color:var(--brand);font-variant-numeric:tabular-nums}
.pos-store{color:var(--muted)}
.pos-badge{display:inline-flex;align-items:center;gap:6px;font-size:10.5px;font-weight:800;padding:3px 10px;border-radius:20px;white-space:nowrap}
.pos-dot{width:7px;height:7px;border-radius:50%;flex:none}
.pos-dot.pulse{animation:posPulse 1.3s ease-in-out infinite}
@keyframes posPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.45;transform:scale(.75)}}
.pos-cashier{display:inline-flex;align-items:center;gap:7px;font-weight:600}
.pos-av{width:22px;height:22px;border-radius:7px;background:var(--gold-soft);color:var(--brand);font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;flex:none}
.pos-dash{color:var(--faint);font-weight:700}
.pos-last{font-size:11px;color:var(--faint)}
.pos-sales{font-size:14.5px;font-weight:800;color:var(--brand);font-variant-numeric:tabular-nums}
.pos-sales.zero{color:var(--faint);font-weight:700}
.pos-empty{padding:26px;text-align:center;color:var(--faint);font-size:12px}
.pos-foot{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:14px;flex-wrap:wrap}
.pos-total{display:inline-flex;align-items:center;gap:7px;font-size:12px;color:var(--muted);font-weight:600}
.pos-total .ic{width:15px;height:15px;stroke:var(--data-1)}
.pos-total b{color:var(--ink);font-weight:800}
.pager{display:flex;align-items:center;gap:5px}
.pg-btn{min-width:30px;height:30px;padding:0 8px;border:1px solid var(--line);border-radius:8px;background:var(--card);font-family:inherit;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .12s}
.pg-btn:hover:not(:disabled){border-color:var(--brand);color:var(--brand)}
.pg-btn.on{background:var(--data-1);color:#fff;border-color:var(--brand)}
.pg-btn:disabled{opacity:.4;cursor:not-allowed}

/* equal-height performance row + interactive hour bars */
.perf-top-row{align-items:stretch}
.perf-top-row .card{display:flex;flex-direction:column}
.perf-top-row .card .card-head{flex:none}
.sr-trend-card .sr-trend-wrap{flex:1;margin-top:8px}
.sr-trend-card .sr-chart{width:100%;height:100%;min-height:230px}
.hour-card .colpro-wrap,.hour-card .hbars2{flex:1}
.hbars2{position:relative;display:flex;align-items:flex-end;gap:12px;min-height:240px;padding:26px 4px 0;margin-top:8px}
.hbar2-grid{position:absolute;inset:26px 4px 28px;display:flex;flex-direction:column;justify-content:space-between;pointer-events:none;z-index:0}
.hbar2-grid span{height:1px;width:100%;background:var(--line-soft)}
.hbar2{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end;cursor:pointer}
.hbar2-track{width:100%;flex:1;display:flex;align-items:flex-end;min-height:0}
.hbar2-fill{position:relative;width:100%;background:linear-gradient(180deg,var(--fill-a),var(--fill-b));border-radius:8px 8px 3px 3px;min-height:6px;transition:filter .16s,transform .16s;transform-origin:bottom}
.hbar2.peak .hbar2-fill{background:linear-gradient(180deg,#0F5049,#2E7D6E)}
.hbar2:hover .hbar2-fill{filter:brightness(1.08) saturate(1.1);transform:scaleX(1.04)}
.hbar2-val{position:absolute;top:-20px;left:50%;transform:translateX(-50%);font-size:11.5px;font-weight:800;color:var(--muted);font-variant-numeric:tabular-nums}
.hbar2.peak .hbar2-val{color:var(--data-1)}
.hbar2-lbl{font-size:11px;color:var(--faint);font-weight:600;margin-top:8px;white-space:nowrap}
.hbar2-tip{position:absolute;transform:translate(-50%,-100%);background:var(--tip-bg);color:var(--on-brand);border-radius:10px;padding:9px 12px;pointer-events:none;opacity:0;transition:opacity .15s;white-space:nowrap;box-shadow:var(--shadow-md);z-index:6}
.hbar2-tip .th{font-size:9.5px;color:#A9C7C1;font-weight:800;margin-bottom:5px;letter-spacing:.02em}
.hbar2-tip .tr{display:flex;justify-content:space-between;gap:18px;font-size:11.5px;line-height:1.7}
.hbar2-tip .tr span{color:#B9D4CE}
.hbar2-tip .tr b{font-weight:800}

/* Inventory Analytics — revenue-card style */
.ia-card{padding:18px}
.ia-rows{display:flex;flex-direction:column;gap:17px;margin-top:8px}
.ia-row-top{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin-bottom:8px}
.ia-name{font-size:13px;font-weight:800;color:var(--ink)}
.ia-orders{font-size:11px;color:var(--faint);font-weight:600;margin-inline-start:5px}
.ia-right{display:flex;align-items:center;gap:14px;white-space:nowrap}
.ia-chg{font-size:11.5px;font-weight:800}
.ia-chg.up{color:#1E7A5A}
.ia-chg.down{color:#8A7A4E}
.ia-val{font-size:12.5px;font-weight:800;color:var(--ink)}
