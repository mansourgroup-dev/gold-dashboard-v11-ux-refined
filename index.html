.ia-bar{position:relative;display:flex;align-items:center;height:26px;background:var(--surface);border:1px solid var(--line-soft);border-radius:9px}
.ia-fill{height:100%;display:flex;align-items:center;justify-content:center;border-radius:8px;background:linear-gradient(90deg,#0F5049,#2E7D6E);min-width:8px}
.ia-row.slow .ia-fill{background:linear-gradient(90deg,var(--fill-slow-a),var(--fill-slow-b))}
.ia-pct{color:#fff;font-size:11px;font-weight:800;text-align:center}
.ia-row.slow .ia-pct{color:#3A3320}
.ia-pct-out{font-size:11px;font-weight:800;color:var(--muted);padding-inline-start:9px}
.ia-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:20px;padding-top:18px;border-top:1px solid var(--line-soft)}
.ia-kpi{display:flex;flex-direction:column;align-items:center;text-align:center;gap:8px;padding:12px 6px;background:var(--surface);border:1px solid var(--line-soft);border-radius:12px}
.ia-kpi-ic{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center}
.ia-kpi-ic .ic{width:17px;height:17px}
.ia-kpi-val{font-size:18px;font-weight:800;color:var(--ink);line-height:1}
.ia-kpi-val .u{font-size:10px;font-weight:600;color:var(--faint);margin-inline-start:2px}
.ia-kpi-lbl{font-size:10.5px;color:var(--muted);font-weight:600}
@media (max-width:1200px){.ia-kpis{grid-template-columns:1fr 1fr}}

/* two facing product columns */
.ia-cols{display:grid;grid-template-columns:1fr 1fr;gap:28px;margin-top:8px}
.ia-col-h{font-size:10.5px;font-weight:800;color:var(--muted);display:flex;align-items:center;gap:6px;margin-bottom:13px;padding-bottom:9px;border-bottom:1px solid var(--line-soft)}
.ia-col .ia-rows{gap:15px;margin-top:0}
@media(max-width:1200px){.ia-cols{grid-template-columns:1fr;gap:20px}}

/* 2x3 grid: two rows (fast/slow) of 3 horizontal charts each */
.ia-cols{display:flex;flex-direction:column;gap:18px;margin-top:8px}
.ia-col .ia-rows{display:grid;grid-template-columns:repeat(3,1fr);gap:16px 22px}
.ia-sub{font-size:10.5px;color:var(--faint);font-weight:600;margin:2px 0 8px}
.ia-row-top{margin-bottom:0}
@media(max-width:1200px){.ia-col .ia-rows{grid-template-columns:1fr 1fr}}
@media(max-width:760px){.ia-col .ia-rows{grid-template-columns:1fr}}

/* products in a 3x2 grid (all of selected type) */
.ia-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px 22px;margin-top:12px}
@media(max-width:1200px){.ia-grid{grid-template-columns:1fr 1fr}}
@media(max-width:760px){.ia-grid{grid-template-columns:1fr}}

/* E-commerce sub-tabs + dual-line legend */
.ec-tabs{display:flex;gap:4px;overflow-x:auto;border-bottom:1px solid var(--line);margin-bottom:4px}
.ec-tab{white-space:nowrap;font-size:12px;font-weight:700;color:var(--muted);padding:10px 15px;border:none;background:none;cursor:pointer;position:relative;font-family:inherit;transition:color .14s}
.ec-tab:hover{color:var(--ink)}
.ec-tab.on{color:var(--brand)}
.ec-tab.on::after{content:"";position:absolute;inset-inline:10px;bottom:-1px;height:2.5px;background:var(--data-1);border-radius:3px}
.dl-legend2{display:flex;gap:16px;justify-content:center;margin-top:8px}
.dl-legend2 span{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;color:var(--muted)}
.dl-legend2 i{width:14px;height:3px;border-radius:2px;display:block}

/* expandable parent + nested submenu (dark sidebar) */
.nav-parent .nav-caret{margin-inline-start:auto;display:flex;align-items:center;transition:transform .2s}
.nav-parent .nav-caret .ic{width:14px;height:14px;stroke:#9FBDB8;opacity:.9}
.nav-parent.open .nav-caret{transform:rotate(180deg)}
.nav-parent.open .nav-caret .ic{stroke:#F5F1EB}
.nav-sub{display:flex;flex-direction:column;gap:2px;margin:3px 0;padding-inline-start:23px;position:relative}
.nav-sub[hidden]{display:none}
.nav-sub::before{content:"";position:absolute;inset-inline-start:14px;top:3px;bottom:3px;width:1.5px;background:rgba(255,255,255,.13);border-radius:2px}
.nav-child{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:7px;color:#9FBDB8;font-size:12px;font-weight:500;width:100%;text-align:start;position:relative;transition:background .15s,color .15s}
.nav-child:hover{background:rgba(255,255,255,.06);color:#fff}
.nav-child .nav-dot{width:6px;height:6px;border-radius:50%;background:#6F9691;flex:none;transition:background .15s,box-shadow .15s}
.nav-child:hover .nav-dot{background:#C9DEDA}
.nav-child.active{color:#fff;font-weight:600;background:rgba(255,255,255,.09)}
.nav-child.active .nav-dot{background:#F5F1EB;box-shadow:0 0 0 3px rgba(245,241,235,.16)}
/* e-commerce scope chip */
.ec-scope{display:inline-flex;align-items:center;gap:7px;font-size:11.5px;font-weight:700;color:var(--brand);background:var(--gold-soft);border:1px solid var(--warning-border);padding:5px 12px;border-radius:20px;width:fit-content}
.ec-scope .ic{width:13px;height:13px;stroke:var(--data-1)}

/* E-commerce admin: fulfillment tiles, badges, stock, order actions */
.fulfil-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:12px}
.fulfil-tile{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:9px;box-shadow:var(--shadow-sm);transition:transform .15s,box-shadow .15s}
.fulfil-tile:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.fulfil-ic{width:32px;height:32px;border-radius:9px;background:var(--surface);border:1px solid var(--line-soft);display:flex;align-items:center;justify-content:center}
.fulfil-ic .ic{width:16px;height:16px}
.fulfil-val{font-size:20px;font-weight:800;color:var(--ink);line-height:1}
.fulfil-lbl{font-size:10.5px;color:var(--muted);font-weight:600;line-height:1.3}
.ec-badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:800;padding:3px 10px;border-radius:20px;white-space:nowrap}
.stock-list{display:flex;flex-direction:column}
.stock-item{display:flex;align-items:center;gap:11px;padding:11px 4px;border-bottom:1px solid var(--line-soft)}
.stock-item:last-child{border-bottom:none}
.stock-ic{width:30px;height:30px;border-radius:8px;background:var(--surface);border:1px solid var(--line-soft);display:flex;align-items:center;justify-content:center;flex:none}
.stock-ic .ic{width:15px;height:15px}
.stock-body{flex:1;min-width:0}
.stock-name{font-size:12.5px;font-weight:700;color:var(--ink)}
.stock-sub{font-size:10.5px;color:var(--faint);margin-top:1px}
.ord-actions{display:flex;gap:6px}
.ord-btn{width:28px;height:28px;border-radius:7px;border:1px solid var(--line);background:var(--card);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .12s}
.ord-btn:hover{border-color:var(--brand);background:var(--surface)}
.ord-btn .ic{width:14px;height:14px;stroke:var(--data-1)}
@media(max-width:1200px){.fulfil-grid{grid-template-columns:repeat(4,1fr)}}
@media(max-width:760px){.fulfil-grid{grid-template-columns:1fr 1fr}}

/* reference-style campaign trend + comparison card */
.rc-wrap{position:relative;margin-top:6px}
.rc-svg{width:100%;height:auto;display:block;overflow:visible}
.rc-hit{cursor:pointer}
.rc-legend{display:flex;gap:18px;margin:2px 0 2px}
.rc-legend span{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:var(--muted)}
.rc-legend i{width:10px;height:10px;border-radius:3px;display:block}
.rc-tip{position:absolute;transform:translate(-50%,-100%);background:#fff;border:1px solid var(--line);border-radius:12px;padding:9px 12px;box-shadow:var(--shadow-md);pointer-events:none;opacity:0;transition:opacity .12s;white-space:nowrap;z-index:6;min-width:158px}
.rc-th{font-size:10px;font-weight:800;color:var(--faint);margin-bottom:6px}
.rc-tr{display:flex;align-items:center;justify-content:space-between;gap:18px;font-size:11.5px;line-height:1.8}
.rc-tr span{display:flex;align-items:center;gap:6px;color:var(--muted);font-weight:600}
.rc-tr i{width:9px;height:9px;border-radius:2px;display:block}
.rc-tr b{font-weight:800;color:var(--ink)}
.cmp-rows{display:flex;flex-direction:column;gap:15px;margin-top:6px}
.cmp-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.cmp-k{font-size:11.5px;color:var(--muted);font-weight:600}
.cmp-delta{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:800}
.cmp-delta.up{color:var(--up)}
.cmp-delta.down{color:var(--down)}
.cmp-delta .ic{width:11px;height:11px;stroke:currentColor}
.cmp-vals{display:flex;align-items:baseline;gap:8px;margin-bottom:7px}
.cmp-vals b{font-size:15px;font-weight:800;color:var(--ink)}
.cmp-vals span{font-size:10.5px;color:var(--faint)}
.cmp-bars{display:flex;flex-direction:column;gap:4px}
.cmp-b{height:6px;border-radius:5px;min-width:4px;transition:width .4s ease}
.cmp-b.cur{background:var(--data-1)}
.cmp-b.prev{background:var(--chart-track)}

.rc-bseg{transition:opacity .15s}
.rc-xl{transition:fill .12s}

/* mobile interactive revenue chart */
.mr-wrap{position:relative;margin-top:6px}
.mr-svg{width:100%;height:auto;display:block;overflow:visible}
.mr-hit{cursor:pointer}
.mr-tip{position:absolute;transform:translate(-50%,-118%);background:var(--data-1);color:#fff;border-radius:9px;padding:7px 11px;font-size:11px;pointer-events:none;opacity:0;transition:opacity .12s;white-space:nowrap;box-shadow:var(--shadow-md);z-index:6}
.mr-tip .l{display:block;font-size:9.5px;color:#A9C7C1;font-weight:600;margin-bottom:2px}
.mr-tip b{font-size:13px;font-weight:800}
.mr-line{stroke-dasharray:2600;stroke-dashoffset:2600;animation:mrDraw 1s ease forwards}
@keyframes mrDraw{to{stroke-dashoffset:0}}

/* payment methods — horizontal bars (reference style) */
.pay-list{display:flex;flex-direction:column;gap:16px;margin-top:6px}
.pay-top{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin-bottom:8px}
.pay-name{font-size:13px;font-weight:800;color:var(--ink)}
.pay-sub{font-size:11px;color:var(--faint);font-weight:600;margin-inline-start:5px}
.pay-right{display:flex;align-items:center;gap:14px;white-space:nowrap}
.pay-chg{font-size:11.5px;font-weight:800}
.pay-chg.up{color:var(--up)}
.pay-chg.down{color:var(--down)}
.pay-val{font-size:12.5px;font-weight:800;color:var(--ink)}
.pay-bar{position:relative;display:flex;align-items:center;height:26px;background:var(--surface);border:1px solid var(--line-soft);border-radius:9px}
.pay-fill{height:100%;display:flex;align-items:center;justify-content:flex-end;border-radius:8px;background:linear-gradient(90deg,var(--brand),#2E7D6E);min-width:8px}
.pay-pct{color:var(--on-fill);font-size:11px;font-weight:800;padding-inline-end:11px}
.pay-pct-out{font-size:11px;font-weight:800;color:var(--muted);padding-inline-start:9px}

/* gold ounce + combined-store bits */
.gold-top{display:flex;align-items:baseline;gap:12px;margin:4px 0 10px;flex-wrap:wrap}
.gold-val{font-size:28px;font-weight:800;color:var(--ink);line-height:1}
.gold-val .u{font-size:12px;color:var(--faint);font-weight:600;margin-inline-start:4px}
.gold-ohlc{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:12px;padding-top:12px;border-top:1px solid var(--line-soft)}
.gold-ohlc span{font-size:10px;color:var(--faint);display:block;margin-bottom:2px}
.gold-ohlc b{font-size:13px;font-weight:800;color:var(--ink)}
.fulfil-sub{font-size:10px;color:var(--faint);font-weight:600}

/* net profit bar chart (reference style) */
.pf-chart{margin-top:14px}
.pf-bars{display:flex;align-items:stretch;gap:16px;height:240px}
.pf-bar{flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;height:100%}
.pf-top{display:flex;flex-direction:column;align-items:center;gap:6px;margin-bottom:8px}
.pf-badge{display:inline-flex;align-items:center;gap:3px;font-size:10.5px;font-weight:800;padding:3px 9px;border-radius:20px;background:var(--elev-4);border:1px solid var(--line);box-shadow:var(--shadow-sm);white-space:nowrap}
.pf-badge.up{color:var(--up)}
.pf-badge.down{color:var(--down)}
.pf-badge .ic{width:11px;height:11px}
.pf-val{font-size:11px;font-weight:800;color:var(--on-data);background:var(--data-1);padding:3px 10px;border-radius:8px;box-shadow:var(--shadow-md);opacity:0;transition:opacity .15s;white-space:nowrap}
.pf-bar.hot .pf-val,.pf-bar:hover .pf-val{opacity:1}
.pf-fill{width:100%;max-width:64px;border-radius:12px 12px 5px 5px;min-height:10px;transition:filter .15s}
.pf-bar:hover .pf-fill{filter:brightness(1.09)}
.pf-labels{display:flex;gap:16px;margin-top:10px}
.pf-labels span{flex:1;text-align:center;font-size:11px;font-weight:600;color:var(--faint)}
.pf-layout{display:grid;grid-template-columns:180px 1fr;gap:26px;align-items:center;margin-top:6px}
.pf-side{background:var(--surface);border:1px solid var(--line-soft);border-radius:14px;padding:18px}
.pf-cap{font-size:12px;font-weight:800;color:var(--muted)}
.pf-lbl2{font-size:11px;color:var(--faint);font-weight:600;margin-top:2px}
.pf-total{font-size:26px;font-weight:800;color:var(--brand);margin-top:10px;line-height:1.15}
.pf-total .u{font-size:12px;color:var(--faint);font-weight:600;margin-inline-start:4px}
@media(max-width:900px){.pf-layout{grid-template-columns:1fr}}

/* campaign bars interactive tooltip */
#campBars{position:relative}
.camp-row{cursor:pointer}
.camp-tip{position:absolute;transform:translate(-50%,-100%);background:var(--elev-4);border:1px solid var(--line);border-radius:12px;padding:9px 12px;box-shadow:var(--shadow-md);pointer-events:none;opacity:0;transition:opacity .12s;white-space:nowrap;z-index:7;min-width:158px}
.camp-tip .ct-h{font-size:10.5px;font-weight:800;color:var(--brand);margin-bottom:6px}
.camp-tip .ct-r{display:flex;justify-content:space-between;gap:18px;font-size:11px;line-height:1.75}
.camp-tip .ct-r span{color:var(--muted);font-weight:600}
.camp-tip .ct-r b{font-weight:800;color:var(--ink)}

/* net profit — interactive area chart */
.pf-area{position:relative;flex:1}
.pf-svg{width:100%;height:auto;display:block;overflow:visible}
.pf-hit{cursor:pointer}
.pf-line{stroke-dasharray:2200;stroke-dashoffset:2200;animation:pfDraw 1s ease forwards}
@keyframes pfDraw{to{stroke-dashoffset:0}}
.pf-tip{position:absolute;transform:translate(-50%,-118%);background:var(--data-1);color:#fff;border-radius:9px;padding:7px 11px;font-size:11px;pointer-events:none;opacity:0;transition:opacity .12s;white-space:nowrap;box-shadow:var(--shadow-md);z-index:6}
.pf-tip .l{display:block;font-size:9.5px;color:#A9C7C1;font-weight:600;margin-bottom:2px}
.pf-tip b{font-size:13px;font-weight:800}
.pf-side-chg{margin-top:10px;font-size:12px;font-weight:800;display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;width:fit-content}

.cs-wrap{position:relative;margin-top:4px}
.cs-hit{cursor:pointer}

/* campaign stacked bars: badge (profit %) + return label */
.cb-card{display:flex;flex-direction:column}
.cb-wrap{position:relative;margin-top:4px;flex:1;display:flex;flex-direction:column;min-height:0}
.cb-chart{display:flex;gap:16px;align-items:stretch;padding-top:8px;flex:1;min-height:0}
.cb-bar{flex:1;display:flex;flex-direction:column;align-items:center;cursor:pointer}
.cb-track{position:relative;width:100%;max-width:66px;flex:1;min-height:130px;margin:0 auto}
.cb-col{position:absolute;left:0;right:0;bottom:0;display:flex;flex-direction:column;border-radius:10px 10px 5px 5px;overflow:hidden;transition:filter .15s}
.cb-bar:hover .cb-col{filter:brightness(1.07)}
.cb-profit{background:var(--fill-profit);min-height:4px}
.cb-spend{background:var(--data-1);min-height:4px}
.cb-badge{position:absolute;left:50%;transform:translateX(-50%);font-size:10.5px;font-weight:800;color:var(--brand);background:var(--gold-soft);border:1px solid var(--warning-border);padding:2px 8px;border-radius:20px;white-space:nowrap}
.cb-name{margin-top:10px;font-size:11px;font-weight:700;color:var(--ink);text-align:center}
.cb-return{font-size:10.5px;color:var(--muted);font-weight:700;text-align:center;margin-top:1px}

/* revenue balance-summary chart */
.rv-wrap{position:relative;margin-top:6px}
.rv-svg{width:100%;height:auto;display:block;overflow:visible}
.rv-hit{cursor:pointer}
.rv-tip{position:absolute;transform:translate(-50%,-118%);background:#2E3A42;color:#fff;border-radius:10px;padding:8px 12px;pointer-events:none;opacity:0;transition:opacity .12s;white-space:nowrap;box-shadow:var(--shadow-md);z-index:6}
.rv-tip b{font-size:14px;font-weight:800;display:block}
.rv-tip .l{font-size:9.5px;color:#A9B2AE;margin-top:2px}

/* merchant contracts card */
.ct-list{display:flex;flex-direction:column;margin-top:4px}
.ct-row{display:flex;align-items:center;gap:11px;padding:11px 4px;border-bottom:1px solid var(--line-soft)}
.ct-row:last-child{border-bottom:none}
.ct-ic{width:32px;height:32px;border-radius:9px;background:var(--surface);border:1px solid var(--line-soft);display:flex;align-items:center;justify-content:center;flex:none}
.ct-ic .ic{width:15px;height:15px}
.ct-body{flex:1;min-width:0}
.ct-name{font-size:12.5px;font-weight:700;color:var(--ink)}
.ct-sub{font-size:10.5px;color:var(--faint);font-weight:600;margin-top:1px}
.ct-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;white-space:nowrap}
.ct-val{font-size:12px;font-weight:800;color:var(--ink)}
.ct-empty{padding:26px 0;text-align:center;font-size:12px;color:var(--faint);font-weight:600}

/* regions / locations page */
.regions-layout{display:grid;grid-template-columns:1.7fr 1fr;gap:18px;align-items:start}
@media(max-width:1000px){.regions-layout{grid-template-columns:1fr}}
.rmap-card .map-svg-wrap{min-height:440px}
.reg-panel{position:sticky;top:16px}
.reg-panel-head{display:flex;align-items:center;gap:9px;padding-bottom:12px;border-bottom:1px solid var(--line-soft);margin-bottom:14px;flex-wrap:wrap}
.reg-dot{width:11px;height:11px;border-radius:50%;background:var(--data-1);flex:none}
.reg-name{font-size:16px;font-weight:800;color:var(--ink)}
.reg-share{font-size:11px;font-weight:800;color:#8A6D1E;background:var(--gold-soft);border:1px solid var(--warning-border);padding:3px 10px;border-radius:20px;margin-inline-start:auto}
.reg-kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.reg-kpi{background:var(--surface);border:1px solid var(--line-soft);border-radius:12px;padding:13px}
.reg-kpi-ic{width:30px;height:30px;border-radius:8px;background:var(--card);border:1px solid var(--line-soft);display:flex;align-items:center;justify-content:center;margin-bottom:8px}
.reg-kpi-ic .ic{width:15px;height:15px}
.reg-kpi-v{font-size:17px;font-weight:800;color:var(--ink);line-height:1.1}
.reg-kpi-l{font-size:10.5px;color:var(--muted);font-weight:600;margin-top:3px}
.branch-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
@media(max-width:1100px){.branch-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:680px){.branch-grid{grid-template-columns:1fr}}
.branch-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:var(--shadow-sm);transition:transform .15s,box-shadow .15s}
.branch-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.bc-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:12px}
.bc-name{font-size:13.5px;font-weight:800;color:var(--ink)}
.bc-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.bc-stat{display:flex;flex-direction:column;gap:2px}
.bc-stat span{font-size:10px;color:var(--faint);font-weight:600}
.bc-stat b{font-size:13px;font-weight:800;color:var(--ink)}
.bc-foot{display:flex;align-items:center;gap:8px;margin-top:12px;padding-top:11px;border-top:1px solid var(--line-soft)}
.bc-growth{font-size:12px;font-weight:800;display:inline-flex;align-items:center;gap:3px}
.bc-growth.up{color:var(--up)}.bc-growth.down{color:var(--down)}
.bc-growth .ic{width:12px;height:12px}
.bc-foot-l{font-size:10px;color:var(--faint);font-weight:600}
.reg-anim{animation:regFade .35s ease}
@keyframes regFade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* CRM page */
.f-select{font-family:inherit;font-size:12px;font-weight:700;color:var(--ink);background:var(--card);border:1px solid var(--line);border-radius:9px;padding:8px 12px;cursor:pointer}
.cg-wrap{position:relative;margin-top:4px}
.cg-svg{width:100%;height:auto;display:block;overflow:visible}
.cg-hit{cursor:pointer}
.cg-legend{display:flex;gap:16px;margin:2px 0 2px}
.cg-legend span{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:var(--muted)}
.cg-legend i{width:11px;height:11px;border-radius:3px;display:block}
.cg-tip{position:absolute;transform:translate(-50%,-100%);background:#fff;border:1px solid var(--line);border-radius:12px;padding:9px 12px;box-shadow:var(--shadow-md);pointer-events:none;opacity:0;transition:opacity .12s;white-space:nowrap;z-index:6;min-width:150px}
.cg-th{font-size:10px;font-weight:800;color:var(--faint);margin-bottom:6px}
.cg-tr{display:flex;align-items:center;justify-content:space-between;gap:16px;font-size:11.5px;line-height:1.7}
.cg-tr span{display:flex;align-items:center;gap:6px;color:var(--muted);font-weight:600}
.cg-tr i{width:9px;height:9px;border-radius:2px;display:block}
.cg-tr b{font-weight:800;color:var(--ink)}
.tl-list{display:flex;flex-direction:column;position:relative;margin-top:4px}
.tl-list::before{content:"";position:absolute;inset-inline-start:15px;top:14px;bottom:14px;width:1.5px;background:var(--line-soft)}
.tl-item{display:flex;align-items:center;gap:12px;padding:9px 0;position:relative}
.tl-ic{width:32px;height:32px;border-radius:9px;background:var(--surface);border:1px solid var(--line-soft);display:flex;align-items:center;justify-content:center;flex:none;z-index:1}
.tl-ic .ic{width:15px;height:15px}
.tl-ic.warn{background:var(--gold-soft);border-color:var(--warning-border)}
.tl-body{flex:1;min-width:0}
.tl-t{font-size:12.5px;font-weight:700;color:var(--ink)}
.tl-who{font-size:11px;color:var(--muted);font-weight:600;margin-top:1px}
.tl-time{font-size:10.5px;color:var(--faint);font-weight:600;white-space:nowrap}

/* customer segmentation donut + list */
.seg-donut-wrap{display:flex;justify-content:center;padding:8px 0 12px}
.seg-donut-svg{width:190px;height:190px}
.seg-list{border-top:1px solid var(--line-soft)}
.seg-row{display:flex;align-items:center;justify-content:space-between;padding:11px 4px;border-bottom:1px solid var(--line-soft)}
.seg-row:last-child{border-bottom:none}
.seg-name{font-size:13px;font-weight:700;color:var(--ink)}
.seg-pct{font-size:13px;font-weight:800;color:var(--muted)}

.seg-donut-wrap{position:relative}
.seg-slice{cursor:pointer;transition:opacity .15s}
.seg-tip{position:absolute;transform:translate(-50%,-118%);background:var(--elev-4);border:1px solid var(--line);border-radius:10px;padding:7px 11px;box-shadow:var(--shadow-md);pointer-events:none;opacity:0;transition:opacity .12s;white-space:nowrap;z-index:6}
.seg-tip b{font-size:12px;font-weight:800;color:var(--ink);display:block}
.seg-tip span{font-size:10.5px;color:var(--muted);font-weight:600}
.seg-cval,.seg-cname{transition:none}

/* employees page */
.et-wrap{position:relative;margin-top:4px}
.et-svg{width:100%;height:auto;display:block;overflow:visible}
.et-hit{cursor:pointer}
.et-tip{position:absolute;transform:translate(-50%,-118%);background:var(--data-1);color:#fff;border-radius:9px;padding:7px 11px;font-size:11px;pointer-events:none;opacity:0;transition:opacity .12s;white-space:nowrap;box-shadow:var(--shadow-md);z-index:6}
.et-tip .l{display:block;font-size:9.5px;color:#A9C7C1;font-weight:600;margin-bottom:2px}
.et-tip b{font-size:13px;font-weight:800}
.emp-rating{display:inline-flex;align-items:center;gap:4px;font-weight:800;color:#8A6D1E}
.emp-rating .ic{width:12px;height:12px;stroke:var(--gold)}
.ach-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
@media(max-width:900px){.ach-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:560px){.ach-grid{grid-template-columns:1fr}}
.ach-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:var(--shadow-sm);transition:transform .15s,box-shadow .15s}
.ach-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.ach-ic{width:34px;height:34px;border-radius:10px;background:var(--gold-soft);border:1px solid var(--warning-border);display:flex;align-items:center;justify-content:center;margin-bottom:10px}
.ach-ic .ic{width:16px;height:16px;stroke:#8A6D1E}
.ach-lbl{font-size:10.5px;color:var(--faint);font-weight:700}
.ach-who{font-size:13.5px;font-weight:800;color:var(--ink);margin-top:3px}
.ach-val{font-size:12px;font-weight:800;color:var(--brand);margin-top:2px}

/* top performer special card */
.top-perf-card{background:var(--data-1);border-radius:12px;padding:15px;color:#fff;display:flex;flex-direction:column;gap:11px}
.tp-badge{font-size:10px;font-weight:800;color:#C9B78E;display:inline-flex;align-items:center;gap:5px}
.tp-badge .ic{width:13px;height:13px;stroke:#C9B78E}
.tp-body{display:flex;align-items:center;gap:12px}
.tp-avatar{width:46px;height:46px;border-radius:50%;background:#EFE6CF;border:2px solid #C9B78E;display:flex;align-items:flex-end;justify-content:center;overflow:hidden;flex:none}
.tp-photo{width:100%;height:100%}
.tp-name{font-size:14px;font-weight:800;line-height:1.2}
.tp-role{font-size:11px;color:rgba(255,255,255,.75);font-weight:600;margin-top:2px}
.tp-foot{display:flex;align-items:baseline;gap:8px;margin-top:auto;padding-top:9px;border-top:1px solid rgba(255,255,255,.16)}
.tp-val{font-size:18px;font-weight:800;color:#C9B78E}
.tp-sub{font-size:10.5px;color:rgba(255,255,255,.72);font-weight:600}

/* branches overview cards */
.bpc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
@media(max-width:1100px){.bpc-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:680px){.bpc-grid{grid-template-columns:1fr}}
.bpc-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:var(--shadow-sm);cursor:pointer;transition:transform .15s,box-shadow .15s,border-color .15s}
.bpc-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);border-color:var(--brand)}
.bpc-head{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:12px}
.bpc-name{font-size:13.5px;font-weight:800;color:var(--ink)}
.bpc-city{display:flex;align-items:center;gap:4px;font-size:10.5px;color:var(--faint);font-weight:600;margin-top:2px}
.bpc-city .ic{width:12px;height:12px}
.bpc-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px;margin-bottom:13px}
.bpc-stat{display:flex;flex-direction:column;gap:2px}
.bpc-stat span{font-size:9.5px;color:var(--faint);font-weight:600}
.bpc-stat b{font-size:12.5px;font-weight:800;color:var(--ink)}
.bpc-g.up{color:var(--up)}.bpc-g.down{color:var(--down)}
.bpc-perf{padding-top:11px;border-top:1px solid var(--line-soft)}
.bpc-perf-top{display:flex;align-items:center;justify-content:space-between;font-size:10.5px;font-weight:700;color:var(--muted);margin-bottom:6px}
.bpc-perf-top b{color:var(--brand);font-weight:800}
.bpc-bar{height:6px;border-radius:20px;background:var(--surface);overflow:hidden}
.bpc-bar>div{height:100%;border-radius:20px;background:linear-gradient(90deg,var(--brand),var(--brand-2))}

/* karat analytics page */
.kt-guide{pointer-events:none}
.kb-wrap{position:relative;margin-top:4px}
.kb-bar{cursor:pointer}
.kb-bar:hover{filter:brightness(1.05)}
.ka-chip{display:inline-flex;align-items:center;gap:7px;font-weight:800;color:var(--ink)}
.ka-dot{width:10px;height:10px;border-radius:50%;display:inline-block;flex:none}
.ka-inv{display:inline-flex;align-items:center;gap:8px;font-weight:700;color:var(--muted);white-space:nowrap}
.ka-inv-bar{width:52px;height:6px;border-radius:20px;background:var(--surface);overflow:hidden;display:inline-block}
.ka-inv-bar>span{display:block;height:100%;border-radius:20px;background:linear-gradient(90deg,var(--brand),var(--brand-2))}
.cg-tip .cg-th{margin-bottom:6px}

/* interactive treasury chart */
.tc-wrap{position:relative;margin-top:6px}
.tc-bar{cursor:pointer;transition:opacity .15s}
.tc-fill{transition:filter .15s}
.tc-bar:hover .tc-fill{filter:brightness(1.1)}

/* finance page (business units) */
.fin-head{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;padding:12px 14px;background:var(--surface);border:1px solid var(--line-soft);border-radius:12px}
.ft-card{display:flex;flex-direction:column}
.ft-row{display:flex;align-items:center;justify-content:space-between;padding:12px 2px;border-bottom:1px solid var(--line-soft)}
.ft-l{font-size:12.5px;font-weight:700;color:var(--muted)}
.ft-v{font-size:14px;font-weight:800;display:inline-flex;align-items:center;gap:4px}
.ft-v.up{color:var(--up)}.ft-v.down{color:var(--down)}
.ft-v .ic{width:13px;height:13px}
.ft-note{display:flex;align-items:center;gap:6px;margin-top:auto;padding-top:12px;font-size:11px;font-weight:700;color:var(--brand);background:var(--gold-soft);border-radius:9px;padding:9px 11px}
.ft-note .ic{width:13px;height:13px}
.tb-layout{display:grid;grid-template-columns:260px 1fr;gap:14px;align-items:stretch}
@media(max-width:900px){.tb-layout{grid-template-columns:1fr}}
.tb-card{background:var(--data-1);color:#fff;display:flex;flex-direction:column;justify-content:center;gap:6px}
.tb-lbl{display:flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;color:#C9B78E}
.tb-lbl .ic{width:14px;height:14px;stroke:#C9B78E}
.tb-val{font-size:30px;font-weight:800;line-height:1.1}
.tb-val .u{font-size:12px;font-weight:600;color:rgba(255,255,255,.7);margin-inline-start:5px}
.tb-chg{font-size:12px;font-weight:800;color:#C9B78E;display:inline-flex;align-items:center;gap:4px;width:fit-content}
.tb-chg .ic{width:12px;height:12px;stroke:#C9B78E}
.tb-sub{font-size:10.5px;color:rgba(255,255,255,.65);font-weight:600}
.ir-row{display:flex;align-items:center;gap:11px;padding:14px 2px;border-bottom:1px solid var(--line-soft)}
.ir-row:last-child{border-bottom:none}
.ir-ic{width:32px;height:32px;border-radius:9px;background:var(--surface);border:1px solid var(--line-soft);display:flex;align-items:center;justify-content:center;flex:none}
.ir-ic .ic{width:15px;height:15px}
.ir-l{font-size:10.5px;color:var(--faint);font-weight:600}
.ir-n{font-size:13.5px;font-weight:800;color:var(--ink)}
.ir-v{margin-inline-start:auto;font-size:13px;font-weight:800;color:var(--brand)}


/* ===== DATE RANGE PICKER (topbar popover) ===== */
.date-tool{position:relative}
.date-tool>.tool{cursor:pointer}
.date-tool>.tool .cv{max-width:170px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.date-tool>.tool .chev{width:12px;height:12px;stroke:var(--faint);margin-inline-start:2px;flex:none}
.date-tool.open>.tool{border-color:var(--focus-ring)}
.dp-pop{position:absolute;top:calc(100% + 6px);inset-inline-end:0;z-index:60;width:290px;
  background:var(--elev-3);border:1px solid var(--border-strong);border-radius:12px;
  box-shadow:var(--shadow-md);padding:12px;display:none}
.date-tool.open .dp-pop{display:block}
.dp-sec{font-size:10px;font-weight:800;color:var(--faint);letter-spacing:.03em;
  text-transform:uppercase;margin:2px 2px 7px}
.dp-presets{display:flex;flex-direction:column;gap:4px}
.dp-preset{display:flex;align-items:center;gap:8px;width:100%;text-align:start;
  padding:8px 10px;border-radius:8px;font-size:12.5px;font-weight:600;color:var(--ink);
  border:1px solid transparent;transition:background .12s,border-color .12s}
.dp-preset:hover{background:var(--hover-bg);border-color:var(--border)}
.dp-preset.on{background:var(--selected-bg);border-color:var(--accent);color:var(--ink);font-weight:700}
.dp-preset .dp-tick{margin-inline-start:auto;width:13px;height:13px;stroke:var(--accent);opacity:0}
.dp-preset.on .dp-tick{opacity:1}
.dp-div{height:1px;background:var(--border-soft);margin:11px 0}
.dp-range{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.dp-f{display:flex;flex-direction:column;gap:4px}
.dp-f label{font-size:10px;font-weight:700;color:var(--muted)}
.dp-f input{height:32px;padding:0 8px;border:1px solid var(--border);border-radius:7px;
  background:var(--elev-2);color:var(--ink);font-family:inherit;font-size:12px;outline:none;
  color-scheme:light}
[data-theme="dark"] .dp-f input{color-scheme:dark}
.dp-f input:focus{border-color:var(--focus-ring);box-shadow:0 0 0 2px rgba(95,211,172,.18)}
.dp-err{font-size:10.5px;font-weight:600;color:var(--error);margin-top:7px;display:none}
.dp-err.show{display:block}
.dp-actions{display:flex;gap:7px;margin-top:11px}
.dp-btn{flex:1;height:32px;border-radius:8px;font-size:12px;font-weight:700;
  border:1px solid var(--border);background:var(--elev-2);color:var(--ink);transition:background .12s}
.dp-btn:hover{background:var(--hover-bg)}
.dp-btn.primary{background:var(--accent);border-color:var(--accent);color:var(--on-accent)}
.dp-btn.primary:hover{background:var(--accent-hover);border-color:var(--accent-hover)}

/* ===== KARAT BY BRANCH — stepped horizontal bars ===== */
.kb-list{position:relative;display:flex;flex-direction:column;gap:14px;margin-top:14px}
.kb-row{display:grid;grid-template-columns:104px 1fr;align-items:center;gap:14px;cursor:pointer}
.kb-name{font-size:12px;font-weight:700;color:var(--ink);line-height:1.25;
  overflow-wrap:anywhere;text-align:start}
.kb-cells{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;height:38px}
.kbc{position:relative;border-radius:7px;background:var(--kb-empty);
  transition:transform .14s ease, filter .14s ease}
.kbc.on.s0{background:var(--kb-1)}
.kbc.on.s1{background:var(--kb-2)}
.kbc.on.s2{background:var(--kb-3)}
.kbc.on.s3{background:var(--kb-4)}
.kbc.on.s4{background:var(--kb-5)}
.kbc.on.s5{background:var(--kb-6)}
/* the value sits inside the final filled cell, as in the reference */
.kbc.last{display:flex;align-items:center;justify-content:center}
.kbc-val{font-size:11.5px;font-weight:800;color:var(--kb-val-ink);white-space:nowrap;
  padding:0 6px;letter-spacing:-.01em}
.kb-row:hover .kbc.on{filter:brightness(1.08)}
.kb-row:hover .kbc.last{transform:scale(1.04)}
@media(max-width:720px){
  .kb-row{grid-template-columns:84px 1fr;gap:10px}
  .kb-cells{height:32px;gap:4px}
  .kbc-val{font-size:10.5px}
}

/* ===== الوزن والفئات حسب العيار ===== */
.kw-wrap{margin-top:8px}
.kw-bar rect{transition:filter .14s ease}
.kw-bar:hover rect{filter:brightness(1.1)}
.kc-list{position:relative;display:flex;flex-direction:column;gap:11px;margin-top:12px}
.kc-row{display:grid;grid-template-columns:66px 1fr auto;align-items:center;gap:10px;cursor:pointer}
.kc-name{font-size:12px;font-weight:700;color:var(--ink);white-space:nowrap}
.kc-track{display:flex;height:22px;border-radius:6px;overflow:hidden;min-width:2%;
  background:var(--chart-track);transition:filter .14s ease}
.kc-row:hover .kc-track{filter:brightness(1.1)}
.kc-seg{display:block;height:100%}
.kc-seg + .kc-seg{box-shadow:inset 1px 0 0 var(--seg-line)}
.kc-val{font-size:12px;font-weight:800;color:var(--ink);white-space:nowrap;text-align:end;min-width:64px}
.kc-val span{font-size:9.5px;font-weight:600;color:var(--faint);margin-inline-start:2px}
@media(max-width:720px){.kc-row{grid-template-columns:56px 1fr auto;gap:7px}.kc-val{min-width:52px;font-size:11px}}

/* ===== FORECAST — premium dual-series comparison chart ===== */
.fc-card{background:var(--fc-surface);border:1px solid var(--fc-border);border-radius:16px;
  padding:22px 24px 16px;margin-top:10px}
.fc-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap}
.fc-eyebrow{font-size:10.5px;font-weight:700;color:var(--fc-muted);letter-spacing:.06em;
  text-transform:uppercase;margin-bottom:5px}
.fc-metric{display:flex;align-items:center;gap:9px;font-size:29px;font-weight:800;
  color:var(--ink);letter-spacing:-.02em;line-height:1}
.fc-unit{font-size:13px;font-weight:600;color:var(--faint);margin-inline-start:-3px}
.fc-growth{display:inline-flex;align-items:center;gap:3px;font-size:11.5px;font-weight:800;
  padding:3px 9px;border-radius:20px}
.fc-growth.up{color:var(--fc-1);background:var(--fc-growth-bg);border:1px solid var(--fc-growth-bd)}
.fc-growth.down{color:var(--trend-dn-ink);background:var(--trend-dn-bg);border:1px solid var(--trend-dn-bd)}
.fc-ga{width:11px;height:11px;stroke:currentColor}
.fc-acc{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;
  color:var(--muted);background:var(--surface);border:1px solid var(--border);
  padding:5px 10px;border-radius:8px}
.fc-acc .ic{stroke:var(--muted)}
.fc-ctrl{display:flex;align-items:center;justify-content:space-between;gap:12px;
  flex-wrap:wrap;margin:18px 0 6px}
.fc-sels{display:flex;gap:8px}
.fc-sel{height:32px;padding:0 26px 0 10px;border:1px solid var(--border);border-radius:9px;
  background:var(--card);color:var(--ink);font-family:inherit;font-size:12px;font-weight:600;
  outline:none;cursor:pointer;transition:border-color .14s}
.fc-sel:hover{border-color:var(--border-strong)}
.fc-sel:focus-visible{border-color:var(--focus-ring)}
.fc-legend{display:flex;gap:16px}
.fc-legend span{display:flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;color:var(--muted)}
.fc-legend i{width:9px;height:9px;border-radius:3px;flex:none}
.fc-legend i.d1{background:var(--fc-1)}
.fc-legend i.d2{background:var(--fc-2)}
.fc-plot{position:relative;margin-top:6px}
.fc-svg{width:100%;height:250px;display:block;overflow:visible}
.fc-grid{stroke:var(--fc-grid);stroke-width:1}
.fc-vline{stroke:var(--fc-grid);stroke-width:1;stroke-dasharray:4 5}
.fc-ylbl,.fc-xlbl{font-size:10px;font-weight:600;fill:var(--fc-muted);font-family:Cairo}
.fc-area{transition:opacity .3s ease}
.fc-l1{fill:none;stroke:var(--fc-1);stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round}
.fc-l2{fill:none;stroke:var(--fc-2);stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;opacity:.85}
/* hover affordances — hidden until needed, per the brief */
.fc-cursor{stroke:var(--fc-1);stroke-width:1.5;opacity:0;transition:opacity .16s ease}
.fc-cursor.on{opacity:.32}
.fc-dot{opacity:0;transition:opacity .16s ease;stroke:var(--fc-surface);stroke-width:2.5}
.fc-dot.on{opacity:1}
.fc-dot.d1{fill:var(--fc-1)}
.fc-dot.d2{fill:var(--fc-2)}
.fc-hit{cursor:crosshair}
.fc-tip{position:absolute;pointer-events:none;opacity:0;transform:translate(-50%,-112%);
  background:var(--fc-tip-bg);border:1px solid var(--fc-border);border-radius:11px;
  padding:10px 12px;min-width:158px;box-shadow:0 6px 20px rgba(0,0,0,.10);
  transition:opacity .16s ease, left .12s ease, top .12s ease;z-index:8}
[data-theme="dark"] .fc-tip{box-shadow:0 6px 22px rgba(0,0,0,.45)}
.fc-tip.on{opacity:1}
.fc-tip-h{font-size:9.5px;font-weight:800;color:var(--fc-muted);letter-spacing:.06em;
  text-transform:uppercase;margin-bottom:7px}
.fc-tip-r{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:2.5px 0}
.fc-tip-r b{font-size:12.5px;font-weight:800}
.fc-tip-r.r1 b{color:var(--fc-1)}
.fc-tip-r.r2 b{color:var(--fc-2)}
.fc-tip-r span{font-size:10.5px;font-weight:600;color:var(--fc-muted);white-space:nowrap}
@media(max-width:720px){
  .fc-card{padding:16px 14px 12px;border-radius:13px}
  .fc-metric{font-size:23px}
  .fc-svg{height:200px}
  .fc-ctrl{gap:9px}
  .fc-legend{gap:11px}
  .fc-sel{font-size:11px;height:30px}
}

/* ===== USERS & ROLES ===== */
.us-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.us-bar .tool.primary{margin-inline-start:auto}
/* bulk actions */
.us-bulk{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:10px 14px;
  background:var(--selected-bg);border-bottom:1px solid var(--border)}
.us-bulk-n{font-size:11.5px;font-weight:800;color:var(--ink)}
.us-bulk .tool{height:30px;font-size:11.5px}
.tool.danger{color:var(--error);border-color:var(--error-border)}
.tool.danger .ic{stroke:var(--error)}
.tool.danger:hover{background:var(--error-bg)}
.us-clear{margin-inline-start:auto;font-size:11.5px;font-weight:700;color:var(--muted);
  text-decoration:underline;text-underline-offset:2px}
.us-clear:hover{color:var(--ink)}
/* table */
.us-table th{white-space:nowrap}
.us-table tr.sel{background:var(--hover-bg)}
.us-sort{cursor:pointer;user-select:none}
.us-sort:hover{color:var(--ink)}
.us-sort.on{color:var(--ink)}
.us-caret{font-size:8.5px;margin-inline-start:4px;opacity:.65}
.us-id{display:flex;align-items:center;gap:8px;white-space:nowrap}
.us-av{width:26px;height:26px;border-radius:50%;flex:none;display:flex;align-items:center;
  justify-content:center;background:var(--brand-2);color:var(--on-brand);
  font-size:11px;font-weight:800}
.us-mail{color:var(--muted);font-size:11.5px;direction:ltr;text-align:start}
.us-dim{color:var(--muted)}
.us-role{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;white-space:nowrap}
.us-role i{width:7px;height:7px;border-radius:50%;flex:none}
.us-2fa{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;white-space:nowrap}
.us-2fa.on{color:var(--success)}
.us-2fa.on .ic{stroke:var(--success)}
.us-2fa.off{color:var(--faint)}
.us-2fa.off .ic{stroke:var(--warning)}
.us-acts{display:flex;gap:4px}
.us-ico{width:26px;height:26px;border-radius:7px;border:1px solid var(--border);
  background:var(--card);display:flex;align-items:center;justify-content:center;
  transition:background .12s,border-color .12s}
.us-ico .ic{stroke:var(--muted);width:13px;height:13px}
.us-ico:hover{background:var(--hover-bg);border-color:var(--border-strong)}
.us-ico:hover .ic{stroke:var(--ink)}
.us-ico.danger:hover{background:var(--error-bg);border-color:var(--error-border)}
.us-ico.danger:hover .ic{stroke:var(--error)}
/* checkbox */
.us-cb{display:inline-flex;cursor:pointer}
.us-cb input{position:absolute;opacity:0;width:0;height:0}
.us-cb span{width:15px;height:15px;border-radius:4px;border:1.5px solid var(--border-strong);
  background:var(--card);display:block;position:relative;transition:background .12s,border-color .12s}
.us-cb input:checked + span{background:var(--accent);border-color:var(--accent)}
.us-cb input:checked + span::after{content:"";position:absolute;inset-inline-start:4px;top:1px;
  width:4px;height:8px;border:solid var(--on-accent);border-width:0 2px 2px 0;transform:rotate(45deg)}
.us-cb input:focus-visible + span{outline:2px solid var(--focus-ring);outline-offset:2px}
/* footer + pagination */
.us-foot{display:flex;align-items:center;justify-content:space-between;gap:10px;
  flex-wrap:wrap;padding:12px 16px;border-top:1px solid var(--border)}
.us-count{font-size:11.5px;font-weight:600;color:var(--muted)}
.us-pg{display:flex;gap:4px}
.us-pg .pg-btn:disabled{opacity:.45;cursor:not-allowed}
/* roles */
.us-roles{display:grid;grid-template-columns:repeat(auto-fill,minmax(212px,1fr));gap:12px}
.us-rcard{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;
  cursor:pointer;transition:border-color .14s,background .14s}
.us-rcard:hover{border-color:var(--border-strong);background:var(--hover-bg)}
.us-rcard.on{border-color:var(--accent);background:var(--selected-bg)}
.us-rtop{display:flex;align-items:center;gap:7px}
.us-rtop b{font-size:13px;font-weight:800;color:var(--ink)}
.us-rdot{width:9px;height:9px;border-radius:50%;flex:none}
.us-rn{margin-inline-start:auto;font-size:11px;font-weight:800;color:var(--ink);
  background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:2px 8px}
.us-rd{font-size:11px;color:var(--muted);line-height:1.5;margin:7px 0 10px;min-height:33px}
.us-rfoot{display:flex;align-items:center;gap:5px;font-size:10.5px;font-weight:700;color:var(--faint);
  border-top:1px solid var(--border-soft);padding-top:8px}
.us-rfoot .ic{stroke:var(--faint);width:12px;height:12px}
/* permission matrix */
.perm-tbl td.pc,.perm-tbl th.pc{text-align:center;width:78px}
.perm-res{font-weight:700;white-space:nowrap}
.sw{display:inline-flex;cursor:pointer}
.sw input{position:absolute;opacity:0;width:0;height:0}
.sw-t{width:32px;height:18px;border-radius:20px;background:var(--chart-track);
  border:1px solid var(--border);display:block;position:relative;transition:background .16s,border-color .16s}
.sw-t::after{content:"";position:absolute;top:2px;inset-inline-start:2px;width:12px;height:12px;
  border-radius:50%;background:var(--faint);transition:transform .16s ease,background .16s}
.sw input:checked + .sw-t{background:var(--accent);border-color:var(--accent)}
.sw input:checked + .sw-t::after{background:var(--on-accent);transform:translateX(13px)}
[dir="rtl"] .sw input:checked + .sw-t::after{transform:translateX(-13px)}
.sw input:focus-visible + .sw-t{outline:2px solid var(--focus-ring);outline-offset:2px}
@media(max-width:720px){
  .us-bar .tool.primary{margin-inline-start:0;width:100%;justify-content:center}
  .us-roles{grid-template-columns:1fr 1fr}
  .us-rd{min-height:0}
}

/* ===== custom filter dropdown ===== */
.dd{position:relative;flex:none}
.dd-btn{display:flex;align-items:center;gap:6px;height:34px;width:158px;padding:0 10px;
  border:1px solid var(--border);border-radius:9px;background:var(--card);
  font-family:inherit;font-size:12px;font-weight:600;color:var(--muted);
  transition:border-color .13s,background .13s}
.dd-btn:hover{border-color:var(--border-strong);background:var(--hover-bg)}
.dd.open .dd-btn{border-color:var(--focus-ring)}
.dd.has .dd-btn{color:var(--ink);font-weight:700;border-color:var(--accent);background:var(--selected-bg)}
.dd-btn:focus-visible{outline:2px solid var(--focus-ring);outline-offset:2px}
.dd-lbl{flex:1;text-align:start;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dd-cv{width:12px;height:12px;stroke:var(--faint);flex:none;transition:transform .16s ease}
.dd.open .dd-cv{transform:rotate(180deg)}
.dd-x{display:flex;width:16px;height:16px;border-radius:50%;align-items:center;justify-content:center;
  background:var(--border-strong);flex:none;cursor:pointer}
.dd-x .ic{stroke:var(--ink);width:9px;height:9px}
.dd-x:hover{background:var(--error);}
.dd-x:hover .ic{stroke:#fff}
.ic-xs{width:11px;height:11px}
.dd-pop{position:absolute;top:calc(100% + 5px);inset-inline-start:0;z-index:60;width:206px;
  background:var(--elev-3);border:1px solid var(--border-strong);border-radius:11px;
  box-shadow:var(--shadow-md);padding:5px;display:none}
.dd.open .dd-pop{display:block}
.dd-search{display:flex;align-items:center;gap:6px;padding:6px 8px;margin-bottom:4px;
  border-bottom:1px solid var(--border-soft)}
.dd-search .ic{stroke:var(--faint);width:13px;height:13px;flex:none}
.dd-inp{flex:1;min-width:0;border:none;background:transparent;outline:none;
  font-family:inherit;font-size:12px;color:var(--ink)}
.dd-inp::placeholder{color:var(--faint)}
.dd-scroll{max-height:224px;overflow-y:auto;display:flex;flex-direction:column;gap:1px}
.dd-scroll::-webkit-scrollbar{width:7px}
.dd-scroll::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:8px}
.dd-opt{display:flex;align-items:center;gap:8px;width:100%;padding:8px 9px;border-radius:7px;
  font-family:inherit;font-size:12.5px;font-weight:600;color:var(--ink);text-align:start;
  transition:background .11s}
.dd-opt span{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dd-opt:hover{background:var(--hover-bg)}
.dd-opt.on{background:var(--selected-bg);font-weight:700}
.dd-tick{width:13px;height:13px;stroke:var(--accent);flex:none}
.dd-empty{padding:14px;text-align:center;font-size:11.5px;color:var(--faint);font-weight:600}
.dd-reset{display:flex;align-items:center;gap:5px;height:34px;padding:0 11px;border-radius:9px;
  border:1px dashed var(--border-strong);background:transparent;
  font-family:inherit;font-size:11.5px;font-weight:700;color:var(--muted);transition:all .13s}
.dd-reset:hover{color:var(--error);border-color:var(--error);background:var(--error-bg)}
.dd-reset .ic{stroke:currentColor;width:12px;height:12px}

/* ===== Add User drawer ===== */
.nu-scrim{position:fixed;inset:0;z-index:90;background:rgba(4,16,15,.42);
  backdrop-filter:blur(2px);animation:nuFade .18s ease}
@keyframes nuFade{from{opacity:0}to{opacity:1}}
.nu-drawer{position:fixed;top:0;bottom:0;inset-inline-end:0;z-index:91;width:min(560px,100%);
  background:var(--card);border-inline-start:1px solid var(--border);
  display:flex;flex-direction:column;box-shadow:-8px 0 32px rgba(0,0,0,.16);
  animation:nuIn .22s cubic-bezier(.22,1,.36,1)}
[data-theme="dark"] .nu-drawer{box-shadow:-8px 0 32px rgba(0,0,0,.5)}
@keyframes nuIn{from{transform:translateX(var(--nu-off,100%))}to{transform:translateX(0)}}
[dir="rtl"] .nu-drawer{--nu-off:-100%}
@media(prefers-reduced-motion:reduce){.nu-drawer,.nu-scrim{animation:none}}
.nu-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;
  padding:20px 22px 16px;border-bottom:1px solid var(--border)}
.nu-title{font-size:16px;font-weight:800;color:var(--ink)}
.nu-sub{font-size:11.5px;color:var(--muted);margin-top:3px}
.nu-close{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);
  background:var(--surface);display:flex;align-items:center;justify-content:center;flex:none}
.nu-close .ic{stroke:var(--muted);width:15px;height:15px}
.nu-close:hover{background:var(--hover-bg);border-color:var(--border-strong)}
.nu-close:hover .ic{stroke:var(--ink)}
.nu-body{flex:1;overflow-y:auto;padding:18px 22px 22px}
.nu-body::-webkit-scrollbar{width:8px}
.nu-body::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:8px}
.nu-sec{font-size:10px;font-weight:800;color:var(--faint);letter-spacing:.06em;
  text-transform:uppercase;margin:16px 0 10px}
.nu-sec:first-child{margin-top:0}
.nu-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.nu-f{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.nu-f label{font-size:11.5px;font-weight:700;color:var(--ink);display:flex;align-items:center;gap:4px}
.nu-f label i{color:var(--error);font-style:normal}
.nu-opt{margin-inline-start:auto;font-size:10px;font-weight:600;color:var(--faint)}
.nu-f input,.nu-f textarea{height:36px;padding:0 11px;border:1px solid var(--border);border-radius:9px;
  background:var(--surface);color:var(--ink);font-family:inherit;font-size:12.5px;outline:none;
  transition:border-color .13s,box-shadow .13s}
.nu-f textarea{height:auto;padding:9px 11px;resize:vertical;line-height:1.55}
.nu-f input::placeholder,.nu-f textarea::placeholder{color:var(--faint)}
.nu-f input:focus,.nu-f textarea:focus{border-color:var(--focus-ring);box-shadow:0 0 0 3px var(--focus-soft)}
.nu-f.err input,.nu-f.err textarea{border-color:var(--error);background:var(--error-bg)}
.nu-f.err .dd-btn{border-color:var(--error)}
.nu-f .dd,.nu-f .dd-btn{width:100%}
.nu-f .dd-pop{width:100%}
.nu-err{display:flex;align-items:center;gap:4px;font-size:10.5px;font-weight:600;color:var(--error)}
.nu-err .ic{stroke:var(--error);flex:none}
.nu-seg{display:flex;gap:6px}
.nu-seg button{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;height:36px;
  border:1px solid var(--border);border-radius:9px;background:var(--surface);
  font-family:inherit;font-size:12px;font-weight:600;color:var(--muted);transition:all .13s}
.nu-seg button .ic{stroke:currentColor;width:13px;height:13px}
.nu-seg button:hover{border-color:var(--border-strong);color:var(--ink)}
.nu-seg button.on{background:var(--accent);border-color:var(--accent);color:var(--on-accent);font-weight:700}
.nu-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 13px;
  border:1px solid var(--border);border-radius:10px;background:var(--surface);margin-bottom:12px}
.nu-rt{font-size:12.5px;font-weight:700;color:var(--ink)}
.nu-rs{font-size:10.5px;color:var(--muted);margin-top:2px}
.nu-warns{display:flex;flex-direction:column;gap:7px;margin:4px 0 12px}
.nu-warn{display:flex;gap:8px;padding:10px 11px;border-radius:9px;border:1px solid;font-size:11.5px}
.nu-warn .ic{flex:none;margin-top:1px;width:13px;height:13px}
.nu-warn b{display:block;font-weight:800;margin-bottom:2px}
.nu-warn span{display:block;line-height:1.5;opacity:.88}
.nu-warn.high{background:var(--error-bg);border-color:var(--error-border);color:var(--error)}
.nu-warn.high .ic{stroke:var(--error)}
.nu-warn.mid{background:var(--warning-bg);border-color:var(--warning-border);color:var(--warning)}
.nu-warn.mid .ic{stroke:var(--warning)}
.nu-warn.info{background:var(--success-bg);border-color:var(--success-border);color:var(--success)}
.nu-warn.info .ic{stroke:var(--success)}
.nu-foot{display:flex;align-items:center;gap:9px;padding:14px 22px;border-top:1px solid var(--border);
  background:var(--surface)}
.nu-foot-err{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:var(--error);
  margin-inline-end:auto}
.nu-foot-err .ic{stroke:var(--error)}
.nu-foot .nu-btn:first-of-type{margin-inline-start:auto}
.nu-btn{display:flex;align-items:center;justify-content:center;gap:6px;height:38px;padding:0 20px;
  border-radius:9px;border:1px solid var(--border);background:var(--card);
  font-family:inherit;font-size:12.5px;font-weight:700;color:var(--ink);transition:all .13s}
.nu-btn:hover{background:var(--hover-bg);border-color:var(--border-strong)}
.nu-btn.primary{background:var(--accent);border-color:var(--accent);color:var(--on-accent)}
.nu-btn.primary .ic{stroke:var(--on-accent)}
.nu-btn.primary:hover{background:var(--accent-hover);border-color:var(--accent-hover)}
@media(max-width:720px){
  .nu-drawer{width:100%}
  .nu-grid{grid-template-columns:1fr}
  .dd-btn{width:100%}
  .dd{flex:1;min-width:132px}
  .dd-pop{width:100%;min-width:180px}
}

/* ===== profile drawer ===== */
.pf-hero{display:flex;gap:14px;align-items:center;padding:4px 0 16px;border-bottom:1px solid var(--border);margin-bottom:4px}
.pf-photo{width:62px;height:62px;border-radius:50%;flex:none;display:flex;align-items:center;
  justify-content:center;background:var(--brand-2);color:var(--on-brand);
  font-size:21px;font-weight:800;letter-spacing:.02em}
.pf-hb{min-width:0}
.pf-name{font-size:17px;font-weight:800;color:var(--ink);line-height:1.25}
.pf-jt{font-size:11.5px;color:var(--muted);margin:2px 0 8px}
.pf-chips{display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.pf-row{display:flex;gap:11px;align-items:center;padding:9px 0;border-bottom:1px solid var(--border-soft)}
.pf-row:last-child{border-bottom:none}
.pf-ic{width:29px;height:29px;border-radius:8px;flex:none;display:flex;align-items:center;
  justify-content:center;background:var(--surface);border:1px solid var(--border)}
.pf-ic .ic{stroke:var(--muted);width:13px;height:13px}
.pf-rb{display:flex;flex-direction:column;gap:1px;min-width:0;flex:1}
.pf-lbl{font-size:10.5px;font-weight:600;color:var(--faint)}
.pf-val{font-size:12.5px;font-weight:700;color:var(--ink);overflow-wrap:anywhere}
.pf-val.ltr{direction:ltr;text-align:start}
.nu-btn.danger{background:var(--error-bg);border-color:var(--error-border);color:var(--error)}
.nu-btn.danger .ic{stroke:var(--error)}
.nu-btn.danger:hover{background:var(--error);border-color:var(--error);color:#fff}
.nu-btn.danger:hover .ic{stroke:#fff}
.nu-btn:disabled{opacity:.5;cursor:not-allowed}
.nu-btn:disabled:hover{background:var(--accent);border-color:var(--accent)}

/* ===== permissions drawer ===== */
.nu-drawer.wide{width:min(660px,100%)}
.pm-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:11px 22px;
  background:var(--surface);border-bottom:1px solid var(--border)}
.pm-count{font-size:11.5px;font-weight:700;color:var(--ink)}
.pm-diff{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:700;
  color:var(--warning);background:var(--warning-bg);border:1px solid var(--warning-border);
  padding:3px 8px;border-radius:20px}
.pm-diff .ic{stroke:var(--warning)}
.pm-reset{display:inline-flex;align-items:center;gap:5px;margin-inline-start:auto;
  font-size:11px;font-weight:700;color:var(--muted);border:1px dashed var(--border-strong);
  border-radius:8px;padding:5px 9px;background:transparent;transition:all .13s}
.pm-reset .ic{stroke:currentColor}
.pm-reset:hover{color:var(--ink);border-color:var(--ink)}
.pm-mod{border:1px solid var(--border);border-radius:11px;padding:12px 13px;margin-bottom:9px;
  background:var(--card);transition:border-color .13s,opacity .13s}
.pm-mod.off{opacity:.62}
.pm-mod:hover{border-color:var(--border-strong)}
.pm-mh{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:9px}
.pm-mt{font-size:13px;font-weight:800;color:var(--ink);display:flex;align-items:center;gap:7px}
.pm-mt span{font-size:10px;font-weight:700;color:var(--faint);background:var(--surface);
  border:1px solid var(--border);border-radius:20px;padding:1px 7px}
.pm-all{font-size:10.5px;font-weight:700;color:var(--accent);background:transparent}
.pm-all:hover{text-decoration:underline;text-underline-offset:2px}
.pm-acts{display:grid;grid-template-columns:repeat(auto-fill,minmax(94px,1fr));gap:6px}
.pm-act{display:flex;align-items:center;gap:6px;padding:7px 8px;border-radius:8px;cursor:pointer;
  border:1px solid var(--border);background:var(--surface);transition:all .12s;position:relative}
.pm-act input{position:absolute;opacity:0;width:0;height:0}
.pm-box{width:15px;height:15px;border-radius:4px;border:1.5px solid var(--border-strong);
  background:var(--card);flex:none;display:flex;align-items:center;justify-content:center}
.pm-box .ic{stroke:var(--on-accent);opacity:0;width:9px;height:9px;stroke-width:3}
.pm-lbl{font-size:11.5px;font-weight:600;color:var(--muted)}
.pm-act:hover{border-color:var(--border-strong);background:var(--hover-bg)}
.pm-act.on{border-color:var(--accent);background:var(--selected-bg)}
.pm-act.on .pm-box{background:var(--accent);border-color:var(--accent)}
.pm-act.on .pm-box .ic{opacity:1}
.pm-act.on .pm-lbl{color:var(--ink);font-weight:700}
.pm-act.diff::after{content:"";position:absolute;top:4px;inset-inline-end:4px;width:5px;height:5px;
  border-radius:50%;background:var(--warning)}
.pm-act input:focus-visible + .pm-box{outline:2px solid var(--focus-ring);outline-offset:2px}

/* ===== disable confirmation ===== */
.ds-wrap{position:fixed;inset:0;z-index:91;display:flex;align-items:center;justify-content:center;
  padding:20px;pointer-events:none}
.ds-card{pointer-events:auto;width:min(420px,100%);background:var(--card);
  border:1px solid var(--border);border-radius:16px;padding:24px 22px 18px;
  box-shadow:0 20px 50px rgba(0,0,0,.22);animation:dsIn .2s cubic-bezier(.22,1,.36,1)}
[data-theme="dark"] .ds-card{box-shadow:0 20px 50px rgba(0,0,0,.6)}
@keyframes dsIn{from{opacity:0;transform:translateY(10px) scale(.97)}to{opacity:1;transform:none}}
@media(prefers-reduced-motion:reduce){.ds-card{animation:none}}
.ds-ic{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;
  background:var(--error-bg);border:1px solid var(--error-border);margin-bottom:13px}
.ds-ic .ic{stroke:var(--error);width:22px;height:22px}
.ds-title{font-size:16px;font-weight:800;color:var(--ink);margin-bottom:6px}
.ds-sub{font-size:12.5px;color:var(--muted);line-height:1.6}
.ds-sub b{color:var(--ink);font-weight:700}
.ds-keep{display:flex;flex-direction:column;gap:6px;margin-top:14px;padding:11px 12px;
  border-radius:10px;background:var(--surface);border:1px solid var(--border)}
.ds-k{display:flex;align-items:center;gap:7px;font-size:11.5px;font-weight:600;color:var(--success)}
.ds-k .ic{stroke:var(--success);flex:none}
.ds-k.off{color:var(--error)}
.ds-k.off .ic{stroke:var(--error)}
.ds-foot{display:flex;gap:8px;margin-top:18px}
.ds-foot .nu-btn{flex:1}
@media(max-width:720px){.nu-drawer.wide{width:100%}.pm-acts{grid-template-columns:1fr 1fr}}

/* ===== SETTINGS ===== */
.st-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.st-card{display:flex;flex-direction:column;background:var(--card);border:1px solid var(--border);
  border-radius:14px;padding:16px;transition:border-color .14s}
.st-card:hover{border-color:var(--border-strong)}
.st-ch{display:flex;gap:11px;align-items:flex-start;margin-bottom:13px}
.st-cic{width:36px;height:36px;border-radius:10px;flex:none;display:flex;align-items:center;
  justify-content:center;background:var(--surface);border:1px solid var(--border)}
.st-cic .ic{stroke:var(--muted);width:17px;height:17px}
.st-ct{font-size:14px;font-weight:800;color:var(--ink)}
.st-cd{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.45}
.st-cb{flex:1;display:flex;flex-direction:column;gap:1px;margin-bottom:13px}
.st-kv{display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:8px 0;border-bottom:1px solid var(--border-soft);min-height:36px}
.st-kv:last-child{border-bottom:none}
.st-kv>span{font-size:11.5px;color:var(--muted);font-weight:600}
.st-kv>b{font-size:11.5px;color:var(--ink);font-weight:700;text-align:end;overflow-wrap:anywhere}
.st-mg{width:100%}
.st-note{display:flex;align-items:center;gap:5px;font-size:10.5px;font-weight:600;color:var(--faint);
  padding-top:10px;border-top:1px solid var(--border-soft)}
.st-note .ic{stroke:var(--faint)}
.st-sysb{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.st-sysb .nu-btn{height:34px;padding:0 10px;font-size:11.5px}
.nu-seg.sm button{height:29px;font-size:11px;padding:0 9px;gap:4px}
.nu-seg.sm{flex:none}
/* backup progress */
.st-prog{height:6px;border-radius:20px;background:var(--chart-track);overflow:hidden;margin-top:9px}
.st-prog-b{height:100%;background:var(--accent);border-radius:20px;transition:width .25s ease}
.st-prog-t{font-size:10.5px;font-weight:700;color:var(--muted);margin-top:5px}
.st-ok{display:flex;align-items:center;gap:5px;margin-top:9px;padding:7px 9px;border-radius:8px;
  font-size:11px;font-weight:700;color:var(--success);background:var(--success-bg);
  border:1px solid var(--success-border)}
.st-ok .ic{stroke:var(--success)}
/* panel extras */
.st-prev{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;
  border-radius:9px;background:var(--surface);border:1px dashed var(--border-strong);margin-bottom:12px}
.st-prev span{font-size:10.5px;font-weight:700;color:var(--faint)}
.st-prev b{font-size:13px;font-weight:800;color:var(--ink);direction:ltr}
.st-link{display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:10px;
  border:1px solid var(--border);background:var(--surface);cursor:pointer;margin-bottom:12px;
  transition:border-color .13s,background .13s}
.st-link:hover{border-color:var(--accent);background:var(--hover-bg)}
.st-link>.ic{stroke:var(--faint);margin-inline-start:auto;flex:none}
/* integrations */
.st-ints{display:flex;flex-direction:column;gap:9px}
.st-int{display:flex;gap:11px;align-items:center;padding:13px;border-radius:11px;
  border:1px solid var(--border);background:var(--card)}
.st-int.on{border-color:var(--success-border);background:var(--success-bg)}
.st-int-ic{width:34px;height:34px;border-radius:9px;flex:none;display:flex;align-items:center;
  justify-content:center;background:var(--surface);border:1px solid var(--border)}
.st-int-ic .ic{stroke:var(--muted)}
.st-int-b{flex:1;min-width:0}
.st-int-t{display:flex;align-items:center;gap:7px;flex-wrap:wrap;font-size:12.5px;font-weight:800;color:var(--ink)}
.st-int-d{font-size:11px;color:var(--muted);margin-top:2px}
.st-int-a{display:flex;gap:6px;flex:none}
.st-int-a .nu-btn{height:31px;padding:0 11px;font-size:11px}
/* toast */
.st-toast{position:fixed;bottom:22px;inset-inline-start:50%;transform:translateX(-50%);z-index:95;
  display:flex;align-items:center;gap:7px;padding:11px 18px;border-radius:11px;
  background:var(--success-bg);border:1px solid var(--success-border);color:var(--success);
  font-size:12.5px;font-weight:700;box-shadow:var(--shadow-md);animation:stUp .22s ease}
.st-toast .ic{stroke:var(--success)}
@keyframes stUp{from{opacity:0;transform:translate(-50%,10px)}to{opacity:1;transform:translate(-50%,0)}}
@media(prefers-reduced-motion:reduce){.st-toast{animation:none}}
.ds-ic.info{background:var(--success-bg);border-color:var(--success-border)}
.ds-ic.info .ic{stroke:var(--success)}

/* ===== SIDEBAR COLLAPSE =====
   Earlier rules targeted classes that don't exist (.nav-group-label,
   .sidebar-brand, .profile-info). Rewritten against the real markup. */
.sidebar{transition:width .22s cubic-bezier(.22,1,.36,1)}
.nav-item span,.brand-name,.brand-env,.nav-label{transition:opacity .12s ease}
@media(prefers-reduced-motion:reduce){.sidebar{transition:none}}

[data-nav="collapsed"]{--sidebar-w:74px}
/* hide every label, keep the icons */
[data-nav="collapsed"] .brand-name,
[data-nav="collapsed"] .brand-env,
[data-nav="collapsed"] .nav-item > span:not(.badge),
[data-nav="collapsed"] .nav-caret,
[data-nav="collapsed"] .profile-name,
[data-nav="collapsed"] .profile-role,
[data-nav="collapsed"] .profile-branch,
[data-nav="collapsed"] .nav-sub{display:none}
/* icons centred, equal padding, square hit area */
[data-nav="collapsed"] .nav-item{
  justify-content:center;align-items:center;gap:0;
  padding:0;width:42px;height:42px;margin:0 auto 3px;border-radius:10px}
[data-nav="collapsed"] .nav-item .ic{width:18px;height:18px;margin:0}
/* active indicator: a filled pill, not the edge bar (which is invisible at 74px) */
[data-nav="collapsed"] .nav-item.active{background:rgba(255,255,255,.16)}
[data-nav="collapsed"] .nav-item.active::before{
  inset-inline-start:auto;inset-inline-end:-9px;top:50%;transform:translateY(-50%);
  width:3px;height:20px;border-radius:3px;background:#F5F1EB}
/* groups stay visually separated even with no labels */
[data-nav="collapsed"] .nav-label{
  height:1px;padding:0;margin:12px auto;width:26px;overflow:hidden;
  background:rgba(255,255,255,.13);color:transparent;letter-spacing:0}
[data-nav="collapsed"] .nav-group:first-child .nav-label{margin-top:4px}
[data-nav="collapsed"] .brand-head{padding:18px 0 14px;justify-content:center}
[data-nav="collapsed"] .brand-logo{width:38px;height:38px}
[data-nav="collapsed"] .profile{justify-content:center;padding:10px 0;gap:0}
[data-nav="collapsed"] .avatar{margin:0}
[data-nav="collapsed"] .nav{padding-inline:8px}
[data-nav="collapsed"] .nav-item .badge{
  position:absolute;top:3px;inset-inline-end:3px;margin:0;min-width:15px;height:15px;
  padding:0 3px;font-size:8.5px;display:flex;align-items:center;justify-content:center}
/* tooltip on hover — the label has to live somewhere */
[data-nav="collapsed"] .nav-item::after{
  content:attr(data-tip);position:absolute;inset-inline-start:calc(100% + 10px);top:50%;
  transform:translateY(-50%);z-index:70;white-space:nowrap;pointer-events:none;
  background:var(--elev-4,#123230);color:var(--ink,#E8F0EE);
  border:1px solid var(--border-strong,#2C4B48);border-radius:8px;
  padding:6px 10px;font-size:11.5px;font-weight:700;
  box-shadow:0 4px 14px rgba(0,0,0,.3);
  opacity:0;transition:opacity .14s ease .04s;}
[data-nav="collapsed"] .nav-item:hover::after{opacity:1}
[data-nav="collapsed"] .nav-item:not([data-tip])::after{display:none}

@media(max-width:720px){
  .st-grid{grid-template-columns:1fr}
  .st-sysb{grid-template-columns:1fr}
  .st-int{flex-wrap:wrap}
  .st-int-a{width:100%}
  .st-int-a .nu-btn{flex:1}
}

/* ===== AI ASSISTANT ===== */
.ai-fab{position:fixed;bottom:24px;inset-inline-end:24px;z-index:80;
  width:54px;height:54px;border-radius:50%;border:1px solid var(--ai-bd);
  background:var(--ai-fab);display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 22px rgba(0,0,0,.18);cursor:pointer;
  transition:transform .18s cubic-bezier(.22,1,.36,1),box-shadow .18s,opacity .16s}
[data-theme="dark"] .ai-fab{box-shadow:0 6px 24px rgba(0,0,0,.5)}
.ai-fab .ic{stroke:var(--on-accent);width:22px;height:22px}
.ai-fab:hover{transform:translateY(-2px) scale(1.05);box-shadow:0 10px 28px rgba(0,0,0,.24)}
.ai-fab.hid{opacity:0;pointer-events:none;transform:scale(.85)}
/* soft pulse — subtle, not attention-grabbing */
.ai-fab-p{position:absolute;inset:-1px;border-radius:50%;border:1.5px solid var(--accent);
  opacity:0;animation:aiP 3.4s ease-out infinite}
@keyframes aiP{0%{transform:scale(1);opacity:.5}70%{transform:scale(1.35);opacity:0}100%{opacity:0}}
@media(prefers-reduced-motion:reduce){.ai-fab-p{animation:none}.ai-fab{transition:none}}

.ai-panel{position:fixed;bottom:24px;inset-inline-end:24px;z-index:81;
  width:min(396px,calc(100vw - 32px));height:min(590px,calc(100vh - 48px));
  display:flex;flex-direction:column;overflow:hidden;
  background:var(--ai-bg);border:1px solid var(--border-strong);border-radius:18px;
  box-shadow:0 16px 48px rgba(0,0,0,.20);
  animation:aiIn .24s cubic-bezier(.22,1,.36,1)}
[data-theme="dark"] .ai-panel{box-shadow:0 16px 48px rgba(0,0,0,.6)}
.ai-panel.big{width:min(660px,calc(100vw - 32px));height:min(80vh,760px)}
@keyframes aiIn{from{opacity:0;transform:translateY(14px) scale(.97)}to{opacity:1;transform:none}}
@media(prefers-reduced-motion:reduce){.ai-panel{animation:none}}
.ai-head{display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:13px 15px;border-bottom:1px solid var(--border);background:var(--card);flex:none}
.ai-hl{display:flex;align-items:center;gap:9px;min-width:0}
.ai-dot{width:8px;height:8px;border-radius:50%;background:var(--success);flex:none;
  box-shadow:0 0 0 3px var(--success-bg)}
.ai-name{font-size:13px;font-weight:800;color:var(--ink);line-height:1.2}
.ai-sub{font-size:10px;color:var(--faint);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ai-ha{display:flex;gap:4px;flex:none}
.ai-ic{width:26px;height:26px;border-radius:7px;border:1px solid var(--border);
  background:var(--surface);display:flex;align-items:center;justify-content:center}
.ai-ic .ic{stroke:var(--muted)}
.ai-ic:hover{background:var(--hover-bg);border-color:var(--border-strong)}
.ai-ic:hover .ic{stroke:var(--ink)}
.ai-body{flex:1;overflow-y:auto;padding:15px;display:flex;flex-direction:column;gap:13px}
.ai-body::-webkit-scrollbar{width:7px}
.ai-body::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:8px}
/* empty state */
.ai-empty{margin:auto;text-align:center;padding:14px}
.ai-hero{width:52px;height:52px;border-radius:15px;margin:0 auto 12px;display:flex;
  align-items:center;justify-content:center;background:var(--selected-bg);border:1px solid var(--accent)}
.ai-hero .ic{stroke:var(--accent);width:24px;height:24px}
.ai-h1{font-size:14.5px;font-weight:800;color:var(--ink)}
.ai-h2{font-size:11.5px;color:var(--muted);line-height:1.6;margin-top:5px;max-width:270px}
/* messages */
.ai-m{display:flex;gap:8px;max-width:100%}
.ai-m.u{justify-content:flex-end}
.ai-m.u .ai-b{background:var(--accent);color:var(--on-accent);border-radius:13px 13px 3px 13px;
  padding:9px 12px;font-size:12.5px;font-weight:600;max-width:82%;line-height:1.55}
.ai-av{width:26px;height:26px;border-radius:8px;flex:none;display:flex;align-items:center;
  justify-content:center;background:var(--selected-bg);border:1px solid var(--border)}
.ai-av .ic{stroke:var(--accent)}
.ai-m.a .ai-b{background:var(--card);border:1px solid var(--border);border-radius:13px 13px 13px 3px;
  padding:11px 12px;max-width:88%;min-width:0}
.ai-t{font-size:12.5px;color:var(--ink);line-height:1.7;font-weight:500}
.ai-time{font-size:9px;color:var(--faint);margin-top:7px;font-weight:600}
/* data cards inside answers */
.ai-cards{display:flex;flex-direction:column;gap:6px;margin-top:10px}
.ai-c{padding:8px 10px;border-radius:9px;background:var(--surface);
  border:1px solid var(--border);border-inline-start:2.5px solid var(--faint)}
.ai-c.up{border-inline-start-color:var(--up)}
.ai-c.dn{border-inline-start-color:var(--down)}
.ai-c-t{font-size:10px;font-weight:700;color:var(--faint);margin-bottom:2px}
.ai-c-v{font-size:12.5px;font-weight:700;color:var(--ink);line-height:1.5}
.ai-c-s{font-size:10.5px;color:var(--muted);margin-top:2px;font-weight:600}
/* mini charts */
.ai-chart{margin-top:10px;padding:10px;border-radius:10px;background:var(--surface);
  border:1px solid var(--border)}
.ai-chart-l{font-size:10px;font-weight:700;color:var(--faint);margin-bottom:6px}
.ai-chart svg{width:100%;display:block}
.ai-bar{display:flex;align-items:center;gap:7px;margin-top:5px}
.ai-bar span{font-size:10.5px;font-weight:600;color:var(--muted);width:74px;flex:none;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ai-bar i{flex:1;height:7px;border-radius:20px;background:var(--chart-track);overflow:hidden}
.ai-bar i b{display:block;height:100%;border-radius:20px;background:var(--fc-1)}
.ai-bar em{font-size:10.5px;font-weight:800;color:var(--ink);font-style:normal;width:32px;text-align:end}
.ai-rad{display:flex;align-items:center;gap:10px}
.ai-rad svg{width:68px;flex:none}
.ai-rad .ai-chart-l{margin:0}
/* loading */
.ai-load{display:flex;gap:4px;padding:3px 0}
.ai-load i{width:6px;height:6px;border-radius:50%;background:var(--faint);
  animation:aiL 1.1s ease-in-out infinite}
.ai-load i:nth-child(2){animation-delay:.15s}
.ai-load i:nth-child(3){animation-delay:.3s}
@keyframes aiL{0%,60%,100%{opacity:.28;transform:translateY(0)}30%{opacity:1;transform:translateY(-3px)}}
@media(prefers-reduced-motion:reduce){.ai-load i{animation:none;opacity:.6}}
/* quick prompts */
.ai-quick{display:flex;gap:6px;padding:9px 12px;overflow-x:auto;flex:none;
  border-top:1px solid var(--border-soft);background:var(--card)}
.ai-quick::-webkit-scrollbar{height:0}
.ai-q{flex:none;padding:6px 11px;border-radius:20px;border:1px solid var(--border);
  background:var(--surface);font-family:inherit;font-size:11px;font-weight:600;
  color:var(--muted);white-space:nowrap;transition:all .12s}
.ai-q:hover{border-color:var(--accent);color:var(--ink);background:var(--selected-bg)}
/* input */
.ai-input{display:flex;gap:7px;padding:11px 12px;border-top:1px solid var(--border);
  background:var(--card);flex:none}
.ai-input input{flex:1;min-width:0;height:38px;padding:0 12px;border-radius:10px;
  border:1px solid var(--border);background:var(--surface);color:var(--ink);
  font-family:inherit;font-size:12.5px;outline:none;transition:border-color .13s}
.ai-input input:focus{border-color:var(--focus-ring);box-shadow:0 0 0 3px var(--focus-soft)}
.ai-input input:disabled{opacity:.6}
.ai-send{width:38px;height:38px;border-radius:10px;flex:none;background:var(--accent);
  border:1px solid var(--accent);display:flex;align-items:center;justify-content:center;
  transition:background .13s}
.ai-send .ic{stroke:var(--on-accent)}
.ai-send:hover:not(:disabled){background:var(--accent-hover)}
.ai-send:disabled{opacity:.5;cursor:not-allowed}
@media(max-width:720px){
  .ai-fab{bottom:16px;inset-inline-end:16px;width:48px;height:48px}
  .ai-panel,.ai-panel.big{inset-inline-end:8px;bottom:8px;width:calc(100vw - 16px);
    height:min(76vh,560px)}
}

/* ===== TARGETS & GOALS ===== */
.tg-kgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(184px,1fr));gap:11px}
.tg-k{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:14px;
  cursor:pointer;transition:border-color .14s,transform .14s}
.tg-k:hover{border-color:var(--accent);transform:translateY(-1px)}
.tg-k.big{background:var(--selected-bg);border-color:var(--accent)}
.tg-k-h{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.tg-k-ic{width:26px;height:26px;border-radius:7px;flex:none;display:flex;align-items:center;
  justify-content:center;background:var(--surface);border:1px solid var(--border)}
.tg-k-ic .ic{stroke:var(--muted);width:13px;height:13px}
.tg-k-t{font-size:11px;font-weight:700;color:var(--muted)}
.tg-k-v{font-size:24px;font-weight:800;color:var(--ink);letter-spacing:-.02em;line-height:1}
.tg-k-v span{font-size:12px;font-weight:700;color:var(--faint);margin-inline-start:2px}
.tg-k-b{height:6px;border-radius:20px;background:var(--chart-track);overflow:hidden;margin:9px 0 7px}
.tg-k-b i{display:block;height:100%;border-radius:20px;transition:width .4s cubic-bezier(.22,1,.36,1)}
.tg-k-s{font-size:10.5px;color:var(--muted);font-weight:600}
.tg-k-s b{color:var(--ink);font-weight:800}
/* bullet */
.tg-prow{display:grid;grid-template-columns:1fr 260px;gap:12px}
.tg-buls{display:flex;flex-direction:column;gap:13px;margin-top:6px}
.tg-bul{cursor:pointer}
.tg-bul:hover .tg-bul-h span{color:var(--ink)}
.tg-bul-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.tg-bul-h span{font-size:11.5px;font-weight:700;color:var(--muted)}
.tg-bul-h b{font-size:12px;font-weight:800}
.tg-bul-h b.ok{color:var(--success)}
.tg-bul-h b.warn{color:var(--fc-1)}
.tg-bul-h b.bad{color:var(--warning)}
.tg-bul-t{position:relative;height:15px;border-radius:5px;background:var(--chart-track);overflow:hidden}
.tg-bul-q{position:absolute;inset-block:0;inset-inline-start:0;background:var(--border);opacity:.5}
.tg-bul-f{position:absolute;inset-block:2px;inset-inline-start:0;border-radius:4px;
  transition:width .5s cubic-bezier(.22,1,.36,1)}
.tg-bul-f.ok{background:var(--success)}
.tg-bul-f.warn{background:var(--fc-1)}
.tg-bul-f.bad{background:var(--warning)}
.tg-bul-m{position:absolute;top:-1px;bottom:-1px;width:2.5px;background:var(--ink);border-radius:2px}
.tg-bul-l{display:flex;justify-content:space-between;margin-top:4px}
.tg-bul-l span{font-size:10px;color:var(--faint);font-weight:600}
/* radial */
.tg-radc{display:flex;flex-direction:column}
.tg-rad{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:8px 0}
.tg-rad svg{width:130px;height:130px}
.tg-rad-a{transition:stroke-dashoffset .6s cubic-bezier(.22,1,.36,1)}
.tg-rad-s{font-size:11px;font-weight:700;color:var(--muted);margin-top:9px;text-align:center}
.tg-svg{width:100%;height:210px;display:block;margin-top:6px}
/* unit bars */
.tg-ub{display:flex;flex-direction:column;gap:11px;margin-top:8px}
.tg-ur{display:grid;grid-template-columns:78px 1fr 52px 96px;align-items:center;gap:9px}
.tg-un{font-size:12px;font-weight:700;color:var(--ink)}
.tg-ut{position:relative;height:20px;border-radius:6px;background:var(--chart-track);overflow:visible}
.tg-ut i{display:block;height:100%;border-radius:6px;transition:width .5s cubic-bezier(.22,1,.36,1)}
.tg-u100{position:absolute;top:-3px;bottom:-3px;width:2px;background:var(--ink);border-radius:2px;opacity:.55}
.tg-uv{font-size:12px;font-weight:800;color:var(--ink);text-align:end}
.tg-uv.ok{color:var(--success)}
.tg-uv.bad{color:var(--warning)}
.tg-ud{font-size:10px;color:var(--faint);font-weight:600;text-align:end}
.tg-note{display:flex;align-items:center;gap:5px;margin-top:11px;padding-top:9px;
  border-top:1px solid var(--border-soft);font-size:10.5px;color:var(--faint);font-weight:600}
.tg-note .ic{stroke:var(--faint)}
/* tables */
.tg-sub2{font-size:10px;color:var(--faint);font-weight:600;margin-top:2px}
.tg-mini{height:5px;border-radius:20px;background:var(--chart-track);overflow:hidden;min-width:52px;margin-bottom:3px}
.tg-mini i{display:block;height:100%;border-radius:20px}
.tg-achv{font-size:11px;font-weight:800;color:var(--ink)}
.tg-brow,.tg-trow{cursor:pointer}
.tg-brow:hover,.tg-trow:hover{background:var(--hover-bg)}
/* goal categories */
.tg-cats{display:grid;grid-template-columns:repeat(auto-fill,minmax(212px,1fr));gap:11px}
.tg-cat{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px}
.tg-cat:hover{border-color:var(--border-strong)}
.tg-cat-h{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.tg-cat-h b{font-size:12.5px;font-weight:800;color:var(--ink)}
.tg-cat-h span{margin-inline-start:auto;font-size:13px;font-weight:800;color:var(--fc-1)}
.tg-cat-h span.ok{color:var(--success)}
.tg-cat-h span.bad{color:var(--warning)}
.tg-cat-f{display:flex;justify-content:space-between;margin-top:8px}
.tg-cat-f span{font-size:10.5px;color:var(--muted);font-weight:600}
.tg-cat-f b{color:var(--ink);font-weight:800}
.tg-cat-f b.ok{color:var(--success)}
/* drawers */
.tg-dg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:14px 0}
.tg-d{padding:10px 11px;border-radius:9px;background:var(--surface);border:1px solid var(--border)}
.tg-d span{display:block;font-size:10px;font-weight:700;color:var(--faint);margin-bottom:3px}
.tg-d b{font-size:13px;font-weight:800;color:var(--ink)}
